<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UA Flowchart Drag and Drop</title>
  <script src="interactive_theme.js"></script>
  <link rel="stylesheet" href="interactive_learning.css">
  <style>
    body.ua-flowchart{
      margin:0;
      min-height:100vh;
      color:var(--mls-text);
      background:linear-gradient(180deg,#f7f8fc 0,#eef1f8 48%,#f0f2f8 100%);
      font-family:var(--mls-sans);
    }
    .ua-wrap{max-width:1320px;margin:0 auto;padding:22px 18px 34px}
    .ua-hero{
      background:var(--mls-bg2);
      border:1px solid var(--mls-border);
      border-radius:var(--mls-r2);
      box-shadow:0 12px 28px rgba(37,60,105,.08);
      padding:18px;
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .ua-kicker{font-family:var(--mls-mono);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9a8500;margin-bottom:4px}
    h1{font-size:30px;line-height:1.1;margin:0;color:var(--mls-text);letter-spacing:0}
    .ua-sub{margin:6px 0 0;color:var(--mls-text2);font-size:14px;line-height:1.45;max-width:760px}
    .ua-badge{background:#c8a800;color:#fff;border-radius:999px;padding:8px 12px;font-family:var(--mls-mono);font-size:12px;font-weight:700}
    .toolbar{
      background:var(--mls-bg2);
      border:1px solid var(--mls-border);
      border-radius:var(--mls-r2);
      padding:12px;
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:16px;
      box-shadow:0 8px 22px rgba(37,60,105,.06);
    }
    .ua-btn{
      border:1px solid var(--mls-border);
      border-radius:var(--mls-r);
      background:var(--mls-bg3);
      color:var(--mls-text);
      font:700 13px/1 var(--mls-sans);
      padding:10px 13px;
      cursor:pointer;
    }
    .ua-btn.primary{background:var(--mls-accent);border-color:var(--mls-accent);color:#fff}
    .ua-btn.good{background:#1a8a4a14;border-color:#1a8a4a55;color:var(--mls-success)}
    .score{margin-left:auto;font-family:var(--mls-mono);font-size:12px;color:var(--mls-text3)}
    .game{
      display:grid;
      grid-template-columns:minmax(240px,320px) 1fr;
      gap:14px;
      align-items:start;
    }
    .bank,.board{
      background:var(--mls-bg2);
      border:1px solid var(--mls-border);
      border-radius:var(--mls-r2);
      box-shadow:0 12px 28px rgba(37,60,105,.08);
    }
    .bank{position:sticky;top:78px;padding:14px;max-height:calc(100vh - 96px);overflow:auto}
    .bank-title{
      font-family:var(--mls-mono);
      font-size:12px;
      font-weight:700;
      letter-spacing:.09em;
      text-transform:uppercase;
      color:var(--mls-text3);
      margin-bottom:10px;
    }
    .bank-tabs{display:flex;gap:6px;margin-bottom:10px}
    .tab{
      flex:1;
      border:1px solid var(--mls-border);
      border-radius:999px;
      background:var(--mls-bg3);
      color:var(--mls-text2);
      padding:7px 8px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
    }
    .tab.active{background:#c8a800;color:#fff;border-color:#c8a800}
    .chip-list{display:flex;flex-direction:column;gap:8px}
    .chip{
      background:linear-gradient(180deg,#fff,#f7f8fc);
      border:1px solid var(--mls-border2);
      border-left:5px solid var(--chip-color,#c8a800);
      border-radius:var(--mls-r);
      padding:10px 10px;
      color:var(--mls-text);
      font-weight:700;
      font-size:13px;
      line-height:1.3;
      cursor:grab;
      user-select:none;
      box-shadow:0 5px 14px rgba(35,50,90,.09);
    }
    .chip:hover,.chip.selected{border-color:var(--mls-accent);box-shadow:0 8px 18px rgba(37,99,212,.13)}
    .chip:active{cursor:grabbing}
    .chip small{display:block;margin-top:4px;color:var(--mls-text3);font-family:var(--mls-mono);font-weight:700}
    .macro{--chip-color:#c8a800}
    .micro{--chip-color:#2f86c5}
    .board{padding:16px;overflow:hidden}
    .flow-top{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
    }
    .flow-line{height:2px;background:linear-gradient(90deg,transparent,var(--mls-border2),transparent)}
    .root-node{
      background:#c8a800;
      color:#fff;
      border-radius:999px;
      padding:11px 18px;
      text-align:center;
      font-weight:800;
      box-shadow:0 8px 16px rgba(160,130,0,.16);
      white-space:nowrap;
    }
    .branch-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .branch-card{
      border:1px solid var(--mls-border);
      background:#fbfcff;
      border-radius:var(--mls-r2);
      overflow:hidden;
      min-height:230px;
    }
    .branch-head{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      background:var(--mls-bg3);
      border-bottom:1px solid var(--mls-border);
    }
    .branch-dot{
      width:40px;
      height:40px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--branch,#c8a800);
      color:#fff;
      font-family:var(--mls-mono);
      font-weight:800;
      flex-shrink:0;
    }
    .branch-title{font-weight:800;color:var(--mls-text);font-size:15px}
    .branch-sub{font-family:var(--mls-mono);font-size:11px;color:var(--mls-text3);margin-top:2px}
    .slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
    .slot-title{
      font-family:var(--mls-mono);
      font-size:11px;
      font-weight:700;
      letter-spacing:.08em;
      color:var(--mls-text3);
      text-transform:uppercase;
      margin-bottom:7px;
    }
    .slot{
      min-height:132px;
      border:1.5px dashed var(--mls-border2);
      background:#f8faff;
      border-radius:var(--mls-r);
      padding:8px;
      display:flex;
      flex-direction:column;
      gap:7px;
      transition:.15s ease;
    }
    .slot.over{border-color:var(--mls-accent);background:#2563d40d}
    .slot.empty::before{
      content:"drop findings";
      color:var(--mls-text3);
      font-family:var(--mls-mono);
      font-size:11px;
      margin:auto;
    }
    .slot .chip{box-shadow:none;cursor:pointer}
    .slot.checked.correct{border-style:solid;border-color:var(--mls-success);background:#1a8a4a0f}
    .slot.checked.wrong{border-style:solid;border-color:var(--mls-danger);background:#c0303f0f}
    .message{padding:12px 2px 0;font-size:13px;color:var(--mls-text2);min-height:32px}
    .message.good{color:var(--mls-success);font-weight:700}
    .message.bad{color:var(--mls-danger);font-weight:700}
    html[data-mls-theme="dark"] body.ua-flowchart .branch-card,
    html[data-mls-theme="dark"] body.ua-flowchart .chip{
      background:var(--mls-bg3);
    }
    html[data-mls-theme="dark"] body.ua-flowchart .slot{background:#101625}
    @media(max-width:920px){
      .game{grid-template-columns:1fr}
      .bank{position:static;max-height:none}
      .branch-grid{grid-template-columns:1fr}
      .score{margin-left:0;width:100%}
    }
    @media(max-width:560px){
      h1{font-size:24px}
      .flow-top{grid-template-columns:1fr}
      .flow-line{display:none}
      .slot-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body class="mls-interactive ua-flowchart">
  <div class="site-header">
    <div>
      <div class="logo">MLS Interactive Learning</div>
      <div class="logo-sub">Urinalysis flowchart practice</div>
    </div>
    <a class="mls-home-btn" href="index.html">Home</a>
  </div>

  <main class="ua-wrap">
    <section class="ua-hero">
      <div>
        <div class="ua-kicker">Urinalysis</div>
        <h1>UA Flowchart Drag and Drop</h1>
        <p class="ua-sub">Sort macro findings and microscopic findings into the renal disease pattern they point toward.</p>
      </div>
      <div class="ua-badge">Draft build</div>
    </section>

    <section class="toolbar">
      <button class="ua-btn primary" onclick="checkAnswers()">Check</button>
      <button class="ua-btn" onclick="resetGame()">Reset</button>
      <button class="ua-btn good" onclick="showAnswers()">Show answers</button>
      <div class="score" id="score">0 placed</div>
    </section>

    <section class="game">
      <aside class="bank">
        <div class="bank-title">Finding Bank</div>
        <div class="bank-tabs">
          <button class="tab active" id="tab-all" onclick="setFilter('all')">All</button>
          <button class="tab" id="tab-macro" onclick="setFilter('macro')">Macro</button>
          <button class="tab" id="tab-micro" onclick="setFilter('micro')">Micro</button>
        </div>
        <div class="chip-list" id="bank"></div>
      </aside>

      <section class="board">
        <div class="flow-top">
          <div class="flow-line"></div>
          <div class="root-node">Renal disease pattern</div>
          <div class="flow-line"></div>
        </div>
        <div class="branch-grid" id="branches"></div>
        <div class="message" id="message"></div>
      </section>
    </section>
  </main>

  <script>
    const branches=[
      {id:'glomerular',abbr:'GN',title:'Glomerular Disorders',sub:'filter barrier injury',color:'#c8a800',
        macro:['high protein','hematuria','edema / oliguria clue'],
        micro:['dysmorphic RBCs','RBC casts','hyaline or granular casts']},
      {id:'nephrotic',abbr:'NS',title:'Nephrotic Syndrome',sub:'massive protein loss',color:'#bd7d16',
        macro:['massive proteinuria','low serum albumin + edema','high serum lipids'],
        micro:['oval fat bodies','fatty casts','waxy casts']},
      {id:'tubular',abbr:'TB',title:'Tubular Injury',sub:'ATN / reabsorption problem',color:'#2f86c5',
        macro:['mild proteinuria','low SG / concentrating issue','urine glucose with normal serum glucose'],
        micro:['RTE cells','epithelial casts','granular, waxy, or broad casts']},
      {id:'uti',abbr:'UTI',title:'UTI / Pyelonephritis',sub:'lower vs upper infection',color:'#32a66a',
        macro:['high LEU','nitrite positive + cloudy urine','mild protein + bacteria clue'],
        micro:['numerous WBCs','numerous bacteria','WBC casts = upper UTI']},
      {id:'ain',abbr:'AIN',title:'Acute Interstitial Nephritis',sub:'drug/allergy inflammation',color:'#8c62c8',
        macro:['medication allergy clue','mild to marked protein','high LEU without bacteria'],
        micro:['WBC casts','eosinophils','absence of bacteria']},
      {id:'lithiasis',abbr:'RL',title:'Renal Lithiasis',sub:'stone / crystal irritation',color:'#d24b52',
        macro:['blood positive','pH favors crystals','obstruction or pain clue'],
        micro:['microscopic RBCs','crystals','few casts']}
    ];

    const chips=branches.flatMap(b=>
      ['macro','micro'].flatMap(kind=>
        b[kind].map((text,i)=>({
          id:`${b.id}-${kind}-${i}`,
          text,
          kind,
          branch:b.id
        }))
      )
    );

    let placed={};
    let filter='all';
    let selected=null;
    let checked=false;

    function shuffle(arr){
      return [...arr].sort(()=>Math.random()-.5);
    }

    const shuffled=shuffle(chips);

    function setFilter(next){
      filter=next;
      document.querySelectorAll('.tab').forEach(btn=>btn.classList.remove('active'));
      document.getElementById('tab-'+next).classList.add('active');
      renderBank();
    }

    function makeChip(chip){
      const el=document.createElement('div');
      el.className='chip '+chip.kind+(selected===chip.id?' selected':'');
      el.draggable=true;
      el.dataset.id=chip.id;
      el.innerHTML=`${chip.text}<small>${chip.kind}</small>`;
      el.addEventListener('dragstart',ev=>{
        ev.dataTransfer.setData('text/plain',chip.id);
      });
      el.addEventListener('click',ev=>{
        ev.stopPropagation();
        if(placed[chip.id])returnChip(chip.id);
        else{
          selected=selected===chip.id?null:chip.id;
          renderBank();
        }
      });
      return el;
    }

    function renderBank(){
      const bank=document.getElementById('bank');
      const available=shuffled.filter(chip=>!placed[chip.id]&&(filter==='all'||chip.kind===filter));
      bank.innerHTML='';
      if(!available.length){
        bank.innerHTML='<div style="font-size:12px;color:var(--mls-text3);line-height:1.5">No chips here right now.</div>';
      }
      available.forEach(chip=>bank.appendChild(makeChip(chip)));
      updateScore();
    }

    function renderBranches(){
      const root=document.getElementById('branches');
      root.innerHTML='';
      branches.forEach(branch=>{
        const card=document.createElement('div');
        card.className='branch-card';
        card.style.setProperty('--branch',branch.color);
        card.innerHTML=`
          <div class="branch-head">
            <div class="branch-dot">${branch.abbr}</div>
            <div>
              <div class="branch-title">${branch.title}</div>
              <div class="branch-sub">${branch.sub}</div>
            </div>
          </div>
          <div class="slot-grid">
            <div>
              <div class="slot-title">Macro findings</div>
              <div class="slot empty" data-branch="${branch.id}" data-kind="macro"></div>
            </div>
            <div>
              <div class="slot-title">Micro findings</div>
              <div class="slot empty" data-branch="${branch.id}" data-kind="micro"></div>
            </div>
          </div>`;
        root.appendChild(card);
      });
      document.querySelectorAll('.slot').forEach(slot=>{
        slot.addEventListener('dragover',ev=>{ev.preventDefault();slot.classList.add('over');});
        slot.addEventListener('dragleave',()=>slot.classList.remove('over'));
        slot.addEventListener('drop',ev=>{
          ev.preventDefault();
          slot.classList.remove('over');
          const id=ev.dataTransfer.getData('text/plain');
          placeChip(id,slot.dataset.branch,slot.dataset.kind);
        });
        slot.addEventListener('click',()=>{
          if(selected)placeChip(selected,slot.dataset.branch,slot.dataset.kind);
        });
      });
      renderPlaced();
    }

    function renderPlaced(){
      document.querySelectorAll('.slot').forEach(slot=>{
        const items=chips.filter(chip=>placed[chip.id]&&placed[chip.id].branch===slot.dataset.branch&&placed[chip.id].kind===slot.dataset.kind);
        slot.innerHTML='';
        slot.classList.toggle('empty',items.length===0);
        slot.classList.remove('correct','wrong');
        if(checked&&items.length){
          slot.classList.add('checked');
          slot.classList.add(items.every(chip=>chip.branch===slot.dataset.branch&&chip.kind===slot.dataset.kind)?'correct':'wrong');
        }else{
          slot.classList.remove('checked');
        }
        items.forEach(chip=>slot.appendChild(makeChip(chip)));
      });
      updateScore();
    }

    function placeChip(id,branch,kind){
      const chip=chips.find(c=>c.id===id);
      if(!chip)return;
      placed[id]={branch,kind};
      selected=null;
      checked=false;
      document.getElementById('message').textContent='';
      renderBank();
      renderPlaced();
    }

    function returnChip(id){
      delete placed[id];
      selected=null;
      checked=false;
      document.getElementById('message').textContent='';
      renderBank();
      renderPlaced();
    }

    function updateScore(){
      const placedCount=Object.keys(placed).length;
      document.getElementById('score').textContent=`${placedCount}/${chips.length} placed`;
    }

    function checkAnswers(){
      checked=true;
      const placedIds=Object.keys(placed);
      const correct=placedIds.filter(id=>{
        const chip=chips.find(c=>c.id===id);
        return chip&&placed[id].branch===chip.branch&&placed[id].kind===chip.kind;
      }).length;
      const msg=document.getElementById('message');
      msg.className='message '+(correct===chips.length?'good':'bad');
      msg.textContent=correct===chips.length?'Perfect. Every branch is sorted.':`${correct}/${chips.length} correct. Click any placed chip to send it back to the bank.`;
      renderPlaced();
    }

    function resetGame(){
      placed={};
      selected=null;
      checked=false;
      document.getElementById('message').className='message';
      document.getElementById('message').textContent='';
      renderBank();
      renderBranches();
    }

    function showAnswers(){
      chips.forEach(chip=>{placed[chip.id]={branch:chip.branch,kind:chip.kind};});
      selected=null;
      checked=true;
      document.getElementById('message').className='message good';
      document.getElementById('message').textContent='Answers placed. Use Reset to practice again.';
      renderBank();
      renderPlaced();
    }

    renderBank();
    renderBranches();
  </script>
</body>
</html>
