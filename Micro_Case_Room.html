<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Case Room</title>
<script src="interactive_theme.js"></script>
<link rel="stylesheet" href="interactive_learning.css">
<style>
:root{
  --micro:#23856b;
  --micro-dark:#0e4c3e;
  --micro-soft:#e8f7f1;
  --ink:#172033;
  --muted:#66728d;
  --panel:#ffffff;
  --line:#bed9d0;
  --cream:#fffdf7;
  --amber:#f2c85b;
  --rose:#d85263;
  --blue:#3b74d8;
  --shadow:0 18px 42px rgba(22,48,72,.13);
}
*{box-sizing:border-box}
body.micro-case-room{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at 9% 0%,rgba(35,133,107,.14),transparent 34%),
    linear-gradient(180deg,#f4faf7 0%,#e9f1f6 100%);
  color:var(--ink);
  font-family:"Trebuchet MS",Arial,Helvetica,sans-serif;
  transition:background .45s ease,color .3s ease;
}
body.micro-case-room.room-active{
  background:
    radial-gradient(circle at 20% 18%,rgba(60,255,181,.24),transparent 28%),
    radial-gradient(circle at 76% 8%,rgba(20,87,70,.36),transparent 34%),
    linear-gradient(180deg,#dff7ec 0%,#9ccfc0 52%,#173d35 100%);
}
body.micro-case-room.room-intense{
  background:
    radial-gradient(circle at 18% 20%,rgba(127,255,203,.44),transparent 28%),
    radial-gradient(circle at 78% 9%,rgba(28,150,106,.45),transparent 34%),
    linear-gradient(180deg,#c7f5dd 0%,#3c9b76 54%,#09241f 100%);
}
.micro-wrap{max-width:1240px;margin:0 auto;padding:22px}
.hero,.deck-panel,.room-card,.side-card{
  background:rgba(255,255,255,.94);
  border:2px solid var(--line);
  border-radius:18px;
  box-shadow:var(--shadow);
}
.hero{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:18px;
  align-items:center;
  padding:24px;
  border-top:8px solid var(--micro);
  margin-bottom:16px;
}
.eyebrow{
  color:var(--micro-dark);
  font-size:12px;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
}
.hero h1{margin:6px 0 7px;font-size:42px;line-height:1;color:var(--ink)}
.hero p{margin:0;color:var(--muted);font-size:17px;max-width:780px;line-height:1.4}
.hero-mark{
  width:96px;
  height:96px;
  border-radius:24px;
  border:2px solid #9bcfc0;
  background:
    linear-gradient(90deg,transparent 45%,rgba(255,255,255,.75) 45% 55%,transparent 55%),
    linear-gradient(180deg,#e8fff7,#9cdccc);
  position:relative;
  box-shadow:inset 0 0 0 7px rgba(255,255,255,.55);
}
.hero-mark::before{
  content:"CASE";
  position:absolute;
  left:50%;
  top:17px;
  transform:translateX(-50%);
  color:var(--micro-dark);
  font-weight:1000;
  font-size:15px;
  letter-spacing:.12em;
}
.hero-mark::after{
  content:"ROOM";
  position:absolute;
  left:50%;
  bottom:16px;
  transform:translateX(-50%);
  color:#fff;
  background:var(--micro-dark);
  border-radius:999px;
  padding:6px 9px;
  font-weight:1000;
  font-size:13px;
}
.action-row{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px}
.game-btn{
  border:2px solid #9fc9bd;
  background:#fff;
  color:var(--micro-dark);
  border-radius:999px;
  padding:10px 14px;
  font-weight:900;
  cursor:pointer;
  font-family:inherit;
}
.game-btn.primary{background:var(--micro);border-color:var(--micro);color:#fff}
.game-btn.warn{background:#fff5d9;border-color:#deb34a;color:#725000}
.game-btn.danger{background:#123d34;border-color:#123d34;color:#e6fff7}
.game-btn:disabled{opacity:.5;cursor:not-allowed}
.game-shell{
  position:relative;
  min-height:680px;
  border:2px solid rgba(35,133,107,.35);
  border-radius:26px;
  background:
    radial-gradient(circle at 18% 8%,rgba(255,255,255,.92),transparent 20%),
    linear-gradient(145deg,rgba(255,255,255,.88),rgba(232,247,241,.88));
  box-shadow:0 28px 70px rgba(18,61,52,.18);
  overflow:hidden;
}
body.room-active .game-shell,
body.room-intense .game-shell{
  background:
    radial-gradient(circle at 18% 15%,rgba(233,255,246,.78),transparent 22%),
    linear-gradient(145deg,rgba(217,255,239,.9),rgba(17,71,58,.78));
  border-color:rgba(180,255,225,.7);
}
.game-shell::before{
  content:"";
  position:absolute;
  inset:-90px;
  background:
    radial-gradient(circle at 16% 18%,rgba(35,133,107,.16),transparent 12%),
    radial-gradient(circle at 84% 30%,rgba(18,61,52,.14),transparent 13%),
    radial-gradient(circle at 60% 86%,rgba(35,133,107,.12),transparent 16%);
  pointer-events:none;
}
.game-chrome{
  position:relative;
  z-index:1;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px 16px;
  border-bottom:1px solid rgba(35,133,107,.2);
  background:rgba(255,255,255,.58);
  backdrop-filter:blur(10px);
}
body.room-active .game-chrome,
body.room-intense .game-chrome{background:rgba(10,48,40,.56);border-bottom-color:rgba(210,255,236,.22)}
.chrome-left,.chrome-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chrome-title{font-size:13px;font-weight:1000;letter-spacing:.14em;text-transform:uppercase;color:var(--micro-dark)}
body.room-active .chrome-title,
body.room-intense .chrome-title{color:#dffcf4}
.micro-audio-btn.is-on{background:#123d34;border-color:#123d34;color:#dffcf4}
.scene{
  position:relative;
  z-index:1;
  min-height:610px;
  padding:28px;
}
.welcome-scene{
  display:grid;
  place-items:center;
  text-align:center;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 28%,rgba(255,255,255,.96),transparent 25%),
    linear-gradient(135deg,#ffffff,#e7fff4 45%,#15493d);
}
.welcome-panel{max-width:820px;position:relative;z-index:2}
.welcome-kicker{
  color:#0f5f4d;
  font-weight:1000;
  letter-spacing:.18em;
  text-transform:uppercase;
  font-size:13px;
}
.welcome-title{
  margin:8px 0 10px;
  font-size:clamp(42px,8vw,92px);
  line-height:.9;
  color:#10382f;
  text-shadow:4px 4px 0 #bdf3de,0 12px 32px rgba(14,76,62,.22);
}
.welcome-copy{font-size:20px;line-height:1.4;color:#29493f;margin:0 auto 22px;max-width:710px;font-weight:800}
.enter-btn{
  border:0;
  border-radius:999px;
  padding:18px 28px;
  background:#0e4c3e;
  color:#e7fff5;
  font-size:22px;
  font-weight:1000;
  cursor:pointer;
  box-shadow:0 12px 0 #083129,0 20px 38px rgba(14,76,62,.32);
  font-family:inherit;
  transform:rotate(-1deg);
}
.enter-btn:hover{transform:translateY(-2px) rotate(1deg)}
.microbe-field{position:absolute;inset:0;pointer-events:none;opacity:.75}
.microbe{
  position:absolute;
  width:74px;
  height:44px;
  border-radius:50%;
  border:4px solid #123d34;
  background:#d8ffee;
  transform:rotate(var(--rot,0deg));
}
.microbe::before,.microbe::after{content:"";position:absolute;inset:-12px;border-top:3px solid #123d34;border-radius:50%;transform:rotate(24deg)}
.microbe::after{transform:rotate(-24deg)}
.microbe.one{left:8%;top:16%;--rot:-18deg}
.microbe.two{right:8%;top:20%;--rot:18deg;width:86px;background:#fff8d8}
.microbe.three{left:18%;bottom:16%;--rot:28deg;width:64px;background:#ecf3ff}
.microbe.four{right:22%;bottom:12%;--rot:-30deg;width:78px;background:#dff5ff}
.scene-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px}
.scene-top h1{font-size:42px;line-height:1;margin:0;color:var(--ink)}
.scene-top p{margin:6px 0 0;color:var(--muted);font-size:16px;font-weight:800;max-width:720px}
body.room-active .scene-top h1,
body.room-intense .scene-top h1{color:#f2fff9}
body.room-active .scene-top p,
body.room-intense .scene-top p{color:#d0f4e8}
.deck-select-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
}
.deck-choice-card{
  min-height:164px;
  border:2px solid #a5d3c5;
  border-radius:20px;
  padding:18px;
  background:
    radial-gradient(circle at 86% 12%,rgba(35,133,107,.16),transparent 24%),
    linear-gradient(180deg,#fff,#effaf5);
  text-align:left;
  color:var(--ink);
  font-family:inherit;
  cursor:pointer;
  box-shadow:0 12px 24px rgba(18,61,52,.08);
  transition:.18s ease;
}
.deck-choice-card:hover{transform:translateY(-3px);border-color:var(--micro);box-shadow:0 18px 36px rgba(18,61,52,.14)}
.deck-choice-card.complete{background:linear-gradient(180deg,#f3fff7,#e3f7e9);border-color:#61b47c}
.deck-choice-card h2{margin:0;font-size:24px;line-height:1.05}
.deck-choice-card p{margin:10px 0 0;color:var(--muted);font-size:14px;font-weight:800;line-height:1.35}
.deck-badge{display:inline-block;margin-bottom:12px;border-radius:999px;border:1px solid #9bcfc0;padding:5px 9px;color:var(--micro-dark);font-size:12px;font-weight:1000}
.case-card-grid{
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:12px;
}
.big-case-card{
  min-height:330px;
  border:2px solid #9bcfc0;
  border-radius:22px;
  padding:16px;
  background:
    linear-gradient(135deg,transparent 0 48%,rgba(35,133,107,.16) 49% 52%,transparent 53%),
    linear-gradient(180deg,#fff,#effaf5);
  color:var(--ink);
  text-align:left;
  font-family:inherit;
  cursor:pointer;
  box-shadow:0 16px 28px rgba(18,61,52,.1);
  transition:.18s ease;
  display:grid;
  grid-template-rows:auto 1fr auto;
  overflow:hidden;
}
.big-case-card:hover{transform:translateY(-4px) rotate(-.5deg);border-color:#0e4c3e}
.big-case-card.solved{border-color:#64bb84;background:#effaf3}
.case-number{font-size:13px;font-weight:1000;letter-spacing:.14em;text-transform:uppercase;color:var(--micro-dark)}
.big-case-card h2{font-size:34px;margin:10px 0 8px;line-height:.95}
.case-card-copy{color:#596b63;font-size:14px;font-weight:800;line-height:1.35}
.case-card-footer{border-top:1px dashed #91c7b8;padding-top:12px;font-size:12px;font-weight:1000;text-transform:uppercase;color:var(--micro-dark)}
.deck-panel{padding:16px;margin-bottom:16px}
.deck-title{font-size:13px;font-weight:1000;letter-spacing:.12em;text-transform:uppercase;color:var(--micro-dark);margin-bottom:10px}
.deck-tabs{display:flex;flex-wrap:wrap;gap:9px}
.deck-tab{
  border:2px solid #bcd8cf;
  background:#fff;
  color:#21493d;
  border-radius:999px;
  padding:10px 14px;
  font-size:14px;
  font-weight:1000;
  cursor:pointer;
  font-family:inherit;
  box-shadow:0 3px 0 rgba(35,133,107,.08);
}
.deck-tab.active{background:var(--micro);border-color:var(--micro);color:#fff}
.deck-tab.complete{border-color:#5dbb8d;background:#effaf3}
.deck-tab.active.complete{background:#17664f;color:#fff}
.game-grid{
  display:grid;
  grid-template-columns:minmax(520px,1.25fr) minmax(300px,.75fr);
  gap:16px;
  align-items:start;
}
.room-card{min-height:640px;perspective:1200px;position:relative}
body.room-intense .room-card{border-color:#b8ffe4;box-shadow:0 0 0 5px rgba(202,255,231,.15),0 26px 70px rgba(3,31,26,.36)}
.room-card.case-enter{animation:caseCardIn .62s cubic-bezier(.18,.82,.2,1)}
.flip-inner{position:relative;min-height:640px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.2,.8,.2,1)}
.room-card.solved .flip-inner{transform:rotateY(180deg)}
.room-card:not(.solved) .room-face.front{
  background:
    radial-gradient(circle at 85% 6%,rgba(114,236,182,.2),transparent 25%),
    linear-gradient(180deg,rgba(255,255,255,.88),rgba(238,255,247,.88));
}
@keyframes caseCardIn{
  0%{opacity:0;transform:rotateY(-28deg) scale(.94)}
  100%{opacity:1;transform:rotateY(0) scale(1)}
}
.room-face{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  padding:18px;
  overflow:hidden;
}
.room-face.back{transform:rotateY(180deg)}
.case-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}
.case-top h2{margin:3px 0 0;font-size:29px;line-height:1.04}
.case-kicker{font-size:12px;font-weight:1000;letter-spacing:.12em;text-transform:uppercase;color:var(--micro)}
.progress-pill{
  border:2px solid #bfd8d1;
  border-radius:999px;
  padding:8px 11px;
  font-size:12px;
  font-weight:1000;
  color:var(--micro-dark);
  background:#f7fffb;
  white-space:nowrap;
}
.envelope-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.envelope{
  min-height:188px;
  border:2px solid #40a77c;
  background:
    linear-gradient(135deg,transparent 0 48%,rgba(64,167,124,.36) 49% 52%,transparent 53%),
    linear-gradient(180deg,#e8fff5,#f8fffc);
  border-radius:16px;
  padding:14px;
  position:relative;
  overflow:hidden;
}
.envelope::before{
  content:"";
  position:absolute;
  left:0;
  right:0;
  top:0;
  height:52px;
  background:linear-gradient(135deg,rgba(64,167,124,.32) 49%,transparent 50%),linear-gradient(-135deg,rgba(64,167,124,.32) 49%,transparent 50%);
  opacity:.82;
}
.envelope.locked{filter:saturate(.45);background:#f1f4f7;border-color:#cad3dd}
.envelope h3{position:relative;margin:0 0 10px;font-size:18px;color:#0e4c3e}
.envelope.locked h3{color:#5f6876}
.envelope-list{position:relative;z-index:1;margin:0;padding-left:18px;display:grid;gap:6px}
.envelope-list li{font-size:14px;line-height:1.25;font-weight:800;color:#263246}
.empty-envelope{
  position:relative;
  z-index:1;
  display:grid;
  place-items:center;
  min-height:98px;
  text-align:center;
  color:#0e4c3e;
  font-weight:900;
}
.section-label{font-size:13px;font-weight:1000;letter-spacing:.12em;text-transform:uppercase;color:var(--micro-dark);margin:6px 0 9px}
.test-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:14px}
.test-card{
  min-height:92px;
  border:2px solid #bed9d0;
  border-radius:13px;
  background:linear-gradient(180deg,#fff,#f4fbf8);
  color:var(--ink);
  padding:10px 8px;
  text-align:left;
  font-family:inherit;
  font-weight:900;
  cursor:pointer;
  position:relative;
}
.test-card::after{
  content:"";
  position:absolute;
  left:10px;
  right:10px;
  bottom:10px;
  height:8px;
  border-radius:999px;
  background:repeating-linear-gradient(90deg,#d5e9e2 0 8px,#fff 8px 13px);
}
.test-card small{display:block;margin-top:6px;color:var(--muted);font-weight:900}
.test-card.correct{border-color:#4cae78;background:#effaf3}
.test-card.wrong{border-color:#e5959e;background:#fff0f2;color:#8c2030}
.test-card:disabled{cursor:not-allowed;opacity:.55}
.printout-area{display:grid;gap:8px}
.machine-printout{
  border:2px solid #ccd5df;
  border-radius:12px;
  background:
    repeating-linear-gradient(180deg,#fff 0 18px,#f6f9fb 18px 20px);
  padding:12px 13px;
  box-shadow:0 6px 0 #d7dee8;
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
.machine-printout strong{display:block;color:var(--micro-dark);font-size:13px;margin-bottom:5px}
.locked-printout{
  border:2px dashed #cfd8df;
  border-radius:12px;
  background:#f8fafb;
  padding:16px;
  color:var(--muted);
  font-weight:900;
  text-align:center;
}
.side-card{padding:16px;display:grid;gap:13px}
.timer-card{
  border:2px solid #173f35;
  border-radius:16px;
  background:linear-gradient(180deg,#133b32,#0d2824);
  color:#dffcf4;
  padding:14px;
}
.timer-label{font-size:12px;font-weight:1000;letter-spacing:.16em;text-transform:uppercase;color:#a6ead8}
.timer-value{font-size:46px;line-height:1;font-weight:1000;margin-top:4px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.timer-rule{font-size:12px;color:#c1efe2;margin-top:7px;font-weight:800}
.penalty{
  min-height:44px;
  border:2px solid #d6dfeb;
  border-radius:12px;
  padding:10px 12px;
  background:#fff;
  color:var(--muted);
  font-weight:900;
}
.penalty.bad{background:#fff0f2;border-color:#df9aa3;color:#9a2636}
.penalty.good{background:#effaf3;border-color:#7ec695;color:#22683f}
.organism-grid{display:grid;gap:8px}
.organism-choice{
  border:2px solid #cdd7df;
  border-radius:13px;
  background:#fff;
  padding:11px 12px;
  text-align:left;
  font-family:inherit;
  font-weight:1000;
  color:var(--ink);
  cursor:pointer;
}
.organism-choice:hover{border-color:var(--micro)}
.organism-choice.wrong{border-color:#e5959e;background:#fff0f2;color:#8c2030}
.organism-choice.correct{border-color:#4cae78;background:#effaf3;color:#22683f}
.organism-choice:disabled{opacity:.58;cursor:not-allowed}
.start-panel{
  min-height:480px;
  display:grid;
  place-items:center;
  text-align:center;
  padding:40px 22px;
}
.start-panel h2{font-size:34px;margin:0 0 8px}
.start-panel p{color:var(--muted);font-size:17px;line-height:1.4;max-width:680px;margin:0 auto 18px}
.deck-progress{
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:8px;
  margin-top:16px;
}
.case-dot{
  border:2px solid #cddbd6;
  border-radius:12px;
  padding:9px 8px;
  background:#fff;
  font-size:12px;
  font-weight:1000;
}
.case-dot.done{background:#effaf3;border-color:#5dbb8d;color:#22683f}
.solved-board{
  min-height:100%;
  display:grid;
  place-items:center;
  text-align:center;
  padding:24px;
  background:
    radial-gradient(circle at 50% 18%,rgba(255,255,255,.9),transparent 24%),
    linear-gradient(135deg,#eafaf3,#ffffff 42%,#fff7df);
}
.stamp{
  display:inline-block;
  border:5px solid #1e8a55;
  color:#1e8a55;
  border-radius:16px;
  padding:10px 18px;
  font-size:34px;
  font-weight:1000;
  letter-spacing:.08em;
  transform:rotate(-5deg);
  margin-bottom:16px;
  background:rgba(255,255,255,.68);
}
.stamp.deck-done{border-color:#905f00;color:#905f00}
.solved-card{
  width:min(100%,560px);
  background:#fff;
  border:2px solid #bcd8cf;
  border-radius:18px;
  padding:18px;
  text-align:left;
  box-shadow:var(--shadow);
}
.solved-card h3{font-size:25px;margin:0 0 10px;text-align:center}
.solved-card dl{display:grid;gap:10px;margin:0}
.solved-card dt{font-size:12px;font-weight:1000;letter-spacing:.1em;text-transform:uppercase;color:var(--micro-dark)}
.solved-card dd{margin:2px 0 0;color:#263246;font-weight:800;line-height:1.35}
.solved-actions{display:flex;justify-content:center;flex-wrap:wrap;gap:9px;margin-top:16px}
.printable-game{display:none}
@media(max-width:980px){
  .micro-wrap{padding:14px}
  .hero,.game-grid{grid-template-columns:1fr}
  .hero-mark{display:none}
  .game-chrome{align-items:flex-start;flex-direction:column}
  .deck-select-grid{grid-template-columns:1fr 1fr}
  .case-card-grid{grid-template-columns:1fr 1fr}
  .test-grid{grid-template-columns:1fr 1fr}
  .room-card,.flip-inner{min-height:860px}
}
@media(max-width:640px){
  .hero h1{font-size:34px}
  .scene{padding:18px}
  .welcome-copy{font-size:16px}
  .deck-select-grid,.case-card-grid{grid-template-columns:1fr}
  .envelope-grid,.test-grid{grid-template-columns:1fr}
  .deck-progress{grid-template-columns:1fr}
  .timer-value{font-size:38px}
}
@media print{
  @page{size:letter;margin:.2in}
  @page microSingle{size:4in 6in;margin:0}
  body{background:#fff!important;color:#000!important}
  .screen-shell,.site-header{display:none!important}
  .printable-game{display:block!important;color:#000!important;font-family:Arial,Helvetica,sans-serif}
  .print-title{font-size:16pt;font-weight:900;margin:0 0 .12in;color:#000!important}
  .print-sheet{
    page-break-after:always;

<body class="mls-interactive micro-case-room">
<div class="screen-shell">
  <header class="site-header">
    <div>
      <div class="logo">MLS/BOC PREP</div>
      <div class="logo-sub">Interactive Learning</div>
    </div>
    <a class="mls-home-btn" href="index.html#interactive">Interactive Tools</a>
  </header>

  <main class="micro-wrap">
    <section class="game-shell" id="gameRoot"></section>
  </main>
</div>

<section class="printable-game" id="printableGame"></section>

<script>
const bodySiteNames = [
  "Blood Cultures",
  "CSF",
  "Other Body Fluids",
  "Respiratory Cultures",
  "Ear/Eye Cultures",
  "Urine Cultures",
  "Genital Culture",
  "Wound Cultures",
  "Stool Cultures"
];

const testLabels = [
  "Placeholder Test A",
  "Placeholder Test B",
  "Placeholder Test C",
  "Placeholder Test D",
  "Placeholder Test E"
];

function makeDecks(){
  return bodySiteNames.map((name, deckIndex) => ({
    name,
    code: name.split(/\s+/).map(word => word[0]).join("").replace("/", "").slice(0, 3).toUpperCase(),
    cases: Array.from({length:5}, (_, caseIndex) => makePlaceholderCase(name, deckIndex, caseIndex))
  }));
}

function makePlaceholderCase(deckName, deckIndex, caseIndex){
  const number = caseIndex + 1;
  const requiredCount = number % 2 === 0 ? 2 : 1;
  const primaryTest = caseIndex % testLabels.length;
  const secondaryTest = (caseIndex + 2) % testLabels.length;
  const requiredTests = requiredCount === 2 ? [primaryTest, secondaryTest] : [primaryTest];
  const organismIndex = (deckIndex + caseIndex) % 5;
  return {
    id: `${deckIndex}-${caseIndex}`,
    number,
    deckName,
    age: `Placeholder age ${number}`,
    specimenSource: `${deckName} placeholder specimen source`,
    symptoms: `Placeholder symptoms/history for ${deckName} case ${number}.`,
    collectionNote: `Placeholder collection note for ${deckName} case ${number}.`,
    gramStain: `Placeholder Gram stain clue ${number}.`,
    colonyMorphology: `Placeholder colony morphology clue ${number}.`,
    mediaGrowth: `Placeholder media growth clue ${number}.`,
    extraClue: `Placeholder extra clue ${number}.`,
    tests: testLabels.map((label, testIndex) => ({
      id: `test-${testIndex}`,
      label,
      correct: requiredTests.includes(testIndex),
      result: `Placeholder machine printout result for ${label}.`
    })),
    requiredTestIds: requiredTests.map(testIndex => `test-${testIndex}`),
    organisms: Array.from({length:5}, (_, orgIndex) => ({
      id: `org-${orgIndex}`,
      label: `Placeholder Organism ${String.fromCharCode(65 + orgIndex)}`,
      correct: orgIndex === organismIndex
    })),
    solved: {
      organism: `Placeholder Organism ${String.fromCharCode(65 + organismIndex)}`,
      keyClues: [
        `Placeholder key clue from ${deckName} case ${number}.`,
        `Placeholder lab clue pattern for case ${number}.`
      ],
      confirmatoryTests: requiredTests.map(testIndex => testLabels[testIndex])
    }
  };
}

const decks = makeDecks();
const solvedCases = new Set();
let state = freshState(0, 0, false);
let scene = "welcome";
let timerId = null;
let microAudio = {audio:null, customUrl:null, on:false};

const QUIZ_MUSIC_DB = "mlsboc_quiz_media";
const QUIZ_MUSIC_STORE = "files";
const QUIZ_MUSIC_KEY = "quiz_music";
const QUIZ_MUSIC_VOLUME_KEY = "mlsboc_quiz_music_volume";

function freshState(deckIndex, caseIndex, started){
  return {
    deckIndex,
    caseIndex,
    started,
    patientOpen:false,
    labOpen:false,
    selectedTests:new Set(),
    wrongTests:new Set(),
    wrongOrganisms:new Set(),
    solved:false,
    remaining:15 * 60,
    feedback: started ? "Open the patient envelope to begin the case." : "Choose a deck and start Case 1 of 5.",
    feedbackType:"",
    penalty:""
  };
}

function esc(value){
  return String(value).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function currentDeck(){
  return decks[state.deckIndex];
}

function currentCase(){
  return currentDeck().cases[state.caseIndex];
}

function caseCode(item){
  const deck = decks.find(entry => entry.name === item.deckName) || currentDeck();
  return `${deck.code}-${item.number}`;
}

function formatTime(seconds){
  const safe = Math.max(0, seconds);
  const mins = Math.floor(safe / 60);
  const secs = safe % 60;
  return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
}

function stopTimer(){
  if(timerId){
    clearInterval(timerId);
    timerId = null;
  }
}

function startTimer(){
  stopTimer();
  timerId = setInterval(() => {
    if(!state.started || state.solved)return;
    state.remaining = Math.max(0, state.remaining - 1);
    updateTimerDisplay();
    if(state.remaining <= 0){
      stopTimer();
      state.feedback = "Time expired. Reset this case or start it again.";
      state.feedbackType = "bad";
      render();
    }
  }, 1000);
}

function updateTimerDisplay(){
  const timer = document.getElementById("timerValue");
  if(timer)timer.textContent = formatTime(state.remaining);
}

function completedInDeck(deckIndex){
  return decks[deckIndex].cases.filter(item => solvedCases.has(item.id)).length;
}

function getQuizMusicVolume(){
  const raw = Number(localStorage.getItem(QUIZ_MUSIC_VOLUME_KEY));
  return Number.isFinite(raw) ? Math.max(0, Math.min(1, raw)) : .45;
}

function openQuizMediaDB(){
  return new Promise((resolve, reject) => {
    if(!window.indexedDB){
      reject(new Error("IndexedDB is not supported in this browser."));
      return;
    }
    const req = indexedDB.open(QUIZ_MUSIC_DB, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if(!db.objectStoreNames.contains(QUIZ_MUSIC_STORE))db.createObjectStore(QUIZ_MUSIC_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error("Could not open music storage."));
  });
}

async function quizMusicStore(mode, fn){
  const db = await openQuizMediaDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(QUIZ_MUSIC_STORE, mode);
    const store = tx.objectStore(QUIZ_MUSIC_STORE);
    const req = fn(store);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error("Music storage failed."));
    tx.oncomplete = () => db.close();
    tx.onerror = () => {
      try{db.close();}catch(e){}
      reject(tx.error || new Error("Music storage failed."));
    };
  });
}

async function loadQuizMusicUrl(){
  if(microAudio.customUrl)return microAudio.customUrl;
  try{
    const rec = await quizMusicStore("readonly", store => store.get(QUIZ_MUSIC_KEY));
    if(!rec || !rec.blob)return "";
    microAudio.customUrl = URL.createObjectURL(rec.blob);
    return microAudio.customUrl;
  }catch(err){
    console.warn("Micro Case Room music load failed", err);
    return "";
  }
}

async function startMicroMusic(){
  try{
    if(microAudio.on)return;
    const url = await loadQuizMusicUrl();
    if(!url){
      alert("No quiz music is loaded yet. Add music from the quiz media controls first, then come back here.");
      return;
    }
    if(microAudio.audio){
      try{microAudio.audio.pause();}catch(e){}
    }
    const audio = new Audio(url);
    audio.loop = true;
    audio.volume = getQuizMusicVolume();
    audio.preload = "auto";
    await audio.play();
    microAudio.audio = audio;
    microAudio.on = true;
    updateMicroMusicButton();
  }catch(err){
    console.warn("Micro Case Room music failed", err);
    alert("Music could not start in this browser. The game still works without it.");
  }
}

function stopMicroMusic(){
  if(microAudio.audio){
    try{microAudio.audio.pause();microAudio.audio.currentTime = 0;}catch(e){}
    microAudio.audio = null;
  }
  microAudio.on = false;
  updateMicroMusicButton();
}

function toggleMicroMusic(){
  if(microAudio.on)stopMicroMusic();
  else startMicroMusic();
}

function updateMicroMusicButton(){
  const btn = document.getElementById("microMusicBtn");
  if(!btn)return;
  btn.classList.toggle("is-on", microAudio.on);
  btn.textContent = microAudio.on ? "Music On" : "Music Off";
}

function showWelcome(){
  stopTimer();
  scene = "welcome";
  state.started = false;
  render();
}

function showDecks(){
  stopTimer();
  scene = "decks";
  state.started = false;
  render();
}

function selectDeck(index){
  stopTimer();
  state = freshState(index, 0, false);
  scene = "cases";
  render();
}

function startCase(index = state.caseIndex){
  state = freshState(state.deckIndex, index, true);
  scene = "active";
  startTimer();
  render();
}

function resetCase(){
  startCase(state.caseIndex);
}

function openPatientEnvelope(){
  if(!state.started || state.remaining <= 0)return;
  state.patientOpen = true;
  state.feedback = "Patient envelope open. Open the lab clues envelope next.";
  state.feedbackType = "good";
  render();
}

function openLabEnvelope(){
  if(!state.patientOpen){
    state.feedback = "Open the patient envelope first.";
    state.feedbackType = "bad";
    render();
    return;
  }
  if(state.remaining <= 0)return;
  state.labOpen = true;
  state.feedback = "Lab clues open. Choose the required test card or cards.";
  state.feedbackType = "good";
  render();
}

function requiredTestsComplete(){
  const item = currentCase();
  return item.requiredTestIds.every(testId => state.selectedTests.has(testId));
}

function penalize(message){
  state.remaining = Math.max(0, state.remaining - 60);
  state.penalty = `-1 minute: ${message}`;
  state.feedback = state.penalty;
  state.feedbackType = "bad";
  if(state.remaining <= 0){
    stopTimer();
    state.feedback = "Time expired after the penalty.";
  }
}

function chooseTest(testId){
  const item = currentCase();
  if(!state.labOpen || state.solved || state.remaining <= 0)return;
  const test = item.tests.find(entry => entry.id === testId);
  if(!test || state.selectedTests.has(testId) || state.wrongTests.has(testId))return;
  if(test.correct){
    state.selectedTests.add(testId);
    state.penalty = "";
    state.feedback = requiredTestsComplete()
      ? "All required test printouts are open. Choose the final organism."
      : "Correct test. One more required test printout is still locked.";
    state.feedbackType = "good";
  }else{
    state.wrongTests.add(testId);
    penalize("wrong test card selected");
  }
  render();
}

function chooseOrganism(orgId){
  const item = currentCase();
  if(state.solved || state.remaining <= 0)return;
  if(!requiredTestsComplete()){
    state.feedback = item.requiredTestIds.length === 2
      ? "This case needs both correct test printouts before the organism choice opens."
      : "Open the correct test printout before choosing the organism.";
    state.feedbackType = "bad";
    render();
    return;
  }
  const organism = item.organisms.find(entry => entry.id === orgId);
  if(!organism || state.wrongOrganisms.has(orgId))return;
  if(organism.correct){
    state.solved = true;
    solvedCases.add(item.id);
    stopTimer();
    state.penalty = "";
    state.feedback = "CASE SOLVED.";
    state.feedbackType = "good";
  }else{
    state.wrongOrganisms.add(orgId);
    penalize("wrong organism choice");
  }
  render();
}

function nextCase(){
  if(!state.solved)return;
  if(state.caseIndex < 4){
    state = freshState(state.deckIndex, state.caseIndex + 1, false);
    scene = "cases";
    render();
  }else{
    stopTimer();
    scene = "deckComplete";
    state.started = false;
    state.feedback = "Deck complete. Choose another body-site deck or print the placeholder set.";
    state.feedbackType = "good";
    render();
  }
}

function renderChrome(inner, sceneClass = ""){
  const inWelcome = scene === "welcome";
  return `<div class="game-chrome">
    <div class="chrome-left">
      <div class="chrome-title">Micro Case Room</div>
      ${!inWelcome ? `<button class="game-btn" type="button" onclick="showWelcome()">Welcome</button>
      <button class="game-btn" type="button" onclick="showDecks()">Choose Deck</button>` : ""}
    </div>
    <div class="chrome-right">
      <button class="game-btn micro-audio-btn" id="microMusicBtn" type="button" onclick="toggleMicroMusic()">Music Off</button>
      <button class="game-btn" type="button" onclick="printMode('current')">Print Deck</button>
      <button class="game-btn" type="button" onclick="printMode('single')">Print 4x6</button>
      <button class="game-btn" type="button" onclick="printMode('all')">Print All</button>
    </div>
  </div>
  <div class="scene ${sceneClass}">${inner}</div>`;
}

function renderWelcome(){
  return renderChrome(`<section class="welcome-scene">
    <div class="microbe-field" aria-hidden="true">
      <span class="microbe one"></span>
      <span class="microbe two"></span>
      <span class="microbe three"></span>
      <span class="microbe four"></span>
    </div>
    <div class="welcome-panel">
      <div class="welcome-kicker">Welcome to the specimen wing</div>
      <h1 class="welcome-title">Micro Case Room</h1>
      <p class="welcome-copy">A placeholder microbiology escape-room simulation. Pick a body-site deck, enter a case, open the evidence envelopes, and solve before the countdown drains.</p>
      <button class="enter-btn" type="button" onclick="showDecks()">Enter if you dare!</button>
    </div>
  </section>`, "welcome-wrap");
}

function renderDeckSelect(){
  return renderChrome(`<section>
    <div class="scene-top">
      <div>
        <div class="eyebrow">Choose Your Deck</div>
        <h1>Specimen Flow Builder</h1>
        <p>Each body-site deck has 5 placeholder cases. Solve the deck to clear the room.</p>
      </div>
    </div>
    <div class="deck-select-grid">
      ${decks.map((deck, index) => {
        const done = completedInDeck(index);
        const classes = ["deck-choice-card", done === 5 ? "complete" : ""].filter(Boolean).join(" ");
        return `<button class="${classes}" type="button" onclick="selectDeck(${index})">
          <span class="deck-badge">${done}/5 solved</span>
          <h2>${esc(deck.name)}</h2>
          <p>Open the ${esc(deck.name)} case drawer. Placeholder content is ready for later organism details.</p>
        </button>`;
      }).join("")}
    </div>
  </section>`, "deck-scene");
}

function renderCaseSelect(){
  const deck = currentDeck();
  return renderChrome(`<section>
    <div class="scene-top">
      <div>
        <div class="eyebrow">${esc(deck.name)}</div>
        <h1>Choose a Case File</h1>
        <p>Click a big case card to flip into the room and start the 15-minute timer.</p>
      </div>
      <button class="game-btn" type="button" onclick="showDecks()">Switch Deck</button>
    </div>
    <div class="case-card-grid">
      ${deck.cases.map((item, index) => {
        const solved = solvedCases.has(item.id);
        return `<button class="big-case-card ${solved ? "solved" : ""}" type="button" onclick="startCase(${index})">
          <div>
            <div class="case-number">Case ${item.number} of 5</div>
            <h2>${caseCode(item)}</h2>
            <div class="case-card-copy">${solved ? "Solved file. Replay anytime." : "Sealed placeholder evidence file. Timer starts when opened."}</div>
          </div>
          <div></div>
          <div class="case-card-footer">${solved ? "Case solved" : "Click card to enter"}</div>
        </button>`;
      }).join("")}
    </div>
  </section>`, "case-scene");
}

function renderDeckComplete(){
  const deck = currentDeck();
  return renderChrome(`<section class="solved-board">
    <div>
      <div class="stamp deck-done">DECK COMPLETE</div>
      <div class="solved-card">
        <h3>${esc(deck.name)} cleared</h3>
        <dl>
          <div><dt>Progress</dt><dd>5 of 5 placeholder cases solved.</dd></div>
          <div><dt>Next Move</dt><dd>Replay a case, choose another body-site deck, or print the placeholder game set.</dd></div>
        </dl>
      </div>
      <div class="solved-actions">
        <button class="game-btn primary" type="button" onclick="selectDeck(${state.deckIndex})">Replay Deck</button>
        <button class="game-btn" type="button" onclick="showDecks()">Choose Another Deck</button>
      </div>
    </div>
  </section>`, "deck-complete-scene");
}

function renderEnvelope(title, open, locked, items, openAction){
  if(locked){
    return `<article class="envelope locked">
      <h3>${esc(title)}</h3>
      <div class="empty-envelope">Locked until the prior envelope opens.</div>
    </article>`;
  }
  if(open){
    return `<article class="envelope">
      <h3>${esc(title)}</h3>
      <ul class="envelope-list">${items.map(item => `<li>${esc(item)}</li>`).join("")}</ul>
    </article>`;
  }
  return `<article class="envelope">
    <h3>${esc(title)}</h3>
    <div class="empty-envelope">
      <button class="game-btn warn" type="button" onclick="${openAction}">Open ${esc(title)}</button>
    </div>
  </article>`;
}

function renderTests(item){
  return item.tests.map(test => {
    const chosen = state.selectedTests.has(test.id);
    const wrong = state.wrongTests.has(test.id);
    const classes = ["test-card", chosen ? "correct" : "", wrong ? "wrong" : ""].filter(Boolean).join(" ");
    const status = chosen ? "Printout open" : (wrong ? "Penalty used" : "Envelope closed");
    return `<button class="${classes}" type="button" onclick="chooseTest('${test.id}')" ${!state.labOpen || chosen || wrong || state.remaining <= 0 ? "disabled" : ""}>
      ${esc(test.label)}
      <small>${esc(status)}</small>
    </button>`;
  }).join("");
}

function renderPrintouts(item){
  const openedTests = item.tests.filter(test => state.selectedTests.has(test.id));
  if(!openedTests.length){
    return `<div class="locked-printout">Machine printouts appear here after correct test cards are selected.</div>`;
  }
  return openedTests.map(test => `<div class="machine-printout">
    <strong>${esc(test.label)} / PRINTOUT</strong>
    ${esc(test.result)}
  </div>`).join("");
}

function renderOrganismChoices(item){
  const unlocked = requiredTestsComplete();
  return item.organisms.map(org => {
    const wrong = state.wrongOrganisms.has(org.id);
    const correct = state.solved && org.correct;
    const classes = ["organism-choice", wrong ? "wrong" : "", correct ? "correct" : ""].filter(Boolean).join(" ");
    return `<button class="${classes}" type="button" onclick="chooseOrganism('${org.id}')" ${!unlocked || wrong || state.solved || state.remaining <= 0 ? "disabled" : ""}>${esc(org.label)}</button>`;
  }).join("");
}

function renderActiveCase(){
  const item = currentCase();
  const patientItems = [
    `Age: ${item.age}`,
    `Specimen source: ${item.specimenSource}`,
    `Symptoms/history: ${item.symptoms}`,
    `Collection note: ${item.collectionNote}`
  ];
  const labItems = [
    `Gram stain: ${item.gramStain}`,
    `Colony morphology: ${item.colonyMorphology}`,
    `Media growth: ${item.mediaGrowth}`,
    `Extra clue: ${item.extraClue}`
  ];
  const deckDone = completedInDeck(state.deckIndex) === 5;
  return renderChrome(`<section class="game-grid">
    <article class="room-card case-enter ${state.solved ? "solved" : ""}">
      <div class="flip-inner">
        <div class="room-face front">
          <div class="case-top">
            <div>
              <div class="case-kicker">${esc(item.deckName)}</div>
              <h2>${caseCode(item)} Mystery Case</h2>
            </div>
            <div class="progress-pill">Case ${item.number} of 5</div>
          </div>
          <div class="envelope-grid">
            ${renderEnvelope("Patient Envelope", state.patientOpen, false, patientItems, "openPatientEnvelope()")}
            ${renderEnvelope("Lab Clues Envelope", state.labOpen, !state.patientOpen, labItems, "openLabEnvelope()")}
          </div>
          <div class="section-label">Test Cards / Envelopes</div>
          <div class="test-grid">${renderTests(item)}</div>
          <div class="section-label">Small Lab Machine Printout</div>
          <div class="printout-area">${renderPrintouts(item)}</div>
        </div>
        <div class="room-face back">
          <div class="solved-board">
            <div>
              <div class="stamp ${deckDone ? "deck-done" : ""}">${deckDone ? "DECK COMPLETE" : "CASE SOLVED"}</div>
              <div class="solved-card">
                <h3>${caseCode(item)} Solved Side</h3>
                <dl>
                  <div><dt>Organism</dt><dd>${esc(item.solved.organism)}</dd></div>
                  <div><dt>Key Clues</dt><dd>${item.solved.keyClues.map(esc).join("<br>")}</dd></div>
                  <div><dt>Best Confirmatory Tests</dt><dd>${item.solved.confirmatoryTests.map(esc).join(", ")}</dd></div>
                </dl>
              </div>
              <div class="solved-actions">
                <button class="game-btn primary" type="button" onclick="nextCase()">${item.number < 5 ? "Move to Next Case" : "Show Deck Complete"}</button>
                <button class="game-btn" type="button" onclick="resetCase()">Replay This Case</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </article>
    <aside class="side-card">
      <div class="timer-card">
        <div class="timer-label">Countdown Timer</div>
        <div class="timer-value" id="timerValue">${formatTime(state.remaining)}</div>
        <div class="timer-rule">15 minutes per case. Wrong test or organism choice = minus 1 minute.</div>
      </div>
      <div class="penalty ${state.feedbackType}">${esc(state.feedback)}</div>
      <div>
        <div class="section-label">Final Organism Choice</div>
        <div class="organism-grid">${renderOrganismChoices(item)}</div>
      </div>
      <button class="game-btn" type="button" onclick="resetCase()">Reset Case</button>
    </aside>
  </section>`, "active-scene");
}

function render(){
  document.body.classList.toggle("room-active", scene === "active");
  document.body.classList.toggle("room-intense", scene === "active" && (state.patientOpen || state.labOpen) && !state.solved);
  const root = document.getElementById("gameRoot");
  if(scene === "welcome")root.innerHTML = renderWelcome();
  else if(scene === "decks")root.innerHTML = renderDeckSelect();
  else if(scene === "cases")root.innerHTML = renderCaseSelect();
  else if(scene === "deckComplete")root.innerHTML = renderDeckComplete();
  else root.innerHTML = renderActiveCase();
  updateTimerDisplay();
  updateMicroMusicButton();
}

function printableCard(type, item, deck){
  const body = {
    patient: [
      `Age: ${item.age}`,
      `Specimen source: ${item.specimenSource}`,
      `Symptoms/history: ${item.symptoms}`,
      `Collection note: ${item.collectionNote}`
    ],
    lab: [
      `Gram stain: ${item.gramStain}`,
      `Colony morphology: ${item.colonyMorphology}`,
      `Media growth: ${item.mediaGrowth}`,
      `Extra clue: ${item.extraClue}`
    ],
    result: item.tests.filter(test => item.requiredTestIds.includes(test.id)).map(test => `${test.label}: ${test.result}`),
    organism: item.organisms.map(org => org.label),
    solved: [
      `Organism: ${item.solved.organism}`,
      `Key clues: ${item.solved.keyClues.join(" / ")}`,
      `Best confirmatory tests: ${item.solved.confirmatoryTests.join(", ")}`
    ]
  };
  const title = {
    patient:"Patient Envelope Card",
    lab:"Lab Clue Card",
    result:"Test Result Card",
    organism:"Organism Choice Card",
    solved:"Solved Card"
  }[type];
  return `<article class="print-card">
    <div class="print-card-type">${esc(title)}</div>
    <h2>${esc(caseCode(item))} - ${esc(deck.name)}</h2>
    <div class="meta">Placeholder printable card / 4x6 format / cut line friendly</div>
    <div>
      <h3>${esc(title)}</h3>
      <ul>${body[type].map(line => `<li>${esc(line)}</li>`).join("")}</ul>
    </div>
    <div class="print-cut">Cut card. Placeholder content only.</div>
  </article>`;
}

function renderPrintable(mode){
  const deck = currentDeck();
  const targetCases = mode === "all"
    ? decks.flatMap(entry => entry.cases.map(item => ({deck:entry, item})))
    : mode === "single"
      ? [{deck, item:currentCase()}]
      : deck.cases.map(item => ({deck, item}));
  const cards = targetCases.flatMap(({deck:caseDeck, item}) => ["patient","lab","result","organism","solved"].map(type => printableCard(type, item, caseDeck)));
  const sheets = [];
  for(let i = 0; i < cards.length; i += 2){
    sheets.push(`<div class="print-sheet">${cards.slice(i, i + 2).join("")}</div>`);
  }
  const title = mode === "all" ? "Micro Case Room - All Placeholder Decks" : `Micro Case Room - ${deck.name}`;
  document.getElementById("printableGame").innerHTML = `<h1 class="print-title">${esc(title)}</h1>${sheets.join("")}`;
}

function printMode(mode){
  renderPrintable(mode);
  document.body.classList.remove("print-current", "print-single", "print-all");
  document.body.classList.add(`print-${mode}`);
  setTimeout(() => window.print(), 80);
}

window.addEventListener("afterprint", () => {
  document.body.classList.remove("print-current", "print-single", "print-all");
});
window.addEventListener("beforeunload", stopMicroMusic);

window.showWelcome = showWelcome;
window.showDecks = showDecks;
window.selectDeck = selectDeck;
window.startCase = startCase;
window.resetCase = resetCase;
window.openPatientEnvelope = openPatientEnvelope;
window.openLabEnvelope = openLabEnvelope;
window.chooseTest = chooseTest;
window.chooseOrganism = chooseOrganism;
window.nextCase = nextCase;
window.toggleMicroMusic = toggleMicroMusic;
window.printMode = printMode;

renderPrintable("current");
render();
</script>
</body>
