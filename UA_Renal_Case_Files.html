<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UA Renal Case Files</title>
<script src="interactive_theme.js"></script>
<link rel="stylesheet" href="interactive_learning.css" />
<style>
:root{
  --ua:#c8a800;
  --ua-dark:#806700;
  --ink:#171b2f;
  --muted:#59627f;
  --soft:#f6f3df;
  --panel:#ffffff;
  --line:#c8cce0;
  --blue:#2f6bd8;
  --green:#1a8a4a;
  --red:#c0303f;
  --shadow:0 16px 40px rgba(42,55,105,.12);
}
*,
*::before,
*::after{box-sizing:border-box}
body.ua-case-files{
  margin:0;
  overflow-x:hidden;
  background:
    radial-gradient(circle at 8% 8%,rgba(200,168,0,.14),transparent 26rem),
    linear-gradient(180deg,#fafbff,#edf1f9 60%,#f5f7fb);
  color:var(--ink);
  font-family:var(--mls-sans,Inter,system-ui,sans-serif);
}
.screen-shell{min-height:100vh}
.game-wrap{
  width:min(1120px,calc(100% - 28px));
  margin:0 auto;
  padding:18px 0 34px;
  max-width:100%;
}
.game-hero{
  background:linear-gradient(135deg,#fffdf5,#ffffff 62%,#eef4ff);
  border:1px solid var(--line);
  border-top:6px solid var(--ua);
  border-radius:22px;
  box-shadow:var(--shadow);
  padding:22px;
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:18px;
  align-items:center;
  min-width:0;
}
.game-hero > *{min-width:0}
.eyebrow{
  color:var(--ua-dark);
  font-size:.78rem;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
}
.game-hero h1{
  margin:6px 0 6px;
  font-size:clamp(2rem,4vw,3.8rem);
  line-height:.96;
  color:var(--ink);
}
.game-hero p{
  margin:0;
  color:var(--muted);
  font-size:1.02rem;
  line-height:1.45;
  max-width:720px;
  overflow-wrap:anywhere;
}
.hero-badge{
  min-width:138px;
  aspect-ratio:1;
  border-radius:26px;
  background:linear-gradient(145deg,#fff9d7,#dbe8ff);
  border:1px solid #d4dbef;
  display:grid;
  place-items:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8),0 14px 28px rgba(42,55,105,.12);
  color:var(--ua-dark);
  font-weight:950;
  text-align:center;
}
.hero-badge span{font-size:2.4rem;display:block;margin-bottom:5px}
.action-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:16px;
}
.game-btn{
  border:0;
  border-radius:999px;
  padding:11px 16px;
  background:#e7eaf3;
  color:#454c68;
  font:900 .9rem/1 var(--mls-sans,Inter,system-ui,sans-serif);
  cursor:pointer;
  transition:transform .14s ease,box-shadow .14s ease,background .14s ease;
}
.game-btn:hover{transform:translateY(-1px);box-shadow:0 10px 20px rgba(42,55,105,.12)}
.game-btn.primary{background:var(--blue);color:white}
.game-btn.ua{background:var(--ua);color:#2c2400}
.game-btn.warn{background:#fff1f1;color:#9b1c2d;border:1px solid #f1b9c0}
.game-btn.ghost{background:#fff;border:1px solid var(--line)}
.unit-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:18px;
  margin-top:18px;
}
.unit-card{
  position:relative;
  border:1px solid var(--line);
  border-radius:20px;
  background:linear-gradient(180deg,#ffffff,#f9fbff);
  box-shadow:var(--shadow);
  padding:16px;
  text-align:left;
  cursor:pointer;
  color:var(--ink);
  overflow:hidden;
  min-height:280px;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:12px;
}
.unit-card h2{margin:8px 0 8px;font-size:1.3rem}
.unit-card p{margin:0;color:var(--muted);line-height:1.45}
.unit-card:disabled{
  cursor:default;
  opacity:1;
}
.unit-card.is-empty:hover{transform:none}
.unit-card:hover .door-glow,
.unit-card:focus-visible .door-glow{opacity:1}
.unit-card.door-opening .unit-door.left{transform:translateX(-70%)}
.unit-card.door-opening .unit-door.right{transform:translateX(70%)}
.unit-card.door-opening .door-alert{opacity:1;transform:translateY(0)}
.department-entry{
  position:relative;
  width:min(100%,330px);
  justify-self:center;
  min-height:214px;
  border-radius:18px 18px 24px 24px;
  border:2px solid #c8d1e5;
  background:
    radial-gradient(circle at 20% 12%,rgba(255,255,255,.95),transparent 8rem),
    linear-gradient(90deg,#e8edf6 0 12%,transparent 12% 88%,#e8edf6 88%),
    linear-gradient(180deg,#f8fbff 0 32%,#e5ebf6 32% 100%);
  box-shadow:
    inset 0 -18px 0 rgba(112,126,158,.16),
    inset 0 0 0 8px rgba(255,255,255,.38);
  overflow:hidden;
}
.department-entry::before{
  content:"";
  position:absolute;
  left:11%;
  right:11%;
  bottom:8px;
  height:8px;
  border-radius:999px;
  background:linear-gradient(90deg,#8996ad,#e4e9f3,#8996ad);
  box-shadow:0 -1px 0 rgba(255,255,255,.7);
}
.department-entry::after{
  content:"";
  position:absolute;
  left:50%;
  top:38px;
  width:72px;
  height:12px;
  transform:translateX(-50%);
  border-radius:999px;
  background:#313947;
  box-shadow:0 8px 18px rgba(17,24,39,.22);
}
.department-sign{
  position:absolute;
  z-index:4;
  left:50%;
  top:8px;
  transform:translateX(-50%);
  border-radius:999px;
  background:#ffffff;
  border:1px solid #cfd7ea;
  color:#4b5575;
  font-weight:950;
  font-size:.78rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  padding:7px 12px;
  box-shadow:0 8px 18px rgba(42,55,105,.12);
  white-space:nowrap;
}
.door-track{
  position:absolute;
  left:12%;
  right:12%;
  top:54px;
  height:20px;
  border-radius:12px 12px 4px 4px;
  background:linear-gradient(180deg,#d8dee9,#8d98ac 55%,#6e7a90);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.85),
    0 8px 16px rgba(38,54,95,.16);
}
.unit-door{
  position:absolute;
  top:72px;
  bottom:18px;
  width:36%;
  background:
    linear-gradient(90deg,rgba(255,255,255,.55),rgba(255,255,255,.16) 36%,transparent 76%),
    linear-gradient(180deg,#f3f7fb,#c5cfdd);
  border:3px solid #9eaabd;
  transition:transform .62s cubic-bezier(.2,.8,.2,1);
  box-shadow:inset 0 0 0 4px rgba(255,255,255,.25);
}
.unit-door.left{left:14%;border-radius:8px 2px 2px 8px;border-right:4px solid #7c879c}
.unit-door.right{right:14%;border-radius:2px 8px 8px 2px;border-left:4px solid #7c879c}
.unit-door::before{
  content:"";
  position:absolute;
  top:18px;
  width:64%;
  height:86px;
  border-radius:4px;
  background:
    linear-gradient(135deg,rgba(255,255,255,.7),transparent 38%),
    linear-gradient(180deg,#dff2ff,#a9c8dd);
  border:2px solid #8fa0b4;
  box-shadow:inset 0 0 0 4px rgba(255,255,255,.42);
}
.unit-door::after{
  content:"";
  position:absolute;
  left:12%;
  right:12%;
  bottom:13px;
  height:18px;
  border-radius:3px;
  background:linear-gradient(180deg,#a6b1c2,#7b8798);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.55);
}
.unit-door.left::before{right:15px}
.unit-door.right::before{left:15px}
.door-glow{
  position:absolute;
  inset:72px 38% 18px;
  border-radius:20px 20px 4px 4px;
  background:
    radial-gradient(circle at 50% 22%,rgba(255,241,165,.48),transparent 45%),
    linear-gradient(180deg,rgba(255,255,255,.35),rgba(47,107,216,.12));
  opacity:.45;
  transition:opacity .2s ease;
}
.door-alert{
  position:absolute;
  z-index:5;
  left:50%;
  bottom:14px;
  transform:translate(-50%,8px);
  opacity:0;
  border-radius:999px;
  background:#1a8a4a;
  color:white;
  font-size:.74rem;
  font-weight:950;
  padding:6px 10px;
  letter-spacing:.05em;
  text-transform:uppercase;
}
.coming-soon-pill{
  position:absolute;
  right:14px;
  bottom:14px;
  border-radius:999px;
  border:1px solid #cfbc58;
  background:#fff4bd;
  color:#6d5700;
  font-weight:950;
  font-size:.78rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  padding:7px 11px;
}
.progress-track{
  height:10px;
  background:#edf1fa;
  border-radius:999px;
  overflow:hidden;
  margin-top:14px;
  border:1px solid #d8dfef;
}
.progress-fill{
  height:100%;
  width:var(--progress,0%);
  background:linear-gradient(90deg,var(--ua),#e7c945);
}
.progress-copy{
  color:#4c5570;
  font-weight:900;
  font-size:.88rem;
  margin-top:8px;
}
.unit-panel{
  margin-top:18px;
  display:grid;
  gap:16px;
}
.unit-head,
.chart-panel,
.room-panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  box-shadow:var(--shadow);
  padding:18px;
}
.unit-head{
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:flex-start;
}
.unit-head h2{margin:4px 0 4px;font-size:1.8rem}
.unit-head p{margin:0;color:var(--muted)}
.department-hall{
  border:1px solid var(--line);
  border-radius:18px;
  background:
    linear-gradient(90deg,rgba(200,168,0,.14),transparent 38%,rgba(47,107,216,.08)),
    linear-gradient(180deg,#ffffff,#f6f8ff);
  padding:14px;
  display:flex;
  align-items:center;
  gap:14px;
}
.department-hall-door{
  position:relative;
  flex:0 0 112px;
  height:74px;
  border-radius:14px;
  border:2px solid #c8cfe3;
  background:#edf3ff;
  overflow:hidden;
}
.department-hall-door::before,
.department-hall-door::after{
  content:"";
  position:absolute;
  inset:10px auto 0 0;
  width:50%;
  background:linear-gradient(180deg,#ffffff,#d9e4f6);
  border-right:1px solid #aeb9d3;
  animation:hallDoorBreathe 2.4s ease-in-out infinite;
}
.department-hall-door::after{
  left:auto;
  right:0;
  border-right:0;
  border-left:1px solid #aeb9d3;
  animation-name:hallDoorBreatheRight;
}
@keyframes hallDoorBreathe{
  0%,100%{transform:translateX(0)}
  50%{transform:translateX(-7px)}
}
@keyframes hallDoorBreatheRight{
  0%,100%{transform:translateX(0)}
  50%{transform:translateX(7px)}
}
.department-hall strong{display:block;font-size:1.02rem}
.department-hall span{display:block;color:var(--muted);font-size:.9rem;margin-top:2px}
.room-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
  gap:12px;
}
.room-card{
  position:relative;
  min-height:164px;
  border:1px solid var(--line);
  border-radius:17px;
  background:
    linear-gradient(180deg,rgba(255,255,255,.62),transparent 42%),
    linear-gradient(180deg,#f8fbff,#eef3fc);
  padding:12px;
  text-align:left;
  cursor:pointer;
  overflow:hidden;
}
.room-card.selected .room-door{transform:translateX(-50%) translateY(-3px) rotate(-1.5deg)}
.room-card.closed .room-door{filter:saturate(.72)}
.room-door{
  position:absolute;
  left:50%;
  top:16px;
  width:84px;
  height:108px;
  transform:translateX(-50%);
  border-radius:7px 7px 2px 2px;
  background:
    linear-gradient(90deg,rgba(255,255,255,.22),transparent 28%,rgba(122,83,35,.08) 78%),
    linear-gradient(180deg,#f4d99a,#d2a85e);
  border:5px solid #8e99a9;
  border-bottom-width:7px;
  box-shadow:
    0 8px 18px rgba(42,55,105,.16),
    inset 0 0 0 2px rgba(255,255,255,.28);
  transition:transform .2s ease;
}
.room-door::before{
  content:"";
  position:absolute;
  inset:8px;
  border-radius:4px;
  border:2px solid rgba(116,82,37,.22);
}
.room-door-window{
  position:absolute;
  z-index:2;
  top:14px;
  left:50%;
  width:42px;
  height:22px;
  transform:translateX(-50%);
  border-radius:5px;
  background:linear-gradient(180deg,#e5f5ff,#bfd8ef);
  border:1px solid #9eadc8;
}
.room-door-handle{
  position:absolute;
  z-index:2;
  top:60px;
  right:12px;
  width:9px;
  height:9px;
  border-radius:50%;
  background:#4c5564;
  box-shadow:0 0 0 2px rgba(255,255,255,.22);
}
.room-number{
  position:relative;
  z-index:3;
  display:inline-flex;
  align-items:center;
  gap:5px;
  border-radius:999px;
  background:#fff6c7;
  color:#7a6200;
  font-weight:950;
  padding:6px 10px;
  border:1px solid #dec85d;
  box-shadow:0 6px 14px rgba(42,55,105,.1);
}
.room-card h3,
.room-card p{
  position:relative;
  z-index:3;
}
.room-card h3{margin:76px 0 3px;font-size:1rem}
.room-card p{margin:0;color:var(--muted);font-size:.85rem}
.stamp{
  position:absolute;
  z-index:4;
  right:10px;
  bottom:10px;
  border:3px solid var(--green);
  color:var(--green);
  border-radius:10px;
  padding:5px 7px;
  font-weight:950;
  letter-spacing:.08em;
  text-transform:uppercase;
  transform:rotate(-8deg);
  background:rgba(255,255,255,.9);
  animation:stampIn .34s ease both;
}
@keyframes stampIn{
  from{opacity:0;transform:scale(1.7) rotate(-12deg)}
  to{opacity:1;transform:scale(1) rotate(-8deg)}
}
.chart-layout{
  display:grid;
  grid-template-columns:minmax(0,1.2fr) minmax(260px,.8fr);
  gap:16px;
}
.chart-title-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:start;
  margin-bottom:12px;
}
.chart-title-row h2{margin:0;font-size:1.45rem}
.chart-title-row p{margin:3px 0 0;color:var(--muted)}
.clipboard{
  border:1px solid var(--line);
  border-radius:18px;
  background:#fffdf8;
  overflow:hidden;
}
.clipboard-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  background:#f3e7aa;
  color:#4f4100;
  padding:10px 14px;
  font-weight:950;
}
.evidence-list{
  list-style:none;
  margin:0;
  padding:12px;
  display:grid;
  gap:10px;
}
.evidence-list li{
  border:1px solid #e4dcae;
  background:white;
  border-radius:12px;
  padding:10px 12px;
  color:#303751;
  line-height:1.42;
  font-size:1rem;
  font-weight:760;
}
.diagnosis-bank{
  border:1px solid var(--line);
  border-radius:18px;
  background:#f8faff;
  padding:14px;
}
.diagnosis-bank h3{margin:0 0 5px;font-size:1rem}
.diagnosis-bank p{margin:0 0 12px;color:var(--muted);font-size:.88rem}
.token-grid{
  display:flex;
  flex-wrap:wrap;
  gap:9px;
}
.diagnosis-token{
  border:2px solid #b89a12;
  background:linear-gradient(180deg,#fff6ba,#e0bd26);
  color:#322800;
  border-radius:999px;
  padding:9px 12px;
  font-weight:900;
  font-size:.84rem;
  cursor:pointer;
  box-shadow:0 4px 0 rgba(104,82,0,.18);
}
.diagnosis-token.selected{
  outline:4px solid rgba(47,107,216,.22);
  border-color:#2f6bd8;
  background:#fff;
  color:#18366c;
}
.status-card{
  margin-top:12px;
  min-height:44px;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px 12px;
  color:#4c5570;
  font-weight:900;
  background:white;
}
.status-card.good{border-color:#9ad3b0;background:#ebf8ef;color:var(--green)}
.status-card.bad{border-color:#f0b6bf;background:#fff1f3;color:#a42033}
.completion{
  border:1px solid #9ad3b0;
  background:#ebf8ef;
  color:#0d6b3e;
  padding:13px 14px;
  border-radius:16px;
  font-weight:950;
}
.answer-key-panel{
  margin-top:18px;
  border:1px solid var(--line);
  border-radius:18px;
  background:linear-gradient(180deg,#ffffff,#f8fbff);
  box-shadow:var(--shadow);
  overflow:hidden;
}
.answer-key-panel summary{
  cursor:pointer;
  padding:14px 16px;
  font-weight:950;
  color:var(--ink);
  list-style:none;
}
.answer-key-panel summary::-webkit-details-marker{display:none}
.answer-key-panel summary::after{
  content:"+";
  float:right;
  color:var(--blue);
  font-weight:950;
}
.answer-key-panel[open] summary::after{content:"-"}
.answer-key-grid{
  border-top:1px solid var(--line);
  padding:14px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:10px;
}
.answer-key-item{
  display:grid;
  grid-template-columns:58px 1fr;
  gap:10px;
  align-items:center;
  border:1px solid #dbe2f1;
  border-radius:14px;
  background:#ffffff;
  padding:10px;
}
.answer-key-item strong{
  display:grid;
  place-items:center;
  min-height:38px;
  border-radius:12px;
  background:#fff4bd;
  color:#6d5700;
  font-weight:950;
}
.answer-key-item span{font-weight:850;color:#2b3148}
.printable-game{display:none}
@media(max-width:860px){
  .game-hero{grid-template-columns:1fr}
  .hero-badge{width:118px;min-width:118px;justify-self:start}
  .unit-grid{grid-template-columns:1fr}
  .unit-head{display:grid}
  .department-hall{align-items:flex-start}
  .chart-layout{grid-template-columns:1fr}
}
@media(max-width:560px){
  body.ua-case-files .site-header{flex-wrap:wrap}
  .game-wrap{width:min(100% - 18px,480px);padding-top:12px}
  .game-hero,.unit-head,.chart-panel,.room-panel{padding:14px;border-radius:17px}
  .department-entry{min-height:190px;max-width:286px}
  .unit-door{top:68px;bottom:18px;width:37%}
  .unit-door.left{left:13%}
  .unit-door.right{right:13%}
  .unit-door::before{height:72px}
  .room-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .room-card{min-height:158px;padding:10px}
  .room-door{top:14px;width:74px;height:96px}
  .room-card h3{margin-top:72px}
  .game-btn{width:100%;justify-content:center}
}
html[data-mls-theme="dark"] body.ua-case-files{
  --ink:#f7f9ff;
  --muted:#c8cfe7;
  --panel:#151927;
  --line:#35405e;
  --ua-dark:#f2d96a;
  background:
    radial-gradient(circle at 8% 8%,rgba(200,168,0,.16),transparent 24rem),
    linear-gradient(180deg,#0d0f16,#121827 58%,#0b0d13) !important;
  color:var(--ink) !important;
}
html[data-mls-theme="dark"] body.ua-case-files .game-hero,
html[data-mls-theme="dark"] body.ua-case-files .unit-head,
html[data-mls-theme="dark"] body.ua-case-files .chart-panel,
html[data-mls-theme="dark"] body.ua-case-files .room-panel{
  background:linear-gradient(145deg,#151927,#101522 70%,#1b2132);
  border-color:var(--line);
  color:var(--ink);
}
html[data-mls-theme="dark"] body.ua-case-files .game-hero h1,
html[data-mls-theme="dark"] body.ua-case-files h2,
html[data-mls-theme="dark"] body.ua-case-files h3{
  color:#ffffff;
}
html[data-mls-theme="dark"] body.ua-case-files .game-hero p,
html[data-mls-theme="dark"] body.ua-case-files .unit-card p,
html[data-mls-theme="dark"] body.ua-case-files .unit-head p,
html[data-mls-theme="dark"] body.ua-case-files .chart-title-row p,
html[data-mls-theme="dark"] body.ua-case-files .diagnosis-bank p,
html[data-mls-theme="dark"] body.ua-case-files .department-hall span,
html[data-mls-theme="dark"] body.ua-case-files .room-card p{
  color:var(--muted);
}
html[data-mls-theme="dark"] body.ua-case-files .hero-badge,
html[data-mls-theme="dark"] body.ua-case-files .unit-card,
html[data-mls-theme="dark"] body.ua-case-files .diagnosis-bank{
  background:linear-gradient(180deg,#1b2132,#141a29);
  border-color:var(--line);
  color:var(--ink);
}
html[data-mls-theme="dark"] body.ua-case-files .department-entry,
html[data-mls-theme="dark"] body.ua-case-files .department-hall,

    ],

  },
  {

    ],

  },
  {

    "department": "Nephrotic Syndrome Department",
    "room": 5,
    "caseTitle": "Medical Case 5",
    "patientResults": [
      "History: Diabetic patient with renal monitoring.",
      "UA/lab clue: marked proteinuria monitored by microalbuminuria.",
      "Pathology clue: mesangial cell proliferation with vascular sclerosis.",
      "Key clue: common end-stage kidney disease pattern."
    ],
    "diagnosis": "Diabetic Nephropathy"
  }
];

const storageKey = "mls.uaRenalCaseFiles.v1";
let progress = loadProgress();
let activeUnitId = null;
let activeRoom = null;
let selectedDiagnosis = "";
let chartMessage = "";
let chartMessageState = "";

function esc(value){
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[ch]));
}

function loadProgress(){
  try{
    const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
    return saved && typeof saved === "object" ? {closed:saved.closed || {}} : {closed:{}};
  }catch(error){
    return {closed:{}};
  }
}

function saveProgress(){
  localStorage.setItem(storageKey, JSON.stringify(progress));
}

function caseKey(item){
  return `${item.unitId}-${item.room}`;
}

function caseCode(item){
  const unit = renalUnits.find(unit => unit.unitId === item.unitId);
  return `${unit?.codePrefix || "R"}${item.room}`;
}

function units(){
  const seen = new Map(renalUnits.map(unit => [unit.unitId, {...unit}]));
  renalCaseFiles.forEach(item => {
    if(!seen.has(item.unitId)){
      seen.set(item.unitId, {unitId:item.unitId, unitName:item.unitName, department:item.department});
    }
  });
  return [...seen.values()].sort((a,b) => a.unitId - b.unitId);
}

function casesForUnit(unitId){
  return renalCaseFiles.filter(item => item.unitId === Number(unitId)).sort((a,b) => a.room - b.room);
}

function closedCases(unitId){
  return casesForUnit(unitId).filter(item => progress.closed[caseKey(item)]);
}

function usedDiagnoses(unitId){
  return new Set(closedCases(unitId).map(item => item.diagnosis));
}

function render(){
  const root = document.getElementById("gameRoot");
  root.innerHTML = activeUnitId ? renderUnit() : renderStart();
  document.querySelectorAll(".diagnosis-token").forEach(button => {
    button.addEventListener("click", () => selectDiagnosis(button.dataset.diagnosis));
  });
}

function renderStart(){
  const totalClosed = Object.keys(progress.closed).length;
  const totalCases = renalCaseFiles.length;
  const completeMessage = totalClosed === totalCases
    ? '<div class="completion" style="margin-top:18px">UA Renal Case Files Complete - 13/13 medical cases closed.</div>'
    : "";
  return `
    <div class="unit-grid">
      ${units().map(unit => {
        const cases = casesForUnit(unit.unitId);
        const closed = closedCases(unit.unitId).length;
        const isEmpty = cases.length === 0;
        const pct = isEmpty ? 0 : Math.round((closed / cases.length) * 100);
        const countCopy = isEmpty ? (unit.comingSoon || "Case files coming soon") : `${cases.length} rooms / ${cases.length} medical cases`;
        const progressCopy = isEmpty ? "Ready for future case files" : `Cases Closed ${closed}/${cases.length}`;
        return `<button class="unit-card ${isEmpty ? "is-empty" : ""}" type="button" ${isEmpty ? "disabled" : `onclick="enterUnit(${unit.unitId}, this)"`}>
          <div>
            <div class="eyebrow">${esc(unit.unitName)}</div>
            <h2>${esc(unit.department)}</h2>
            <p>${esc(countCopy)}</p>
          </div>
          <div class="department-entry" aria-hidden="true">
            <div class="department-sign">Automatic Department Doors</div>
            <div class="door-track"></div>
            <div class="door-glow"></div>
            <div class="unit-door left"></div>
            <div class="unit-door right"></div>
            <div class="door-alert">Opening</div>
          </div>
          <div class="progress-track"><div class="progress-fill" style="--progress:${pct}%"></div></div>
          <div class="progress-copy">${esc(progressCopy)}</div>
          ${isEmpty ? '<div class="coming-soon-pill">Coming soon</div>' : ""}
        </button>`;
      }).join("")}
    </div>
    ${completeMessage}
    ${renderAnswerKey()}
  `;
}

function renderUnit(){
  const unitCases = casesForUnit(activeUnitId);
  const unit = units().find(item => item.unitId === activeUnitId);
  if(!unitCases.length){
    return `
      <section class="unit-panel">
        <div class="unit-head">
          <div>
            <div class="eyebrow">${esc(unit.unitName)}</div>
            <h2>${esc(unit.department)}</h2>
            <p>${esc(unit.comingSoon || "Case files coming soon")}</p>
          </div>
          <div class="action-row" style="margin-top:0">
            <button class="game-btn ghost" type="button" onclick="backToUnits()">Hospital Lobby</button>
          </div>
        </div>
      </section>
    `;
  }
  const closed = closedCases(activeUnitId).length;
  const completion = closed === unitCases.length
    ? `<div class="completion">${esc(unit.department)} Complete - ${closed}/${unitCases.length} cases closed.</div>`
    : "";
  return `
    <section class="unit-panel">
      <div class="unit-head">
        <div>
          <div class="eyebrow">${esc(unit.unitName)}</div>
          <h2>${esc(unit.department)}</h2>
          <p>Open a room, review the patient chart, then choose a diagnosis token.</p>
          <div class="progress-track"><div class="progress-fill" style="--progress:${Math.round((closed / unitCases.length) * 100)}%"></div></div>
          <div class="progress-copy">Cases Closed ${closed}/${unitCases.length}</div>
        </div>
        <div class="action-row" style="margin-top:0">
          <button class="game-btn ghost" type="button" onclick="backToUnits()">Hospital Lobby</button>
          <button class="game-btn warn" type="button" onclick="resetUnit(${activeUnitId})">Reset Unit</button>
          <button class="game-btn warn" type="button" onclick="resetWholeGame()">Reset Whole Game</button>
        </div>
      </div>
      ${completion}
      <div class="department-hall">
        <div class="department-hall-door" aria-hidden="true"></div>
        <div>
          <strong>${esc(unit.department)} Hallway</strong>
          <span>Choose a patient room door to pull the chart for that case file.</span>
        </div>
      </div>
      <div class="room-panel">
        <div class="chart-title-row">
          <div>
            <h2>Hospital Rooms</h2>
            <p>Case Closed rooms keep their stamp.</p>
          </div>
        </div>
        <div class="room-grid">
          ${unitCases.map(renderRoomCard).join("")}
        </div>
      </div>
      ${activeRoom ? renderChart(activeRoom) : ""}
    </section>
  `;
}

function renderRoomCard(item){
  const closed = progress.closed[caseKey(item)];
  const selected = activeRoom && activeRoom.unitId === item.unitId && activeRoom.room === item.room;
  return `<button class="room-card ${closed ? "closed" : ""} ${selected ? "selected" : ""}" type="button" onclick="openRoom(${item.unitId},${item.room})">
    <div class="room-door" aria-hidden="true">
      <div class="room-door-window"></div>
      <div class="room-door-handle"></div>
    </div>
    <span class="room-number">${caseCode(item)}</span>
    <h3>Room ${item.room}</h3>
    <p>${esc(item.caseTitle)}</p>
    ${closed ? '<div class="stamp">Case Closed</div>' : ""}
  </button>`;
}

function renderChart(item){
  const closed = progress.closed[caseKey(item)];
  const unitUsed = usedDiagnoses(item.unitId);
  const available = casesForUnit(item.unitId)
    .map(caseFile => caseFile.diagnosis)
    .filter(diagnosis => !unitUsed.has(diagnosis));
  const message = closed
    ? "Case Closed. This room is sealed."
    : (chartMessage || "Choose a diagnosis token, then confirm the chart.");
  const messageState = closed ? "good" : chartMessageState;
  return `<div class="chart-panel" id="patientChart">
    <div class="chart-title-row">
      <div>
        <h2>Patient Chart - ${caseCode(item)} / Room ${item.room}</h2>
        <p>${esc(item.unitName)} / ${esc(item.department)} / ${esc(item.caseTitle)}</p>
      </div>
      <button class="game-btn ghost" type="button" onclick="closeChart()">Close Chart</button>
    </div>
    <div class="chart-layout">
      <div class="clipboard">
        <div class="clipboard-head"><span>Patient Results</span><span>UA Evidence</span></div>
        <ul class="evidence-list">
          ${caseClues(item).map(result => `<li>${esc(result)}</li>`).join("")}
        </ul>
      </div>
      <aside class="diagnosis-bank">
        <h3>Diagnosis Bank</h3>
        <p>${closed ? "This room no longer needs a token." : "Pick one diagnosis token for this patient chart."}</p>
        <div class="token-grid">
          ${closed ? "" : available.map(diagnosis => `<button type="button" class="diagnosis-token ${selectedDiagnosis === diagnosis ? "selected" : ""}" data-diagnosis="${esc(diagnosis)}">${esc(diagnosis)}</button>`).join("")}
        </div>
        <div class="status-card ${messageState}">${esc(message)}</div>
        ${closed ? "" : `<div class="action-row"><button class="game-btn primary" type="button" onclick="confirmDiagnosis()">Confirm Diagnosis</button></div>`}
      </aside>
    </div>
  </div>`;
}

function enterUnit(unitId, doorCard){
  if(doorCard && !doorCard.classList.contains("door-opening")){
    doorCard.classList.add("door-opening");
    setTimeout(() => enterUnit(unitId), 560);
    return;
  }
  activeUnitId = unitId;
  activeRoom = null;
  selectedDiagnosis = "";
  chartMessage = "";
  chartMessageState = "";
  render();
  setTimeout(() => document.querySelector(".unit-panel")?.scrollIntoView({behavior:"smooth",block:"start"}), 40);
}

function backToUnits(){
  activeUnitId = null;
  activeRoom = null;
  selectedDiagnosis = "";
  render();
}

function openRoom(unitId, room){
  activeUnitId = unitId;
  activeRoom = renalCaseFiles.find(item => item.unitId === unitId && item.room === room);
  selectedDiagnosis = "";
  chartMessage = "";
  chartMessageState = "";
  render();
  setTimeout(() => document.getElementById("patientChart")?.scrollIntoView({behavior:"smooth",block:"start"}), 40);
}

function closeChart(){
  activeRoom = null;
  selectedDiagnosis = "";
  chartMessage = "";
  chartMessageState = "";
  render();
}

function selectDiagnosis(diagnosis){
  selectedDiagnosis = diagnosis;
  chartMessage = "Diagnosis token selected. Confirm when ready.";
  chartMessageState = "";
  render();
}

function confirmDiagnosis(){
  if(!activeRoom){return;}
  if(!selectedDiagnosis){
    chartMessage = "Choose a diagnosis token first.";
    chartMessageState = "bad";
    render();
    return;
  }
  if(selectedDiagnosis === activeRoom.diagnosis){
    progress.closed[caseKey(activeRoom)] = selectedDiagnosis;
    saveProgress();
    chartMessage = "Case Closed.";
    chartMessageState = "good";
    selectedDiagnosis = "";
    render();
    return;
  }
  chartMessage = "Recheck the Chart.";
  chartMessageState = "bad";
  render();
}

function resetUnit(unitId){
  casesForUnit(unitId).forEach(item => delete progress.closed[caseKey(item)]);
  saveProgress();
  activeRoom = null;
  selectedDiagnosis = "";
  chartMessage = "";
  chartMessageState = "";
  render();
}

function resetWholeGame(){
  progress = {closed:{}};
  saveProgress();
  activeRoom = null;
  selectedDiagnosis = "";
  chartMessage = "";
  chartMessageState = "";
  render();
}

function renderAnswerKey(){
  return `<details class="answer-key-panel">
    <summary>Answer Sheet - check only, not printed</summary>
    <div class="answer-key-grid">
      ${renalCaseFiles.map(item => `<div class="answer-key-item">
        <strong>${caseCode(item)}</strong>
        <span>${esc(item.diagnosis)}</span>
      </div>`).join("")}
    </div>
  </details>`;
}

function renderPrintable(){
  const cardPages = [];
  for(let i = 0; i < renalCaseFiles.length; i += 2){
    cardPages.push(`<div class="print-card-page">${renalCaseFiles.slice(i,i+2).map(renderPrintCard).join("")}</div>`);
  }
  const tokens = units().filter(unit => casesForUnit(unit.unitId).length).map(unit => {
    const diagnoses = casesForUnit(unit.unitId).map(item => item.diagnosis);
    return `<div class="print-token-section">
      <h2 class="print-section-title">${esc(unit.unitName)} - ${esc(unit.department)} Diagnosis Tokens</h2>
      <div class="print-token-grid">
        ${diagnoses.map(diagnosis => `<div class="print-token"><span>${esc(diagnosis)}</span><small>Code: ____</small></div>`).join("")}
        <div class="print-token"><span>Blank Token</span><small>Code: ____</small></div>
        <div class="print-token"><span>Blank Token</span><small>Code: ____</small></div>
      </div>
    </div>`;
  }).join("");
  document.getElementById("printableGame").innerHTML = `
    <div class="print-case-section">
      <h1 class="print-section-title">UA Renal Case Files - Case Cards</h1>
      ${cardPages.join("")}
    </div>
    ${tokens}
  `;
}

function renderPrintCard(item){
  const clues = caseClues(item);
  return `<article class="print-card">
    <div class="print-hospital-icon" aria-hidden="true">+</div>
    <h2>${caseCode(item)} - ${esc(item.unitName)}</h2>
    <div class="meta">
      <strong>${esc(item.department)}</strong><br>
      Room ${item.room} / ${esc(item.caseTitle)}
    </div>
    <div>
      <div class="clue-title">Patient Results / UA Evidence</div>
      <div class="print-clue-list">${clues.map(result => `<div class="print-clue">${esc(result)}</div>`).join("")}</div>
    </div>
    <div class="token-target"><span class="case-code">${caseCode(item)}</span><small>write matching diagnosis token code</small></div>
    <div class="stamp-box">Case Closed Stamp</div>
  </article>`;
}

function caseClues(item){
  return item.patientResults;
}

function printMode(mode){
  renderPrintable();
  document.body.classList.remove("print-cases","print-tokens","print-full");
  document.body.classList.add(`print-${mode}`);
  setTimeout(() => window.print(), 80);
}

window.addEventListener("afterprint", () => {
  document.body.classList.remove("print-cases","print-tokens","print-full");
});

renderPrintable();
render();
</script>
</body>
</html>
