<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UA Case Game</title>
<script src="interactive_theme.js"></script>
<link rel="stylesheet" href="interactive_learning.css" />
<style>
:root{
  --ua:#c8a800;
  --ua-dark:#806700;
  --ink:#171b2f;
  --muted:#59627f;
  --soft:#f6f3df;
  --panel:#ffffff;
  --line:#c8cce0;
  --blue:#2f6bd8;
  --green:#1a8a4a;
  --red:#c0303f;
  --shadow:0 16px 40px rgba(42,55,105,.12);
}
*,
*::before,
*::after{box-sizing:border-box}
body.ua-case-files{
  margin:0;
  overflow-x:hidden;
  background:
    radial-gradient(circle at 8% 8%,rgba(200,168,0,.14),transparent 26rem),
    linear-gradient(180deg,#fafbff,#edf1f9 60%,#f5f7fb);
  color:var(--ink);
  font-family:"Trebuchet MS",Arial,Helvetica,sans-serif;
}
body.ua-case-files .game-font{
  font-family:"Cooper Black","Arial Black","Arial Rounded MT Bold","Trebuchet MS",Arial,sans-serif;
  letter-spacing:.01em;
}
.screen-shell{min-height:100vh}
.case-header-actions{
  display:flex;
  align-items:center;
  gap:10px;
}
.case-theme-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:1px solid var(--mls-border,#c8cce0);
  background:var(--mls-bg2,#fff);
  color:var(--mls-text2,#4a5070);
  border-radius:8px;
  padding:7px 12px;
  font:700 12px/1 var(--mls-sans,Inter,system-ui,sans-serif);
  cursor:pointer;
  white-space:nowrap;
}
.case-theme-btn:hover{
  border-color:var(--mls-border2,#aab0cc);
  background:var(--mls-bg3,#e8eaf2);
  color:var(--mls-text,#1a1d2e);
}
.game-wrap{
  width:min(1240px,calc(100% - 28px));
  margin:0 auto;
  padding:22px 0 36px;
  max-width:100%;
}
.game-hero{
  position:relative;
  background:
    radial-gradient(circle at 18% 20%,rgba(255,255,255,.92),transparent 23%),
    radial-gradient(circle at 78% 22%,rgba(255,238,126,.34),transparent 25%),
    linear-gradient(135deg,#fffef7 0%,#fff8d7 48%,#d2b126 100%);
  border:3px solid var(--ua);
  border-radius:28px;
  box-shadow:0 24px 56px rgba(118,92,0,.16);
  padding:44px 32px;
  display:grid;
  place-items:center;
  text-align:center;
  min-height:560px;
  min-width:0;
  overflow:hidden;
}
.game-hero::before{
  content:"";
  position:absolute;
  width:330px;
  height:230px;
  left:-165px;
  top:118px;
  border:17px solid rgba(128,103,0,.18);
  border-radius:52% 48% 58% 42%;
  transform:rotate(16deg);
}
.game-hero::after{
  content:"";
  position:absolute;
  width:330px;
  height:230px;
  right:-138px;
  bottom:50px;
  border:17px solid rgba(128,103,0,.18);
  border-radius:50% 48% 58% 42%;
  transform:rotate(-18deg);
}
.game-hero > *{min-width:0}
.game-hero > div:first-child,
.hero-badge{position:relative;z-index:2}
.eyebrow{
  color:var(--ua-dark);
  font-size:14px;
  font-weight:900;
  letter-spacing:.22em;
  text-transform:uppercase;
}
.game-hero h1{
  margin:10px 0 14px;
  font-family:"Cooper Black","Arial Black","Arial Rounded MT Bold","Trebuchet MS",Arial,sans-serif;
  font-size:96px;
  line-height:.82;
  color:var(--ink);
  text-shadow:7px 8px 0 #fff3b8,12px 15px 0 rgba(128,103,0,.16);
}
.game-hero p{
  margin:0;
  color:#463d13;
  font-size:22px;
  line-height:1.32;
  max-width:780px;
  font-weight:1000;
  overflow-wrap:anywhere;
}
.hero-badge{
  position:absolute;
  right:34px;
  top:28px;
  width:118px;
  height:118px;
  border-radius:26px;
  background:
    radial-gradient(circle at 36% 22%,rgba(255,255,255,.86),transparent 2.8rem),
    linear-gradient(145deg,#fff9d7,#dbe8ff);
  border:1px solid #d4dbef;
  display:grid;
  place-items:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8),0 14px 28px rgba(42,55,105,.12);
  color:var(--ua-dark);
  font-weight:950;
  text-align:center;
}
.hero-badge span{font-size:2.4rem;display:block;margin-bottom:5px}
.action-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-top:26px;
  position:relative;
  z-index:2;
}
.game-btn{
  border:0;
  border-radius:999px;
  padding:11px 16px;
  background:#e7eaf3;
  color:#454c68;
  font:900 .9rem/1 "Trebuchet MS",Arial,Helvetica,sans-serif;
  cursor:pointer;
  transition:transform .14s ease,box-shadow .14s ease,background .14s ease;
}
.game-btn:hover{transform:translateY(-1px);box-shadow:0 10px 20px rgba(42,55,105,.12)}
.game-btn.primary{background:var(--blue);color:white}
.game-btn.ua{background:var(--ua);color:#2c2400}
.game-btn.warn{background:#fff1f1;color:#9b1c2d;border:1px solid #f1b9c0}
.game-btn.ghost{background:#fff;border:1px solid var(--line)}
.game-btn.enter{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:290px;
  padding:21px 34px;
  background:#9f8300;
  color:#fffdf0;
  border:0;
  font-size:22px;
  box-shadow:0 12px 0 #5f4d00,0 20px 38px rgba(128,103,0,.28);
  transform:rotate(-1deg);
}
.game-btn.enter:hover{transform:translateY(-2px) rotate(1deg)}
.unit-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:18px;
  margin-top:18px;
}
.unit-card{
  position:relative;
  border:1px solid var(--line);
  border-radius:20px;
  background:
    radial-gradient(circle at 94% 12%,rgba(47,107,216,.08),transparent 11rem),
    linear-gradient(180deg,#ffffff,#f7faff);
  border-color:var(--line);
  box-shadow:var(--shadow);
  padding:18px;
  text-align:left;
  cursor:pointer;
  color:var(--ink);
  overflow:hidden;
  min-height:168px;
  display:grid;
  grid-template-columns:78px 1fr;
  grid-template-rows:auto auto auto;
  column-gap:16px;
  row-gap:10px;
  align-items:center;
}
.unit-card::before{
  content:"";
  display:none;
}
.unit-card h2{margin:6px 0 6px;font-size:1.22rem}
.unit-card p{margin:0;color:var(--muted);line-height:1.45}
.unit-summary{min-width:0}
.unit-lobby-icon{
  grid-row:1 / span 2;
  position:relative;
  width:72px;
  height:72px;
  border-radius:18px;
  border:2px solid #c8d1e5;
  background:
    linear-gradient(180deg,#fefefe,#dfe7f5);
  box-shadow:
    inset 0 0 0 5px rgba(255,255,255,.58),
    0 10px 24px rgba(34,48,92,.14);
}
.unit-lobby-icon::before{
  content:"";
  position:absolute;
  left:17px;
  right:17px;
  bottom:13px;
  height:36px;
  border-radius:8px 8px 5px 5px;
  background:
    linear-gradient(90deg,transparent 42%,#fff 42% 58%,transparent 58%),
    linear-gradient(180deg,#91b9da,#5d86b3);
  border:2px solid #446a95;
  box-shadow:
    -9px 12px 0 -5px #b9cbe0,
    9px 12px 0 -5px #b9cbe0;
}
.unit-lobby-icon::after{
  content:"+";
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  width:28px;
  height:28px;
  border-radius:9px;
  display:grid;
  place-items:center;
  background:#fff4bd;
  border:2px solid #d7bc39;
  color:#6d5700;
  font-size:1.35rem;
  font-weight:950;
  line-height:1;
}
.unit-card:disabled{
  cursor:default;
  opacity:1;
}
.unit-card.is-empty:hover{transform:none}
.unit-card:hover .door-glow,
.unit-card:focus-visible .door-glow{opacity:1}
.unit-card.door-opening .unit-door.left{transform:translateX(-70%)}
.unit-card.door-opening .unit-door.right{transform:translateX(70%)}
.unit-card.door-opening .door-alert{opacity:1;transform:translateY(0)}
.department-entry{
  position:relative;
  width:min(100%,330px);
  justify-self:center;
  min-height:214px;
  border-radius:18px 18px 24px 24px;
  border:2px solid #c8d1e5;
  background:
    radial-gradient(circle at 20% 12%,rgba(255,255,255,.95),transparent 8rem),
    linear-gradient(90deg,#e8edf6 0 12%,transparent 12% 88%,#e8edf6 88%),
    linear-gradient(180deg,#f8fbff 0 32%,#e5ebf6 32% 100%);
  box-shadow:
    inset 0 -18px 0 rgba(112,126,158,.16),
    inset 0 0 0 8px rgba(255,255,255,.38);
  overflow:hidden;
}
.department-entry::before{
  content:"";
  position:absolute;
  left:11%;
  right:11%;
  bottom:8px;
  height:8px;
  border-radius:999px;
  background:linear-gradient(90deg,#8996ad,#e4e9f3,#8996ad);
  box-shadow:0 -1px 0 rgba(255,255,255,.7);
}
.department-entry::after{
  content:"";
  position:absolute;
  left:50%;
  top:38px;
  width:72px;
  height:12px;
  transform:translateX(-50%);
  border-radius:999px;
  background:#313947;
  box-shadow:0 8px 18px rgba(17,24,39,.22);
}
.department-sign{
  position:absolute;
  z-index:4;
  left:50%;
  top:8px;
  transform:translateX(-50%);
  border-radius:999px;
  background:#ffffff;
  border:1px solid #cfd7ea;
  color:#4b5575;
  font-weight:950;
  font-size:.78rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  padding:7px 12px;
  box-shadow:0 8px 18px rgba(42,55,105,.12);
  white-space:nowrap;
}
.door-track{
  position:absolute;
  left:12%;
  right:12%;
  top:54px;
  height:20px;
  border-radius:12px 12px 4px 4px;
  background:linear-gradient(180deg,#d8dee9,#8d98ac 55%,#6e7a90);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.85),
    0 8px 16px rgba(38,54,95,.16);
}
.unit-door{
  position:absolute;
  top:72px;
  bottom:18px;
  width:36%;
  background:
    linear-gradient(90deg,rgba(255,255,255,.55),rgba(255,255,255,.16) 36%,transparent 76%),
    linear-gradient(180deg,#f3f7fb,#c5cfdd);
  border:3px solid #9eaabd;
  transition:transform .62s cubic-bezier(.2,.8,.2,1);
  box-shadow:inset 0 0 0 4px rgba(255,255,255,.25);
}
.unit-door.left{left:14%;border-radius:8px 2px 2px 8px;border-right:4px solid #7c879c}
.unit-door.right{right:14%;border-radius:2px 8px 8px 2px;border-left:4px solid #7c879c}
.unit-door::before{
  content:"";
  position:absolute;
  top:18px;
  width:64%;
  height:86px;
  border-radius:4px;
  background:
    linear-gradient(135deg,rgba(255,255,255,.7),transparent 38%),
    linear-gradient(180deg,#dff2ff,#a9c8dd);
  border:2px solid #8fa0b4;
  box-shadow:inset 0 0 0 4px rgba(255,255,255,.42);
}
.unit-door::after{
  content:"";
  position:absolute;
  left:12%;
  right:12%;
  bottom:13px;
  height:18px;
  border-radius:3px;
  background:linear-gradient(180deg,#a6b1c2,#7b8798);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.55);
}
.unit-door.left::before{right:15px}
.unit-door.right::before{left:15px}
.door-glow{
  position:absolute;
  inset:72px 38% 18px;
  border-radius:20px 20px 4px 4px;
  background:
    radial-gradient(circle at 50% 22%,rgba(255,241,165,.48),transparent 45%),
    linear-gradient(180deg,rgba(255,255,255,.35),rgba(47,107,216,.12));
  opacity:.45;
  transition:opacity .2s ease;
}
.door-alert{
  position:absolute;
  z-index:5;
  left:50%;
  bottom:14px;
  transform:translate(-50%,8px);
  opacity:0;
  border-radius:999px;
  background:#1a8a4a;
  color:white;
  font-size:.74rem;
  font-weight:950;
  padding:6px 10px;
  letter-spacing:.05em;
  text-transform:uppercase;
}
.coming-soon-pill{
  grid-column:2;
  justify-self:start;
  position:static;
  border-radius:999px;
  border:1px solid #cfbc58;
  background:#fff4bd;
  color:#6d5700;
  font-weight:950;
  font-size:.78rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  padding:7px 11px;
}
.progress-track{
  grid-column:1 / -1;
  height:10px;
  background:#edf1fa;
  border-radius:999px;
  overflow:hidden;
  margin-top:14px;
  border:1px solid #d8dfef;
}
.progress-fill{
  height:100%;
  width:var(--progress,0%);
  background:linear-gradient(90deg,var(--ua),#e7c945);
}
.progress-copy{
  grid-column:1 / -1;
  color:#4c5570;
  font-weight:900;
  font-size:.88rem;
  margin-top:8px;
}
.unit-panel{
  margin-top:18px;
  display:grid;
  gap:16px;
}
.unit-head,
.chart-panel,
.room-panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  box-shadow:var(--shadow);
  padding:18px;
}
.unit-head{
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:flex-start;
}
.unit-head h2{margin:4px 0 4px;font-size:1.8rem}
.unit-head p{margin:0;color:var(--muted)}
.department-hall{
  border:1px solid var(--line);
  border-radius:18px;
  background:
    linear-gradient(90deg,rgba(200,168,0,.14),transparent 38%,rgba(47,107,216,.08)),
    linear-gradient(180deg,#ffffff,#f6f8ff);
  padding:14px;
  display:flex;
  align-items:center;
  gap:14px;
}
.department-hall-door{
  position:relative;
  flex:0 0 112px;
  height:74px;
  border-radius:14px;
  border:2px solid #c8cfe3;
  background:#edf3ff;
  overflow:hidden;
}
.department-hall-door::before,
.department-hall-door::after{
  content:"";
  position:absolute;
  inset:10px auto 0 0;
  width:50%;
  background:linear-gradient(180deg,#ffffff,#d9e4f6);
  border-right:1px solid #aeb9d3;
  animation:hallDoorBreathe 2.4s ease-in-out infinite;
}
.department-hall-door::after{
  left:auto;
  right:0;
  border-right:0;
  border-left:1px solid #aeb9d3;
  animation-name:hallDoorBreatheRight;
}
@keyframes hallDoorBreathe{
  0%,100%{transform:translateX(0)}
  50%{transform:translateX(-7px)}
}
@keyframes hallDoorBreatheRight{
  0%,100%{transform:translateX(0)}
  50%{transform:translateX(7px)}
}
.department-hall strong{display:block;font-size:1.02rem}
.department-hall span{display:block;color:var(--muted);font-size:.9rem;margin-top:2px}
.room-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
  gap:12px;
}
.room-card{
  position:relative;
  min-height:164px;
  border:1px solid var(--line);
  border-radius:17px;
  background:
    linear-gradient(180deg,rgba(255,255,255,.62),transparent 42%),
    linear-gradient(180deg,#f8fbff,#eef3fc);
  padding:12px;
  text-align:left;
  cursor:pointer;
  overflow:hidden;
}
.room-card.selected{
  border-color:#2f6bd8;
  background:
    radial-gradient(circle at 50% 30%,rgba(255,243,156,.34),transparent 8rem),
    linear-gradient(180deg,#fffdf2,#eaf2ff);
  box-shadow:0 16px 34px rgba(47,107,216,.2);
}
.room-card.selected .room-door{
  transform:translateX(-50%) translateY(-6px) rotateY(-34deg) rotate(-2deg);
  transform-origin:left center;
  border-color:#2f6bd8;
}
.room-card.selected::after{
  content:"OPEN";
  position:absolute;
  z-index:5;
  right:10px;
  top:10px;
  border-radius:999px;
  background:#2f6bd8;
  color:white;
  font-size:.66rem;
  font-weight:950;
  letter-spacing:.08em;
  padding:5px 8px;
}
.room-card.closed .room-door{filter:saturate(.72)}
.room-door{
  position:absolute;
  left:50%;
  top:16px;
  width:84px;
  height:108px;
  transform:translateX(-50%);
  border-radius:7px 7px 2px 2px;
  background:
    linear-gradient(90deg,rgba(255,255,255,.22),transparent 28%,rgba(122,83,35,.08) 78%),
    linear-gradient(180deg,#f4d99a,#d2a85e);
  border:5px solid #8e99a9;
  border-bottom-width:7px;
  box-shadow:
    0 8px 18px rgba(42,55,105,.16),
    inset 0 0 0 2px rgba(255,255,255,.28);
  transition:transform .2s ease;
}
.room-door::before{
  content:"";
  position:absolute;
  inset:8px;
  border-radius:4px;
  border:2px solid rgba(116,82,37,.22);
}
.room-door-window{
  position:absolute;
  z-index:2;
  top:14px;
  left:50%;
  width:42px;
  height:22px;
  transform:translateX(-50%);
  border-radius:5px;
  background:linear-gradient(180deg,#e5f5ff,#bfd8ef);
  border:1px solid #9eadc8;
}
.room-door-handle{
  position:absolute;
  z-index:2;
  top:60px;
  right:12px;
  width:9px;
  height:9px;
  border-radius:50%;
  background:#4c5564;
  box-shadow:0 0 0 2px rgba(255,255,255,.22);
}
.room-number{
  position:relative;
  z-index:3;
  display:inline-flex;
  align-items:center;
  gap:5px;
  border-radius:999px;
  background:#fff6c7;
  color:#7a6200;
  font-weight:950;
  padding:6px 10px;
  border:1px solid #dec85d;
  box-shadow:0 6px 14px rgba(42,55,105,.1);
}
.room-card h3,
.room-card p{
  position:relative;
  z-index:3;
}
.room-card h3{margin:76px 0 3px;font-size:1rem}
.room-card p{margin:0;color:var(--muted);font-size:.85rem}
.closed-stamp{
  position:absolute;
  z-index:4;
  right:8px;
  bottom:8px;
  transform:rotate(-8deg);
  border:2px solid #c0303f;
  color:#c0303f;
  background:rgba(255,255,255,.78);
  border-radius:9px;
  padding:4px 7px;
  font-size:.68rem;
  font-weight:950;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.chart-layout{
  display:grid;
  grid-template-columns:minmax(0,1.2fr) minmax(260px,.8fr);
  gap:16px;
}
.chart-panel{
  position:relative;
  border:2px solid #2f6bd8;
  background:
    linear-gradient(90deg,rgba(47,107,216,.1),transparent 28%),
    linear-gradient(180deg,#ffffff,#f6f9ff);
  box-shadow:0 20px 42px rgba(47,107,216,.18);
}
.chart-panel::before{
  content:"ACTIVE PATIENT CHART";
  position:absolute;
  top:-13px;
  left:18px;
  border-radius:999px;
  background:#2f6bd8;
  color:white;
  font-size:.68rem;
  font-weight:950;
  letter-spacing:.12em;
  padding:6px 10px;
}
.chart-title-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:start;
  margin-bottom:12px;
}
.chart-title-row h2{margin:0;font-size:1.45rem}
.chart-title-row p{margin:3px 0 0;color:var(--muted)}
.clipboard{
  border:1px solid var(--line);
  border-radius:18px;
  background:#fffdf8;
  overflow:hidden;
}
.clipboard-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  background:#f3e7aa;
  color:#4f4100;
  padding:10px 14px;
  font-weight:950;
}
.evidence-list{
  list-style:none;
  margin:0;
  padding:12px;
  display:grid;
  gap:10px;
}
.evidence-list li{
  border:1px solid #e4dcae;
  background:white;
  border-radius:12px;
  padding:10px 12px;
  color:#303751;
  line-height:1.42;
  font-size:1rem;
  font-weight:760;
}
.diagnosis-bank{
  border:1px solid var(--line);
  border-radius:18px;
  background:#f8faff;
  padding:14px;
}
.diagnosis-bank h3{margin:0 0 5px;font-size:1rem}
.diagnosis-bank p{margin:0 0 12px;color:var(--muted);font-size:.88rem}
.token-grid{
  display:flex;
  flex-wrap:wrap;
  gap:9px;
}
.diagnosis-token{
  border:2px solid #b89a12;
  background:linear-gradient(180deg,#fff6ba,#e0bd26);
  color:#322800;
  border-radius:999px;
  padding:9px 12px;
  font-weight:900;
  font-size:.84rem;
  cursor:pointer;
  box-shadow:0 4px 0 rgba(104,82,0,.18);
}
.diagnosis-token.selected{

const storageKey = "mls.uaRenalCaseFiles.v1";
let progress = loadProgress();
let activeUnitId = null;
let activeRoom = null;
let selectedDiagnosis = "";
let chartMessage = "";
let chartMessageState = "";
let diagnosisBankOrders = {};

function esc(value){
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[ch]));
}

function syncCaseThemeButton(){
  const button = document.getElementById("caseThemeBtn");
  if(!button){return;}
  const theme = document.documentElement.dataset.mlsTheme || "light";
  button.textContent = theme === "dark" ? "Switch to light" : "Switch to dark";
  button.title = theme === "dark" ? "Switch to light mode" : "Switch to dark mode";
}

function toggleCaseTheme(){
  const current = document.documentElement.dataset.mlsTheme || "light";
  const next = current === "dark" ? "light" : "dark";
  document.documentElement.dataset.mlsTheme = next;
  try{localStorage.setItem("mlsboc_theme", next);}catch(error){}
  syncCaseThemeButton();
}

function loadProgress(){
  try{
    const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
    const validKeys = new Map(renalCaseFiles.map(item => [`${item.unitId}-${item.room}`, item.diagnosis]));
    const closed = {};
    Object.entries(saved?.closed || {}).forEach(([key,value]) => {
      if(validKeys.get(key) === value){closed[key] = value;}
    });
    return saved && typeof saved === "object" ? {closed} : {closed:{}};
  }catch(error){
    return {closed:{}};
  }
}

function saveProgress(){
  localStorage.setItem(storageKey, JSON.stringify(progress));
}

function unitFor(item){
  return renalUnits.find(unit => unit.unitId === item.unitId) || {};
}

function unitNameFor(item){
  return unitFor(item).unitName || item.unitName || "Hospital Unit";
}

function caseKey(item){
  return `${item.unitId}-${item.room}`;
}

function caseCode(item){
  const unit = unitFor(item);
  return `${unit?.codePrefix || "R"}${item.room}`;
}

function units(){
  const seen = new Map(renalUnits.map(unit => [unit.unitId, {...unit}]));
  renalCaseFiles.forEach(item => {
    if(!seen.has(item.unitId)){
      seen.set(item.unitId, {unitId:item.unitId, unitName:item.unitName, department:item.department});
    }
  });
  return [...seen.values()].sort((a,b) => a.unitId - b.unitId);
}

function casesForUnit(unitId){
  return renalCaseFiles.filter(item => item.unitId === Number(unitId)).sort((a,b) => a.room - b.room);
}

function closedCases(unitId){
  return casesForUnit(unitId).filter(item => progress.closed[caseKey(item)]);
}

function usedDiagnoses(unitId){
  return new Set(closedCases(unitId).map(item => item.diagnosis));
}

function shuffleList(list){
  const items = [...list];
  for(let i = items.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [items[i],items[j]] = [items[j],items[i]];
  }
  return items;
}

function diagnosisBankFor(item){
  const key = caseKey(item);
  if(!diagnosisBankOrders[key]){
    diagnosisBankOrders[key] = shuffleList(casesForUnit(item.unitId).map(caseFile => caseFile.diagnosis));
  }
  return diagnosisBankOrders[key];
}

function render(){
  const root = document.getElementById("gameRoot");
  root.innerHTML = activeUnitId ? renderUnit() : renderStart();
  document.querySelectorAll(".diagnosis-token").forEach(button => {
    button.addEventListener("click", () => selectDiagnosis(button.dataset.diagnosis));
  });
}

function renderStart(){
  const totalClosed = Object.keys(progress.closed).length;
  const totalCases = renalCaseFiles.length;
  const completeMessage = totalClosed === totalCases
    ? `<div class="completion" style="margin-top:18px">UA Case Game Complete - ${totalCases}/${totalCases} cases closed.</div>`
    : "";
  return `
    <div class="unit-grid">
      ${units().map(unit => {
        const cases = casesForUnit(unit.unitId);
        const closed = closedCases(unit.unitId).length;
        const isEmpty = cases.length === 0;
        const pct = isEmpty ? 0 : Math.round((closed / cases.length) * 100);
        const countCopy = isEmpty ? (unit.comingSoon || "Cases coming soon") : `${cases.length} rooms / ${cases.length} cases`;
        const progressCopy = isEmpty ? "Ready for future cases" : `Cases Closed ${closed}/${cases.length}`;
        return `<button class="unit-card ${isEmpty ? "is-empty" : ""}" type="button" ${isEmpty ? "disabled" : `onclick="enterUnit(${unit.unitId})"`}>
          <div class="unit-lobby-icon" aria-hidden="true"></div>
          <div class="unit-summary">
            <div class="eyebrow">${esc(unit.unitName)}</div>
            <h2>${esc(unit.department)}</h2>
            <p>${esc(countCopy)}</p>
          </div>
          <div class="progress-track"><div class="progress-fill" style="--progress:${pct}%"></div></div>
          <div class="progress-copy">${esc(progressCopy)}</div>
          ${isEmpty ? '<div class="coming-soon-pill">Coming soon</div>' : ""}
        </button>`;
      }).join("")}
    </div>
    ${completeMessage}
    ${renderAnswerKey()}
  `;
}

function renderUnit(){
  const unitCases = casesForUnit(activeUnitId);
  const unit = units().find(item => item.unitId === activeUnitId);
  if(!unitCases.length){
    return `
      <section class="unit-panel">
        <div class="unit-head">
          <div>
            <div class="eyebrow">${esc(unit.unitName)}</div>
            <h2>${esc(unit.department)}</h2>
            <p>${esc(unit.comingSoon || "Cases coming soon")}</p>
          </div>
          <div class="action-row" style="margin-top:0">
            <button class="game-btn ghost" type="button" onclick="backToUnits()">Hospital Lobby</button>
          </div>
        </div>
      </section>
    `;
  }
  const closed = closedCases(activeUnitId).length;
  const completion = closed === unitCases.length
    ? `<div class="completion">${esc(unit.department)} Complete - ${closed}/${unitCases.length} cases closed.</div>`
    : "";
  return `
    <section class="unit-panel">
      <div class="unit-head">
        <div>
          <div class="eyebrow">${esc(unit.unitName)}</div>
          <h2>${esc(unit.department)}</h2>
          <p>Open a hospital room, review the pattern clues, then choose a diagnosis token.</p>
          <div class="progress-track"><div class="progress-fill" style="--progress:${Math.round((closed / unitCases.length) * 100)}%"></div></div>
          <div class="progress-copy">Cases Closed ${closed}/${unitCases.length}</div>
        </div>
        <div class="action-row" style="margin-top:0">
          <button class="game-btn ghost" type="button" onclick="backToUnits()">Hospital Lobby</button>
          <button class="game-btn warn" type="button" onclick="resetUnit(${activeUnitId})">Reset Unit</button>
          <button class="game-btn warn" type="button" onclick="resetWholeGame()">Reset Whole Game</button>
        </div>
      </div>
      ${completion}
      <div class="department-hall">
        <div class="department-hall-door" aria-hidden="true"></div>
        <div>
          <strong>${esc(unit.department)} Hallway</strong>
          <span>Choose a room to pull the short evidence pattern for that case.</span>
        </div>
      </div>
      <div class="room-panel">
        <div class="chart-title-row">
          <div>
            <h2>Case Rooms</h2>
            <p>Closed rooms stay marked in the case list.</p>
          </div>
        </div>
        <div class="room-grid">
          ${unitCases.map(renderRoomCard).join("")}
        </div>
      </div>
      ${activeRoom ? renderChart(activeRoom) : ""}
    </section>
  `;
}

function renderRoomCard(item){
  const closed = progress.closed[caseKey(item)];
  const selected = activeRoom && activeRoom.unitId === item.unitId && activeRoom.room === item.room;
  return `<button class="room-card ${closed ? "closed" : ""} ${selected ? "selected" : ""}" type="button" onclick="openRoom(${item.unitId},${item.room})">
    <div class="room-door" aria-hidden="true">
      <div class="room-door-window"></div>
      <div class="room-door-handle"></div>
    </div>
    <span class="room-number">${caseCode(item)}</span>
    <h3>Case Room ${caseCode(item)}</h3>
    <p>${esc(item.caseTitle)}</p>
    ${closed ? '<span class="closed-stamp">Case Closed</span>' : ""}
  </button>`;
}

function renderChart(item){
  const closed = progress.closed[caseKey(item)];
  const unitUsed = usedDiagnoses(item.unitId);
  const available = diagnosisBankFor(item)
    .filter(diagnosis => !unitUsed.has(diagnosis));
  const message = closed
    ? "Case Closed. This room is sealed."
    : (chartMessage || "Choose a diagnosis token, then confirm the case.");
  const messageState = closed ? "good" : chartMessageState;
  return `<div class="chart-panel" id="patientChart">
    <div class="chart-title-row">
      <div>
        <h2>Patient Chart - ${caseCode(item)}</h2>
        <p>${esc(unitNameFor(item))} / ${esc(item.department)} / ${esc(item.caseTitle)}</p>
      </div>
      <button class="game-btn ghost" type="button" onclick="closeChart()">Close Chart</button>
    </div>
    <div class="chart-layout">
      <div class="clipboard">
        <div class="clipboard-head"><span>Patient Pattern</span><span>UA Evidence</span></div>
        <ul class="evidence-list">
          ${caseClues(item).map(result => `<li>${esc(result)}</li>`).join("")}
        </ul>
      </div>
      <aside class="diagnosis-bank">
        <h3>Diagnosis Bank</h3>
        <p>${closed ? "This room no longer needs a token." : "Pick one diagnosis token for this room."}</p>
        <div class="token-grid">
          ${closed ? "" : available.map(diagnosis => `<button type="button" class="diagnosis-token ${selectedDiagnosis === diagnosis ? "selected" : ""}" data-diagnosis="${esc(diagnosis)}">${esc(diagnosis)}</button>`).join("")}
        </div>
        <div class="status-card ${messageState}">${esc(message)}</div>
        ${closed ? "" : `<div class="action-row"><button class="game-btn primary" type="button" onclick="confirmDiagnosis()">Confirm Diagnosis</button></div>`}
      </aside>
    </div>
  </div>`;
}

function enterUnit(unitId, doorCard){
  if(doorCard && !doorCard.classList.contains("door-opening")){
    doorCard.classList.add("door-opening");
    setTimeout(() => enterUnit(unitId), 560);
    return;
  }
  activeUnitId = unitId;
  activeRoom = null;
  selectedDiagnosis = "";
  chartMessage = "";
  chartMessageState = "";
  render();
  setTimeout(() => document.querySelector(".unit-panel")?.scrollIntoView({behavior:"smooth",block:"start"}), 40);
}

function backToUnits(){
  activeUnitId = null;
  activeRoom = null;
  selectedDiagnosis = "";
  render();
}

function openRoom(unitId, room){
  activeUnitId = unitId;
  activeRoom = renalCaseFiles.find(item => item.unitId === unitId && item.room === room);
  selectedDiagnosis = "";
  chartMessage = "";
  chartMessageState = "";
  render();
  setTimeout(() => document.getElementById("patientChart")?.scrollIntoView({behavior:"smooth",block:"start"}), 40);
}

function closeChart(){
  activeRoom = null;
  selectedDiagnosis = "";
  chartMessage = "";
  chartMessageState = "";
  render();
}

function selectDiagnosis(diagnosis){
  selectedDiagnosis = diagnosis;
  chartMessage = "Diagnosis token selected. Confirm when ready.";
  chartMessageState = "";
  render();
}

function confirmDiagnosis(){
  if(!activeRoom){return;}
  if(!selectedDiagnosis){
    chartMessage = "Choose a diagnosis token first.";
    chartMessageState = "bad";
    render();
    return;
  }
  if(selectedDiagnosis === activeRoom.diagnosis){
    progress.closed[caseKey(activeRoom)] = selectedDiagnosis;
    saveProgress();
    chartMessage = "Case Closed.";
    chartMessageState = "good";
    selectedDiagnosis = "";
    render();
    return;
  }
  chartMessage = "Recheck the Chart.";
  chartMessageState = "bad";
  render();
}

function resetUnit(unitId){
  casesForUnit(unitId).forEach(item => delete progress.closed[caseKey(item)]);
  saveProgress();
  activeRoom = null;
  selectedDiagnosis = "";
  chartMessage = "";
  chartMessageState = "";
  Object.keys(diagnosisBankOrders).forEach(key => {
    if(key.startsWith(`${unitId}-`)){delete diagnosisBankOrders[key];}
  });
  render();
}

function resetWholeGame(){
  progress = {closed:{}};
  saveProgress();
  activeRoom = null;
  selectedDiagnosis = "";
  chartMessage = "";
  chartMessageState = "";
  diagnosisBankOrders = {};
  render();
}

function renderAnswerKey(){
  return `<details class="answer-key-panel">
    <summary>Answer Sheet - check only, not printed</summary>
    <div class="answer-key-grid">
      ${renalCaseFiles.map(item => `<div class="answer-key-item">
        <strong>${caseCode(item)}</strong>
        <span>${esc(item.diagnosis)}</span>
      </div>`).join("")}
    </div>
  </details>`;
}

function renderPrintable(){
  const cardPages = [];
  for(let i = 0; i < renalCaseFiles.length; i += 2){
    cardPages.push(`<div class="print-card-page">${renalCaseFiles.slice(i,i+2).map(renderPrintCard).join("")}</div>`);
  }
  const tokenCases = [...renalCaseFiles].sort((a,b) => a.unitId - b.unitId || a.room - b.room);
  const tokenChunks = [];
  for(let i = 0; i < tokenCases.length; i += 20){
    tokenChunks.push(tokenCases.slice(i,i+20));
  }
  const tokens = tokenChunks.map((chunk,index) => `<div class="print-token-section">
    <h2 class="print-section-title">UA Diagnosis Tokens - Front Sheet ${index + 1}</h2>
    <div class="print-token-grid">
      ${chunk.map(renderPrintTokenFront).join("")}
    </div>
  </div>
  <div class="print-token-section back-side">
    <h2 class="print-section-title">UA Diagnosis Tokens - Back Sheet ${index + 1}</h2>
    <div class="print-token-grid">
      ${chunk.map(renderPrintTokenBack).join("")}
    </div>
  </div>`).join("");
  document.getElementById("printableGame").innerHTML = `
    <div class="print-case-section">
      <h1 class="print-section-title">UA Case Game - Case Cards</h1>
      ${cardPages.join("")}
    </div>
    ${tokens}
  `;
}

function printTokenClass(item, extra = ""){
  const words = item.diagnosis.split(/\s+/).filter(Boolean);
  const longestWord = words.reduce((max, word) => Math.max(max, word.replace(/[^A-Za-z0-9]/g, "").length), 0);
  const lengthClass = item.diagnosis.length > 34 ? "xlong-token" : (item.diagnosis.length > 23 ? "long-token" : "");
  const wordClass = longestWord > 16 ? "wordy-token" : "";
  return `print-token unit-token-${item.unitId} ${item.unitId === 2 ? "ns-token" : ""} ${lengthClass} ${wordClass} ${extra}`.trim();
}

function formatTokenName(name){
  return String(name)
    .split(/\s+/)
    .filter(Boolean)
    .map(word => `<span>${esc(word)}</span>`)
    .join("");
}

function renderPrintTokenFront(item){
  return `<div class="${printTokenClass(item)}">${formatTokenName(item.diagnosis)}</div>`;
}

function renderPrintTokenBack(item){
  return `<div class="${printTokenClass(item, "back")}"><span>${caseCode(item)}</span></div>`;
}

function renderPrintCard(item){
  const clues = caseClues(item);
  return `<article class="print-card">
    <div class="print-hospital-icon" aria-hidden="true"></div>
    <h2>${caseCode(item)} - ${esc(unitNameFor(item))}</h2>
    <div class="meta">
      <strong>${esc(item.department)}</strong><br>
      Room ${caseCode(item)} / ${esc(item.caseTitle)}
    </div>
    <div>
      <div class="clue-title">Pattern Clues / UA Evidence</div>
      <div class="print-clue-list">${clues.map(result => `<div class="print-clue">${esc(result)}</div>`).join("")}</div>
    </div>
    <div class="token-target"><span class="case-code">${caseCode(item)}</span></div>
  </article>`;
}

function caseClues(item){
  return item.patientResults;
}

function printMode(mode){
  renderPrintable();
  document.body.classList.remove("print-cases","print-cases-single","print-tokens","print-full");
  document.body.classList.add(`print-${mode}`);
  setTimeout(() => window.print(), 80);
}

window.addEventListener("afterprint", () => {
  document.body.classList.remove("print-cases","print-cases-single","print-tokens","print-full");
});

syncCaseThemeButton();
renderPrintable();
render();
</script>
</body>
</html>
