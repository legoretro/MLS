<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UA Renal Case Files</title>
<script src="interactive_theme.js"></script>
<link rel="stylesheet" href="interactive_learning.css" />
<style>
:root{
  --ua:#c8a800;
  --ua-dark:#806700;
  --ink:#171b2f;
  --muted:#59627f;
  --soft:#f6f3df;
  --panel:#ffffff;
  --line:#c8cce0;
  --blue:#2f6bd8;
  --green:#1a8a4a;
  --red:#c0303f;
  --shadow:0 16px 40px rgba(42,55,105,.12);
}
body.ua-case-files{
  margin:0;
  background:
    radial-gradient(circle at 8% 8%,rgba(200,168,0,.14),transparent 26rem),
    linear-gradient(180deg,#fafbff,#edf1f9 60%,#f5f7fb);
  color:var(--ink);
  font-family:var(--mls-sans,Inter,system-ui,sans-serif);
}
.screen-shell{min-height:100vh}
.game-wrap{
  width:min(1120px,calc(100% - 28px));
  margin:0 auto;
  padding:18px 0 34px;
}
.game-hero{
  background:linear-gradient(135deg,#fffdf5,#ffffff 62%,#eef4ff);
  border:1px solid var(--line);
  border-top:6px solid var(--ua);
  border-radius:22px;
  box-shadow:var(--shadow);
  padding:22px;
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:18px;
  align-items:center;
}
.eyebrow{
  color:var(--ua-dark);
  font-size:.78rem;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
}
.game-hero h1{
  margin:6px 0 6px;
  font-size:clamp(2rem,4vw,3.8rem);
  line-height:.96;
  color:var(--ink);
}
.game-hero p{
  margin:0;
  color:var(--muted);
  font-size:1.02rem;
  line-height:1.45;
  max-width:720px;
}
.hero-badge{
  min-width:138px;
  aspect-ratio:1;
  border-radius:26px;
  background:linear-gradient(145deg,#fff9d7,#dbe8ff);
  border:1px solid #d4dbef;
  display:grid;
  place-items:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8),0 14px 28px rgba(42,55,105,.12);
  color:var(--ua-dark);
  font-weight:950;
  text-align:center;
}
.hero-badge span{font-size:2.4rem;display:block;margin-bottom:5px}
.action-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:16px;
}
.game-btn{
  border:0;
  border-radius:999px;
  padding:11px 16px;
  background:#e7eaf3;
  color:#454c68;
  font:900 .9rem/1 var(--mls-sans,Inter,system-ui,sans-serif);
  cursor:pointer;
  transition:transform .14s ease,box-shadow .14s ease,background .14s ease;
}
.game-btn:hover{transform:translateY(-1px);box-shadow:0 10px 20px rgba(42,55,105,.12)}
.game-btn.primary{background:var(--blue);color:white}
.game-btn.ua{background:var(--ua);color:#2c2400}
.game-btn.warn{background:#fff1f1;color:#9b1c2d;border:1px solid #f1b9c0}
.game-btn.ghost{background:#fff;border:1px solid var(--line)}
.unit-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:18px;
  margin-top:18px;
}
.unit-card{
  position:relative;
  border:1px solid var(--line);
  border-radius:20px;
  background:linear-gradient(180deg,#ffffff,#f9fbff);
  box-shadow:var(--shadow);
  padding:16px;
  text-align:left;
  cursor:pointer;
  color:var(--ink);
  overflow:hidden;
  min-height:280px;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:12px;
}
.unit-card h2{margin:8px 0 8px;font-size:1.3rem}
.unit-card p{margin:0;color:var(--muted);line-height:1.45}
.unit-card:hover .door-glow,
.unit-card:focus-visible .door-glow{opacity:1}
.unit-card.door-opening .unit-door.left{transform:translateX(-62%)}
.unit-card.door-opening .unit-door.right{transform:translateX(62%)}
.unit-card.door-opening .door-alert{opacity:1;transform:translateY(0)}
.department-entry{
  position:relative;
  min-height:152px;
  border-radius:18px;
  border:3px solid #dde3f2;
  background:
    linear-gradient(90deg,rgba(255,255,255,.6) 0 12%,transparent 12% 88%,rgba(255,255,255,.6) 88%),
    linear-gradient(180deg,#eef4ff,#dce6f6);
  box-shadow:inset 0 -12px 0 rgba(38,54,95,.08);
  overflow:hidden;
}
.department-sign{
  position:absolute;
  z-index:4;
  left:50%;
  top:10px;
  transform:translateX(-50%);
  border-radius:999px;
  background:#ffffff;
  border:1px solid #cfd7ea;
  color:#4b5575;
  font-weight:950;
  font-size:.78rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  padding:7px 12px;
  box-shadow:0 8px 18px rgba(42,55,105,.12);
  white-space:nowrap;
}
.door-track{
  position:absolute;
  left:8%;
  right:8%;
  top:48px;
  height:6px;
  border-radius:999px;
  background:#9ba8c7;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
}
.unit-door{
  position:absolute;
  top:56px;
  bottom:0;
  width:50%;
  background:
    linear-gradient(90deg,rgba(255,255,255,.62),rgba(255,255,255,.12) 30%,transparent 70%),
    linear-gradient(180deg,#f7fbff,#d7e2f3);
  border:1px solid #b9c4dd;
  transition:transform .62s cubic-bezier(.2,.8,.2,1);
}
.unit-door.left{left:0;border-right:2px solid #8b96b2}
.unit-door.right{right:0;border-left:2px solid #8b96b2}
.unit-door::before{
  content:"";
  position:absolute;
  top:28px;
  width:58%;
  height:38px;
  border-radius:12px;
  background:linear-gradient(180deg,#dff0ff,#b9d7f0);
  border:1px solid #9eb3cf;
  box-shadow:inset 0 0 0 4px rgba(255,255,255,.42);
}
.unit-door.left::before{right:18px}
.unit-door.right::before{left:18px}
.door-glow{
  position:absolute;
  inset:52px 28% 0;
  border-radius:28px 28px 0 0;
  background:radial-gradient(circle at 50% 42%,rgba(255,235,120,.44),transparent 62%);
  opacity:.45;
  transition:opacity .2s ease;
}
.door-alert{
  position:absolute;
  z-index:5;
  left:50%;
  bottom:14px;
  transform:translate(-50%,8px);
  opacity:0;
  border-radius:999px;
  background:#1a8a4a;
  color:white;
  font-size:.74rem;
  font-weight:950;
  padding:6px 10px;
  letter-spacing:.05em;
  text-transform:uppercase;
}
.progress-track{
  height:10px;
  background:#edf1fa;
  border-radius:999px;
  overflow:hidden;
  margin-top:14px;
  border:1px solid #d8dfef;
}
.progress-fill{
  height:100%;
  width:var(--progress,0%);
  background:linear-gradient(90deg,var(--ua),#e7c945);
}
.progress-copy{
  color:#4c5570;
  font-weight:900;
  font-size:.88rem;
  margin-top:8px;
}
.unit-panel{
  margin-top:18px;
  display:grid;
  gap:16px;
}
.unit-head,
.chart-panel,
.room-panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  box-shadow:var(--shadow);
  padding:18px;
}
.unit-head{
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:flex-start;
}
.unit-head h2{margin:4px 0 4px;font-size:1.8rem}
.unit-head p{margin:0;color:var(--muted)}
.department-hall{
  border:1px solid var(--line);
  border-radius:18px;
  background:
    linear-gradient(90deg,rgba(200,168,0,.14),transparent 38%,rgba(47,107,216,.08)),
    linear-gradient(180deg,#ffffff,#f6f8ff);
  padding:14px;
  display:flex;
  align-items:center;
  gap:14px;
}
.department-hall-door{
  position:relative;
  flex:0 0 112px;
  height:74px;
  border-radius:14px;
  border:2px solid #c8cfe3;
  background:#edf3ff;
  overflow:hidden;
}
.department-hall-door::before,
.department-hall-door::after{
  content:"";
  position:absolute;
  inset:10px auto 0 0;
  width:50%;
  background:linear-gradient(180deg,#ffffff,#d9e4f6);
  border-right:1px solid #aeb9d3;
  animation:hallDoorBreathe 2.4s ease-in-out infinite;
}
.department-hall-door::after{
  left:auto;
  right:0;
  border-right:0;
  border-left:1px solid #aeb9d3;
  animation-name:hallDoorBreatheRight;
}
@keyframes hallDoorBreathe{
  0%,100%{transform:translateX(0)}
  50%{transform:translateX(-7px)}
}
@keyframes hallDoorBreatheRight{
  0%,100%{transform:translateX(0)}
  50%{transform:translateX(7px)}
}
.department-hall strong{display:block;font-size:1.02rem}
.department-hall span{display:block;color:var(--muted);font-size:.9rem;margin-top:2px}
.room-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
  gap:12px;
}
.room-card{
  position:relative;
  min-height:150px;
  border:1px solid var(--line);
  border-radius:17px;
  background:linear-gradient(180deg,#f8fbff,#eef3fc);
  padding:12px;
  text-align:left;
  cursor:pointer;
  overflow:hidden;
}
.room-card.selected .room-door-panel.left{transform:translateX(-28%)}
.room-card.selected .room-door-panel.right{transform:translateX(28%)}
.room-card.closed .room-door-panel{filter:saturate(.72)}
.room-door{
  position:absolute;
  inset:12px;
  border-radius:14px;
  background:#d9e1ef;
  border:2px solid #c1cada;
  box-shadow:inset 0 8px 0 rgba(255,255,255,.36);
  overflow:hidden;
}
.room-door-panel{
  position:absolute;
  top:22px;
  bottom:0;
  width:50%;
  background:
    linear-gradient(90deg,rgba(255,255,255,.5),transparent 46%),
    linear-gradient(180deg,#fdfefe,#d9e3f1);
  border-top:1px solid #adbad1;
  transition:transform .28s ease;
}
.room-door-panel.left{left:0;border-right:1px solid #9faac0}
.room-door-panel.right{right:0;border-left:1px solid #9faac0}
.room-door-window{
  position:absolute;
  z-index:2;
  top:40px;
  left:50%;
  width:54px;
  height:28px;
  transform:translateX(-50%);
  border-radius:11px;
  background:linear-gradient(180deg,#e5f5ff,#bfd8ef);
  border:1px solid #9eadc8;
}
.room-door-handle{
  position:absolute;
  z-index:2;
  top:82px;
  left:50%;
  width:8px;
  height:8px;
  transform:translateX(-50%);
  border-radius:50%;
  background:#7d879d;
  box-shadow:-16px 0 0 #7d879d;
}
.room-number{
  position:relative;
  z-index:3;
  display:inline-flex;
  align-items:center;
  gap:5px;
  border-radius:999px;
  background:#fff6c7;
  color:#7a6200;
  font-weight:950;
  padding:6px 10px;
  border:1px solid #dec85d;
  box-shadow:0 6px 14px rgba(42,55,105,.1);
}
.room-card h3,
.room-card p{
  position:relative;
  z-index:3;
}
.room-card h3{margin:56px 0 3px;font-size:1rem}
.room-card p{margin:0;color:var(--muted);font-size:.85rem}
.stamp{
  position:absolute;
  z-index:4;
  right:10px;
  bottom:10px;
  border:3px solid var(--green);
  color:var(--green);
  border-radius:10px;
  padding:5px 7px;
  font-weight:950;
  letter-spacing:.08em;
  text-transform:uppercase;
  transform:rotate(-8deg);
  background:rgba(255,255,255,.9);
  animation:stampIn .34s ease both;
}
@keyframes stampIn{
  from{opacity:0;transform:scale(1.7) rotate(-12deg)}
  to{opacity:1;transform:scale(1) rotate(-8deg)}
}
.chart-layout{
  display:grid;
  grid-template-columns:minmax(0,1.2fr) minmax(260px,.8fr);
  gap:16px;
}
.chart-title-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:start;
  margin-bottom:12px;
}
.chart-title-row h2{margin:0;font-size:1.45rem}
.chart-title-row p{margin:3px 0 0;color:var(--muted)}
.clipboard{
  border:1px solid var(--line);
  border-radius:18px;
  background:#fffdf8;
  overflow:hidden;
}
.clipboard-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  background:#f3e7aa;
  color:#4f4100;
  padding:10px 14px;
  font-weight:950;
}
.evidence-list{
  list-style:none;
  margin:0;
  padding:12px;
  display:grid;
  gap:10px;
}
.evidence-list li{
  border:1px solid #e4dcae;
  background:white;
  border-radius:12px;
  padding:10px 12px;
  color:#303751;
  line-height:1.42;
  font-size:1rem;
  font-weight:760;
}
.evidence-list li::before{
  content:"Pattern";
  display:inline-flex;
  margin-right:8px;
  border-radius:999px;
  background:#fff3b8;
  color:#6e5700;
  padding:2px 7px;
  font-size:.7rem;
  font-weight:950;
  letter-spacing:.04em;
  text-transform:uppercase;
  vertical-align:middle;
}
.diagnosis-bank{
  border:1px solid var(--line);
  border-radius:18px;
  background:#f8faff;
  padding:14px;
}
.diagnosis-bank h3{margin:0 0 5px;font-size:1rem}
.diagnosis-bank p{margin:0 0 12px;color:var(--muted);font-size:.88rem}
.token-grid{
  display:flex;
  flex-wrap:wrap;
  gap:9px;
}
.diagnosis-token{
  border:2px solid #b89a12;
  background:linear-gradient(180deg,#fff6ba,#e0bd26);
  color:#322800;
  border-radius:999px;
  padding:9px 12px;
  font-weight:900;
  font-size:.84rem;
  cursor:pointer;
  box-shadow:0 4px 0 rgba(104,82,0,.18);
}
.diagnosis-token.selected{
  outline:4px solid rgba(47,107,216,.22);
  border-color:#2f6bd8;
  background:#fff;
  color:#18366c;
}
.status-card{
  margin-top:12px;
  min-height:44px;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px 12px;
  color:#4c5570;
  font-weight:900;
  background:white;
}
.status-card.good{border-color:#9ad3b0;background:#ebf8ef;color:var(--green)}
.status-card.bad{border-color:#f0b6bf;background:#fff1f3;color:#a42033}
.completion{
  border:1px solid #9ad3b0;
  background:#ebf8ef;
  color:#0d6b3e;
  padding:13px 14px;
  border-radius:16px;
  font-weight:950;
}
.printable-game{display:none}
@media(max-width:860px){
  .game-hero{grid-template-columns:1fr}
  .hero-badge{width:118px;min-width:118px;justify-self:start}
  .unit-grid{grid-template-columns:1fr}
  .unit-head{display:grid}
  .department-hall{align-items:flex-start}
  .chart-layout{grid-template-columns:1fr}
}
@media(max-width:560px){
  .game-wrap{width:min(100% - 18px,480px);padding-top:12px}
  .game-hero,.unit-head,.chart-panel,.room-panel{padding:14px;border-radius:17px}
  .room-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .room-card{min-height:142px;padding:10px}
  .room-card h3{margin-top:50px}
  .game-btn{width:100%;justify-content:center}
}
html[data-mls-theme="dark"] body.ua-case-files{
  --ink:#f7f9ff;
  --muted:#c8cfe7;
  --panel:#151927;
  --line:#35405e;
  --ua-dark:#f2d96a;
  background:
    radial-gradient(circle at 8% 8%,rgba(200,168,0,.16),transparent 24rem),
    linear-gradient(180deg,#0d0f16,#121827 58%,#0b0d13) !important;
  color:var(--ink) !important;
}
html[data-mls-theme="dark"] body.ua-case-files .game-hero,
html[data-mls-theme="dark"] body.ua-case-files .unit-head,
html[data-mls-theme="dark"] body.ua-case-files .chart-panel,
html[data-mls-theme="dark"] body.ua-case-files .room-panel{
  background:linear-gradient(145deg,#151927,#101522 70%,#1b2132);
  border-color:var(--line);
  color:var(--ink);
}
html[data-mls-theme="dark"] body.ua-case-files .game-hero h1,
html[data-mls-theme="dark"] body.ua-case-files h2,
html[data-mls-theme="dark"] body.ua-case-files h3{
  color:#ffffff;
}
html[data-mls-theme="dark"] body.ua-case-files .game-hero p,
html[data-mls-theme="dark"] body.ua-case-files .unit-card p,
html[data-mls-theme="dark"] body.ua-case-files .unit-head p,
html[data-mls-theme="dark"] body.ua-case-files .chart-title-row p,
html[data-mls-theme="dark"] body.ua-case-files .diagnosis-bank p,
html[data-mls-theme="dark"] body.ua-case-files .department-hall span,
html[data-mls-theme="dark"] body.ua-case-files .room-card p{
  color:var(--muted);
}
html[data-mls-theme="dark"] body.ua-case-files .hero-badge,
html[data-mls-theme="dark"] body.ua-case-files .unit-card,
html[data-mls-theme="dark"] body.ua-case-files .diagnosis-bank{
  background:linear-gradient(180deg,#1b2132,#141a29);
  border-color:var(--line);
  color:var(--ink);
}
html[data-mls-theme="dark"] body.ua-case-files .department-entry,
html[data-mls-theme="dark"] body.ua-case-files .department-hall,
html[data-mls-theme="dark"] body.ua-case-files .room-card{
  background:linear-gradient(180deg,#222a3f,#141a29);
  border-color:#4d5876;
}
html[data-mls-theme="dark"] body.ua-case-files .unit-door,
html[data-mls-theme="dark"] body.ua-case-files .room-door-panel{
  background:
    linear-gradient(90deg,rgba(255,255,255,.13),rgba(255,255,255,.04) 38%,transparent 70%),
    linear-gradient(180deg,#2c354b,#1d2537);
  border-color:#59637c;
}
html[data-mls-theme="dark"] body.ua-case-files .room-door,
html[data-mls-theme="dark"] body.ua-case-files .department-hall-door{
  background:#20283c;
  border-color:#59637c;
}
html[data-mls-theme="dark"] body.ua-case-files .department-sign,
html[data-mls-theme="dark"] body.ua-case-files .room-number{
  background:#111827;
  color:#f2d96a;
  border-color:#6f6230;
}
html[data-mls-theme="dark"] body.ua-case-files .clipboard{
  background:#121827;
  border-color:var(--line);
}
html[data-mls-theme="dark"] body.ua-case-files .clipboard-head{
  background:#2b250b;
  color:#ffe985;
}
html[data-mls-theme="dark"] body.ua-case-files .evidence-list li,
html[data-mls-theme="dark"] body.ua-case-files .status-card{
  background:#1a2031;
  color:#f4f6ff;
  border-color:var(--line);
}
@media print{
  @page{size:letter landscape;margin:.25in}
  body{background:#fff!important;color:#000!important}
  .screen-shell,.site-header{display:none!important}
  .printable-game{display:block!important;font-family:"Trebuchet MS","Arial Rounded MT Bold",Arial,sans-serif;color:#111827}
  body.print-cases .print-token-section{display:none!important}
  body.print-tokens .print-case-section{display:none!important}
  body.print-tokens .print-card-page{display:none!important}
  body.print-full .printable-game{display:block!important}
  .print-section-title{font-size:18pt;font-weight:900;margin:0 0 .15in}
  .print-card-page{
    page-break-after:always;
    display:grid;
    grid-template-columns:4.05in 4.05in;
    gap:.55in;
    align-items:start;
    justify-content:center;
  }
  .print-card{
    position:relative;
    width:4.05in;
    height:6in;
    border:2.5px dashed #172554;
    border-radius:.22in;
    padding:.2in;
    page-break-inside:avoid;
    display:grid;
    grid-template-rows:auto auto 1fr auto auto;
    gap:.1in;
    background:
      radial-gradient(circle at 96% 5%,#fff1b8 0 .48in,transparent .49in),
      linear-gradient(180deg,#fffdf4,#ffffff 42%,#f7fbff);
    box-shadow:inset 0 0 0 2px #d7e2f4;
    overflow:hidden;
  }
  .print-card::before{
    content:"";
    position:absolute;
    left:-.18in;
    right:-.18in;
    top:.62in;
    height:.06in;
    background:repeating-linear-gradient(90deg,#c8a800 0 .18in,#2f6bd8 .18in .34in,#1a8a4a .34in .5in);
    transform:rotate(-1.2deg);
  }
  .print-card h2{
    margin:0;
    padding-right:.45in;
    font-size:17pt;
    font-weight:950;
    letter-spacing:.01em;
    color:#111827;
  }
  .print-hospital-icon{
    position:absolute;
    top:.14in;
    right:.16in;
    width:.34in;
    height:.34in;
    border:2px solid #172554;
    border-radius:.08in;
    display:grid;
    place-items:center;
    background:#ffffff;
    color:#c0303f;
    font-size:18pt;
    font-weight:950;
    line-height:1;

const storageKey = "mls.uaRenalCaseFiles.v1";
let progress = loadProgress();
let activeUnitId = null;
let activeRoom = null;
let selectedDiagnosis = "";
let chartMessage = "";
let chartMessageState = "";

function esc(value){
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[ch]));
}

function loadProgress(){
  try{
    const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
    return saved && typeof saved === "object" ? {closed:saved.closed || {}} : {closed:{}};
  }catch(error){
    return {closed:{}};
  }
}

function saveProgress(){
  localStorage.setItem(storageKey, JSON.stringify(progress));
}

function caseKey(item){
  return `${item.unitId}-${item.room}`;
}

function units(){
  const seen = new Map();
  renalCaseFiles.forEach(item => {
    if(!seen.has(item.unitId)){
      seen.set(item.unitId, {unitId:item.unitId, unitName:item.unitName, department:item.department});
    }
  });
  return [...seen.values()];
}

function casesForUnit(unitId){
  return renalCaseFiles.filter(item => item.unitId === Number(unitId)).sort((a,b) => a.room - b.room);
}

function closedCases(unitId){
  return casesForUnit(unitId).filter(item => progress.closed[caseKey(item)]);
}

function usedDiagnoses(unitId){
  return new Set(closedCases(unitId).map(item => item.diagnosis));
}

function render(){
  const root = document.getElementById("gameRoot");
  root.innerHTML = activeUnitId ? renderUnit() : renderStart();
  document.querySelectorAll(".diagnosis-token").forEach(button => {
    button.addEventListener("click", () => selectDiagnosis(button.dataset.diagnosis));
  });
}

function renderStart(){
  const totalClosed = Object.keys(progress.closed).length;
  const totalCases = renalCaseFiles.length;
  const completeMessage = totalClosed === totalCases
    ? '<div class="completion" style="margin-top:18px">UA Renal Case Files Complete - 13/13 medical cases closed.</div>'
    : "";
  return `
    <div class="unit-grid">
      ${units().map(unit => {
        const cases = casesForUnit(unit.unitId);
        const closed = closedCases(unit.unitId).length;
        const pct = Math.round((closed / cases.length) * 100);
        return `<button class="unit-card" type="button" onclick="enterUnit(${unit.unitId}, this)">
          <div>
            <div class="eyebrow">${esc(unit.unitName)}</div>
            <h2>${esc(unit.department)}</h2>
            <p>${cases.length} rooms / ${cases.length} medical cases</p>
          </div>
          <div class="department-entry" aria-hidden="true">
            <div class="department-sign">Automatic Department Doors</div>
            <div class="door-track"></div>
            <div class="door-glow"></div>
            <div class="unit-door left"></div>
            <div class="unit-door right"></div>
            <div class="door-alert">Opening</div>
          </div>
          <div class="progress-track"><div class="progress-fill" style="--progress:${pct}%"></div></div>
          <div class="progress-copy">Cases Closed ${closed}/${cases.length}</div>
        </button>`;
      }).join("")}
    </div>
    ${completeMessage}
  `;
}

function renderUnit(){
  const unitCases = casesForUnit(activeUnitId);
  const unit = units().find(item => item.unitId === activeUnitId);
  const closed = closedCases(activeUnitId).length;
  const completion = closed === unitCases.length
    ? `<div class="completion">${esc(unit.department)} Complete - ${closed}/${unitCases.length} cases closed.</div>`
    : "";
  return `
    <section class="unit-panel">
      <div class="unit-head">
        <div>
          <div class="eyebrow">${esc(unit.unitName)}</div>
          <h2>${esc(unit.department)}</h2>
          <p>Open a room, review the patient chart, then choose a diagnosis token.</p>
          <div class="progress-track"><div class="progress-fill" style="--progress:${Math.round((closed / unitCases.length) * 100)}%"></div></div>
          <div class="progress-copy">Cases Closed ${closed}/${unitCases.length}</div>
        </div>
        <div class="action-row" style="margin-top:0">
          <button class="game-btn ghost" type="button" onclick="backToUnits()">Hospital Lobby</button>
          <button class="game-btn warn" type="button" onclick="resetUnit(${activeUnitId})">Reset Unit</button>
          <button class="game-btn warn" type="button" onclick="resetWholeGame()">Reset Whole Game</button>
        </div>
      </div>
      ${completion}
      <div class="department-hall">
        <div class="department-hall-door" aria-hidden="true"></div>
        <div>
          <strong>${esc(unit.department)} Hallway</strong>
          <span>Choose a patient room door to pull the chart for that case file.</span>
        </div>
      </div>
      <div class="room-panel">
        <div class="chart-title-row">
          <div>
            <h2>Hospital Rooms</h2>
            <p>Case Closed rooms keep their stamp.</p>
          </div>
        </div>
        <div class="room-grid">
          ${unitCases.map(renderRoomCard).join("")}
        </div>
      </div>
      ${activeRoom ? renderChart(activeRoom) : ""}
    </section>
  `;
}

function renderRoomCard(item){
  const closed = progress.closed[caseKey(item)];
  const selected = activeRoom && activeRoom.unitId === item.unitId && activeRoom.room === item.room;
  return `<button class="room-card ${closed ? "closed" : ""} ${selected ? "selected" : ""}" type="button" onclick="openRoom(${item.unitId},${item.room})">
    <div class="room-door" aria-hidden="true">
      <div class="room-door-panel left"></div>
      <div class="room-door-panel right"></div>
      <div class="room-door-window"></div>
      <div class="room-door-handle"></div>
    </div>
    <span class="room-number">Room ${item.room}</span>
    <h3>Room ${item.room}</h3>
    <p>${esc(item.caseTitle)}</p>
    ${closed ? '<div class="stamp">Case Closed</div>' : ""}
  </button>`;
}

function renderChart(item){
  const closed = progress.closed[caseKey(item)];
  const unitUsed = usedDiagnoses(item.unitId);
  const available = casesForUnit(item.unitId)
    .map(caseFile => caseFile.diagnosis)
    .filter(diagnosis => !unitUsed.has(diagnosis));
  const message = closed
    ? "Case Closed. This room is sealed."
    : (chartMessage || "Choose a diagnosis token, then confirm the chart.");
  const messageState = closed ? "good" : chartMessageState;
  return `<div class="chart-panel" id="patientChart">
    <div class="chart-title-row">
      <div>
        <h2>Patient Chart - Room ${item.room}</h2>
        <p>${esc(item.unitName)} / ${esc(item.department)} / ${esc(item.caseTitle)}</p>
      </div>
      <button class="game-btn ghost" type="button" onclick="closeChart()">Close Chart</button>
    </div>
    <div class="chart-layout">
      <div class="clipboard">
        <div class="clipboard-head"><span>Patient Pattern</span><span>UA Pattern</span></div>
        <ul class="evidence-list">
          ${patternClues(item).map(result => `<li>${esc(result)}</li>`).join("")}
        </ul>
      </div>
      <aside class="diagnosis-bank">
        <h3>Diagnosis Bank</h3>
        <p>${closed ? "This room no longer needs a token." : "Pick one diagnosis token for this patient chart."}</p>
        <div class="token-grid">
          ${closed ? "" : available.map(diagnosis => `<button type="button" class="diagnosis-token ${selectedDiagnosis === diagnosis ? "selected" : ""}" data-diagnosis="${esc(diagnosis)}">${esc(diagnosis)}</button>`).join("")}
        </div>
        <div class="status-card ${messageState}">${esc(message)}</div>
        ${closed ? "" : `<div class="action-row"><button class="game-btn primary" type="button" onclick="confirmDiagnosis()">Confirm Diagnosis</button></div>`}
      </aside>
    </div>
  </div>`;
}

function enterUnit(unitId, doorCard){
  if(doorCard && !doorCard.classList.contains("door-opening")){
    doorCard.classList.add("door-opening");
    setTimeout(() => enterUnit(unitId), 560);
    return;
  }
  activeUnitId = unitId;
  activeRoom = null;
  selectedDiagnosis = "";
  chartMessage = "";
  chartMessageState = "";
  render();
  setTimeout(() => document.querySelector(".unit-panel")?.scrollIntoView({behavior:"smooth",block:"start"}), 40);
}

function backToUnits(){
  activeUnitId = null;
  activeRoom = null;
  selectedDiagnosis = "";
  render();
}

function openRoom(unitId, room){
  activeUnitId = unitId;
  activeRoom = renalCaseFiles.find(item => item.unitId === unitId && item.room === room);
  selectedDiagnosis = "";
  chartMessage = "";
  chartMessageState = "";
  render();
  setTimeout(() => document.getElementById("patientChart")?.scrollIntoView({behavior:"smooth",block:"start"}), 40);
}

function closeChart(){
  activeRoom = null;
  selectedDiagnosis = "";
  chartMessage = "";
  chartMessageState = "";
  render();
}

function selectDiagnosis(diagnosis){
  selectedDiagnosis = diagnosis;
  chartMessage = "Diagnosis token selected. Confirm when ready.";
  chartMessageState = "";
  render();
}

function confirmDiagnosis(){
  if(!activeRoom){return;}
  if(!selectedDiagnosis){
    chartMessage = "Choose a diagnosis token first.";
    chartMessageState = "bad";
    render();
    return;
  }
  if(selectedDiagnosis === activeRoom.diagnosis){
    progress.closed[caseKey(activeRoom)] = selectedDiagnosis;
    saveProgress();
    chartMessage = "Case Closed.";
    chartMessageState = "good";
    selectedDiagnosis = "";
    render();
    return;
  }
  chartMessage = "Recheck the Chart.";
  chartMessageState = "bad";
  render();
}

function resetUnit(unitId){
  casesForUnit(unitId).forEach(item => delete progress.closed[caseKey(item)]);
  saveProgress();
  activeRoom = null;
  selectedDiagnosis = "";
  chartMessage = "";
  chartMessageState = "";
  render();
}

function resetWholeGame(){
  progress = {closed:{}};
  saveProgress();
  activeRoom = null;
  selectedDiagnosis = "";
  chartMessage = "";
  chartMessageState = "";
  render();
}

function renderPrintable(){
  const cardPages = [];
  for(let i = 0; i < renalCaseFiles.length; i += 2){
    cardPages.push(`<div class="print-card-page">${renalCaseFiles.slice(i,i+2).map(renderPrintCard).join("")}</div>`);
  }
  const tokens = units().map(unit => {
    const diagnoses = casesForUnit(unit.unitId).map(item => item.diagnosis);
    return `<div class="print-token-section">
      <h2 class="print-section-title">${esc(unit.unitName)} - ${esc(unit.department)} Diagnosis Tokens</h2>
      <div class="print-token-grid">
        ${diagnoses.map(diagnosis => `<div class="print-token">${esc(diagnosis)}</div>`).join("")}
        <div class="print-token">Blank Token</div>
        <div class="print-token">Blank Token</div>
      </div>
    </div>`;
  }).join("");
  document.getElementById("printableGame").innerHTML = `
    <div class="print-case-section">
      <h1 class="print-section-title">UA Renal Case Files - Case Cards</h1>
      ${cardPages.join("")}
    </div>
    ${tokens}
  `;
}

function renderPrintCard(item){
  const clues = patternClues(item);
  return `<article class="print-card">
    <div class="print-hospital-icon" aria-hidden="true">+</div>
    <h2>${esc(item.unitName)}</h2>
    <div class="meta">
      <strong>${esc(item.department)}</strong><br>
      Room ${item.room} / ${esc(item.caseTitle)}
    </div>
    <div>
      <div class="clue-title">Patient Pattern Clues</div>
      <div class="print-clue-list">${clues.map(result => `<div class="print-clue">${esc(result)}</div>`).join("")}</div>
    </div>
    <div class="token-target">Place Diagnosis Token Here</div>
    <div class="stamp-box">Case Closed Stamp</div>
  </article>`;
}

    "2-5": [
      "Diabetes history clue",
      "Proteinuria monitored by microalbumin",
      "Mesangial proliferation + vascular sclerosis",
      "Common end-stage kidney disease pattern"
    ]
  };
  return clueMap[key] || item.patientResults.map(result => result
    .replace(/\bBUN\s+\d+\s*mg\/dL\b/gi, "BUN pattern")
    .replace(/\bASO titer elevated at\s+[\w\s.]+/gi, "ASO elevated")
    .replace(/\bSG\s+\d\.\d+\b/gi, "specific gravity pattern")
    .replace(/\bpH\s+\d\.\d+\b/gi, "pH pattern")
    .replace(/>\d+\s*RBC\/hpf/gi, "many RBCs")
    .replace(/\d+-\d+\s*WBC\/hpf/gi, "WBC pattern"));
}

function printMode(mode){
  renderPrintable();
  document.body.classList.remove("print-cases","print-tokens","print-full");
  document.body.classList.add(`print-${mode}`);
  setTimeout(() => window.print(), 80);
}

window.addEventListener("afterprint", () => {
  document.body.classList.remove("print-cases","print-tokens","print-full");
});

renderPrintable();
render();
</script>
</body>
