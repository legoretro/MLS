<!DOCTYPE html>

<head>

  <title>UA Tubular Flowchart</title>

  <link rel="stylesheet" href="interactive_learning.css">

<body class="ua-flow-page mls-interactive">

  <script>
    window.UA_FLOWCHART_DATA={
      title:'UA Tubular Flowchart',
      color:'#2c83d6',
      tint:'#e7f2ff',
      summary:'Tubular disorders affect cells that reabsorb, secrete or respond to signals. Match the tubular clue chips to the correct disorder.',

      branches:[
        {
          title:'Cell injury pattern',
          diseases:[
            {
              id:'atn',
              name:'Acute tubular necrosis',
              note:'RTE cells are damaged by ischemia or toxins.',

              other:['ischemia clue','toxin clue']
            }
          ]
        },
        {
          title:'Proximal reabsorption failure',
          diseases:[
            {
              id:'fanconi',

        {
          title:'Specific function problem',

            {
              id:'ndi',

            {
              id:'glycosuria',
