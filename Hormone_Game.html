<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hormone Crosswords</title>
<script src="interactive_theme.js"></script>
<link rel="stylesheet" href="interactive_learning.css?v=hormone-crossword-1">
<script src="interactive_music.js?v=hormone-game-2" defer></script>
<style>
:root{
  --chem:#2980b9;
  --chem-dark:#0f4770;
  --chem-deep:#09283f;
  --chem-soft:#e6f5ff;
  --chem-glow:#bde8ff;
  --ink:#122033;
  --muted:#54657c;
  --panel:#ffffff;
  --line:#bad4ea;
  --good:#1f9d64;
  --bad:#d64d5f;
  --gold:#f4bd4f;
  --shadow:0 22px 54px rgba(18,48,84,.16);
}
*{box-sizing:border-box}
body.hormone-game{
  margin:0;
  min-height:100vh;
  font-family:"Trebuchet MS",Arial,Helvetica,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 14% 0%,rgba(41,128,185,.22),transparent 30%),
    linear-gradient(180deg,#f4f9ff 0%,#e6eef8 100%);
}
body.hormone-game .site-header{border-bottom-color:var(--chem)}
body.hormone-game .site-header .logo,
body.hormone-game .mls-home-btn,
body.hormone-game .mls-theme-btn,
body.hormone-game .mls-audio-btn{color:var(--chem-dark)}
body.hormone-game .mls-home-btn,
body.hormone-game .mls-theme-btn,
body.hormone-game .mls-audio-btn{
  border-color:#9fc4df;
  box-shadow:0 6px 0 rgba(41,128,185,.16);
}
.screen-shell{max-width:1240px;margin:0 auto;padding:22px}
.game-font{
  font-family:"Cooper Black","Arial Black","Arial Rounded MT Bold","Trebuchet MS",Arial,sans-serif;
  letter-spacing:.01em;
}
.hero,.panel,.puzzle-card,.crossword-shell,.clue-card,.output-card{
  background:rgba(255,255,255,.94);
  border:2px solid var(--line);
  border-radius:20px;
  box-shadow:var(--shadow);
}
.hero{
  min-height:620px;
  display:grid;
  place-items:center;
  text-align:center;
  padding:34px 22px;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 22% 20%,rgba(255,255,255,.9),transparent 18%),
    radial-gradient(circle at 78% 18%,rgba(41,128,185,.2),transparent 24%),
    linear-gradient(135deg,#f8fdff 0%,#d7f0ff 48%,#16486b 100%);
}
.hero::before,.hero::after,.hall-hero::before,.hall-hero::after{
  content:"";
  position:absolute;
  width:250px;
  height:250px;
  border:14px solid rgba(9,40,63,.18);
  border-radius:34% 66% 48% 52%;
  transform:rotate(-22deg);
  pointer-events:none;
}
.hero::before,.hall-hero::before{left:-88px;top:96px}
.hero::after,.hall-hero::after{right:-72px;bottom:68px}
.hero-panel{position:relative;z-index:1;max-width:900px}
.eyebrow{
  color:var(--chem-dark);
  font-size:13px;
  font-weight:1000;
  letter-spacing:.22em;
  text-transform:uppercase;
}
.hero h1,.hall-hero h1{
  margin:8px 0 10px;
  color:#10243a;
  font-size:clamp(52px,9vw,118px);
  line-height:.86;
  font-weight:1000;
  text-shadow:7px 8px 0 rgba(255,255,255,.72),11px 12px 0 rgba(41,128,185,.22);
}
.hero-copy{
  margin:12px auto 22px;
  max-width:780px;
  font-size:21px;
  line-height:1.35;
  color:#18334c;
  font-weight:900;
}
.game-btn{
  border:0;
  border-radius:999px;
  padding:12px 16px;
  font-family:inherit;
  font-weight:1000;
  cursor:pointer;
}
.enter-btn{
  min-width:min(100%,430px);
  background:var(--chem);
  color:#fff;
  padding:22px 28px;
  font-size:26px;
  box-shadow:0 12px 0 #0d4166,0 26px 42px rgba(0,0,0,.23);
  transform:rotate(-1deg);
}
.enter-btn:hover{transform:translateY(-2px) rotate(-1deg)}
.primary-btn{background:var(--chem);color:#fff}
.ghost-btn{background:#fff;color:var(--chem-dark);border:2px solid #9fc4df}
.danger-btn{background:#fff2f4;color:#7b1f31;border:2px solid #efb3bf}
.print-btn{background:#fefefe;color:var(--chem-dark);border:2px solid #9fc4df}
.toolbar{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  gap:10px;
  margin-bottom:14px;
}
.toolbar-left,.toolbar-right{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.hall-hero{
  position:relative;
  overflow:hidden;
  text-align:center;
  min-height:330px;
  display:grid;
  place-items:center;
  padding:34px 22px;
  margin-bottom:18px;
  border:2px solid var(--chem);
  border-radius:24px;
  background:
    radial-gradient(circle at 22% 18%,rgba(255,255,255,.9),transparent 22%),
    radial-gradient(circle at 76% 20%,rgba(41,128,185,.2),transparent 24%),
    linear-gradient(135deg,#f8fdff 0%,#d9f1ff 52%,#2a7fb7 100%);
  box-shadow:var(--shadow);
}
.hall-hero h1{font-size:clamp(48px,7vw,92px)}
.puzzle-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
}
.puzzle-card{
  min-height:176px;
  text-align:left;
  padding:18px;
  cursor:pointer;
  display:grid;
  align-content:space-between;
  color:var(--ink);
  transition:transform .15s ease,border-color .15s ease,box-shadow .15s ease;
}
.puzzle-card:hover{
  transform:translateY(-3px);
  border-color:var(--chem);
  box-shadow:0 22px 42px rgba(41,128,185,.17);
}
.puzzle-card.solved{border-color:var(--good);background:#edfbf4}
.puzzle-number{
  display:inline-flex;
  width:36px;
  height:36px;
  border-radius:50%;
  align-items:center;
  justify-content:center;
  background:var(--chem);
  color:#fff;
  font-weight:1000;
  box-shadow:0 5px 0 rgba(15,71,112,.22);
}
.puzzle-card h2{
  margin:12px 0 8px;
  font-size:26px;
  line-height:1;
  color:#10243a;
}
.puzzle-card p{
  margin:0;
  color:var(--muted);
  font-weight:900;
  line-height:1.35;
}
.puzzle-status{
  margin-top:16px;
  font-size:12px;
  font-weight:1000;
  color:var(--chem-dark);
  letter-spacing:.1em;
  text-transform:uppercase;
}
.puzzle-layout{
  display:grid;
  grid-template-columns:minmax(320px,.72fr) minmax(520px,1.28fr);
  gap:16px;
  align-items:start;
}
.panel{padding:18px}
.panel-title{
  color:var(--chem-dark);
  font-size:14px;
  font-weight:1000;
  letter-spacing:.14em;
  text-transform:uppercase;
  margin-bottom:10px;
}
.puzzle-title{
  margin:4px 0 12px;
  font-size:clamp(32px,5vw,54px);
  line-height:.9;
  color:#10243a;
}
.map-line{
  display:inline-flex;
  border-radius:999px;
  padding:8px 11px;
  background:#0f4770;
  color:#fff;
  font-weight:1000;
}
.pathway-strip{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:8px;
  margin-top:14px;
}
.pathway-step{
  border:2px solid #bad4ea;
  border-radius:15px;
  background:#f8fcff;
  padding:10px;
  color:#10243a;
  font-weight:1000;
  min-height:58px;
  display:flex;
  align-items:center;
  gap:8px;
}
.pathway-step strong{
  width:28px;
  height:28px;
  border-radius:50%;
  display:grid;
  place-items:center;
  flex:0 0 auto;
  color:#fff;
  background:var(--chem);
  box-shadow:0 4px 0 rgba(15,71,112,.18);
}
.pathway-step.active{border-color:var(--chem);background:#e7f5ff}
.step-pills{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(38px,1fr));
  gap:6px;
  margin-top:14px;
}
.step-pill{
  min-height:34px;
  border:2px solid #9fc4df;
  border-radius:999px;
  display:grid;
  place-items:center;
  font-size:11px;
  font-weight:1000;
  color:var(--chem-dark);
  background:#fff;
}
.step-pill.active{border-color:var(--chem);background:#e6f5ff}
.step-pill.solved{border-color:var(--good);background:#edfbf4;color:#176540}
.clue-card{padding:16px;margin-top:14px}
.clue-card h3{margin:0 0 8px;color:#10243a;font-size:22px}
.clue-card p{margin:0 0 12px;color:#40536a;font-weight:900;line-height:1.35}
.ordered-clues{
  display:grid;
  gap:10px;
  margin-top:14px;
}
.term-step{
  border:2px solid #bad4ea;
  border-radius:16px;
  background:#fff;
  color:#10243a;
  padding:12px;
  text-align:left;
  display:grid;
  grid-template-columns:auto minmax(0,1fr);
  gap:10px;
  align-items:start;
  cursor:pointer;
  font-family:inherit;
}
.term-step.active{border-color:var(--chem);background:#e6f5ff;box-shadow:0 8px 18px rgba(41,128,185,.14)}
.term-step-number{
  width:34px;
  height:34px;
  border-radius:50%;
  background:var(--chem);
  color:#fff;
  display:grid;
  place-items:center;
  font-weight:1000;
}
.term-step-name{
  font-size:20px;
  font-weight:1000;
  line-height:1.05;
}
.term-step-clue{
  display:block;
  margin-top:4px;
  color:#40536a;
  font-size:14px;
  font-weight:900;
  line-height:1.25;
}
.answer-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px}
.answer-input{
  width:100%;
  min-height:48px;
  border:2px solid #9fc4df;
  border-radius:14px;
  padding:10px 12px;
  font:1000 18px/1.1 "Trebuchet MS",Arial,Helvetica,sans-serif;
  color:#10243a;
  background:#fff;
}
.feedback{
  margin-top:12px;
  min-height:48px;
  border-radius:14px;
  padding:12px 14px;
  background:rgba(255,255,255,.78);
  border:2px solid #bad4ea;
  color:#40536a;
  font-weight:900;
  line-height:1.35;
}
.feedback.good{border-color:rgba(31,157,100,.55);background:#edfbf4;color:#176540}
.feedback.bad{border-color:rgba(214,77,95,.55);background:#fff1f3;color:#8b2738}
.output-card{
  margin-top:14px;
  padding:16px;
  display:none;
}
.output-card.visible{display:block}
.output-card h3{margin:0 0 8px;color:#176540;font-size:25px}
.output-card p{margin:0;color:#263d34;font-weight:900;line-height:1.35}
.crossword-shell{padding:18px;overflow:hidden}
.crossword-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:12px;
}
.crossword-head h2{margin:0;color:#10243a;font-size:30px}
.crossword-head p{margin:5px 0 0;color:var(--muted);font-weight:900}
.crossword-board-wrap{overflow:auto;padding-bottom:6px}
.crossword-board{
  display:grid;
  gap:3px;
  justify-content:start;
  width:max-content;
  min-width:100%;
}
.cell{
  width:28px;
  height:28px;
  border:2px solid #86b9dc;
  border-radius:7px;
  background:#fff;
  display:grid;
  place-items:center;
  position:relative;
  font-weight:1000;
  color:#10243a;
  box-shadow:0 2px 0 rgba(41,128,185,.12);
}
.cell.empty{
  border-color:transparent;
  background:transparent;
  box-shadow:none;
}
.cell.solved{background:#f8fcff;border-color:#86b9dc}
.cell.active{background:#fff2be;border-color:#d39a25;box-shadow:0 0 0 3px rgba(244,189,79,.24)}
.cell-number{
  position:absolute;
  top:1px;
  left:3px;
  font-size:8px;
  color:var(--chem-dark);
  line-height:1;
}
.cell-letter{font-size:15px;line-height:1}
.mini-map{
  margin-top:14px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
  gap:8px;
}
.mini-map span{
  border:2px solid #bad4ea;
  border-radius:13px;
  background:#f8fcff;
  padding:9px;
  text-align:center;
  color:#10243a;
  font-weight:1000;
  min-height:46px;
  display:grid;
  place-items:center;
}
.print-only{display:none}
@media(max-width:980px){
  .puzzle-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .puzzle-layout{grid-template-columns:1fr}
}
@media(max-width:620px){
  .screen-shell{padding:14px}
  .hero{min-height:540px}
  .hero-copy{font-size:17px}
  .enter-btn{font-size:20px;padding:18px 20px}
  .toolbar{display:grid}
  .toolbar-left,.toolbar-right{display:grid;grid-template-columns:1fr 1fr}
  .puzzle-grid{grid-template-columns:1fr}
  .answer-row{grid-template-columns:1fr}
  .cell{width:24px;height:24px;border-radius:6px}
  .cell-letter{font-size:13px}
}
html[data-mls-theme="dark"] body.hormone-game{
  background:
    radial-gradient(circle at 14% 0%,rgba(41,128,185,.18),transparent 30%),
    linear-gradient(180deg,#07101d 0%,#111827 100%) !important;
  color:#f4f9ff;
}
html[data-mls-theme="dark"] body.hormone-game .panel,
html[data-mls-theme="dark"] body.hormone-game .puzzle-card,
html[data-mls-theme="dark"] body.hormone-game .crossword-shell,
html[data-mls-theme="dark"] body.hormone-game .clue-card,
html[data-mls-theme="dark"] body.hormone-game .output-card{
  background:#101a2b !important;
  border-color:#406996 !important;
  color:#f4f9ff !important;
}
html[data-mls-theme="dark"] body.hormone-game h1,
html[data-mls-theme="dark"] body.hormone-game h2,
html[data-mls-theme="dark"] body.hormone-game h3,
html[data-mls-theme="dark"] body.hormone-game .puzzle-title,
html[data-mls-theme="dark"] body.hormone-game .crossword-head h2{
  color:#fff !important;
}
html[data-mls-theme="dark"] body.hormone-game .puzzle-card p,
html[data-mls-theme="dark"] body.hormone-game .clue-card p,
html[data-mls-theme="dark"] body.hormone-game .crossword-head p,
html[data-mls-theme="dark"] body.hormone-game .feedback{
  color:#d8eaff !important;
}
@media print{
  @page{size:letter landscape;margin:.5in}
  body{background:#fff!important;color:#000!important}
  .site-header,.screen-shell{display:none!important}
  .print-only{display:block!important;font-family:Arial,Helvetica,sans-serif;color:#000!important}
  .print-page{break-after:page}
  .print-title{font-size:19pt;margin:0 0 .1in;font-weight:900;color:#000!important}
  .print-note{font-size:10pt;margin:0 0 .16in;color:#000!important}
  .print-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.14in}
  .print-card{
    border:2px solid #000;
    border-radius:.12in;
    padding:.12in;
    min-height:1.85in;
    break-inside:avoid;
    color:#000!important;
    background:#fff!important;
  }
  .print-card h2{font-size:15pt;margin:0 0 .06in;color:#000!important}
  .print-card h3{font-size:10pt;margin:.03in 0;color:#000!important;text-transform:uppercase;letter-spacing:.08em}
  .print-card p,.print-card li{font-size:9.5pt;line-height:1.22;color:#000!important}
  .print-card ul{margin:.05in 0 0;padding-left:.2in}
  .answer-table{width:100%;border-collapse:collapse;font-size:9pt}
  .answer-table th,.answer-table td{border:1px solid #000;padding:.06in;text-align:left;vertical-align:top;color:#000!important}
  .answer-table th{font-weight:900}
  .print-crossword{display:grid;gap:.03in;width:max-content;margin:.08in 0}
  .print-cell{
    width:.22in;
    height:.22in;
    border:1px solid #000;
    display:grid;
    place-items:center;
    position:relative;
    font-size:9pt;
    font-weight:900;
  }
  .print-cell.empty{border-color:transparent}
  .print-cell-number{position:absolute;top:0;left:.02in;font-size:5pt}
  .print-ordered{width:100%;border-collapse:collapse;font-size:8.5pt;margin-top:.08in}
  .print-ordered th,.print-ordered td{border:1px solid #000;padding:.04in;color:#000!important;vertical-align:top}
  .print-ordered th{font-weight:900}
}
</style>
</head>
<body class="mls-interactive hormone-game">
<header class="site-header">
  <div>
    <div class="logo">MLS<span style="color:var(--mls-text3)">/</span>BOC<span style="color:var(--mls-text3);font-size:12px;margin-left:8px">PREP</span></div>
    <div class="logo-sub">Interactive Learning</div>
  </div>
  <a class="mls-home-btn" href="index.html#interactive">Back to tools</a>
</header>

<main class="screen-shell" id="app"></main>
<section class="print-only" id="print-area"></section>

<script>
const puzzles = [
  {
    id:"oxytocin",
    title:"Posterior Pituitary Puzzle 1",
    code:"HP-1",
    summary:"Reproductive smooth muscle and breast line.",
    path:"Hypothalamus -> Oxytocin -> Posterior pituitary -> Uterus/Breast",
    output:"Uterine contraction and lactation support",
    entries:[
      ["Hypothalamus","Map center that sends the posterior pituitary signal."],
      ["Oxytocin","Posterior pituitary peptide connected to uterus and breast."],
      ["Posterior Pituitary","Pituitary lobe that releases this peptide."],
      ["Uterus","Target organ for contraction."],
      ["Breast","Target organ for milk letdown."],
      ["Lactation","Breast-related output connected to this line."]
    ]
  },
  {
    id:"adh",
    title:"Posterior Pituitary Puzzle 2",
    code:"HP-2",
    summary:"Water-balance and pressure-support line.",
    path:"Osmoreceptors -> ADH -> Posterior pituitary -> Kidneys/Blood pressure",
    output:"Water retention and blood pressure support",
    entries:[
      ["Osmoreceptors","Sensors that monitor water concentration."],
      ["ADH","Posterior pituitary hormone also called vasopressin."],
      ["Posterior Pituitary","Pituitary lobe that releases ADH."],
      ["Kidneys","Direct effector for water retention."],
      ["Blood Pressure","Indirect effect supported by ADH."],
      ["Vasopressin","Another name for ADH."]
    ]
  },
  {
    id:"prolactin",
    title:"Anterior Pituitary Puzzle 1",
    code:"HP-3",
    summary:"Lactotroph-control line.",
    path:"Dopamine -| Lactotroph -> PRL -> Breast",
    output:"Lactation",
    entries:[
      ["Dopamine","Hypothalamus signal that inhibits lactotrophs."],
      ["Anterior Pituitary","Pituitary lobe with lactotroph cells."],
      ["Lactotroph","Pituitary cell that releases PRL."],
      ["PRL","Peptide hormone released by lactotrophs."],
      ["Breast","Target organ for PRL."],
      ["Lactation","Final action for the PRL line."]
    ]
  },
  {
    id:"thyroid",
    title:"Anterior Pituitary Puzzle 2",
    code:"HP-4",
    summary:"Metabolic heat-control line.",
    path:"TRH/Somatostatin -> Thyrotroph -> TSH -> Thyroid -> T3/T4",
    output:"Thyroid hormone production",
    entries:[
      ["TRH","Hypothalamic peptide that stimulates thyrotrophs."],
      ["Somatostatin","Hypothalamic peptide that inhibits this line."],
      ["Anterior Pituitary","Pituitary lobe with thyrotroph cells."],
      ["Thyrotroph","Pituitary cell that releases TSH."],
      ["TSH","Glycoprotein hormone that stimulates the thyroid."],
      ["Thyroid","Target gland for TSH."],
      ["T3 T4","Thyroid hormones at the end of this map line."]
    ]
  },
  {
    id:"acth",
    title:"Anterior Pituitary Puzzle 3",
    code:"HP-5",
    summary:"Stress-adrenal line.",
    path:"CRH -> Corticotroph -> ACTH -> Adrenal -> Cortisol/DHEA",
    output:"Cortisol and adrenal androgen signaling",
    entries:[
      ["CRH","Hypothalamic peptide that stimulates corticotrophs."],
      ["Anterior Pituitary","Pituitary lobe with corticotroph cells."],
      ["Corticotroph","Pituitary cell that releases ACTH."],
      ["ACTH","Peptide hormone that stimulates adrenal cortex."],
      ["Adrenal","Target gland for ACTH."],
      ["Cortisol","Steroid hormone on this stress line."],
      ["DHEA","Adrenal androgen shown with adrenal zones."]
    ]
  },
  {
    id:"growth",
    title:"Anterior Pituitary Puzzle 4",
    code:"HP-6",
    summary:"Growth and lower-right gland connection.",
    path:"GHRH/Somatostatin -> Somatotroph -> GH -> Liver/IGF-1 and adrenal connection",
    output:"Growth, IGF-1, and adrenal-line connection",
    entries:[
      ["GHRH","Hypothalamic peptide that stimulates somatotrophs."],
      ["Somatostatin","Hypothalamic peptide that inhibits somatotrophs."],
      ["Somatotroph","Pituitary cell that releases growth hormone."],
      ["GH","Growth hormone abbreviation."],
      ["Liver","Target organ that releases IGF-1."],
      ["IGF 1","Peptide downstream of GH from liver."],
      ["Adrenal","Gland also connected in the GH/lower-right map area."]
    ]
  },
  {
    id:"fsh",
    title:"Anterior Pituitary Puzzle 5",
    code:"HP-7",
    summary:"Gonadal support-feedback line.",
    path:"GnRH -> Gonadotroph -> FSH -> Ovary/Testis -> Inhibin",
    output:"Follicle and Sertoli-line feedback",
    entries:[
      ["GnRH","Hypothalamic peptide that stimulates gonadotrophs."],
      ["Gonadotroph","Pituitary cell that releases LH and FSH."],
      ["FSH","Glycoprotein hormone on follicle/Sertoli line."],
      ["Ovary","Female target organ on this line."],
      ["Testis","Male target organ on this line."],
      ["Inhibin","Feedback hormone shown from gonadal targets."]
    ]
  },
  {
    id:"lh",
    title:"Anterior Pituitary Puzzle 6",
    code:"HP-8",
    summary:"Gonadal steroid line.",
    path:"GnRH -> Gonadotroph -> LH -> Ovary/Testis -> Steroids",
    output:"Estradiol, progesterone, and testosterone",
    entries:[
      ["GnRH","Hypothalamic peptide that stimulates gonadotrophs."],
      ["Gonadotroph","Pituitary cell that releases LH and FSH."],
      ["LH","Glycoprotein hormone on steroid-producing gonadal line."],
      ["Ovary","Target organ connected to estrogen and progesterone."],
      ["Testis","Target organ connected to testosterone."],
      ["Estradiol","Estrogen label shown near the ovary."],
      ["Progesterone","Steroid label shown near the ovary."],
      ["Testosterone","Steroid label shown near the testis."]
    ]
  },
  {
    id:"raas",
    title:"RAAS Puzzle",
    code:"HP-9",
    summary:"Kidney-liver-lung-adrenal cascade.",
    path:"Low blood pressure -> Renin -> Angiotensinogen -> ACE -> Angiotensin II -> Aldosterone",
    output:"Aldosterone from zona glomerulosa",
    entries:[
      ["Low Blood Pressure","Red trigger box that starts the RAAS line."],
      ["Renin","Kidney release that begins the cascade."],
      ["Angiotensinogen","Liver protein converted in the RAAS line."],
      ["Angiotensin I","Intermediate before ACE conversion."],
      ["ACE","Lung/vascular endothelial enzyme in the map."],
      ["Angiotensin II","Product that stimulates adrenal cortex."],
      ["Adrenal","Gland receiving the RAAS signal."],
      ["Zona Glomerulosa","Adrenal cortex zone that produces aldosterone."],
      ["Aldosterone","Steroid output at the end of the RAAS line."]
    ]
  }
].map(puzzle => ({
  ...puzzle,
  entries:puzzle.entries.map((entry, index) => ({
    id:`${puzzle.id}-${index}`,
    term:entry[0],
    clue:entry[1],
    answer:normalize(entry[0])
  }))
}));

let scene = new URLSearchParams(window.location.search).get("preview") === "puzzle" ? "puzzle" : "welcome";
let activePuzzleId = scene === "puzzle" ? puzzles[0].id : "";
let activeEntryIndex = 0;
let feedback = "Choose a hormone crossword.";
let feedbackType = "";

function normalize(value){
  return String(value).replace(/[^a-zA-Z0-9]/g,"").toUpperCase();
}

function esc(value){
  return String(value).replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
}

function currentPuzzle(){
  return puzzles.find(puzzle => puzzle.id === activePuzzleId) || puzzles[0];
}

function enterHall(){
  scene = "hall";
  feedback = "Choose one crossword line from the hormone map.";
  feedbackType = "";
  render();
}

function openPuzzle(id){
  activePuzzleId = id;
  scene = "puzzle";
  activeEntryIndex = 0;
  feedback = "Everything is visible. Tap any numbered term to highlight it on the crossword.";
  feedbackType = "";
  render();
}

function backToHall(){
  scene = "hall";
  feedbackType = "";
  render();
}

function clearPuzzle(){
  if(!activePuzzleId)return;
  activeEntryIndex = 0;
  feedback = "Highlight reset to step 1.";
  feedbackType = "";
  render();
}

function selectEntry(index){
  const puzzle = currentPuzzle();
  activeEntryIndex = Math.max(0, Math.min(index, puzzle.entries.length - 1));
  const entry = puzzle.entries[activeEntryIndex];
  feedback = `Step ${activeEntryIndex + 1} highlighted: ${entry.term}.`;
  feedbackType = "";
  render();
}

function makeCrossword(entries){
  const placements = [];
  const grid = new Map();
  const key = (r,c) => `${r},${c}`;
  const canPlace = (word,row,col,dir) => {
    for(let i = 0; i < word.length; i++){
      const r = row + (dir === "down" ? i : 0);
      const c = col + (dir === "across" ? i : 0);
      const existing = grid.get(key(r,c));
      if(existing && existing !== word[i])return false;
    }
    return true;
  };
  const scorePlacement = (word,row,col,dir) => {
    let score = 0;
    for(let i = 0; i < word.length; i++){
      const r = row + (dir === "down" ? i : 0);
      const c = col + (dir === "across" ? i : 0);
      if(grid.get(key(r,c)) === word[i])score++;
    }
    return score;
  };
  const place = (entry,row,col,dir) => {
    const word = entry.answer;
    const cells = [];
    for(let i = 0; i < word.length; i++){
      const r = row + (dir === "down" ? i : 0);
      const c = col + (dir === "across" ? i : 0);
      grid.set(key(r,c), word[i]);
      cells.push({r,c});
    }
    placements.push({entry,row,col,dir,cells});
  };
  place(entries[0], 0, 0, "across");
  for(let entryIndex = 1; entryIndex < entries.length; entryIndex++){
    const entry = entries[entryIndex];
    const word = entry.answer;
    let best = null;
    for(const placement of placements){
      placement.cells.forEach((cell, cellIndex) => {
        const gridLetter = grid.get(key(cell.r, cell.c));
        [...word].forEach((letter, letterIndex) => {
          if(letter !== gridLetter)return;
          ["across","down"].forEach(dir => {
            const row = cell.r - (dir === "down" ? letterIndex : 0);
            const col = cell.c - (dir === "across" ? letterIndex : 0);
            if(!canPlace(word,row,col,dir))return;
            const score = scorePlacement(word,row,col,dir);
            if(!best || score > best.score)best = {row,col,dir,score};
          });
        });
      });
    }
    if(!best){
      const maxRow = Math.max(...placements.flatMap(item => item.cells.map(cell => cell.r)));
      best = {row:maxRow + 2,col:0,dir:"across",score:0};
    }
    place(entry,best.row,best.col,best.dir);
  }
  const minR = Math.min(...placements.flatMap(item => item.cells.map(cell => cell.r)));
  const minC = Math.min(...placements.flatMap(item => item.cells.map(cell => cell.c)));
  placements.forEach(placement => {
    placement.row -= minR;
    placement.col -= minC;
    placement.cells.forEach(cell => {
      cell.r -= minR;
      cell.c -= minC;
    });
  });
  const maxR = Math.max(...placements.flatMap(item => item.cells.map(cell => cell.r)));
  const maxC = Math.max(...placements.flatMap(item => item.cells.map(cell => cell.c)));
  const cells = new Map();
  placements.forEach((placement, index) => {
    placement.cells.forEach((cell, letterIndex) => {
      const cellKey = key(cell.r, cell.c);
      const rec = cells.get(cellKey) || {r:cell.r,c:cell.c,letter:placement.entry.answer[letterIndex],entries:[],starts:[]};
      rec.entries.push(index);
      if(letterIndex === 0)rec.starts.push(index + 1);
      cells.set(cellKey, rec);
    });
  });
  return {placements,cells,rows:maxR + 1,cols:maxC + 1};
}

function renderHero(){
  return `<section class="hero">
    <div class="hero-panel">
      <div class="eyebrow">Welcome to the endocrine arcade</div>
      <h1 class="game-font">Hormone Crosswords</h1>
      <p class="hero-copy">Choose one hormone-map line and study its numbered crossword. Every term is visible, so you can build the pathway in any order.</p>
      <button class="game-btn enter-btn" type="button" onclick="enterHall()">Enter the Hormone Puzzle Hall!</button>
    </div>
  </section>`;
}

function renderHall(){
  return `<section class="hall-hero">
    <div class="hero-panel">
      <div class="eyebrow">Choose your hormone puzzle</div>
      <h1 class="game-font">Puzzle Hall</h1>
      <p class="hero-copy">Each card is one line from the hormone diagram. Pick one, read the numbered pathway, and use the crossword as the visual map.</p>
    </div>
  </section>
  <section class="puzzle-grid">
    ${puzzles.map((puzzle, index) => {
      return `<button class="puzzle-card" type="button" onclick="openPuzzle('${esc(puzzle.id)}')">
        <div>
          <span class="puzzle-number">${index + 1}</span>
          <h2 class="game-font">${esc(puzzle.title)}</h2>
          <p>${esc(puzzle.summary)}</p>
        </div>
        <div class="puzzle-status">${puzzle.entries.length} ordered crossword terms</div>
      </button>`;
    }).join("")}
  </section>`;
}

function renderToolbar(){
  return `<div class="toolbar">
    <div class="toolbar-left">
      <button class="game-btn primary-btn" type="button" onclick="backToHall()">Choose Another Puzzle</button>
      <button class="game-btn danger-btn" type="button" onclick="clearPuzzle()">Reset Highlight</button>
    </div>
    <div class="toolbar-right">
      <button class="game-btn print-btn" type="button" onclick="printCurrentPuzzle()">Print This Puzzle</button>
      <button class="game-btn print-btn" type="button" onclick="printGamePack()">Print Puzzle Pack</button>
      <button class="game-btn print-btn" type="button" onclick="printAnswerKey()">Print Answer Key</button>
    </div>
  </div>`;
}

function renderPuzzleInfo(puzzle){
  const current = Math.max(0, Math.min(activeEntryIndex, puzzle.entries.length - 1));
  const entry = puzzle.entries[current];
  return `<section class="panel">
    <div class="eyebrow">Hormone puzzle</div>
    <h1 class="game-font puzzle-title">${esc(puzzle.title)}</h1>
    <span class="map-line">${esc(puzzle.code)} / ${puzzle.entries.length} visible terms</span>
    <div class="pathway-strip">
      ${puzzle.entries.map((entryItem, index) => `<button class="pathway-step ${index === current ? "active" : ""}" type="button" onclick="selectEntry(${index})"><strong>${index + 1}</strong><span>${esc(entryItem.term)}</span></button>`).join("")}
    </div>
    <div class="clue-card">
      <h3>Step ${current + 1}: ${esc(entry.term)}</h3>
      <p>${esc(entry.clue)}</p>
      <div class="ordered-clues">
        ${puzzle.entries.map((entryItem, index) => `<button class="term-step ${index === current ? "active" : ""}" type="button" onclick="selectEntry(${index})">
          <span class="term-step-number">${index + 1}</span>
          <span>
            <span class="term-step-name">${esc(entryItem.term)}</span>
            <span class="term-step-clue">${esc(entryItem.clue)}</span>
          </span>
        </button>`).join("")}
      </div>
    </div>
    <div class="feedback ${feedbackType}">${esc(feedback)}</div>
    <div class="output-card visible">
      <h3>Output</h3>
      <p>${esc(puzzle.output)}</p>
    </div>
  </section>`;
}

function renderCrossword(puzzle){
  const crossword = makeCrossword(puzzle.entries);
  const current = Math.max(0, Math.min(activeEntryIndex, puzzle.entries.length - 1));
  return `<section class="crossword-shell">
    <div class="crossword-head">
      <div>
        <div class="panel-title">Crossword Board</div>
        <h2 class="game-font">${esc(puzzle.code)} Map Terms</h2>
        <p>All terms are visible. Tap any numbered term to highlight its letters.</p>
      </div>
      <span class="map-line">Highlight step ${current + 1}</span>
    </div>
    <div class="crossword-board-wrap">
      <div class="crossword-board" style="grid-template-columns:repeat(${crossword.cols},28px)">
        ${Array.from({length:crossword.rows * crossword.cols}, (_, rawIndex) => {
          const r = Math.floor(rawIndex / crossword.cols);
          const c = rawIndex % crossword.cols;
          const cell = crossword.cells.get(`${r},${c}`);
          if(!cell)return `<div class="cell empty" aria-hidden="true"></div>`;
          const cellActive = current !== -1 && cell.entries.includes(current);
          const number = cell.starts.length ? cell.starts[0] : "";
          return `<div class="cell solved ${cellActive ? "active" : ""}">
            ${number ? `<span class="cell-number">${number}</span>` : ""}
            <span class="cell-letter">${esc(cell.letter)}</span>
          </div>`;
        }).join("")}
      </div>
    </div>
  </section>`;
}

function renderPuzzle(){
  const puzzle = currentPuzzle();
  return `${renderToolbar()}
  <div class="puzzle-layout">
    ${renderPuzzleInfo(puzzle)}
    ${renderCrossword(puzzle)}
  </div>`;
}

function printCard(puzzle){
  return `<article class="print-card">
    <h3>${esc(puzzle.code)}</h3>
    <h2>${esc(puzzle.title)}</h2>
    <p><strong>Output:</strong> ${esc(puzzle.output)}</p>
    <ul>${puzzle.entries.map((entry, index) => `<li><strong>${index + 1}. ${esc(entry.term)}:</strong> ${esc(entry.clue)}</li>`).join("")}</ul>
  </article>`;
}

function renderPrintPack(){
  return `<section class="print-page">
    <h1 class="print-title">Hormone Crosswords - Puzzle Pack</h1>
    <p class="print-note">Each card uses only terms from one hormone-map line. Numbers show pathway order.</p>
    <div class="print-grid">${puzzles.map(printCard).join("")}</div>
  </section>`;
}

function renderPrintKey(){
  return `<section class="print-page">
    <h1 class="print-title">Hormone Crosswords - Answer Key</h1>
    <table class="answer-table">
      <thead><tr><th>Puzzle</th><th>Terms in order</th><th>Output</th></tr></thead>
      <tbody>${puzzles.map(puzzle => `<tr>
        <td>${esc(puzzle.code + " - " + puzzle.title)}</td>
        <td>${esc(puzzle.entries.map(entry => entry.term).join(" -> "))}</td>
        <td>${esc(puzzle.output)}</td>
      </tr>`).join("")}</tbody>
    </table>
  </section>`;
}

function renderPrintCrossword(puzzle){
  const crossword = makeCrossword(puzzle.entries);
  return `<div class="print-crossword" style="grid-template-columns:repeat(${crossword.cols},.22in)">
    ${Array.from({length:crossword.rows * crossword.cols}, (_, rawIndex) => {
      const r = Math.floor(rawIndex / crossword.cols);
      const c = rawIndex % crossword.cols;
      const cell = crossword.cells.get(`${r},${c}`);
      if(!cell)return `<div class="print-cell empty"></div>`;
      const number = cell.starts.length ? cell.starts[0] : "";
      return `<div class="print-cell">${number ? `<span class="print-cell-number">${number}</span>` : ""}${esc(cell.letter)}</div>`;
    }).join("")}
  </div>`;
}

function renderPrintPuzzle(puzzle){
  return `<section class="print-page">
    <h1 class="print-title">${esc(puzzle.code)} - ${esc(puzzle.title)}</h1>
    <p class="print-note">Hormone Crosswords. Numbers show pathway order. Output: ${esc(puzzle.output)}</p>
    ${renderPrintCrossword(puzzle)}
    <table class="print-ordered">
      <thead><tr><th>#</th><th>Term</th><th>Clue</th></tr></thead>
      <tbody>${puzzle.entries.map((entry, index) => `<tr><td>${index + 1}</td><td>${esc(entry.term)}</td><td>${esc(entry.clue)}</td></tr>`).join("")}</tbody>
    </table>
  </section>`;
}

function doPrint(markup){
  document.getElementById("print-area").innerHTML = markup;
  setTimeout(() => window.print(), 80);
}

function printGamePack(){doPrint(renderPrintPack())}
function printAnswerKey(){doPrint(renderPrintKey())}
function printCurrentPuzzle(){doPrint(renderPrintPuzzle(currentPuzzle()))}

function render(){
  const root = document.getElementById("app");
  if(scene === "welcome")root.innerHTML = renderHero();
  else if(scene === "hall")root.innerHTML = renderHall();
  else root.innerHTML = renderPuzzle();
}

window.enterHall = enterHall;
window.openPuzzle = openPuzzle;
window.backToHall = backToHall;
window.clearPuzzle = clearPuzzle;
window.selectEntry = selectEntry;
window.printGamePack = printGamePack;
window.printAnswerKey = printAnswerKey;
window.printCurrentPuzzle = printCurrentPuzzle;

if(scene === "puzzle"){
  feedback = "Everything is visible. Tap any numbered term to highlight it on the crossword.";
}
render();
</script>
</body>
</html>
