<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hormone Game</title>
<script src="interactive_theme.js"></script>
<link rel="stylesheet" href="interactive_learning.css?v=hormone-game-1">
<script src="interactive_music.js?v=hormone-game-2" defer></script>
<style>
:root{
  --chem:#2980b9;
  --chem-dark:#0f4770;
  --chem-deep:#09283f;
  --chem-soft:#e6f5ff;
  --chem-glow:#bde8ff;
  --ink:#122033;
  --muted:#66728d;
  --panel:#ffffff;
  --line:#bad4ea;
  --good:#1f9d64;
  --bad:#d64d5f;
  --gold:#f4bd4f;
  --shadow:0 22px 54px rgba(18,48,84,.16);
}
*{box-sizing:border-box}
body.hormone-game{
  margin:0;
  min-height:100vh;
  font-family:"Trebuchet MS",Arial,Helvetica,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 14% 0%,rgba(41,128,185,.22),transparent 30%),
    linear-gradient(180deg,#f4f9ff 0%,#e6eef8 100%);
}
body.hormone-game .site-header{
  border-bottom-color:var(--chem);
}
body.hormone-game .site-header .logo,
body.hormone-game .mls-home-btn,
body.hormone-game .mls-theme-btn,
body.hormone-game .mls-audio-btn{
  color:var(--chem-dark);
}
body.hormone-game .mls-home-btn,
body.hormone-game .mls-theme-btn,
body.hormone-game .mls-audio-btn{
  border-color:#9fc4df;
  box-shadow:0 6px 0 rgba(41,128,185,.16);
}
.screen-shell{max-width:1240px;margin:0 auto;padding:22px}
.game-font{
  font-family:"Cooper Black","Arial Black","Arial Rounded MT Bold","Trebuchet MS",Arial,sans-serif;
  letter-spacing:.01em;
}
.hero,.panel,.map-card,.slot,.path-card,.study-map{
  background:rgba(255,255,255,.94);
  border:2px solid var(--line);
  border-radius:20px;
  box-shadow:var(--shadow);
}
.hero{
  min-height:620px;
  display:grid;
  place-items:center;
  text-align:center;
  padding:34px 22px;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 22% 20%,rgba(255,255,255,.9),transparent 18%),
    radial-gradient(circle at 78% 18%,rgba(41,128,185,.20),transparent 24%),
    linear-gradient(135deg,#f8fdff 0%,#d7f0ff 48%,#16486b 100%);
}
.hero::before,.hero::after{
  content:"";
  position:absolute;
  width:250px;
  height:250px;
  border:14px solid rgba(9,40,63,.18);
  border-radius:34% 66% 48% 52%;
  transform:rotate(-22deg);
}
.hero::before{left:-88px;top:96px}
.hero::after{right:-72px;bottom:68px}
.hero-panel{position:relative;z-index:1;max-width:860px}
.eyebrow{
  color:var(--chem-dark);
  font-size:13px;
  font-weight:1000;
  letter-spacing:.22em;
  text-transform:uppercase;
}
.hero h1{
  margin:8px 0 10px;
  color:#10243a;
  font-size:clamp(52px,9vw,118px);
  line-height:.86;
  font-weight:1000;
  text-shadow:7px 8px 0 rgba(255,255,255,.72), 11px 12px 0 rgba(41,128,185,.22);
}
.hero-copy{
  margin:12px auto 22px;
  max-width:760px;
  font-size:21px;
  line-height:1.35;
  color:#18334c;
  font-weight:900;
}
.enter-btn,.primary-btn,.ghost-btn,.danger-btn,.print-btn{
  border:0;
  border-radius:999px;
  padding:12px 16px;
  font-family:inherit;
  font-weight:1000;
  cursor:pointer;
}
.enter-btn{
  min-width:min(100%,430px);
  background:var(--chem);
  color:#fff;
  padding:22px 28px;
  font-size:26px;
  box-shadow:0 12px 0 #0d4166, 0 26px 42px rgba(0,0,0,.23);
  transform:rotate(-1deg);
}
.enter-btn:hover{transform:translateY(-2px) rotate(-1deg)}
.toolbar{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  gap:10px;
  margin-bottom:14px;
}
.toolbar-left,.toolbar-right{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.primary-btn{background:var(--chem);color:#fff}
.ghost-btn{background:#fff;color:var(--chem-dark);border:2px solid #9fc4df}
.danger-btn{background:#fff2f4;color:#7b1f31;border:2px solid #efb3bf}
.print-btn{background:#fefefe;color:var(--chem-dark);border:2px solid #9fc4df}
.board-grid{
  display:grid;
  grid-template-columns:minmax(300px,.78fr) minmax(440px,1.22fr);
  gap:16px;
  align-items:start;
}
.panel{padding:16px}
.panel-title{
  color:var(--chem-dark);
  font-size:14px;
  font-weight:1000;
  letter-spacing:.14em;
  text-transform:uppercase;
  margin-bottom:10px;
}
.build-layout{
  display:grid;
  grid-template-columns:minmax(260px,.82fr) minmax(300px,1.18fr);
  gap:14px;
  align-items:start;
}
.map-card{
  min-height:260px;
  background:
    linear-gradient(135deg,rgba(255,255,255,.96),rgba(225,244,255,.96)),
    repeating-linear-gradient(45deg,transparent 0 14px,rgba(41,128,185,.07) 14px 17px);
  padding:18px;
  position:relative;
  overflow:hidden;
}
.map-card.empty{
  display:grid;
  place-items:center;
  text-align:center;
}
.map-card h2{margin:0;color:#10243a;font-size:30px;line-height:1}
.map-goal{
  display:inline-flex;
  margin:10px 0;
  padding:7px 11px;
  border-radius:999px;
  background:#0f4770;
  color:#fff;
  font-weight:1000;
}
.map-meta{
  display:grid;
  gap:7px;
  margin-top:10px;
  font-weight:900;
  color:#284861;
}
.map-meta span{
  display:block;
  border:1px solid #bad4ea;
  border-radius:12px;
  padding:8px 10px;
  background:#fff;
}
.case-chart{
  display:grid;
  gap:8px;
  margin-top:12px;
}
.case-row{
  display:grid;
  grid-template-columns:110px 1fr;
  gap:10px;
  align-items:start;
  border:1px solid #bad4ea;
  border-radius:13px;
  padding:9px 10px;
  background:#fff;
  color:#284861;
  font-weight:900;
}
.case-row strong{
  color:var(--chem-dark);
  font-size:11px;
  letter-spacing:.1em;
  text-transform:uppercase;
}
.case-question{
  margin-top:12px;
  border:2px dashed #9fc4df;
  border-radius:14px;
  padding:10px 12px;
  background:#f8fcff;
  color:#123f62;
  font-weight:1000;
  line-height:1.35;
}
.progress-strip{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:6px;
  margin-top:12px;
}
.progress-dot{
  min-height:34px;
  border-radius:999px;
  border:2px solid #9fc4df;
  display:grid;
  place-items:center;
  font-size:11px;
  font-weight:1000;
  color:var(--chem-dark);
  background:#fff;
}
.progress-dot.solved{
  border-color:var(--good);
  background:#e7fbf1;
  color:#136b43;
}
.ladder-wrap,.choice-panel{
  background:#f8fcff;
  border:2px solid #bad4ea;
  border-radius:18px;
  padding:14px;
}
.ladder-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:7px;
}
.ladder-head .panel-title{margin:0}
.ladder-status{
  display:inline-flex;
  align-items:center;
  border-radius:999px;
  padding:5px 9px;
  background:#e6f5ff;
  color:var(--chem-dark);
  font-size:11px;
  font-weight:1000;
}
.ladder-note,.choice-note{
  margin:0 0 12px;
  color:#40536a;
  font-size:13px;
  line-height:1.35;
  font-weight:900;
}
.slots{
  display:grid;
  grid-template-columns:1fr;
  gap:0;
}
.slot{
  min-height:118px;
  padding:12px;
  display:grid;
  grid-template-columns:44px 1fr;
  align-content:start;
  align-items:start;
  gap:7px;
  border-style:dashed;
  background:#f8fcff;
  cursor:pointer;
  text-align:left;
  width:100%;
  position:relative;
}
.slot.filled{
  border-style:solid;
  background:#fff;
}
.slot.active{
  border-color:var(--chem);
  background:#eef8ff;
  box-shadow:0 0 0 4px rgba(41,128,185,.12);
}
.slot.correct{border-color:var(--good);background:#edfbf4}
.slot.wrong{border-color:var(--bad);background:#fff1f3}
.slot-number{
  width:34px;
  height:34px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:var(--chem);
  color:#fff;
  font-size:15px;
  font-weight:1000;
  box-shadow:0 4px 0 rgba(15,71,112,.22);
}
.slot-kicker{
  color:var(--chem-dark);
  font-size:11px;
  font-weight:1000;
  letter-spacing:.1em;
  text-transform:uppercase;
}
.slot-label{font-size:20px;font-weight:1000;color:#10243a;line-height:1.05}
.slot-copy{font-size:13px;line-height:1.3;color:#40536a;font-weight:800}
.ladder-arrow{
  display:grid;
  place-items:center;
  height:28px;
  color:var(--chem);
  font-size:24px;
  line-height:1;
  font-weight:1000;
}
.choice-head{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:space-between;
  align-items:center;
  margin-bottom:7px;
}
.choice-head .panel-title{margin:0}
.current-step{
  display:inline-flex;
  border-radius:999px;
  padding:6px 10px;
  background:var(--chem);
  color:#fff;
  font-size:12px;
  font-weight:1000;
}
.choice-empty{
  min-height:160px;
  border:2px dashed #9fc4df;
  border-radius:16px;
  display:grid;
  place-items:center;
  text-align:center;
  padding:18px;
  color:#123f62;
  background:#fff;
  font-weight:1000;
  line-height:1.35;
}
.visual-map{
  border:2px solid #9fc4df;
  border-radius:18px;
  background:linear-gradient(180deg,#ffffff 0%,#eef8ff 100%);
  padding:16px;
  margin-bottom:14px;
  overflow:hidden;
}
.map-mission{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  margin-bottom:14px;
}
.map-mission strong{
  color:#10243a;
  font-size:22px;
  line-height:1;
}
.map-mission span{
  color:#40536a;
  font-size:13px;
  font-weight:900;
}
.map-track{
  display:grid;
  grid-template-columns:1fr 42px 1fr 42px 1fr;
  align-items:stretch;
}
.map-node{
  min-height:190px;
  display:grid;
  align-content:center;
  gap:8px;
  text-align:center;
  border:3px dashed #9fc4df;
  border-radius:22px;
  padding:16px 12px;
  background:#f8fcff;
  transition:.2s ease;
}
.visual-map.built .map-node{
  border-style:solid;
  border-color:var(--chem);
  background:#fff;
  box-shadow:0 12px 26px rgba(41,128,185,.14);
}
.node-zone{
  color:var(--chem-dark);
  font-size:12px;
  font-weight:1000;
  letter-spacing:.14em;
  text-transform:uppercase;
}
.node-name{
  color:#10243a;
  font-family:"Cooper Black","Arial Black","Arial Rounded MT Bold","Trebuchet MS",Arial,sans-serif;
  font-size:clamp(26px,4vw,42px);
  line-height:.95;
}
.node-detail{
  color:#40536a;
  font-size:13px;
  font-weight:900;
  line-height:1.25;
}
.map-arrow{
  display:grid;
  place-items:center;
  color:var(--chem);
  font-size:34px;
  font-weight:1000;
}
.route-token-grid{
  display:grid;
  grid-template-columns:repeat(6,minmax(0,1fr));
  gap:9px;
}
.route-token{
  min-height:92px;
  border:2px solid #9fc4df;
  border-radius:17px;
  background:#fff;
  color:#10243a;
  padding:10px;
  display:grid;
  gap:7px;
  align-content:center;
  justify-items:center;
  font-family:inherit;
  font-weight:1000;
  cursor:pointer;
  box-shadow:0 6px 0 rgba(41,128,185,.12);
}
.route-token:hover,
.route-token.active{
  border-color:var(--chem);
  transform:translateY(-1px);
}
.route-token.active{
  background:#e6f5ff;
}
.route-token.solved{
  border-color:var(--good);
  background:#edfbf4;
}
.route-token-path{
  display:grid;
  grid-template-columns:repeat(3,18px);
  gap:8px;
  align-items:center;
}
.route-token-path span{
  width:18px;
  height:18px;
  border-radius:50%;
  background:var(--chem);
  box-shadow:0 0 0 4px rgba(41,128,185,.13);
}
.route-token-name{
  font-size:14px;
  line-height:1;
}
.visual-helper{
  margin:10px 0 0;
  color:#40536a;
  font-size:13px;
  font-weight:900;
  line-height:1.35;
}
.card-bank{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:9px;
}
.path-card{
  min-height:124px;
  padding:12px;
  text-align:left;
  cursor:pointer;
  transition:.15s ease;
}
.path-card:hover{transform:translateY(-2px);border-color:var(--chem)}
.path-card.used{opacity:.42}
.path-card.selected{border-color:var(--gold);box-shadow:0 0 0 3px rgba(244,189,79,.23)}
.card-type{
  display:inline-flex;
  margin-bottom:8px;
  border-radius:999px;
  padding:4px 8px;
  background:#e6f5ff;
  color:var(--chem-dark);
  font-size:10px;
  font-weight:1000;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.path-card h3{margin:0;color:#10243a;font-size:18px;line-height:1.02}
.path-card p{margin:7px 0 0;color:#526178;font-size:12px;line-height:1.28;font-weight:800}
.feedback{
  margin-top:12px;
  min-height:48px;
  border-radius:14px;
  padding:12px 14px;
  background:rgba(255,255,255,.78);
  border:2px solid #bad4ea;
  color:#40536a;
  font-weight:900;
  line-height:1.35;
}
.feedback.good{border-color:rgba(31,157,100,.55);background:#edfbf4;color:#176540}
.feedback.bad{border-color:rgba(214,77,95,.55);background:#fff1f3;color:#8b2738}
.study-map{
  margin-top:14px;
  padding:14px;
  display:none;
}
.study-map.visible{display:block}
.study-map h3{margin:0 0 8px;color:var(--chem-dark);font-size:17px}
.study-map-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
}
.study-map-grid div{
  border:1px solid #bad4ea;
  border-radius:12px;
  padding:9px;
  background:#fff;
  font-weight:900;
  font-size:13px;
  line-height:1.3;
}
.print-only{display:none}
@page hormoneCards{size:letter;margin:.28in}
@media print{
  body{background:#fff!important;color:#000!important}
  .site-header,.screen-shell{display:none!important}
  .print-only{display:block!important;font-family:Arial,Helvetica,sans-serif;color:#000!important}
  .print-page{break-after:page}
  .print-title{font-size:19pt;margin:0 0 .1in;font-weight:900;color:#000!important}
  .print-note{font-size:10pt;margin:0 0 .16in;color:#000!important}
  .print-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.14in}
  .print-card{
    border:2px solid #000;
    border-radius:.12in;
    padding:.12in;
    min-height:2.05in;
    break-inside:avoid;
    color:#000!important;
    background:#fff!important;
  }
  .print-card h2{font-size:15pt;margin:0 0 .06in;color:#000!important}
  .print-card h3{font-size:10pt;margin:.03in 0;color:#000!important;text-transform:uppercase;letter-spacing:.08em}
  .print-card p,.print-card li{font-size:9.5pt;line-height:1.22;color:#000!important}
  .print-card ul{margin:.05in 0 0;padding-left:.2in}
  .answer-table{width:100%;border-collapse:collapse;font-size:9pt}
  .answer-table th,.answer-table td{border:1px solid #000;padding:.06in;text-align:left;vertical-align:top;color:#000!important}
  .answer-table th{font-weight:900}
}
html[data-mls-theme="dark"] body.hormone-game{
  background:
    radial-gradient(circle at 14% 0%,rgba(41,128,185,.18),transparent 30%),
    linear-gradient(180deg,#07101d 0%,#111827 100%) !important;
  color:#f4f9ff;
}
html[data-mls-theme="dark"] body.hormone-game .panel,
html[data-mls-theme="dark"] body.hormone-game .map-card,
html[data-mls-theme="dark"] body.hormone-game .ladder-wrap,
html[data-mls-theme="dark"] body.hormone-game .choice-panel,
html[data-mls-theme="dark"] body.hormone-game .visual-map,
html[data-mls-theme="dark"] body.hormone-game .study-map{
  background:#101a2b !important;
  border-color:#406996 !important;
  color:#f4f9ff !important;
}
html[data-mls-theme="dark"] body.hormone-game .panel-title,
html[data-mls-theme="dark"] body.hormone-game .eyebrow,
html[data-mls-theme="dark"] body.hormone-game .case-row strong,
html[data-mls-theme="dark"] body.hormone-game .slot-kicker,
html[data-mls-theme="dark"] body.hormone-game .node-zone,
html[data-mls-theme="dark"] body.hormone-game .study-map h3{
  color:#bde8ff !important;
}
html[data-mls-theme="dark"] body.hormone-game .map-card h2,
html[data-mls-theme="dark"] body.hormone-game .slot-label,
html[data-mls-theme="dark"] body.hormone-game .map-mission strong,
html[data-mls-theme="dark"] body.hormone-game .node-name,
html[data-mls-theme="dark"] body.hormone-game .route-token,
html[data-mls-theme="dark"] body.hormone-game .path-card h3{
  color:#ffffff !important;
}
html[data-mls-theme="dark"] body.hormone-game .case-row,
html[data-mls-theme="dark"] body.hormone-game .case-question,
html[data-mls-theme="dark"] body.hormone-game .slot,
html[data-mls-theme="dark"] body.hormone-game .path-card,
html[data-mls-theme="dark"] body.hormone-game .map-node,
html[data-mls-theme="dark"] body.hormone-game .route-token,
html[data-mls-theme="dark"] body.hormone-game .choice-empty,
html[data-mls-theme="dark"] body.hormone-game .study-map-grid div{
  background:#17243a !important;
  border-color:#5d82ab !important;
  color:#e8f5ff !important;
}
html[data-mls-theme="dark"] body.hormone-game .slot.active{
  background:#123a5b !important;
  border-color:#87d8ff !important;
}
html[data-mls-theme="dark"] body.hormone-game .slot-copy,
html[data-mls-theme="dark"] body.hormone-game .path-card p,
html[data-mls-theme="dark"] body.hormone-game .map-mission span,
html[data-mls-theme="dark"] body.hormone-game .node-detail,
html[data-mls-theme="dark"] body.hormone-game .visual-helper,
html[data-mls-theme="dark"] body.hormone-game .choice-note,
html[data-mls-theme="dark"] body.hormone-game .ladder-note{
  color:#d8eaff !important;
}
html[data-mls-theme="dark"] body.hormone-game .card-type,
html[data-mls-theme="dark"] body.hormone-game .ladder-status{
  background:#244d72 !important;
  color:#dff4ff !important;
}
html[data-mls-theme="dark"] body.hormone-game .feedback{
  background:#17243a !important;
  border-color:#5d82ab !important;
  color:#e8f5ff !important;
}
@media(max-width:960px){
  .board-grid{grid-template-columns:1fr}
  .build-layout{grid-template-columns:1fr}
  .card-bank{grid-template-columns:repeat(2,minmax(0,1fr))}
  .map-track{grid-template-columns:1fr;gap:8px}
  .map-arrow{font-size:28px;transform:rotate(90deg)}
  .map-node{min-height:132px}
  .route-token-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
}
@media(max-width:620px){
  .screen-shell{padding:14px}
  .hero{min-height:540px}
  .hero-copy{font-size:17px}
  .enter-btn{font-size:20px;padding:18px 20px}
  .card-bank{grid-template-columns:1fr}
  .toolbar{display:grid}
  .toolbar-left,.toolbar-right{display:grid;grid-template-columns:1fr 1fr}
  .case-row{grid-template-columns:1fr;gap:3px}
  .slot{grid-template-columns:38px 1fr}
  .slot-label{font-size:18px}
  .route-token-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .map-mission strong{font-size:19px}
}
</style>
</head>
<body class="mls-interactive hormone-game">
<header class="site-header">
  <div>
    <div class="logo">MLS<span style="color:var(--mls-text3)">/</span>BOC<span style="color:var(--mls-text3);font-size:12px;margin-left:8px">PREP</span></div>
    <div class="logo-sub">Interactive Learning</div>
  </div>
  <a class="mls-home-btn" href="index.html#interactive">Back to tools</a>
</header>

<main class="screen-shell" id="app"></main>
<section class="print-only" id="print-area"></section>

<script>
const routes = [
  {
    id:"adrenal",
    title:"Adrenal Stress Route",
    caseCode:"HG-1",
    caseTitle:"Hormone Case HG-1",
    badge:"Stress",
    caseRows:[
      ["Patient","Placeholder case note."],
      ["Chart","Placeholder chart clue."],
      ["Mission","Build the matching hormone map."]
    ],
    goal:"Cortisol",
    axis:"CRH -> ACTH -> Cortisol",
    start:"start-adrenal",
    middle:"mid-adrenal",
    final:"final-adrenal",
    action:"Cell homeostasis and function",
    details:["CRH stimulates pituitary corticotrophs.","ACTH stimulates the adrenal gland.","Cortisol suppresses CRH and ACTH feedback."]
  },
  {
    id:"thyroid",
    title:"Thyroid Heat Route",
    caseCode:"HG-2",
    caseTitle:"Hormone Case HG-2",
    badge:"Thyroid",
    caseRows:[
      ["Patient","Placeholder case note."],
      ["Chart","Placeholder chart clue."],
      ["Mission","Build the matching hormone map."]
    ],
    goal:"T3 and T4",
    axis:"TRH / Somatostatin -> TSH -> T3, T4",
    start:"start-thyroid",
    middle:"mid-thyroid",
    final:"final-thyroid",
    action:"Thermogenesis and protein synthesis",
    details:["TRH stimulates thyrotrophs.","Somatostatin suppresses thyrotroph signaling.","T3 and T4 suppress TRH and TSH feedback."]
  },
  {
    id:"ovary",
    title:"Ovary Cycle Route",
    caseCode:"HG-3",
    caseTitle:"Hormone Case HG-3",
    badge:"Ovary",
    caseRows:[
      ["Patient","Placeholder case note."],
      ["Chart","Placeholder chart clue."],
      ["Mission","Build the matching hormone map."]
    ],
    goal:"Estradiol, progesterone, inhibin, follistatin",
    axis:"GnRH -> LH/FSH -> ovarian hormones",
    start:"start-gonadal",
    middle:"mid-gonadal",
    final:"final-ovary",
    action:"Ovulation",
    details:["GnRH stimulates gonadotrophs.","LH and FSH stimulate the ovary.","Ovarian hormones feed back to the hypothalamus and pituitary."]
  },
  {
    id:"testis",
    title:"Testis Signal Route",
    caseCode:"HG-4",
    caseTitle:"Hormone Case HG-4",
    badge:"Testis",
    caseRows:[
      ["Patient","Placeholder case note."],
      ["Chart","Placeholder chart clue."],
      ["Mission","Build the matching hormone map."]
    ],
    goal:"Testosterone and inhibin",
    axis:"GnRH -> LH/FSH -> testicular hormones",
    start:"start-gonadal",
    middle:"mid-gonadal",
    final:"final-testis",
    action:"Spermatogenesis",
    details:["GnRH stimulates gonadotrophs.","LH and FSH stimulate the testis.","Testosterone and inhibin feed back to the hypothalamus and pituitary."]
  },
  {
    id:"growth",
    title:"Growth Route",
    caseCode:"HG-5",
    caseTitle:"Hormone Case HG-5",
    badge:"Growth",
    caseRows:[
      ["Patient","Placeholder case note."],
      ["Chart","Placeholder chart clue."],
      ["Mission","Build the matching hormone map."]
    ],
    goal:"IGF-1",
    axis:"GHRH / Somatostatin -> GH -> IGF-1",
    start:"start-growth",
    middle:"mid-growth",
    final:"final-growth",
    action:"Growth, anabolic metabolism, linear and organ growth",
    details:["GHRH stimulates somatotrophs.","Somatostatin suppresses somatotroph signaling.","GH stimulates liver IGF-1 and supports bone growth through osteoblasts and chondrocytes."]
  },
  {
    id:"prolactin",
    title:"Lactation Route",
    caseCode:"HG-6",
    caseTitle:"Hormone Case HG-6",
    badge:"Lactation",
    caseRows:[
      ["Patient","Placeholder case note."],
      ["Chart","Placeholder chart clue."],
      ["Mission","Build the matching hormone map."]
    ],
    goal:"PRL",
    axis:"Dopamine suppression -> PRL -> lactation",
    start:"start-prl",
    middle:"mid-prl",
    final:"final-prl",
    action:"Lactation",
    details:["Dopamine suppresses lactotrophs.","Less dopamine allows PRL activity.","PRL targets the breast for lactation."]
  }
];

const cards = [
  {id:"start-adrenal",type:"start",name:"CRH",short:"CRH",copy:"Hypothalamus starter. Stimulates corticotrophs."},
  {id:"mid-adrenal",type:"middle",name:"Corticotroph + ACTH",short:"ACTH",copy:"Pituitary bridge. ACTH stimulates adrenal gland."},
  {id:"final-adrenal",type:"final",name:"Adrenal gland + Cortisol",short:"Cortisol",copy:"Final hormone: cortisol. Action: cell homeostasis and function."},
  {id:"start-thyroid",type:"start",name:"TRH + Somatostatin",short:"TRH / SST",copy:"Hypothalamus controls. TRH stimulates; somatostatin suppresses."},
  {id:"mid-thyroid",type:"middle",name:"Thyrotroph + TSH",short:"TSH",copy:"Pituitary bridge. TSH stimulates thyroid gland."},
  {id:"final-thyroid",type:"final",name:"Thyroid gland + T3/T4",short:"T3 / T4",copy:"Final hormones: T3 and T4. Actions: thermogenesis and protein synthesis."},
  {id:"start-gonadal",type:"start",name:"GnRH",short:"GnRH",copy:"Hypothalamus starter. Stimulates gonadotrophs."},
  {id:"mid-gonadal",type:"middle",name:"Gonadotroph + LH/FSH",short:"LH / FSH",copy:"Pituitary bridge. LH and FSH stimulate ovary and testis."},
  {id:"final-ovary",type:"final",name:"Ovary hormones",short:"Ovary",copy:"Estradiol, progesterone, inhibin, follistatin. Action: ovulation."},
  {id:"final-testis",type:"final",name:"Testis hormones",short:"Testis",copy:"Testosterone and inhibin. Action: spermatogenesis."},
  {id:"start-growth",type:"start",name:"GHRH + Somatostatin",short:"GHRH / SST",copy:"Hypothalamus controls. GHRH stimulates; somatostatin suppresses."},
  {id:"mid-growth",type:"middle",name:"Somatotroph + GH",short:"GH",copy:"Pituitary bridge. GH stimulates liver and bone growth cells."},
  {id:"final-growth",type:"final",name:"Liver + IGF-1",short:"IGF-1",copy:"Final hormone: IGF-1. Actions: growth and anabolic metabolism."},
  {id:"start-prl",type:"start",name:"Dopamine",short:"Dopamine",copy:"Hypothalamus suppressor. Dopamine suppresses lactotrophs."},
  {id:"mid-prl",type:"middle",name:"Lactotroph + PRL",short:"PRL",copy:"Pituitary bridge. PRL travels to the breast."},
  {id:"final-prl",type:"final",name:"Breast + Lactation",short:"Lactation",copy:"Target/action card for lactation."}
];

const ladderSteps = [
  {type:"start",label:"Start Signal",slot:"Hypothalamus / Controller",hint:"Choose the hypothalamus signal card for rung 1."},
  {type:"middle",label:"Pituitary Bridge",slot:"Pituitary / Trophic Hormone",hint:"Choose the pituitary bridge card for rung 2."},
  {type:"final",label:"Target / Final",slot:"Target Organ / Final Hormone",hint:"Choose the target or final hormone/action card for rung 3."}
];
const typeLabels = {start:"1 Hypothalamus",middle:"2 Pituitary",final:"3 Target"};
let scene = "welcome";
let currentRoute = null;
let builtRoute = null;
let slots = [null,null,null];
let selectedId = "";
let solved = new Set();
let feedback = "Pick a hormone case to begin.";
let feedbackType = "";
let order = shuffle(cards.map(card => card.id));

function esc(text){
  return String(text).replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
}

function shuffle(list){
  const copy = [...list];
  for(let i = copy.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function cardById(id){
  return cards.find(card => card.id === id);
}

function routeExpected(route){
  return [route.start, route.middle, route.final];
}

function activeSlotIndex(){
  if(!currentRoute)return -1;
  return slots.findIndex(value => !value);
}

function stepPrompt(index){
  if(index < 0)return "Ladder is full.";
  const step = ladderSteps[index];
  return "Choose rung " + (index + 1) + ": " + step.label + ".";
}

function enterGame(){
  scene = "board";
  feedback = "Pick a hormone case. Then tap one route token to build the map.";
  feedbackType = "";
  render();
}

function drawMap(){
  const available = routes.filter(route => !solved.has(route.id));
  const pool = available.length ? available : routes;
  currentRoute = pool[Math.floor(Math.random() * pool.length)];
  builtRoute = null;
  slots = [null,null,null];
  selectedId = "";
  feedback = "Case opened. Tap a route token and the map will build itself.";
  feedbackType = "";
  order = shuffle(cards.map(card => card.id));
  render();
}

function chooseRoute(routeId){
  if(!currentRoute){
    feedback = "Pick a hormone case first.";
    feedbackType = "bad";
    render();
    return;
  }
  builtRoute = routes.find(route => route.id === routeId);
  if(!builtRoute)return;
  if(builtRoute.id === currentRoute.id){
    solved.add(currentRoute.id);
    feedback = "CASE SOLVED. This map matches the case.";
    feedbackType = "good";
  }else{
    feedback = "Map built. Compare the shape with the case clue, or tap another route token.";
    feedbackType = "";
  }
  render();
}

function placeCard(id){
  if(!currentRoute){
    feedback = "Pick a hormone case first.";
    feedbackType = "bad";
    render();
    return;
  }
  const existing = slots.indexOf(id);
  if(existing !== -1){
    slots[existing] = null;
    selectedId = "";
    feedback = "Card returned to the deck.";
    feedbackType = "";
    render();
    return;
  }
  const openIndex = slots.findIndex(value => !value);
  if(openIndex === -1){
    selectedId = id;
    feedback = "All 3 rungs are full. Tap Check Pathway, or tap a rung to clear and replace it.";
    feedbackType = "bad";
    render();
    return;
  }
  const card = cardById(id);
  const step = ladderSteps[openIndex];
  if(card.type !== step.type){
    feedback = "That card belongs to a different rung. " + stepPrompt(openIndex);
    feedbackType = "bad";
    render();
    return;
  }
  slots[openIndex] = id;
  selectedId = id;
  const nextIndex = activeSlotIndex();
  feedback = nextIndex === -1 ? "Ladder filled. Tap Check Pathway." : "Rung " + (openIndex + 1) + " placed. " + stepPrompt(nextIndex);
  feedbackType = "";
  render();
}

function clearSlot(index){
  if(!currentRoute){
    feedback = "Pick a hormone case first.";
    feedbackType = "bad";
    render();
    return;
  }
  slots[index] = null;
  selectedId = "";
  feedback = "Rung " + (index + 1) + " cleared. " + stepPrompt(activeSlotIndex());
  feedbackType = "";
  render();
}

function resetRound(){
  builtRoute = null;
  slots = [null,null,null];
  selectedId = "";
  feedback = currentRoute ? "Board cleared. Tap a route token to rebuild the map." : "Pick a hormone case to begin.";
  feedbackType = "";
  render();
}

function checkPath(){
  if(!currentRoute){
    feedback = "Pick a hormone case first.";
    feedbackType = "bad";
    render();
    return;
  }
  if(slots.some(value => !value)){
    feedback = "You need all 3 cards before checking.";
    feedbackType = "bad";
    render();
    return;
  }
  const expected = routeExpected(currentRoute);
  const correct = expected.every((id, index) => slots[index] === id);
  if(correct){
    solved.add(currentRoute.id);
    feedback = "PATHWAY SOLVED. You reached " + currentRoute.goal + ".";
    feedbackType = "good";
  }else{
    const firstMiss = slots.findIndex((id, index) => id !== expected[index]);
    feedback = "Ladder jam at slot " + (firstMiss + 1) + ". Check the order: hypothalamus, pituitary, target/final.";
    feedbackType = "bad";
  }
  render();
}

function showAnswer(){
  if(!currentRoute){
    drawMap();
    return;
  }
  builtRoute = currentRoute;
  solved.add(currentRoute.id);
  slots = routeExpected(currentRoute);
  feedback = "Case map revealed. Study the pathway shape, then pick another case.";
  feedbackType = "good";
  render();
}

function slotStatus(index){
  if(!currentRoute || !slots[index])return "";
  if(feedbackType !== "good" && feedbackType !== "bad")return "";
  const expected = routeExpected(currentRoute);
  return slots[index] === expected[index] ? "correct" : "wrong";
}

function renderHero(){
  return `<section class="hero">
    <div class="hero-panel">
      <div class="eyebrow">Welcome to the endocrine arcade</div>
      <h1 class="game-font">Hormone Game</h1>
      <p class="hero-copy">Open a hormone case, tap a route token, and watch the hormone map build itself.</p>
      <button class="enter-btn" type="button" onclick="enterGame()">Enter the Hormone Arcade!</button>
    </div>
  </section>`;
}

function renderToolbar(){
  return `<div class="toolbar">
    <div class="toolbar-left">
      <button class="primary-btn" type="button" onclick="drawMap()">Pick a Hormone Case</button>
      <button class="ghost-btn" type="button" onclick="showAnswer()">Build Case Map</button>
      <button class="danger-btn" type="button" onclick="resetRound()">Clear Map</button>
    </div>
    <div class="toolbar-right">
      <button class="print-btn" type="button" onclick="printGamePack()">Print Game Pack</button>
      <button class="print-btn" type="button" onclick="printMapCards()">Print Case Cards</button>
      <button class="print-btn" type="button" onclick="printAnswerKey()">Print Answer Key</button>
    </div>
  </div>`;
}

function renderMapCard(){
  if(!currentRoute){
    return `<section class="map-card empty">
      <div>
        <div class="eyebrow">Hormone case deck</div>
        <h2 class="game-font">Pick a case</h2>
        <p class="hero-copy" style="font-size:17px;margin-bottom:18px">Open a tiny case clue, then build its hormone map.</p>
        <button class="primary-btn" type="button" onclick="drawMap()">Open Random Case</button>
      </div>
    </section>`;
  }
  return `<section class="map-card">
    <div class="eyebrow">Hormone case</div>
    <h2 class="game-font">${esc(currentRoute.caseTitle)}</h2>
    <span class="map-goal">Answer hidden</span>
    <div class="case-chart">
      ${currentRoute.caseRows.map(row => `<div class="case-row"><strong>${esc(row[0])}</strong><span>${esc(row[1])}</span></div>`).join("")}
    </div>
    <div class="case-question">Tap a route token. Watch the hormone map fill in.</div>
  </section>`;
}

function renderProgress(){
  return `<div class="progress-strip">
    ${routes.map(route => `<div class="progress-dot ${solved.has(route.id) ? "solved" : ""}">${esc(route.caseCode)}</div>`).join("")}
  </div>`;
}

function renderSlots(){
  const activeIndex = activeSlotIndex();
  return `<section class="ladder-wrap">
    <div class="ladder-head">
      <div class="panel-title">Hormone Ladder</div>
      <span class="ladder-status">${activeIndex === -1 && currentRoute ? "Ready to check" : currentRoute ? "Rung " + (activeIndex + 1) : "Open a case"}</span>
    </div>
    <p class="ladder-note">Build top to bottom. Tap a filled rung if you want to change it.</p>
    <div class="slots">
    ${slots.map((id, index) => {
      const card = id ? cardById(id) : null;
      const step = ladderSteps[index];
      const active = currentRoute && activeIndex === index && !id;
      return `<button class="slot ${id ? "filled" : ""} ${active ? "active" : ""} ${slotStatus(index)}" type="button" onclick="clearSlot(${index})">
        <div class="slot-number">${index + 1}</div>
        <div>
          <div class="slot-kicker">${esc(step.label)}</div>
          <div class="slot-label">${card ? esc(card.name) : esc(step.slot)}</div>
          <div class="slot-copy">${card ? esc(card.copy) : esc(step.hint)}</div>
        </div>
      </button>${index < slots.length - 1 ? `<div class="ladder-arrow">↓</div>` : ""}`;
    }).join("")}
    </div>
  </section>`;
}

function renderCardBank(){
  if(!currentRoute){
    return `<section class="choice-panel">
      <div class="choice-head">
        <div class="panel-title">Choice Cards</div>
        <span class="current-step">No case yet</span>
      </div>
      <div class="choice-empty">Open a hormone case first. Then this area will only show the cards for the rung you are building.</div>
    </section>`;
  }
  const activeIndex = activeSlotIndex();
  if(activeIndex === -1){
    return `<section class="choice-panel">
      <div class="choice-head">
        <div class="panel-title">Choice Cards</div>
        <span class="current-step">Ladder full</span>
      </div>
      <div class="choice-empty">The ladder has 3 cards. Tap Check Pathway, or tap a rung on the ladder to clear and replace it.</div>
    </section>`;
  }
  const step = ladderSteps[activeIndex];
  const visibleIds = order.filter(id => cardById(id).type === step.type);
  return `<section class="choice-panel">
    <div class="choice-head">
      <div class="panel-title">Choose Rung ${activeIndex + 1}</div>
      <span class="current-step">${esc(step.label)}</span>
    </div>
    <p class="choice-note">${esc(step.hint)} Only this rung's cards are shown right now.</p>
    <div class="card-bank">
    ${visibleIds.map(id => {
      const card = cardById(id);
      const used = slots.includes(id);
      const selected = selectedId === id;
      return `<button class="path-card ${used ? "used" : ""} ${selected ? "selected" : ""}" type="button" onclick="placeCard('${esc(id)}')">
        <span class="card-type">${esc(typeLabels[card.type])}</span>
        <h3>${esc(card.name)}</h3>
        <p>${esc(card.copy)}</p>
      </button>`;
    }).join("")}
    </div>
  </section>`;
}

function routeStep(route, index){
  if(!route)return null;
  const card = cardById(routeExpected(route)[index]);
  return card || null;
}

function renderVisualMap(){
  const route = builtRoute;
  const zones = ["Hypothalamus","Pituitary","Target"];
  const emptyNames = ["Start","Bridge","Finish"];
  const emptyDetails = ["Brain signal","Trophic hormone","Organ / final effect"];
  return `<section class="visual-map ${route ? "built" : ""}">
    <div class="map-mission">
      <strong>${route ? esc(route.badge + " Map") : "Build the Map"}</strong>
      <span>${route ? "Tap another route token to redraw instantly." : "Tap one route token below. The board fills itself."}</span>
    </div>
    <div class="map-track">
      ${[0,1,2].map(index => {
        const card = routeStep(route, index);
        return `<div class="map-node">
          <div class="node-zone">${esc(zones[index])}</div>
          <div class="node-name">${card ? esc(card.short) : esc(emptyNames[index])}</div>
          <div class="node-detail">${card ? esc(card.name) : esc(emptyDetails[index])}</div>
        </div>${index < 2 ? `<div class="map-arrow">→</div>` : ""}`;
      }).join("")}
    </div>
    <p class="visual-helper">${route ? esc(route.title + " · " + route.action) : "No sorting. No tiny deck. Just pick a map shape and see the pathway."}</p>
  </section>`;
}

function renderRouteTokens(){
  return `<section>
    <div class="panel-title">Route Tokens</div>
    <div class="route-token-grid">
      ${routes.map(route => {
        const active = builtRoute && builtRoute.id === route.id;
        const routeSolved = solved.has(route.id);
        return `<button class="route-token ${active ? "active" : ""} ${routeSolved ? "solved" : ""}" type="button" onclick="chooseRoute('${esc(route.id)}')">
          <span class="route-token-path"><span></span><span></span><span></span></span>
          <span class="route-token-name">${esc(route.badge)}</span>
        </button>`;
      }).join("")}
    </div>
  </section>`;
}

function renderStudyMap(){
  if(!currentRoute)return "";
  return `<section class="study-map ${feedbackType === "good" ? "visible" : ""}">
    <h3>Study ladder: ${esc(currentRoute.title)}</h3>
    <div class="study-map-grid">
      ${currentRoute.details.map(item => `<div>${esc(item)}</div>`).join("")}
    </div>
  </section>`;
}

function renderBoard(){
  return `${renderToolbar()}
  <div class="board-grid">
    <div>
      ${renderMapCard()}
      ${renderProgress()}
      <div class="feedback ${feedbackType}">${esc(feedback)}</div>
      ${renderStudyMap()}
    </div>
    <section class="panel">
      <div class="panel-title">Visual Hormone Map</div>
      ${renderVisualMap()}
      ${renderRouteTokens()}
    </section>
  </div>`;
}

function render(){
  document.getElementById("app").innerHTML = scene === "welcome" ? renderHero() : renderBoard();
}

function printCard(title, label, body){
  return `<article class="print-card">
    <h3>${esc(label)}</h3>
    <h2>${esc(title)}</h2>
    <p>${esc(body)}</p>
  </article>`;
}

function printCaseCard(route){
  return `<article class="print-card">
    <h3>Hormone Case Card</h3>
    <h2>${esc(route.caseTitle)}</h2>
    <ul>
      ${route.caseRows.map(row => `<li><strong>${esc(row[0])}:</strong> ${esc(row[1])}</li>`).join("")}
    </ul>
    <p><strong>Build the hormone ladder:</strong> start signal -> pituitary bridge -> target/final. Answer hidden.</p>
  </article>`;
}

function renderPrintMaps(){
  return `<section class="print-page">
    <h1 class="print-title">Hormone Game - Case Cards</h1>
    <p class="print-note">Pick one case card. Use the patient/chart clue to build the 3-card hormone ladder. These cards do not include answers.</p>
    <div class="print-grid">
      ${routes.map(route => printCaseCard(route)).join("")}
    </div>
  </section>`;
}

function renderPrintPathCards(){
  return `<section class="print-page">
    <h1 class="print-title">Hormone Game - Pathway Cards</h1>
    <p class="print-note">Use these cards to build hypothalamus, pituitary, and target/final routes.</p>
    <div class="print-grid">
      ${cards.map(card => printCard(card.name, typeLabels[card.type], card.copy)).join("")}
    </div>
  </section>`;
}

function renderPrintKey(){
  return `<section class="print-page">
    <h1 class="print-title">Hormone Game - Answer Key</h1>
    <p class="print-note">Low-ink case key from the provided anterior pituitary hormone map.</p>
    <table class="answer-table">
      <thead><tr><th>Case</th><th>Card 1</th><th>Card 2</th><th>Card 3</th><th>Feedback</th></tr></thead>
      <tbody>
        ${routes.map(route => {
          const expected = routeExpected(route).map(cardById);
          return `<tr>
            <td>${esc(route.caseCode + " - " + route.title)}</td>
            <td>${esc(expected[0].name)}</td>
            <td>${esc(expected[1].name)}</td>
            <td>${esc(expected[2].name)}</td>
            <td>${esc(route.details.join(" "))}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </section>`;
}

function doPrint(markup){
  document.getElementById("print-area").innerHTML = markup;
  setTimeout(() => window.print(), 80);
}

function printGamePack(){
  doPrint(renderPrintMaps() + renderPrintPathCards() + renderPrintKey());
}

function printMapCards(){
  doPrint(renderPrintMaps());
}

function printAnswerKey(){
  doPrint(renderPrintKey());
}

window.enterGame = enterGame;
window.drawMap = drawMap;
window.placeCard = placeCard;
window.chooseRoute = chooseRoute;
window.clearSlot = clearSlot;
window.checkPath = checkPath;
window.resetRound = resetRound;
window.showAnswer = showAnswer;
window.printGamePack = printGamePack;
window.printMapCards = printMapCards;
window.printAnswerKey = printAnswerKey;
if(new URLSearchParams(window.location.search).get("preview") === "board"){
  scene = "board";
  currentRoute = routes[0];
  builtRoute = null;
  feedback = "Case opened. Tap a route token and the map will build itself.";
}
render();
</script>
</body>
</html>
