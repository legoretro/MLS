  `;
}

function renderSubjectCaseQuestion(caseId,q,qi,selState,answerKey){
  const checked=selState[qi]?.checked===true;
  const chosen=selState[qi]?.choice;
  const letters=['a','b','c','d'];
  const correctIdx=letters.indexOf(q.correct);
  return `
    <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:16px 18px;box-shadow:0 2px 8px #0002">
      <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;font-family:var(--mono)">Q${qi+1}</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.65">${escNL(q.question)}</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${(q.options||[]).map((opt,oi)=>{
          if(!opt)return '';
          const letter=letters[oi];
          let bg='var(--bg4)';let bd='var(--border)';let color='var(--text)';let weight='400';
          if(chosen===letter&&!checked){bg='var(--bg4)';bd='var(--accent)';color='var(--accent)';weight='500';}
          if(checked){
            if(letter===q.correct){bg='var(--bg4)';bd='var(--success)';color='var(--success)';weight='600';}
            else if(letter===chosen&&chosen!==q.correct){bg='var(--bg4)';bd='var(--danger)';color='var(--danger)';weight='500';}
          }
          return `<button onclick="selectSubjectCaseQ('${caseId}',${qi},'${letter}','${answerKey}')" ${checked?'disabled':''} style="display:flex;align-items:flex-start;gap:10px;background:${bg};border:1px solid ${bd};border-radius:var(--r);padding:9px 13px;cursor:${checked?'default':'pointer'};text-align:left;width:100%;transition:all .12s">
            <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:${color};min-width:20px;margin-top:1px">${letter.toUpperCase()}.</span>
            <span style="font-size:13px;color:${color};font-weight:${weight};line-height:1.5">${opt}</span>
          </button>`;
        }).filter(Boolean).join('')}
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:32px">
        ${!checked&&chosen?`<button class="btn btn-primary btn-sm" onclick="checkSubjectCaseQ('${caseId}',${qi},'${answerKey}')">Check Answer</button>`:''}
        ${chosen?`<button class="btn btn-ghost btn-sm" onclick="resetSubjectCaseQ('${caseId}',${qi},'${answerKey}')">Reset</button>`:''}
      </div>
      ${checked?`
        <div class="case-feedback ${chosen===q.correct?'correct':'wrong'}" style="margin-top:8px;font-size:13px">
          ${chosen===q.correct?'✓ Correct!':`✗ Incorrect — Correct: ${(q.correct||'a').toUpperCase()}. ${(q.options||[])[correctIdx]||''}`}
        </div>
        ${q.explanation?`<div class="explanation" style="margin-top:8px;font-size:13px">${q.explanation}</div>`:''}`:''}
    </div>
  `;
}

function toggleSubjectCaseCollapse(id,key){
  if(!appState[key])appState[key]={};
  appState[key][id]=appState[key][id]===false?true:false;
  renderTab();
}
function scAllChecked(caseId,count,key){
  const s=(appState[key]||{})[caseId]||{};
  for(let i=0;i<count;i++){if(!s[i]?.checked)return false;}
  return count>0;
}
function scAnyAnswered(caseId,key){
  return Object.values((appState[key]||{})[caseId]||{}).some(v=>v?.choice);
}
function selectSubjectCaseQ(caseId,qi,letter,key){
  if(!appState[key])appState[key]={};
  if(!appState[key][caseId])appState[key][caseId]={};
  if(appState[key][caseId][qi]?.checked)return;
  appState[key][caseId][qi]={choice:letter,checked:false};
  renderTab();
}
function checkAllSC(caseId,count,key){
  if(!appState[key])appState[key]={};
  if(!appState[key][caseId])appState[key][caseId]={};
  for(let i=0;i<count;i++){
    if(appState[key][caseId][i]?.choice&&!appState[key][caseId][i]?.checked)
      appState[key][caseId][i].checked=true;
  }
  renderTab();
}
function resetAllSC(caseId,key){if(!appState[key])appState[key]={};appState[key][caseId]={};renderTab();}
function checkSubjectCaseQ(caseId,qi,key){if(appState[key]?.[caseId]?.[qi])appState[key][caseId][qi].checked=true;renderTab();}
function resetSubjectCaseQ(caseId,qi,key){if(appState[key]?.[caseId])delete appState[key][caseId][qi];renderTab();}

// ─── SUBJECT CASE QUIZ MODE ────────────────────────────────────────────────────
async function startSubjectCaseQuiz(qmKey,dbTable,tableField){
  const {data}=await sb.from(dbTable).select('*').order('created_at');
  const allQs=(data||[]).flatMap(c=>(c.questions||[]).filter(q=>q.question).map(q=>({...q,_caseTitle:c.title,_scenario:c.scenario,_tableData:c.table_data||null,_imgs:c.images||[]})));
  if(!allQs.length){alert('No questions found yet.');return;}
  appState[qmKey]=true;
  appState[qmKey+'Items']=shuffle(allQs);
  appState[qmKey+'Idx']=0;
  appState[qmKey+'Chosen']=null;
  appState[qmKey+'Answered']=false;
  appState[qmKey+'Score']=0;
  appState[qmKey+'Done']=false;
  appState[qmKey+'Answers']={};
  renderTab();
}

// These keys for quiz dispatch - called by the renderSubjectCases routing
function renderSubjectCaseQuiz(el,cfg){
  const qmKey=cfg.quizModeKey;
  if(appState[qmKey+'Done']){renderSubjectCaseQuizResults(el,cfg);return;}
  const items=appState[qmKey+'Items']||[];
  const idx=appState[qmKey+'Idx']||0;
  const item=items[idx];
  if(!item){appState[qmKey]=false;renderTab();return;}
  const answered=appState[qmKey+'Answered'];
  const chosen=appState[qmKey+'Chosen'];
  const letters=['a','b','c','d'];
  const colors=['bbq-opt-a','bbq-opt-b','bbq-opt-c','bbq-opt-d'];
  const emojis=['🔴','🔵','🟡','🟢'];
  const pct=Math.round((idx+1)/items.length*100);

  const tableHtml=item._tableData&&tblHasContent(item._tableData)?`
    <div style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px">${cfg.tableLabel}</div>
      ${renderDataTable(item._tableData,{small:true})}
    </div>`:'';

  const optsHtml=(item.options||[]).map((opt,oi)=>{
    if(!opt)return '';
    const letter=letters[oi];
    let cls=`bbq-opt ${colors[oi]}`;
    if(answered){
      if(letter===item.correct)cls+=' correct-ans';
      else if(letter===chosen&&chosen!==item.correct)cls+=' wrong-ans';
    }
    return `<button class="${cls}" onclick="answerSubjectCaseQuiz('${qmKey}','${letter}')" ${answered?'disabled':''}><span class="bbq-opt-letter">${emojis[oi]}</span><span>${opt}</span></button>`;
  }).filter(Boolean).join('');

  let afterHtml='';
  if(answered){
    const isCorrect=chosen===item.correct;
    const correctIdx=letters.indexOf(item.correct);
    afterHtml=`
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:22px;font-weight:800;color:${isCorrect?'var(--success)':'var(--danger)'};margin-bottom:6px">${isCorrect?'✓ Correct!':'✗ Incorrect'}</div>
        ${!isCorrect?`<div style="font-size:13px;color:var(--text2)">Correct: <strong style="color:var(--success)">${(item.options||[])[correctIdx]||''}</strong></div>`:''}
        ${item.explanation?`<div style="font-size:13px;color:var(--text2);margin-top:8px;background:var(--bg3);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 var(--r) var(--r) 0;text-align:left">${item.explanation}</div>`:''}
      </div>
      <div style="text-align:center">
        ${idx<items.length-1
          ?`<button class="btn btn-primary" onclick="subjectCaseQuizNext('${qmKey}')" style="font-size:15px;padding:12px 32px">Next →</button>`
          :`<button class="btn btn-success" onclick="appState['${qmKey}Done']=true;renderTab()" style="font-size:15px;padding:12px 32px">See Results</button>`}
      </div>`;
  }

  el.innerHTML=`
    <div class="bbq-overlay">
      <div class="bbq-header">
        <button class="btn btn-ghost btn-sm" onclick="appState['${qmKey}']=false;appState['${qmKey}Done']=false;renderTab()">✕ Exit</button>
        <div class="progress-bar" style="flex:1;margin:0 8px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span class="question-num" style="white-space:nowrap">${idx+1} / ${items.length}</span>
      </div>
      <div class="bbq-body">
        <div class="bbq-context">
          <div class="bbq-context-title">${item._caseTitle||'Case'}</div>
          ${item._scenario?`<div class="bbq-context-scenario">${item._scenario}</div>`:''}
          ${tableHtml}
        </div>
        <div class="bbq-question">${escNL(item.question)}</div>
        <div class="bbq-options">${optsHtml}</div>
        ${afterHtml}
      </div>
    </div>
  `;
}

function answerSubjectCaseQuiz(qmKey,letter){
  if(appState[qmKey+'Answered'])return;
  appState[qmKey+'Answered']=true;
  appState[qmKey+'Chosen']=letter;
  if(!appState[qmKey+'Answers'])appState[qmKey+'Answers']={};
  appState[qmKey+'Answers'][appState[qmKey+'Idx']]=letter;
  const item=(appState[qmKey+'Items']||[])[appState[qmKey+'Idx']];
  if(item&&letter===item.correct)appState[qmKey+'Score']=(appState[qmKey+'Score']||0)+1;
  renderTab();
}

function subjectCaseQuizNext(qmKey){
  appState[qmKey+'Idx']=(appState[qmKey+'Idx']||0)+1;
  appState[qmKey+'Chosen']=null;
  appState[qmKey+'Answered']=false;
  renderTab();
}

function renderSubjectCaseQuizResults(el,cfg){
  const qmKey=cfg.quizModeKey;
  const total=(appState[qmKey+'Items']||[]).length;
  const score=appState[qmKey+'Score']||0;
  const pct=Math.round(score/total*100);
  const answers=appState[qmKey+'Answers']||{};
  const letters=['a','b','c','d'];
  const missed=[];
  (appState[qmKey+'Items']||[]).forEach((item,i)=>{
    if(answers[i]!==item.correct)missed.push({item,ans:answers[i]});
  });

  const exportMissed=()=>{
    if(!missed.length){alert('Nothing missed!');return;}
    try{
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF({unit:'mm',format:'a4'});
      const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight(),margin=18,cW=pageW-margin*2;
      let y=margin;
      const checkPage=(n=8)=>{if(y+n>pageH-margin){doc.addPage();y=margin;}};
      doc.setFillColor(210,210,210);doc.rect(margin,y,cW,10,'F');
      doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
      doc.text('Missed '+cfg.exportTitle+' Quiz Questions',(pageW/2),y+7,{align:'center'});y+=16;
      missed.forEach(({item,ans},i)=>{
        checkPage(32);
        const correctIdx=letters.indexOf(item.correct);
        const chosenIdx=ans?letters.indexOf(ans):-1;
        if(item._caseTitle){doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(100,100,140);doc.text(item._caseTitle,margin,y);y+=5;}
        doc.setFontSize(10.5);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
        doc.splitTextToSize('Q'+(i+1)+'. '+item.question,cW).forEach(l=>{checkPage();doc.text(l,margin,y);y+=5.5;});
        (item.options||[]).forEach((opt,oi)=>{
          if(!opt)return;
          const ltr=letters[oi];
          const isCorrect=ltr===item.correct,isGiven=ltr===ans;
          doc.setFontSize(9.5);doc.setFont('helvetica',isCorrect?'bold':'normal');
          doc.setTextColor(...(isCorrect?[20,120,60]:isGiven?[180,40,40]:[50,50,50]));
          checkPage();doc.text(ltr.toUpperCase()+'. '+opt+(isCorrect?' ✓':isGiven?' ←':''),margin+4,y);y+=5;
        });
        if(item.explanation){y+=1;doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(80,80,100);doc.splitTextToSize('Note: '+item.explanation,cW-4).forEach(l=>{checkPage();doc.text(l,margin+4,y);y+=4.5;});}
        y+=5;
      });
      const total2=doc.internal.getNumberOfPages();
      for(let p=1;p<=total2;p++){doc.setPage(p);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);doc.text('MLS BOC Prep — Missed Questions · Page '+p+' of '+total2,margin,pageH-8);doc.text(new Date().toLocaleDateString(),pageW-margin,pageH-8,{align:'right'});}
      doc.save('missed_'+cfg.subject+'_quiz.pdf');
    }catch(err){alert('PDF export failed: '+err.message);}
  };

  const retryWrong=()=>{
    if(!missed.length)return;
    appState[qmKey+'Items']=shuffle(missed.map(m=>m.item));
    appState[qmKey+'Idx']=0;appState[qmKey+'Chosen']=null;appState[qmKey+'Answered']=false;
    appState[qmKey+'Score']=0;appState[qmKey+'Done']=false;appState[qmKey+'Answers']={};
    renderTab();
  };

  el.innerHTML=`
    <div class="bbq-overlay">
      <div class="bbq-header">
        <button class="btn btn-ghost btn-sm" onclick="appState['${qmKey}']=false;appState['${qmKey}Done']=false;renderTab()">← Back to Cases</button>
        <div class="ml-auto" style="color:var(--text);font-size:13px;font-family:var(--mono)">Quiz Complete</div>
      </div>
      <div class="bbq-body">
        <div style="text-align:center;padding:24px 0 32px">
          <div style="font-size:48px;margin-bottom:8px">${pct>=80?'🏆':pct>=60?'✅':'📚'}</div>
          <div class="bbq-score-big">${pct}%</div>
          <div style="font-size:16px;color:var(--text2)">${score} of ${total} correct</div>
        </div>
        <div class="result-grid" style="margin-bottom:24px">
          <div class="stat-card"><div class="stat-num text-success">${score}</div><div class="stat-label">Correct</div></div>
          <div class="stat-card"><div class="stat-num text-danger">${total-score}</div><div class="stat-label">Missed</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${pct}%</div><div class="stat-label">Score</div></div>
        </div>
        <div class="flex gap-8 mb-20 flex-wrap">
          <button class="btn btn-primary" onclick="appState['${qmKey}Idx']=0;appState['${qmKey}Chosen']=null;appState['${qmKey}Answered']=false;appState['${qmKey}Score']=0;appState['${qmKey}Done']=false;appState['${qmKey}Answers']={};appState['${qmKey}Items']=shuffle(appState['${qmKey}Items']||[]);renderTab()">🔄 Retry All</button>
          ${missed.length?`<button class="btn btn-warn" onclick="(${retryWrong.toString()})()">⚡ Retry Wrong Only (${missed.length})</button>`:''}
          ${missed.length?`<button class="btn btn-ghost btn-sm" onclick="(${exportMissed.toString()})()">📥 Export Missed</button>`:''}

            </div>`;
          }).join('')}`:`<div style="color:var(--success);font-weight:600;text-align:center;font-size:18px">Perfect score! 🎉</div>`}

}

function addSCQuestion(){
  if((window._scQCount||0)>=5){alert('Max 5 questions per case.');return;}
  const i=window._scQCount++;
  const container=document.getElementById('sc-questions-list');if(!container)return;
  const div=document.createElement('div');div.innerHTML=scQuestionEditor(i,null);
  container.appendChild(div.firstElementChild);
  if(window._scQCount>=5){const b=document.getElementById('sc-add-q-btn');if(b)b.style.display='none';}
}

function removeSCQuestion(i){
  const el=document.getElementById('sc-q-'+i);if(el)el.remove();
  window._scQCount=Math.max(0,(window._scQCount||1)-1);
  const b=document.getElementById('sc-add-q-btn');if(b)b.style.display='';

async function saveSubjectCase(){
  const subject=window._scSubject;
  const caseId=window._scCaseId;
  const cfg=getSubjectCaseConfig(subject);
  const title=document.getElementById('sc-title')?.value.trim();
  const scenario=document.getElementById('sc-scenario')?.value.trim();
  const isDraft=document.getElementById('sc-draft')?.value==='true';
  if(!title){alert('Title required.');return;}
  const tableData=tblReadData('sc');
  const table_data=tblHasContent(tableData)?tableData:null;
  const questions=[];
  for(let i=0;i<(window._scQCount||0);i++){
    const qEl=document.getElementById('sc-q-'+i);if(!qEl||!qEl.isConnected)continue;
    const question=document.getElementById('sc-qq-'+i)?.value.trim()||'';if(!question)continue;
    const options=['a','b','c','d'].map(l=>document.getElementById('sc-qo-'+i+'-'+l)?.value.trim()||'');
    const correct=document.getElementById('sc-qc-'+i)?.value||'a';
    const explanation=document.getElementById('sc-qe-'+i)?.value.trim()||'';
    questions.push({question,options,correct,explanation});
  }
  const payload={title,scenario:scenario||'',table_data,questions,is_draft:isDraft,images:[]};
  let error;
  if(caseId){({error}=await sb.from(cfg.dbTable).update(payload).eq('id',caseId));}
  else{({error}=await sb.from(cfg.dbTable).insert(payload));}
  if(error){alert('Save failed: '+error.message);return;}
  document.getElementById('condition-modal').classList.add('hidden');
  if(!appState[cfg.answerKey])appState[cfg.answerKey]={};
  renderTab();
}

function generateSubjectCasePDF(data,tableField,tableLabel,exportTitle){
  const selected=[];
  document.querySelectorAll('.sc-export-cb:checked').forEach(cb=>{
    const c=data.find(x=>x.id===cb.dataset.id);
    if(c)selected.push(c);
  });
  if(!selected.length){alert('Select at least one case.');return;}
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight(),margin=18,cW=pageW-margin*2;
    let y=margin;let first=true;
    const checkPage=(n=10)=>{if(y+n>pageH-margin){doc.addPage();y=margin;}};
    const writeText=(text,opts={})=>{
      const {size=11,bold=false,color=[30,30,30],indent=0}=opts;
      doc.setFontSize(size);doc.setFont('helvetica',bold?'bold':'normal');doc.setTextColor(...color);
      doc.splitTextToSize(String(text||''),cW-indent).forEach(l=>{checkPage(6);doc.text(l,margin+indent,y);y+=size*0.4+1.2;});
    };
    selected.forEach((c,ci)=>{
      if(!first){doc.addPage();y=margin;}first=false;
      doc.setFillColor(210,210,210);doc.rect(margin,y,cW,10,'F');
      doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
      doc.text(exportTitle+' — Case '+(ci+1)+': '+(c.title||'Untitled'),margin+3,y+7);y+=14;
      if(c.scenario){writeText('Patient Scenario',{size:10,bold:true,color:[40,40,40]});writeText(c.scenario,{size:10,indent:2});y+=3;}
      const tableD=c.table_data;
      if(tableD&&tableD.headers&&tableD.headers.length){
        checkPage(20);writeText(tableLabel,{size:10,bold:true,color:[40,40,40]});
        const hdrs=tableD.headers;const rows=tableD.rows||[];const meta=tableD.meta||[];
        const colW=Math.min(cW/hdrs.length,44);const tableW=colW*hdrs.length;
        // header row
        doc.setFillColor(220,220,220);doc.rect(margin,y,tableW,8,'F');doc.setDrawColor(160,160,160);doc.setLineWidth(0.2);doc.rect(margin,y,tableW,8,'S');
        doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);
        hdrs.forEach((h,i)=>doc.text(String(h||'').substring(0,14),margin+i*colW+2,y+5.5));y+=8;
        // data rows
        rows.forEach((row,ri)=>{
          checkPage(9);
          doc.setFillColor(245,245,245);doc.rect(margin,y,tableW,9,'F');doc.rect(margin,y,tableW,9,'S');
          row.forEach((cell,ci)=>{
            const m=(meta[ri]||[])[ci]||{};
            const rgb=m.color?hexToRgb(m.color):[30,30,30];
            doc.setFontSize(10);doc.setFont('helvetica',m.bold?'bold':'normal');doc.setTextColor(...rgb);
            doc.text(String(cell||'').substring(0,12),margin+ci*colW+2,y+6.2);
          });y+=9;
        });y+=3;
      }
      const qs=c.questions||[];
      if(qs.length){
        y+=2;doc.setDrawColor(180,180,180);doc.setLineWidth(0.3);doc.line(margin,y,pageW-margin,y);y+=4;
        writeText('Questions',{size:10,bold:true,color:[40,40,40]});y+=1;
        const letters=['a','b','c','d'];
        qs.forEach((q,qi)=>{
          checkPage(28);writeText('Q'+(qi+1)+'. '+q.question,{size:10,bold:true,indent:2,color:[20,20,20]});
          (q.options||[]).forEach((opt,oi)=>{
            if(!opt)return;
            checkPage(6);doc.setFontSize(9.5);doc.setFont('helvetica','normal');doc.setTextColor(30,30,30);
            doc.text(letters[oi].toUpperCase()+'. '+opt,margin+6,y);y+=5;
          });
          y+=4;
        });
      }
    });
    const tot=doc.internal.getNumberOfPages();
    for(let p=1;p<=tot;p++){doc.setPage(p);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);doc.text('MLS BOC Prep — '+exportTitle+' · Page '+p+' of '+tot,margin,pageH-8);doc.text(new Date().toLocaleDateString(),pageW-margin,pageH-8,{align:'right'});}
    doc.save(exportTitle.replace(/\s+/g,'_').toLowerCase()+'_cases.pdf');
    document.getElementById('condition-modal').classList.add('hidden');
  }catch(err){alert('PDF export failed: '+err.message);}
}


// ─── SUBJECT PROGRESS VISUAL (cartoon animated, right=green wrong=red dual fill) ─
function renderProgressVisual(subj, rightPct, wrongPct, isDone100){
  const r=Math.max(0,Math.min(100,rightPct||0));
  const w=Math.max(0,Math.min(100-r,wrongPct||0));
  const confetti=isDone100?renderConfetti():'';
  if(subj==='blood_bank')       return confetti+renderBBVisual(r,w);
  if(subj==='clinical_chemistry')return confetti+renderChemVisual(r,w);
  if(subj==='urinalysis')       return confetti+renderUAVisual(r,w);
  if(subj==='microbiology')     return confetti+renderMicroVisual(r,w);
  return confetti+renderGenericVisual(r,w);
}

function renderConfetti(){
  const colors=['#f5a623','#e63946','#3ddc84','#2196f3','#9b59b6','#ffe44d'];
  const pieces=Array.from({length:28},(_,i)=>{
    const c=colors[i%colors.length];
    const x=Math.round(20+Math.random()*60);
    const delay=(Math.random()*0.6).toFixed(2);
    const dur=(0.9+Math.random()*0.8).toFixed(2);
    const rot=Math.round(Math.random()*360);
    return `<rect x="${x}%" y="0" width="${3+Math.round(Math.random()*5)}" height="${4+Math.round(Math.random()*5)}"
      fill="${c}" rx="1" opacity=".9"
      transform="rotate(${rot},${x*1.4},0)"
      style="animation:confetti-fall ${dur}s ease-in ${delay}s both"/>`;
  });
  return `<div style="position:relative;overflow:visible;height:0">
    <svg style="position:absolute;left:0;top:-10px;width:100%;height:90px;overflow:visible;pointer-events:none">
      ${pieces.join('')}
    </svg>
  </div>`;
}

// ── BLOOD BANK ── blood bag, green fill = right, red-orange fill = wrong
function renderBBVisual(r,w){
  // Container height = 70 SVG units (y 22 to 92)
  const H=70;
  const rightH=Math.round(r/100*H);
  const wrongH=Math.round(w/100*H);
  const emptyH=H-rightH-wrongH;
  // wrong fills from bottom, right fills on top of wrong
  const wrongY=92-wrongH;
  const rightY=wrongY-rightH;
  const smile=(r+w)>=98?'M38,58 Q48,66 58,58':'M40,56 Q48,62 56,56';
  const wavePath=(y,col)=>rightH+wrongH>4?`
    <path fill="none" stroke="${col}" stroke-width="2" opacity=".5">
      <animate attributeName="d" dur="1.8s" repeatCount="indefinite"
        values="M22,${y} Q37,${y-5} 52,${y} Q67,${y+5} 78,${y};
                M22,${y} Q37,${y+4} 52,${y} Q67,${y-4} 78,${y};
                M22,${y} Q37,${y-5} 52,${y} Q67,${y+5} 78,${y}"/>
    </path>`:'';
  return `<div class="spv-wrap" style="min-height:130px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;animation:spv-float 2.5s ease-in-out infinite">
      <svg width="130" height="148" viewBox="0 0 100 148">
        <defs>
          <clipPath id="bagclip2"><rect x="22" y="22" width="56" height="70" rx="12"/></clipPath>
          <linearGradient id="rightblood" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#e85c5c"/>
            <stop offset="100%" stop-color="#8b0000"/>
          </linearGradient>
          <linearGradient id="wrongblood" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3a0000"/>
            <stop offset="100%" stop-color="#1a0000"/>
          </linearGradient>
        </defs>
        <!-- IV lines -->
        <line x1="35" y1="22" x2="30" y2="6"  stroke="#ccc" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="50" y1="22" x2="50" y2="4"  stroke="#ccc" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="65" y1="22" x2="70" y2="6"  stroke="#ccc" stroke-width="2.5" stroke-linecap="round"/>
        <!-- bag body -->
        <rect x="22" y="22" width="56" height="70" rx="12" fill="white" stroke="#ddd" stroke-width="2"/>

        <!-- flask body outline -->
        <path d="M28,14 L28,38 L6,96 Q4,100 8,102 L72,102 Q76,100 74,96 L52,38 L52,14 Z"

        <!-- liquid fills clipped to flask shape -->
        <g clip-path="url(#flaskclip)">
          ${wrongH>0?`<rect x="4" y="${wrongTop}" width="72" height="${wrongH+4}" fill="url(#chemwrong)" opacity=".9" style="transition:all .6s ease"/>`:''}
          ${rightH>0?`<rect x="4" y="${rightTop}" width="72" height="${rightH+4}" fill="url(#chemright)" opacity=".88" style="transition:all .6s ease"/>
            ${waveAnim(waveY,'#aaddff')}${bubble}`:''}

// Generic cases
async function renderGenericCases(el){
  const {data}=await sb.from('mlsboc_cases').select('*').eq('subject',appState.subject).order('created_at');
  el.innerHTML=`
    ${isAdmin?`<div class="mb-16">${adminCaseControls()}</div>`:''}

    ${(data||[]).map((c,i)=>renderCaseCard(c,i)).join('')}
  `;

function renderCaseCard(c,idx){
  const steps=parseSteps(c.steps);
  const fb=appState.caseSelections[c.id]?.feedback;
  const imgs=c.images||[];
  return `
    <div class="case-card" id="ccard-${c.id}">
      <div class="flex-center gap-8 mb-8 flex-wrap">
        <span class="tag tag-info">Case ${idx+1}</span>
        <span style="font-size:14px;font-weight:600">${c.title}</span>
        ${c.is_draft?`<span class="draft-badge">Draft</span>`:''}
      </div>
      <div class="case-scenario">${escNL(c.scenario)}</div>
      ${c.case_data?`<div class="case-data">${c.case_data}</div>`:''}
      ${imgs.filter(Boolean).length?`<div class="case-img-row">${imgs.filter(Boolean).map(url=>`<img src="${url}" alt="">`).join('')}</div>`:''}
      ${steps.map((step,si)=>renderCaseStep(c.id,step,si,fb)).join('')}
      ${!fb?`<button class="btn btn-primary btn-sm mt-8" onclick="submitGenericCase('${c.id}','${esc(c.answer)}')">Submit</button>`:''}
      ${fb?`<div class="case-feedback ${fb.correct?'correct':'wrong'}">${fb.correct?'✓ Correct':'✗ Incorrect'} — ${fb.note||c.answer}</div>`:''}
      ${isAdmin?`<div class="flex gap-8 mt-8">
        ${c.is_draft?`<button class="btn btn-success btn-xs" onclick="publishCase('${c.id}')">Publish</button>`:''}
        <button class="btn btn-danger btn-xs" onclick="deleteCase('${c.id}')">Delete</button>
        <button class="btn btn-ghost btn-xs" onclick="openCaseImageEditor('${c.id}')">Edit Images</button>
      </div>`:''}
    </div>
  `;
}

function renderCaseStep(caseId,step,si,fb){
  const sel=appState.caseSelections[caseId]?.steps||{};
  const disabled=fb?'disabled':'';
  if(step.type==='select'){
    return `<div class="case-step">
      <div class="case-step-label">${step.label}</div>
      <div class="case-options">
        ${step.options.map(o=>`<button class="case-opt ${sel[step.key]===o?'selected':''}" onclick="selectCaseOpt('${caseId}','${step.key}','${esc(o)}','single')" ${disabled}>${o}</button>`).join('')}
      </div>
    </div>`;
  }
  if(step.type==='multi'){
    const msel=sel[step.key]||[];
    return `<div class="case-step">
      <div class="case-step-label">${step.label} (select all that apply)</div>
      <div class="case-options">
        ${step.options.map(o=>`<button class="case-opt ${msel.includes(o)?'selected':''}" onclick="selectCaseOpt('${caseId}','${step.key}','${esc(o)}','multi')" ${disabled}>${o}</button>`).join('')}
      </div>
    </div>`;
  }
  return '';
}

function selectCaseOpt(caseId,key,val,type){
  if(!appState.caseSelections[caseId])appState.caseSelections[caseId]={steps:{}};
  if(!appState.caseSelections[caseId].steps)appState.caseSelections[caseId].steps={};
  if(type==='single'){
    appState.caseSelections[caseId].steps[key]=val;
  }else{
    const arr=appState.caseSelections[caseId].steps[key]||[];
    appState.caseSelections[caseId].steps[key]=arr.includes(val)?arr.filter(x=>x!==val):[...arr,val];
  }
  renderTab();
}

function submitGenericCase(caseId,answer){
  if(!appState.caseSelections[caseId])appState.caseSelections[caseId]={steps:{}};
  const allVals=Object.values(appState.caseSelections[caseId].steps||{}).flat().join(' ').toLowerCase();
  const correct=answer&&allVals.includes(answer.toLowerCase().split(' ')[0]);
  appState.caseSelections[caseId].feedback={correct,note:'Expected: '+answer};
  renderTab();
}

      ${collapsed?'':`
        <div style="margin-top:16px">
          ${c.scenario?`<div class="case-scenario" style="margin-bottom:20px;font-size:15px;line-height:1.85">${escNL(c.scenario)}</div>`:''}
          ${c.table_data&&tblHasContent(c.table_data)?renderDataTable(c.table_data):''}  
          ${imgs.filter(Boolean).length?`<div class="case-img-row">${imgs.filter(Boolean).map(url=>`<img src="${url}" alt="" onclick="openImgViewer('${url}')" style="cursor:zoom-in">`).join('')}</div>`:''}
          ${qs.length?`
            <div class="divider"></div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
              <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px">Questions</div>
              ${mcAllChecked(c.id,qs.length)?'':`<button class="btn btn-primary btn-sm" onclick="checkAllMC('${c.id}',${qs.length})">Check All</button>`}
              ${mcAnyAnswered(c.id)?`<button class="btn btn-ghost btn-sm" onclick="resetAllMC('${c.id}')">Reset All</button>`:''}
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;align-items:start">
              ${qs.map((q,qi)=>renderMicroCaseQuestion(c.id,q,qi,selState)).join('')}
            </div>
          `:'<div class="empty" style="padding:16px;text-align:left">No questions added yet.</div>'}
        </div>
      `}
    </div>
  `;
}

function renderMicroCaseQuestion(caseId,q,qi,selState){
  const checked=selState[qi]?.checked===true;
  const chosen=selState[qi]?.choice;
  const letters=['a','b','c','d'];
  const correctIdx=letters.indexOf(q.correct);
  return `
    <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:16px 18px;box-shadow:0 2px 8px #0002">
      <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;font-family:var(--mono)">Q${qi+1}</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.65">${escNL(q.question)}</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${(q.options||[]).map((opt,oi)=>{
          if(!opt)return '';
          const letter=letters[oi];
          let bg='var(--bg4)';let bd='var(--border)';let color='var(--text)';let weight='400';
          if(chosen===letter&&!checked){bg='var(--bg4)';bd='var(--accent)';color='var(--accent)';weight='500';}
          if(checked){
            if(letter===q.correct){bg='var(--bg4)';bd='var(--success)';color='var(--success)';weight='600';}
            else if(letter===chosen&&chosen!==q.correct){bg='var(--bg4)';bd='var(--danger)';color='var(--danger)';weight='500';}
          }
          return `<button onclick="selectMCQ('${caseId}',${qi},'${letter}')" ${checked?'disabled':''} style="display:flex;align-items:flex-start;gap:10px;background:${bg};border:1px solid ${bd};border-radius:var(--r);padding:9px 13px;cursor:${checked?'default':'pointer'};text-align:left;width:100%;transition:all .12s">
            <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:${color};min-width:20px;margin-top:1px">${letter.toUpperCase()}.</span>
            <span style="font-size:13px;color:${color};font-weight:${weight};line-height:1.5">${opt}</span>
          </button>`;
        }).filter(Boolean).join('')}
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:32px">
        ${!checked&&chosen?`<button class="btn btn-primary btn-sm" onclick="checkMCQ('${caseId}',${qi})">Check Answer</button>`:''}
        ${chosen?`<button class="btn btn-ghost btn-sm" onclick="resetMCQ('${caseId}',${qi})">Reset</button>`:''}
      </div>
      ${checked?`
        <div class="case-feedback ${chosen===q.correct?'correct':'wrong'}" style="margin-top:8px;font-size:13px">
          ${chosen===q.correct?'✓ Correct!':`✗ Incorrect — Correct: ${(q.correct||'a').toUpperCase()}. ${(q.options||[])[correctIdx]||''}`}
        </div>
        ${q.explanation?`<div class="explanation" style="margin-top:8px;font-size:13px">${q.explanation}</div>`:''}`:''}
    </div>
  `;
}

function mcAllChecked(caseId,count){
  const s=(appState.microCaseAnswers||{})[caseId]||{};
  for(let i=0;i<count;i++){if(!s[i]?.checked)return false;}
  return count>0;
}
function mcAnyAnswered(caseId){
  return Object.values((appState.microCaseAnswers||{})[caseId]||{}).some(v=>v?.choice);
}
function selectMCQ(caseId,qi,letter){
  if(!appState.microCaseAnswers)appState.microCaseAnswers={};
  if(!appState.microCaseAnswers[caseId])appState.microCaseAnswers[caseId]={};
  if(appState.microCaseAnswers[caseId][qi]?.checked)return;
  appState.microCaseAnswers[caseId][qi]={choice:letter,checked:false};
  renderTab();
}
function checkAllMC(caseId,count){
  if(!appState.microCaseAnswers)appState.microCaseAnswers={};
  if(!appState.microCaseAnswers[caseId])appState.microCaseAnswers[caseId]={};
  for(let i=0;i<count;i++){
    if(appState.microCaseAnswers[caseId][i]?.choice&&!appState.microCaseAnswers[caseId][i]?.checked)
      appState.microCaseAnswers[caseId][i].checked=true;
  }
  renderTab();
}
function resetAllMC(caseId){if(!appState.microCaseAnswers)appState.microCaseAnswers={};appState.microCaseAnswers[caseId]={};renderTab();}
function checkMCQ(caseId,qi){if(appState.microCaseAnswers?.[caseId]?.[qi])appState.microCaseAnswers[caseId][qi].checked=true;renderTab();}
function resetMCQ(caseId,qi){if(appState.microCaseAnswers?.[caseId])delete appState.microCaseAnswers[caseId][qi];renderTab();}
function toggleMicroCaseCollapse(id){
  if(!appState.microCaseCollapsed)appState.microCaseCollapsed={};
  appState.microCaseCollapsed[id]=appState.microCaseCollapsed[id]===false?true:false;
  renderTab();
}

function adminMicroCaseControls(){
  return `<div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px">Admin: Microbiology Cases</div>
    <button class="btn btn-primary" onclick="openMicroCaseEditor(null)">+ New Case</button>
  </div>`;
}

    <div class="flex-center gap-8 mb-16">
      <div style="font-size:16px;font-weight:600">${caseId?'Edit':'New'} Microbiology Case</div>
      <button class="btn btn-ghost btn-sm ml-auto" onclick="document.getElementById('condition-modal').classList.add('hidden')">✕</button>
    </div>
    <div class="form-group"><label>Case Title</label><input type="text" id="mc-title" value="${esc(c.title||'')}" placeholder="e.g. Unknown GPC Cluster"></div>
    <div class="form-group"><label>Gram Group</label>
      <select id="mc-group">
        <option value="gram_positive" ${(c.group_label||'')==='gram_positive'?'selected':''}>Gram Positive</option>

function mcTableRow(i,label,value){
  return `<div class="flex-center gap-8 mb-6" id="mc-tr-${i}">
    <input type="text" placeholder="e.g. Catalase" value="${esc(label||'')}" id="mc-tl-${i}" style="flex:1">
    <input type="text" placeholder="e.g. +" value="${esc(value||'')}" id="mc-tv-${i}" style="width:100px">
    <button class="btn btn-danger btn-xs" onclick="document.getElementById('mc-tr-${i}').remove()">✕</button>
  </div>`;
}
function addMCTableCol(){
  const i=window._mcTableCount++;
  const container=document.getElementById('mc-table-rows');if(!container)return;
  const div=document.createElement('div');div.innerHTML=mcTableRow(i,'','');
  container.appendChild(div.firstElementChild);
}
function mcQuestionEditor(i,q){
  q=q||{question:'',options:['','','',''],correct:'a',explanation:''};
  const opts=q.options||['','','',''];
  return `<div class="card-sm mb-12" id="mc-q-${i}" style="border-left:3px solid var(--accent)">
    <div class="flex-center gap-8 mb-10">
      <span style="font-size:12px;font-weight:600;color:var(--accent);font-family:var(--mono)">Q${i+1}</span>
      <button class="btn btn-danger btn-xs ml-auto" onclick="removeMCQuestion(${i})">Remove</button>
    </div>
    <div class="form-group"><label>Question</label><textarea id="mc-qq-${i}" style="min-height:60px">${q.question||''}</textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      ${['a','b','c','d'].map((l,oi)=>`<div><label>${l.toUpperCase()}.</label><input type="text" id="mc-qo-${i}-${l}" value="${esc(opts[oi]||'')}" placeholder="Option ${l.toUpperCase()}"></div>`).join('')}
    </div>
    <div class="form-group"><label>Correct Answer</label>
      <select id="mc-qc-${i}">${['a','b','c','d'].map(l=>`<option value="${l}" ${(q.correct||'a')===l?'selected':''}>${l.toUpperCase()}</option>`).join('')}</select>
    </div>
    <div class="form-group" style="margin-bottom:0"><label>Explanation (optional)</label>
      <input type="text" id="mc-qe-${i}" value="${esc(q.explanation||'')}" placeholder="Why this answer is correct">
    </div>
  </div>`;
}
function addMCQuestion(){
  if((window._mcQCount||0)>=5){alert('Max 5 questions per case.');return;}
  const i=window._mcQCount++;
  const container=document.getElementById('mc-questions-list');if(!container)return;
  const div=document.createElement('div');div.innerHTML=mcQuestionEditor(i,null);
  container.appendChild(div.firstElementChild);
  if(window._mcQCount>=5){const b=document.getElementById('mc-add-q-btn');if(b)b.style.display='none';}
}
function removeMCQuestion(i){
  const el=document.getElementById('mc-q-'+i);if(el)el.remove();
  window._mcQCount=Math.max(0,(window._mcQCount||1)-1);
  const b=document.getElementById('mc-add-q-btn');if(b)b.style.display='';
}
async function saveMicroCase(caseId){
  const title=document.getElementById('mc-title')?.value.trim();
  const scenario=document.getElementById('mc-scenario')?.value.trim();
  const group_label=document.getElementById('mc-group')?.value||'';
  const isDraft=document.getElementById('mc-draft')?.value==='true';
  if(!title){alert('Title required.');return;}
  const rawMC=tblReadData('mc');
  const table_data=tblHasContent(rawMC)?rawMC:null;
  const questions=[];
  for(let i=0;i<(window._mcQCount||0);i++){
    const qEl=document.getElementById('mc-q-'+i);if(!qEl||!qEl.isConnected)continue;
    const question=document.getElementById('mc-qq-'+i)?.value.trim()||'';if(!question)continue;
    const options=['a','b','c','d'].map(l=>document.getElementById('mc-qo-'+i+'-'+l)?.value.trim()||'');
    const correct=document.getElementById('mc-qc-'+i)?.value||'a';
    const explanation=document.getElementById('mc-qe-'+i)?.value.trim()||'';
    questions.push({question,options,correct,explanation});
  }
  const payload={title,scenario:scenario||'',table_data,questions,group_label,is_draft:isDraft,images:[]};
  let error;
  if(caseId){({error}=await sb.from('mlsboc_micro_cases').update(payload).eq('id',caseId));}
  else{({error}=await sb.from('mlsboc_micro_cases').insert(payload));}
  if(error){alert('Save failed: '+error.message);return;}
  document.getElementById('condition-modal').classList.add('hidden');
  if(!appState.microCaseAnswers)appState.microCaseAnswers={};
  renderTab();
}
async function deleteMicroCase(id){
  if(!confirm('Delete this case?'))return;
  await sb.from('mlsboc_micro_cases').delete().eq('id',id);
  renderTab();
}

// ─── BLOOD BANK QUIZ MODE ─────────────────────────────────────────────────────
async function startBBQuiz(){
  const {data:_bq1}=await sb.from('mlsboc_bb_cases').select('*').order('created_at');
  const data=(_bq1||[]).map(withTableData);
  const allQs=(data||[]).flatMap(c=>(c.questions||[]).filter(q=>q.question).map(q=>({...q,_caseTitle:c.title,_scenario:c.scenario,_tableData:c.table_data||null,_imgs:c.images||[]})));
  if(!allQs.length){alert('No questions found in any case yet.');return;}
  appState.bbQuizMode=true;
  appState.bbQuizItems=shuffle(allQs);
  appState.bbQuizIdx=0;
  appState.bbQuizChosen=null;
  appState.bbQuizAnswered=false;
  appState.bbQuizScore=0;
  appState.bbQuizDone=false;
  appState.bbQuizAnswers={};
  
  renderTab();
}

function exitBBQuiz(){
  
  appState.bbQuizMode=false;
  appState.bbQuizDone=false;
  renderTab();
}

function renderBBQuiz(el){
  if(appState.bbQuizDone){renderBBQuizResults(el);return;}

  const items=appState.bbQuizItems;
  const idx=appState.bbQuizIdx;
  const item=items[idx];
  const answered=appState.bbQuizAnswered;
  const chosen=appState.bbQuizChosen;
  const letters=['a','b','c','d'];
  const colors=['bbq-opt-a','bbq-opt-b','bbq-opt-c','bbq-opt-d'];
  const emojis=['🔴','🔵','🟡','🟢'];
  const pct=Math.round((idx+1)/items.length*100);

  const tableHtml=item._tableData&&tblHasContent(item._tableData)?`
    <div style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px">Typing Results</div>
      <div style="overflow-x:auto">
        <table style="border-collapse:collapse;font-size:14px">
          <thead><tr>${(item._tableData.rows||[]).flat().map(v=>({value:v})).map(col=>`<th style="background:var(--bg4);border:1px solid var(--border2);padding:8px 12px;text-align:center;font-weight:600;color:var(--text);white-space:nowrap">${col.label}</th>`).join('')}</tr></thead>
          <tbody><tr>${(item._tableData.rows||[]).flat().map(v=>({value:v})).map(col=>`<td style="border:1px solid var(--border);padding:8px 12px;text-align:center;font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text);background:var(--bg3)">${col.value}</td>`).join('')}</tr></tbody>
        </table>
      </div>
    </div>`:'' ;

  const imgHtml=item._imgs&&item._imgs.filter(Boolean).length?`
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
      ${item._imgs.filter(Boolean).map(url=>`<img src="${url}" onclick="openImgViewer('${url}')" style="height:70px;border-radius:var(--r);border:1px solid var(--border);cursor:zoom-in;object-fit:cover">`).join('')}
    </div>`:'' ;

  const optsHtml=(item.options||[]).map((opt,oi)=>{
    if(!opt)return '';
    const letter=letters[oi];
    let cls=`bbq-opt ${colors[oi]}`;
    if(answered){
      if(letter===item.correct)cls+=' correct-ans';
      else if(letter===chosen&&chosen!==item.correct)cls+=' wrong-ans';
    }
    return `<button class="${cls}" onclick="answerBBQuiz('${letter}')" ${answered?'disabled':''}><span class="bbq-opt-letter">${emojis[oi]}</span><span>${opt}</span></button>`;
  }).filter(Boolean).join('');

  let afterHtml='';
  if(answered){
    const isCorrect=chosen===item.correct;
    const correctIdx=letters.indexOf(item.correct);
    afterHtml=`
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:22px;font-weight:800;color:${isCorrect?'var(--success)':'var(--danger)'};margin-bottom:6px">${isCorrect?'✓ Correct!':'✗ Incorrect'}</div>
        ${!isCorrect?`<div style="font-size:13px;color:var(--text2)">Correct answer: <strong style="color:var(--success)">${(item.options||[])[correctIdx]||''}</strong></div>`:''}
        ${item.explanation?`<div style="font-size:13px;color:var(--text2);margin-top:8px;background:var(--bg3);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 var(--r) var(--r) 0;text-align:left">${item.explanation}</div>`:''}
      </div>
      <div style="text-align:center">
        ${idx<items.length-1
          ?`<button class="btn btn-primary" onclick="bbQuizNext()" style="font-size:15px;padding:12px 32px">Next →</button>`
          :`<button class="btn btn-success" onclick="appState.bbQuizDone=true;renderTab()" style="font-size:15px;padding:12px 32px">See Results</button>`}
      </div>`;
  }

  el.innerHTML=`
    <div class="bbq-overlay">
      <div class="bbq-header">
        <button class="btn btn-ghost btn-sm" onclick="exitBBQuiz()">✕ Exit</button>
        <div class="progress-bar" style="flex:1;margin:0 8px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span class="question-num" style="white-space:nowrap">${idx+1} / ${items.length}</span>
      </div>
      <div class="bbq-body">
        <div class="bbq-context">
          <div class="bbq-context-title">${item._caseTitle||'Case'}</div>
          ${item._scenario?`<div class="bbq-context-scenario">${item._scenario}</div>`:''}
          ${tableHtml}${imgHtml}
        </div>
        <div class="bbq-question">${escNL(item.question)}</div>
        <div class="bbq-options">${optsHtml}</div>
        ${afterHtml}
      </div>
    </div>
  `;
}

function answerBBQuiz(letter){
  if(appState.bbQuizAnswered)return;
  
  appState.bbQuizAnswered=true;
  appState.bbQuizChosen=letter;
  if(!appState.bbQuizAnswers)appState.bbQuizAnswers={};
  appState.bbQuizAnswers[appState.bbQuizIdx]=letter;
  const item=appState.bbQuizItems[appState.bbQuizIdx];
  if(letter&&letter===item.correct)appState.bbQuizScore++;
  renderTab();
}

function bbQuizNext(){
  appState.bbQuizIdx++;
  appState.bbQuizChosen=null;
  appState.bbQuizAnswered=false;
  renderTab();
}

function renderBBQuizResults(el){
  const total=appState.bbQuizItems.length;
  const score=appState.bbQuizScore;
  const pct=Math.round(score/total*100);
  const answers=appState.bbQuizAnswers||{};
  const letters=['a','b','c','d'];
  const missed=[];

  let reviewHtml='';
  appState.bbQuizItems.forEach((item,i)=>{
    const ans=answers[i]||null;
    const wasCorrect=ans===item.correct;
    const correctIdx=letters.indexOf(item.correct);
    const chosenIdx=ans?letters.indexOf(ans):-1;
    if(!wasCorrect) missed.push({item,ans});
    reviewHtml+=`
      <div style="background:var(--bg2);border:1px solid ${wasCorrect?'var(--border)':'#f0647433'};border-radius:var(--r);padding:14px 16px;margin-bottom:8px">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">${item._caseTitle||''}</div>
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px">${escNL(item.question)}</div>
        ${wasCorrect
          ?`<div style="font-size:12px;color:var(--success)">✓ Correct — ${(item.options||[])[correctIdx]||''}</div>`
          :`<div style="font-size:12px;color:var(--danger)">✗ ${ans&&chosenIdx>=0?'Your answer: '+((item.options||[])[chosenIdx]||''):'(unanswered)'}</div>
           <div style="font-size:12px;color:var(--success);margin-top:2px">Correct: ${(item.options||[])[correctIdx]||''}</div>`}
        ${item.explanation?`<div style="font-size:12px;color:var(--text2);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">${item.explanation}</div>`:''}
      </div>`;
  });

  const exportBBMissed=()=>{
    if(!missed.length){alert('Nothing missed!');return;}
    try{
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF({unit:'mm',format:'a4'});
      const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight(),margin=18,cW=pageW-margin*2;
      let y=margin;
      const checkPage=(n=8)=>{if(y+n>pageH-margin){doc.addPage();y=margin;}};
      doc.setFillColor(210,210,210);doc.rect(margin,y,cW,10,'F');
      doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
      doc.text('Missed Blood Bank Quiz Questions',(pageW/2),y+7,{align:'center'});y+=16;
      missed.forEach(({item,ans},i)=>{
        checkPage(32);
        const correctIdx=letters.indexOf(item.correct);
        const chosenIdx=ans?letters.indexOf(ans):-1;
        if(item._caseTitle){doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(100,100,140);doc.text(item._caseTitle,margin,y);y+=5;}
        doc.setFontSize(10.5);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
        doc.splitTextToSize(`Q${i+1}. ${item.question}`,cW).forEach(l=>{checkPage();doc.text(l,margin,y);y+=5.5;});
        (item.options||[]).forEach((opt,oi)=>{
          if(!opt)return;
          const ltr=letters[oi];
          const isCorrect=ltr===item.correct,isGiven=ltr===ans;
          doc.setFontSize(9.5);doc.setFont('helvetica',isCorrect?'bold':'normal');
          doc.setTextColor(...(isCorrect?[20,120,60]:isGiven?[180,40,40]:[50,50,50]));
          checkPage();doc.text(`${ltr.toUpperCase()}. ${opt}${isCorrect?' ✓':isGiven?' ←':''}`,margin+4,y);y+=5;
        });
        if(item.explanation){y+=1;doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(80,80,100);doc.splitTextToSize('Note: '+item.explanation,cW-4).forEach(l=>{checkPage();doc.text(l,margin+4,y);y+=4.5;});}
        y+=5;
      });
      const total=doc.internal.getNumberOfPages();
      for(let p=1;p<=total;p++){doc.setPage(p);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);doc.text(`MLS BOC Prep — Missed Questions · Page ${p} of ${total}`,margin,pageH-8);doc.text(new Date().toLocaleDateString(),pageW-margin,pageH-8,{align:'right'});}
      doc.save('missed_bb_quiz.pdf');
    }catch(err){alert('PDF export failed: '+err.message);}
  };

  const retryWrongOnly=()=>{
    if(!missed.length)return;
    appState.bbQuizItems=shuffle(missed.map(m=>m.item));
    appState.bbQuizIdx=0;appState.bbQuizChosen=null;appState.bbQuizAnswered=false;
    appState.bbQuizScore=0;appState.bbQuizDone=false;appState.bbQuizAnswers={};
    renderTab();
  };

  el.innerHTML=`
    <div class="bbq-overlay">
      <div class="bbq-header">
        <button class="btn btn-ghost btn-sm" onclick="exitBBQuiz()">← Back to Cases</button>
        <div class="ml-auto" style="color:var(--text);font-size:13px;font-family:var(--mono)">Quiz Complete</div>
      </div>
      <div class="bbq-body">
        <div style="text-align:center;padding:24px 0 32px">
          <div style="font-size:48px;margin-bottom:8px">${pct>=80?'🏆':pct>=60?'✅':'📚'}</div>
          <div class="bbq-score-big">${pct}%</div>
          <div style="font-size:16px;color:var(--text2)">${score} of ${total} correct</div>
        </div>
        <div class="result-grid" style="margin-bottom:24px">
          <div class="stat-card"><div class="stat-num text-success">${score}</div><div class="stat-label">Correct</div></div>
          <div class="stat-card"><div class="stat-num text-danger">${total-score}</div><div class="stat-label">Missed</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${pct}%</div><div class="stat-label">Score</div></div>
        </div>
        <div class="flex gap-8 mb-20 flex-wrap">
          <button class="btn btn-primary" onclick="startBBQuiz()">🔄 Retry All</button>
          ${missed.length?`<button class="btn btn-warn" onclick="(${retryWrongOnly.toString()})()">⚡ Retry Wrong Only (${missed.length})</button>`:''}
          ${missed.length?`<button class="btn btn-ghost btn-sm" onclick="(${exportBBMissed.toString()})()">📥 Export Missed</button>`:''}
          <button class="btn btn-ghost" onclick="exitBBQuiz()">Back to Cases</button>
        </div>
        ${missed.length?`<div style="font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px">Review All Questions</div>${reviewHtml}`:'<div style="color:var(--success);font-weight:600;text-align:center;font-size:18px">Perfect score! 🎉</div>'}
      </div>
    </div>
  `;
}

function renderBBQuestion(caseId,q,qi,selState){
  const checked=selState[qi]?.checked===true;
  const chosen=selState[qi]?.choice;
  const letters=['a','b','c','d'];
  const correctIdx=letters.indexOf(q.correct);
  return `
    <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:16px 18px;box-shadow:0 2px 8px #0002">
      <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;font-family:var(--mono);letter-spacing:.5px">Q${qi+1}</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.65">${escNL(q.question)}</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${(q.options||[]).map((opt,oi)=>{
          if(!opt)return '';
          const letter=letters[oi];
          let bg='var(--bg4)';let bd='var(--border)';let color='var(--text)';let weight='400';
          if(chosen===letter&&!checked){bg='var(--bg4)';bd='var(--accent)';color='var(--accent)';weight='500';}
          if(checked){
            if(letter===q.correct){bg='var(--bg4)';bd='var(--success)';color='var(--success)';weight='600';}
            else if(letter===chosen&&chosen!==q.correct){bg='var(--bg4)';bd='var(--danger)';color='var(--danger)';weight='500';}
          }
          return `<button onclick="selectBBQ('${caseId}',${qi},'${letter}')" ${checked?'disabled':''} style="display:flex;align-items:flex-start;gap:10px;background:${bg};border:1px solid ${bd};border-radius:var(--r);padding:9px 13px;cursor:${checked?'default':'pointer'};text-align:left;width:100%;transition:all .12s">
            <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:${color};min-width:20px;margin-top:1px">${letter.toUpperCase()}.</span>
            <span style="font-size:13px;color:${color};font-weight:${weight};line-height:1.5">${opt}</span>
          </button>`;
        }).filter(Boolean).join('')}
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:32px">
        ${!checked&&chosen?`<button class="btn btn-primary btn-sm" onclick="checkBBQ('${caseId}',${qi})">Check Answer</button>`:''}
        ${chosen?`<button class="btn btn-ghost btn-sm" onclick="resetBBQ('${caseId}',${qi})">Reset</button>`:''}
      </div>
      ${checked?`
        <div class="case-feedback ${chosen===q.correct?'correct':'wrong'}" style="margin-top:8px;font-size:13px">
          ${chosen===q.correct
            ?'✓ Correct!'
            :`✗ Incorrect — Correct: ${(q.correct||'a').toUpperCase()}. ${(q.options||[])[correctIdx]||''}`}
        </div>
        ${q.explanation?`<div class="explanation" style="margin-top:8px;font-size:13px">${q.explanation}</div>`:''}`:''}
    </div>
  `;
}

function bbAllChecked(caseId,count){
  const s=appState.bbAnswers[caseId]||{};
  for(let i=0;i<count;i++){if(!s[i]?.checked)return false;}
  return count>0;
}
function bbAnyAnswered(caseId){
  return Object.values(appState.bbAnswers[caseId]||{}).some(v=>v?.choice);
}
function selectBBQ(caseId,qi,letter){
  if(!appState.bbAnswers[caseId])appState.bbAnswers[caseId]={};
  if(appState.bbAnswers[caseId][qi]?.checked)return;
  appState.bbAnswers[caseId][qi]={choice:letter,checked:false};
  renderTab();
}
function checkAllBB(caseId,count){
  if(!appState.bbAnswers[caseId])appState.bbAnswers[caseId]={};
  for(let i=0;i<count;i++){
    if(appState.bbAnswers[caseId][i]?.choice&&!appState.bbAnswers[caseId][i]?.checked)
      appState.bbAnswers[caseId][i].checked=true;
  }
  renderTab();
}
function resetAllBB(caseId){appState.bbAnswers[caseId]={};renderTab();}
function checkBBQ(caseId,qi){if(appState.bbAnswers[caseId]?.[qi])appState.bbAnswers[caseId][qi].checked=true;renderTab();}
function resetBBQ(caseId,qi){if(appState.bbAnswers[caseId])delete appState.bbAnswers[caseId][qi];renderTab();}

function toggleBBCollapse(id){
  if(!appState.bbCollapsed)appState.bbCollapsed={};
  // undefined/true = collapsed, false = open
  appState.bbCollapsed[id]=appState.bbCollapsed[id]===false?true:false;
  renderTab();
}

function addBBTableCol(){

function bbQuestionEditor(i,q){
  q=q||{question:'',options:['','','',''],correct:'a',explanation:''};
  const opts=q.options||['','','',''];

    </div>

      <label>Question</label>
      <textarea id="bb-qq-${i}" style="min-height:60px">${q.question||''}</textarea>

      ${['a','b','c','d'].map((l,oi)=>`<div>

        <input type="text" id="bb-qo-${i}-${l}" value="${esc(opts[oi]||'')}" placeholder="Option ${l.toUpperCase()}">

function addBBQuestion(){
  if((window._bbQCount||0)>=5){alert('Maximum 5 questions per case.');return;}
  const i=window._bbQCount++;
  const container=document.getElementById('bb-questions-list');
  if(!container)return;
  const div=document.createElement('div');
  div.innerHTML=bbQuestionEditor(i,null);
  container.appendChild(div.firstElementChild);
  if(window._bbQCount>=5){
    const btn=document.getElementById('bb-add-q-btn');
    if(btn)btn.style.display='none';
  }
}

function removeBBQuestion(i){
  const el=document.getElementById('bb-q-'+i);
  if(el)el.remove();
  window._bbQCount=Math.max(0,(window._bbQCount||1)-1);
  const btn=document.getElementById('bb-add-q-btn');
  if(btn)btn.style.display='';
}

async function saveBBCase(caseId){
  const title=document.getElementById('bb-title')?.value.trim();
  const scenario=document.getElementById('bb-scenario')?.value.trim();
  const isDraft=document.getElementById('bb-draft')?.value==='true';
  if(!title){alert('Case title is required.');return;}

  const rawBB=tblReadData('bb');
  const table_data=tblHasContent(rawBB)?rawBB:null;

  const questions=[];
  for(let i=0;i<(window._bbQCount||0);i++){
    const qEl=document.getElementById('bb-q-'+i);
    if(!qEl||!qEl.isConnected)continue;
    const question=document.getElementById('bb-qq-'+i)?.value.trim()||'';
    if(!question)continue;
    const options=['a','b','c','d'].map(l=>document.getElementById('bb-qo-'+i+'-'+l)?.value.trim()||'');
    const correct=document.getElementById('bb-qc-'+i)?.value||'a';
    const explanation=document.getElementById('bb-qe-'+i)?.value.trim()||'';
    questions.push({question,options,correct,explanation});
  }

  const payload={title,scenario:scenario||'',table_data,questions,is_draft:isDraft,images:[]};

  let error;
  if(caseId){
    ({error}=await sb.from('mlsboc_bb_cases').update(payload).eq('id',caseId));
  }else{
    ({error}=await sb.from('mlsboc_bb_cases').insert(payload));
  }
  if(error){alert('Save failed: '+error.message);return;}
  document.getElementById('condition-modal').classList.add('hidden');
  appState.bbAnswers={};
  renderTab();
}

async function deleteBBCase(id){
  if(!confirm('Delete this case and all its questions?'))return;
  await sb.from('mlsboc_bb_cases').delete().eq('id',id);
  delete appState.bbAnswers[id];
  renderTab();
}


// ─── FORMULAS VIEW ────────────────────────────────────────────────────────────
// ─── CALCULATIONS / REFERENCE RANGES ─────────────────────────────────────────
// Two types stored in mlsboc_formulas:
//   type='calc'  → name, category, numerator, denominator, steps[], notes, example
//   type='rr'    → name, category, conventional_value, conventional_unit,
//                  si_value, si_unit, notes

async function renderFormulasView(v){
  // Fetch all rows then split by type — works even if 'type' column not yet added to Supabase
  let calcData=[],rrData=[];
  try{
    const {data:allRows}=await sb.from('mlsboc_formulas').select('*').order('category,name');
    (allRows||[]).forEach(f=>{
      if(f.type==='rr') rrData.push(f);
      else calcData.push(f); // default everything to calc if type missing
    });
  }catch(e){ console.warn('Formulas fetch failed:',e); }

  // Group by category
  const groupBy=(arr)=>{const g={};arr.forEach(f=>{const c=f.category||'General';if(!g[c])g[c]=[];g[c].push(f);});return g;};
  const calcCats=groupBy(calcData);
  const rrCats=groupBy(rrData);
  const activeTab=appState._fmTab||'calc';

  v.innerHTML=`
    <div class="flex-center gap-12 mb-16 flex-wrap">
      <button class="btn btn-ghost btn-sm" onclick="goHome()">← Home</button>
      <div class="section-title">Calculations / Reference Ranges</div>
      <div class="flex gap-8 ml-auto flex-wrap">
        <button class="btn btn-ghost btn-sm" onclick="openFormulasExport()">📄 Export</button>
        ${isAdmin?`<button class="btn btn-primary btn-sm" onclick="openFormulaEditor(null,'${activeTab}')">+ Add ${activeTab==='calc'?'Calculation':'Reference Range'}</button>`:''}
      </div>
    </div>
    <div class="tabs mb-16">
      <button class="tab ${activeTab==='calc'?'active':''}" onclick="appState._fmTab='calc';renderView()">Calculations</button>
      <button class="tab ${activeTab==='rr'?'active':''}" onclick="appState._fmTab='rr';renderView()">Reference Ranges</button>
    </div>
    ${activeTab==='calc'?renderCalcTab(calcCats,calcData):renderRRTab(rrCats,rrData)}
  `;
}

function renderCalcTab(cats,all){
  if(!all.length)return '<div class="empty">No calculations yet. Use Admin mode to add some.</div>';
  return Object.entries(cats).map(([cat,items])=>`
    <div class="mb-24">
      <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px">${esc(cat)}</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        ${items.map(f=>renderCalcCard(f)).join('')}
      </div>
    </div>`).join('');
}

function renderCalcCard(f){
  const steps=(f.steps||[]).filter(Boolean);
  const hasFraction=f.numerator||f.denominator;
  return `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px">

async function saveFormula(id,type){
  type=type||'calc';
  const name=document.getElementById('fm-name')?.value.trim();
  const category=document.getElementById('fm-cat')?.value.trim()||'General';
  if(!name){alert('Name required.');return;}
  let payload={name,category,type};
  if(type==='rr'){
    payload.formula=''; // required by DB constraint, not used for RR
    payload.conventional_value=document.getElementById('fm-conv-val')?.value.trim()||'';
    payload.conventional_unit=document.getElementById('fm-conv-unit')?.value.trim()||'';
    payload.si_value=document.getElementById('fm-si-val')?.value.trim()||'';
    payload.si_unit=document.getElementById('fm-si-unit')?.value.trim()||'';
    payload.notes=document.getElementById('fm-notes')?.value.trim()||'';
  }else{
    payload.result_label=document.getElementById('fm-result-label')?.value.trim()||'';
    payload.numerator=document.getElementById('fm-numerator')?.value.trim()||'';
    payload.denominator=document.getElementById('fm-denominator')?.value.trim()||'';
    payload.multiplier=document.getElementById('fm-multiplier')?.value.trim()||'';
    payload.steps=Array.from({length:5},(_,i)=>document.getElementById('fm-step-'+i)?.value.trim()||'').filter(Boolean);
    payload.notes=document.getElementById('fm-notes')?.value.trim()||'';
    payload.example=document.getElementById('fm-example')?.value.trim()||'';
    // Keep formula column satisfied (build from numerator/denominator or use name)
    payload.formula=[payload.numerator,payload.denominator].filter(Boolean).join(' / ')||payload.result_label||payload.name||'';
  }
  let error;
  if(id){({error}=await sb.from('mlsboc_formulas').update(payload).eq('id',id));}
  else{({error}=await sb.from('mlsboc_formulas').insert(payload));}
  if(error){alert('Save failed: '+error.message);return;}
  document.getElementById('condition-modal').classList.add('hidden');
  renderView();
}

async function deleteFormula(id){
  if(!confirm('Delete this?'))return;
  await sb.from('mlsboc_formulas').delete().eq('id',id);
  renderView();
}

function generateFormulasPDF(calcData,rrData){
  const inclCalc=document.getElementById('exp-calc')?.checked;
  const inclRR=document.getElementById('exp-rr')?.checked;
  if(!inclCalc&&!inclRR){alert('Select at least one section.');return;}
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4'});
    const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight(),margin=18,cW=pageW-margin*2;
    let y=margin;
    const checkPage=(n=10)=>{if(y+n>pageH-margin){doc.addPage();y=margin;}};
    const sectionHeader=(title)=>{checkPage(14);doc.setFillColor(40,60,100);doc.rect(margin,y,cW,10,'F');doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);doc.text(title,margin+4,y+7);y+=14;};
    const catHeader=(title)=>{checkPage(8);doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(60,80,140);doc.text(title.toUpperCase(),margin,y);y+=2;doc.setDrawColor(60,80,140);doc.setLineWidth(0.3);doc.line(margin,y,pageW-margin,y);y+=5;};
    const writeText=(text,opts={})=>{const{size=10,bold=false,color=[30,30,30],indent=0}=opts;doc.setFontSize(size);doc.setFont('helvetica',bold?'bold':'normal');doc.setTextColor(...color);doc.splitTextToSize(String(text||''),cW-indent).forEach(l=>{checkPage(6);doc.text(l,margin+indent,y);y+=size*0.4+1.5;});};

    if(inclCalc&&calcData.length){
      sectionHeader('Calculations');
      const cats={};calcData.forEach(f=>{const c=f.category||'General';if(!cats[c])cats[c]=[];cats[c].push(f);});
      Object.entries(cats).forEach(([cat,items])=>{
        catHeader(cat);
        items.forEach(f=>{
          checkPage(30);
          writeText(f.name,{size:11,bold:true,color:[20,20,20]});
          if(f.result_label||f.numerator||f.denominator){
            const label=f.result_label?f.result_label+' = ':'';
            const num=f.numerator||'…';const den=f.denominator||'…';
            const mult=f.multiplier?' × '+f.multiplier:'';
            const fracW=Math.max(num.length,den.length)*3.2+8;
            checkPage(20);
            doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(30,60,120);
            if(label)doc.text(label,margin+4,y+6);
            const fx=margin+4+(label.length*2.8);
            doc.text(num,fx,y+3);
            doc.setLineWidth(0.5);doc.setDrawColor(30,60,120);doc.line(fx,y+5,fx+fracW,y+5);
            doc.text(den,fx,y+10);
            if(mult)doc.text(mult,fx+fracW+3,y+7);
            y+=16;
          }
          (f.steps||[]).filter(Boolean).forEach((s,i)=>{
            checkPage(6);doc.setFontSize(9.5);doc.setFont('helvetica','normal');doc.setTextColor(50,50,80);
            doc.text('Step '+(i+1)+': '+s,margin+4,y);y+=5.5;
          });
          if(f.notes)writeText(f.notes,{size:9.5,color:[80,80,80],indent:4});
          if(f.example)writeText('Example: '+f.example,{size:9,color:[60,100,60],indent:4});
          y+=5;
        });
      });
    }
    if(inclRR&&rrData.length){
      sectionHeader('Reference Ranges');
      const cats={};rrData.forEach(f=>{const c=f.category||'General';if(!cats[c])cats[c]=[];cats[c].push(f);});
      Object.entries(cats).forEach(([cat,items])=>{
        catHeader(cat);
        checkPage(20);
        const colW=[cW*0.38,cW*0.31,cW*0.31];
        ['Analyte','Conventional Units','SI Units'].forEach((h,i)=>{
          const x=margin+colW.slice(0,i).reduce((a,b)=>a+b,0);
          doc.setFillColor(220,225,240);doc.rect(x,y,colW[i],8,'F');doc.setDrawColor(180,185,210);doc.setLineWidth(0.2);doc.rect(x,y,colW[i],8,'S');
          doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(40,40,80);doc.text(h,x+2,y+5.5);
        });y+=8;
        items.forEach((f,ri)=>{
          checkPage(8);
          const bg=ri%2===0?[245,246,250]:[255,255,255];
          doc.setFillColor(...bg);
          colW.forEach((w,ci)=>{const x=margin+colW.slice(0,ci).reduce((a,b)=>a+b,0);doc.rect(x,y,w,8,'F');doc.setDrawColor(200,205,220);doc.rect(x,y,w,8,'S');});
          doc.setFontSize(9.5);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);doc.text(f.name||'',margin+2,y+5.5);
          doc.setFont('helvetica','normal');doc.setTextColor(40,40,80);
          const cv=(f.conventional_value||'—')+(f.conventional_unit?' '+f.conventional_unit:'');
          const sv=(f.si_value||'—')+(f.si_unit?' '+f.si_unit:'');
          doc.text(cv,margin+colW[0]+2,y+5.5);
          doc.text(sv,margin+colW[0]+colW[1]+2,y+5.5);
          y+=8;
        });
        y+=6;
      });
    }
    const tot=doc.internal.getNumberOfPages();
    for(let p=1;p<=tot;p++){doc.setPage(p);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);doc.text('MLS BOC Prep — Calculations & Reference Ranges · Page '+p+' of '+tot,margin,pageH-8);doc.text(new Date().toLocaleDateString(),pageW-margin,pageH-8,{align:'right'});}
    doc.save('mls_calc_rr.pdf');
    document.getElementById('condition-modal').classList.add('hidden');
  }catch(err){alert('PDF export failed: '+err.message);}
}

async function startAllExam(){
  const total=100;
  const allQ=[];
  for(const s of SUBJECTS){
    if(s._combined)continue; // skip UI-only card
    const key=s.key;
    const w=BOC_WEIGHTS[key]||0;
    if(!w)continue;
    const count=Math.round(total*w/100);
    if(key==='microbiology'){
      // Microbiology weight pool includes parasitology & mycology (ASCP BOC 2025)
      const [mRes,pRes,myRes]=await Promise.all([
        sb.from('mlsboc_questions').select('*').eq('subject','microbiology'),
        sb.from('mlsboc_questions').select('*').eq('subject','parasitology'),
        sb.from('mlsboc_questions').select('*').eq('subject','mycology')
      ]);
      const microPool=shuffle([...(mRes.data||[]),...(pRes.data||[]),...(myRes.data||[])]);
      if(microPool.length)allQ.push(...microPool.slice(0,count));
    }else{
      const {data}=await sb.from('mlsboc_questions').select('*').eq('subject',key);
      if(data&&data.length)allQ.push(...shuffle(data).slice(0,count));
    }
  }
  // Also pull lab_operations if exists
  const labW=BOC_WEIGHTS['lab_operations']||7.5;
  const labCount=Math.round(total*labW/100);
  const {data:labQ}=await sb.from('mlsboc_questions').select('*').eq('subject','lab_operations');
  if(labQ&&labQ.length)allQ.push(...shuffle(labQ).slice(0,labCount));

  window._kqOpts={};appState.allQ=shuffle(allQ).slice(0,Math.min(total,allQ.length));
  appState.allIdx=0;appState.allAns=[];appState.allStarted=true;appState.allDone=false;appState.allSeconds=0;
  clearInterval(appState.allTimer);
  appState.allTimer=setInterval(()=>{appState.allSeconds++;updateAllTimer();},1000);
  renderView();
}

function updateAllTimer(){
  const el=document.getElementById('all-timer');
  if(el)el.textContent=fmtTime(appState.allSeconds);
}

    <div class="bbq-overlay">
      <div class="bbq-header">
        <button class="btn btn-ghost btn-sm" onclick="goHome()">← Quit</button>
        <div class="progress-bar" style="flex:1;margin:0 8px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span class="tag tag-info" style="font-size:11px;white-space:nowrap">${(q.subject||'').replace(/_/g,' ')}</span>
        <span class="question-num" style="white-space:nowrap;margin-left:8px">${appState.allIdx+1} / ${appState.allQ.length}</span>
        <div class="timer ml-auto" id="all-timer" style="font-size:12px">${fmtTime(appState.allSeconds)}</div>
      </div>
      <div class="bbq-body">
        <div class="bbq-question">${escNL(q.question)}</div>
        <div class="bbq-options">
          ${opts.map((opt,oi)=>`
            <button class="bbq-opt${answered?(opt===q.correct_answer?' correct-ans':(opt===answered&&answered!==q.correct_answer?' wrong-ans':'')):''}
              " style="background:${colors[oi]};color:${textColors[oi]}" onclick="answerAll('${opt}')" ${answered?'disabled':''}>
              <span class="bbq-opt-letter">${emojis[oi]}</span>
              <span>${q['option_'+opt]}</span>
            </button>`).join('')}
        </div>
        ${answered?`
          <div style="text-align:center;margin-bottom:16px">
            <div style="font-size:20px;font-weight:800;color:${answered===q.correct_answer?'var(--success)':'var(--danger)'};margin-bottom:8px">${answered===q.correct_answer?'✓ Correct!':'✗ Incorrect — '+q['option_'+q.correct_answer]}</div>
            ${q.explanation?`<div style="font-size:13px;color:var(--text2);background:var(--bg3);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 var(--r) var(--r) 0;text-align:left;max-width:500px;margin:0 auto">${q.explanation}</div>`:''}
          </div>
          <div style="text-align:center;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
            ${appState.allIdx>0?`<button class="btn btn-ghost" onclick="allPrev()">← Prev</button>`:''}
            ${appState.allIdx<appState.allQ.length-1
              ?`<button class="btn btn-primary" style="font-size:15px;padding:12px 32px" onclick="allNext()">Next →</button>`
              :`<button class="btn btn-success" style="font-size:15px;padding:12px 32px" onclick="finishAll()">Finish & Submit</button>`}
          </div>`:''}
      </div>
    </div>
  `;
}

function answerAll(opt){appState.allAns[appState.allIdx]=opt;renderView();}
function allNext(){appState.allIdx++;renderView();}
function allPrev(){appState.allIdx--;renderView();}

function finishAll(){
  clearInterval(appState.allTimer);
  appState.allDone=true;
  // Results are NOT saved to the database — export PDF to keep a record
  renderView();
}

function renderAllDone(v){
  v.innerHTML=`
    <div class="flex-center gap-12 mb-16">
      <button class="btn btn-ghost btn-sm" onclick="goHome()">← Home</button>
      <div class="section-title">Exam Results</div>
    </div>
    <div id="all-results"></div>
  `;
  renderQuizResults(document.getElementById('all-results'),true);
}

async function exportAttempt(attemptId){
  const {data:attempt}=await sb.from('mlsboc_attempts').select('*').eq('id',attemptId).single();
  if(!attempt)return;
  const ids=attempt.incorrect_ids||[];
  if(!ids.length){alert('No missed questions in this attempt.');return;}
  const {data:qs}=await sb.from('mlsboc_questions').select('*').in('id',ids);
  const rows=[['Question','Correct Answer','Subject']];
  (qs||[]).forEach(q=>rows.push([csvEsc(q.question),csvEsc(q['option_'+q.correct_answer]),q.subject]));
  dlCSV(rows,'missed_'+attemptId.slice(0,8)+'.csv');
}

function exportFromResults(){
  const qs=appState.allQ,ans=appState.allAns;
  const rows=[['Question','Your Answer','Correct Answer','Subject']];
  qs.forEach((q,i)=>{
    if(ans[i]!==q.correct_answer)rows.push([csvEsc(q.question),csvEsc(q['option_'+(ans[i]||'?')]||'(unanswered)'),csvEsc(q['option_'+q.correct_answer]),q.subject]);
  });
  dlCSV(rows,'missed_questions.csv');
}

async function reviewAttempt(idx){
  const a=appState.attempts[idx];
  const allIds=[...(a.correct_ids||[]),...(a.incorrect_ids||[])];
  const {data:qs}=await sb.from('mlsboc_questions').select('*').in('id',allIds);
  appState.allQ=qs||[];
  appState.allAns=qs.map(q=>(a.correct_ids||[]).includes(q.id)?q.correct_answer:'?');
  appState.allSeconds=a.time_seconds||0;
  appState.allDone=true;appState.view='all';
  renderView();
}
async function reviewAttemptFromAll(idx){reviewAttempt(idx);}

async function handleCaseImgFile(e,caseId,slot){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const dataUrl=ev.target.result;
    const {data}=await sb.from('mlsboc_cases').select('images').eq('id',caseId).single();
    const imgs=[...(data?.images||[])];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=dataUrl;
    await sb.from('mlsboc_cases').update({images:imgs}).eq('id',caseId);
    openCaseImageEditor(caseId);
    renderTab();
  };
  reader.readAsDataURL(file);
}

async function openExportModal(){

  // Safe fetch helper — always returns array
  const safeFetch=async(table)=>{
    try{
      const res=await sb.from(table).select('*').order('created_at');
      return Array.isArray(res.data)?res.data.map(withTableData):[];
    }catch(e){return [];}

  const [bbD,hcD,mcD,immD,chemD,paraD,mycoD]=await Promise.all([

    safeFetch('mlsboc_chem_cases'),
    safeFetch('mlsboc_para_cases'),
    safeFetch('mlsboc_myco_cases'),

  const sources=[
    {label:'Blood Bank',        key:'bb',   data:bbD,   tableLabel:'Typing Results'},
    {label:'Hematology',        key:'hc',   data:hcD,   tableLabel:'Lab Results'},
    {label:'Microbiology',      key:'mc',   data:mcD,   tableLabel:'Test Results'},
    {label:'Immunology',        key:'imm',  data:immD,  tableLabel:'Immunology Results'},
    {label:'Clinical Chemistry',key:'chem', data:chemD, tableLabel:'Chemistry Results'},

    {label:'Mycology',          key:'myco', data:mycoD, tableLabel:'Mycology Results'},

  if(!sources.length){
    modalBody.innerHTML=`<div class="flex-center gap-8 mb-16"><div style="font-size:16px;font-weight:600">Export Cases to PDF</div>${closeBtn}</div><div class="empty">No cases to export yet.</div>`;
    return;
  }

  _exportCases=sources;

  let html=`
    <div class="flex-center gap-8 mb-16">
      <div style="font-size:16px;font-weight:600">Export Cases to PDF</div>
      ${closeBtn}
    </div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:12px">Select cases to include — all go into one PDF.</div>

}
