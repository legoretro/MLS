// ─── BLOOD BANK QUIZ MODE ─────────────────────────────────────────────────────
async function startBBQuiz(){
  if(!isAdmin){alert('Quiz mode is available in Admin mode only for case activities.');return;}
  const {data:_bq1}=await sb.from('mlsboc_bb_cases').select('*').order('created_at');
  const data=(_bq1||[]).map(withTableData);
  const allQs=(data||[]).flatMap(c=>(c.questions||[]).filter(q=>q.question).map(q=>({...q,_caseTitle:c.title,_scenario:c.scenario,_tableData:c.table_data||null,_imgs:imageEntryList(c.images)})));
  if(!allQs.length){alert('No questions found in any case yet.');return;}
  appState.bbQuizMode=true;
  appState.bbQuizItems=shuffle(allQs);
  appState.bbQuizIdx=0;
  appState.bbQuizChosen=null;
  appState.bbQuizAnswered=false;
  appState.bbQuizScore=0;
  appState.bbQuizDone=false;
  appState.bbQuizAnswers={};
  
  renderTab();
}

function exitBBQuiz(){
  
  appState.bbQuizMode=false;
  appState.bbQuizDone=false;
  renderTab();
}

function renderBBQuiz(el){
  if(appState.bbQuizDone){renderBBQuizResults(el);return;}

  const items=appState.bbQuizItems;
  const idx=appState.bbQuizIdx;
  const item=items[idx];
  const answers=appState.bbQuizAnswers||{};
  const chosen=answers[idx]??appState.bbQuizChosen;
  const answered=chosen!==undefined&&chosen!==null;
  const letters=['a','b','c','d'];
  const colors=['bbq-opt-a','bbq-opt-b','bbq-opt-c','bbq-opt-d'];
  const emojis=['🔴','🔵','🟡','🟢'];
  const pct=Math.round((idx+1)/items.length*100);

  const tableHtml=item._tableData&&tblHasContent(item._tableData)?`
    <div style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px">Typing Results</div>
      ${renderDataTable(item._tableData,{small:true})}
    </div>`:'' ;

  const qImgs=imageEntryList(item._imgs).map(imageEntrySrc).filter(Boolean);
  const imgHtml=qImgs.length?`
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
      ${qImgs.map(url=>`<img src="${esc(url)}" onclick="openImgViewer('${jsAttr(url)}')" onerror="retryImageLoad(this)" style="height:70px;max-width:180px;border-radius:var(--r);border:1px solid var(--border);cursor:zoom-in;object-fit:contain;background:var(--bg3)">`).join('')}
    </div>`:'' ;

  const optsHtml=(item.options||[]).map((opt,oi)=>{
    if(!opt)return '';
    const letter=letters[oi];
    let cls=`bbq-opt ${colors[oi]}`;
    if(answered){
      if(letter===item.correct)cls+=' correct-ans';
      else if(letter===chosen&&chosen!==item.correct)cls+=' wrong-ans';
    }
    return `<button class="${cls}" onclick="answerBBQuiz('${letter}')" ${answered?'disabled':''}><span class="bbq-opt-letter">${emojis[oi]}</span><span>${opt}</span></button>`;
  }).filter(Boolean).join('');

  let afterHtml='';
  if(answered){
    const isCorrect=chosen===item.correct;
    const correctIdx=letters.indexOf(item.correct);
    afterHtml=`
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:22px;font-weight:800;color:${isCorrect?'var(--success)':'var(--danger)'};margin-bottom:6px">${isCorrect?'✓ Correct!':'✗ Incorrect'}</div>
        ${!isCorrect?`<div style="font-size:13px;color:var(--text2)">Correct answer: <strong style="color:var(--success)">${(item.options||[])[correctIdx]||''}</strong></div>`:''}
        ${item.explanation?`<div style="font-size:13px;color:var(--text2);margin-top:8px;background:var(--bg3);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 var(--r) var(--r) 0;text-align:left">${item.explanation}</div>`:''}
      </div>
      <div style="text-align:center;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        ${idx>0?`<button class="btn btn-ghost" onclick="bbQuizPrev()" style="font-size:15px;padding:12px 24px">← Prev</button>`:''}
        ${idx<items.length-1
          ?`<button class="btn btn-primary" onclick="bbQuizNext()" style="font-size:15px;padding:12px 32px">Next →</button>`
          :`<button class="btn btn-success" onclick="appState.bbQuizDone=true;renderTab()" style="font-size:15px;padding:12px 32px">See Results</button>`}
      </div>`;
  }

  el.innerHTML=`
    <div class="bbq-overlay">
      <div class="bbq-header">
        <button class="btn btn-ghost btn-sm" onclick="exitBBQuiz()">✕ Exit</button>
        <div class="progress-bar" style="flex:1;margin:0 8px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span class="question-num" style="white-space:nowrap">${idx+1} / ${items.length}</span>
      </div>
      <div class="bbq-body">
        <div class="bbq-context">
          <div class="bbq-context-title">${item._caseTitle||'Case'}</div>
          ${item._scenario?`<div class="bbq-context-scenario">${item._scenario}</div>`:''}
          ${tableHtml}${imgHtml}
        </div>
        <div class="bbq-question">${escNL(item.question)}</div>
        <div class="bbq-options">${optsHtml}</div>
        ${afterHtml}
      </div>
    </div>
  `;
}

function answerBBQuiz(letter){
  if(!appState.bbQuizAnswers)appState.bbQuizAnswers={};
  if(appState.bbQuizAnswers[appState.bbQuizIdx]!==undefined)return;
  appState.bbQuizAnswered=true;
  appState.bbQuizChosen=letter;
  appState.bbQuizAnswers[appState.bbQuizIdx]=letter;
  const item=appState.bbQuizItems[appState.bbQuizIdx];
  if(letter&&letter===item.correct)appState.bbQuizScore++;
  renderTab();
}

function bbQuizNext(){
  appState.bbQuizIdx++;
  const chosen=(appState.bbQuizAnswers||{})[appState.bbQuizIdx];
  appState.bbQuizChosen=chosen??null;
  appState.bbQuizAnswered=chosen!==undefined;
  renderTab();
}
function bbQuizPrev(){
  appState.bbQuizIdx=Math.max(0,appState.bbQuizIdx-1);
  const chosen=(appState.bbQuizAnswers||{})[appState.bbQuizIdx];
  appState.bbQuizChosen=chosen??null;
  appState.bbQuizAnswered=chosen!==undefined;
  renderTab();
}

function renderBBQuizResults(el){
  const total=appState.bbQuizItems.length;
  const answers=appState.bbQuizAnswers||{};
  const score=appState.bbQuizItems.reduce((sum,item,i)=>sum+(answers[i]===item.correct?1:0),0);
  const pct=Math.round(score/total*100);
  const letters=['a','b','c','d'];
  const missed=[];

  let reviewHtml='';
  appState.bbQuizItems.forEach((item,i)=>{
    const ans=answers[i]||null;
    const wasCorrect=ans===item.correct;
    const correctIdx=letters.indexOf(item.correct);
    const chosenIdx=ans?letters.indexOf(ans):-1;
    if(!wasCorrect) missed.push({item,ans});
    reviewHtml+=`
      <div style="background:var(--bg2);border:1px solid ${wasCorrect?'var(--border)':'#f0647433'};border-radius:var(--r);padding:14px 16px;margin-bottom:8px">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">${item._caseTitle||''}</div>
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px">${escNL(item.question)}</div>
        ${wasCorrect
          ?`<div style="font-size:12px;color:var(--success)">✓ Correct — ${(item.options||[])[correctIdx]||''}</div>`
          :`<div style="font-size:12px;color:var(--danger)">✗ ${ans&&chosenIdx>=0?'Your answer: '+((item.options||[])[chosenIdx]||''):'(unanswered)'}</div>
           <div style="font-size:12px;color:var(--success);margin-top:2px">Correct: ${(item.options||[])[correctIdx]||''}</div>`}
        ${item.explanation?`<div style="font-size:12px;color:var(--text2);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">${item.explanation}</div>`:''}
      </div>`;
  });

  const exportBBMissed=()=>{
    if(!missed.length){alert('Nothing missed!');return;}
    try{
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF({unit:'mm',format:'a4'});
      const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight(),margin=18,cW=pageW-margin*2;
      let y=margin;
      const checkPage=(n=8)=>{if(y+n>pageH-margin){doc.addPage();y=margin;}};
      doc.setFillColor(210,210,210);doc.rect(margin,y,cW,10,'F');
      doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
      doc.text('Missed Blood Bank Quiz Questions',(pageW/2),y+7,{align:'center'});y+=16;
      missed.forEach(({item,ans},i)=>{
        checkPage(32);
        const correctIdx=letters.indexOf(item.correct);
        const chosenIdx=ans?letters.indexOf(ans):-1;
        if(item._caseTitle){doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(100,100,140);doc.text(item._caseTitle,margin,y);y+=5;}
        doc.setFontSize(10.5);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
        doc.splitTextToSize(`Q${i+1}. ${item.question}`,cW).forEach(l=>{checkPage();doc.text(l,margin,y);y+=5.5;});
        (item.options||[]).forEach((opt,oi)=>{
          if(!opt)return;
          const ltr=letters[oi];
          const isCorrect=ltr===item.correct,isGiven=ltr===ans;
          doc.setFontSize(9.5);doc.setFont('helvetica',isCorrect?'bold':'normal');
          doc.setTextColor(...(isCorrect?[20,120,60]:isGiven?[180,40,40]:[50,50,50]));
          checkPage();doc.text(`${ltr.toUpperCase()}. ${opt}${isCorrect?' ✓':isGiven?' ←':''}`,margin+4,y);y+=5;
        });
        if(item.explanation){y+=1;doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(80,80,100);doc.splitTextToSize('Note: '+item.explanation,cW-4).forEach(l=>{checkPage();doc.text(l,margin+4,y);y+=4.5;});}
        y+=5;
      });
      const total=doc.internal.getNumberOfPages();
      for(let p=1;p<=total;p++){doc.setPage(p);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);doc.text(`MLS BOC Prep — Missed Questions · Page ${p} of ${total}`,margin,pageH-8);doc.text(new Date().toLocaleDateString(),pageW-margin,pageH-8,{align:'right'});}
      doc.save('missed_bb_quiz.pdf');
    }catch(err){alert('PDF export failed: '+err.message);}
  };

  const retryWrongOnly=()=>{
    if(!missed.length)return;
    appState.bbQuizItems=shuffle(missed.map(m=>m.item));
    appState.bbQuizIdx=0;appState.bbQuizChosen=null;appState.bbQuizAnswered=false;
    appState.bbQuizScore=0;appState.bbQuizDone=false;appState.bbQuizAnswers={};
    renderTab();
  };

  el.innerHTML=`
    <div class="bbq-overlay">
      <div class="bbq-header">
        <button class="btn btn-ghost btn-sm" onclick="exitBBQuiz()">← Back to Cases</button>
        <div class="ml-auto" style="color:var(--text);font-size:13px;font-family:var(--mono)">Quiz Complete</div>
      </div>
      <div class="bbq-body">
        <div style="text-align:center;padding:24px 0 32px">
          <div style="font-size:48px;margin-bottom:8px">${pct>=80?'🏆':pct>=60?'✅':'📚'}</div>
          <div class="bbq-score-big">${pct}%</div>
          <div style="font-size:16px;color:var(--text2)">${score} of ${total} correct</div>
        </div>
        <div class="result-grid" style="margin-bottom:24px">
          <div class="stat-card"><div class="stat-num text-success">${score}</div><div class="stat-label">Correct</div></div>
          <div class="stat-card"><div class="stat-num text-danger">${total-score}</div><div class="stat-label">Missed</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${pct}%</div><div class="stat-label">Score</div></div>
        </div>
        <div class="flex gap-8 mb-20 flex-wrap">
          <button class="btn btn-primary" onclick="startBBQuiz()">🔄 Retry All</button>
          ${missed.length?`<button class="btn btn-warn" onclick="(${retryWrongOnly.toString()})()">⚡ Retry Wrong Only (${missed.length})</button>`:''}
          ${missed.length?`<button class="btn btn-ghost btn-sm" onclick="(${exportBBMissed.toString()})()">📥 Export Missed</button>`:''}
          <button class="btn btn-ghost" onclick="exitBBQuiz()">Back to Cases</button>
        </div>
        ${missed.length?`<div style="font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px">Review All Questions</div>${reviewHtml}`:'<div style="color:var(--success);font-weight:600;text-align:center;font-size:18px">Perfect score! 🎉</div>'}
      </div>
    </div>
  `;
}

function renderBBCase(c,idx){
  const qs=c.questions||[];
  const selState=appState.bbAnswers[c.id]||{};
  const imgs=imageEntryList(c.images);
  // table_data rendered via renderDataTable
  const collapsed=!appState.bbCollapsed||appState.bbCollapsed[c.id]!==false;
  return `
    <div class="case-card" id="bbcase-${c.id}" style="margin-bottom:12px">
      <div class="flex-center gap-8 flex-wrap" style="cursor:pointer" onclick="toggleBBCollapse('${c.id}')">
        <span class="tag tag-info" style="font-size:13px;font-weight:700;padding:4px 12px">Case ${idx+1}</span>
        <span style="font-size:17px;font-weight:700">${c.title||'Untitled Case'}</span>
        ${c.is_draft?`<span class="draft-badge">Draft</span>`:''}
        <span class="ml-auto" style="font-size:18px;color:var(--text3);transition:transform .2s;transform:rotate(${collapsed?'0':'180'}deg)">⌃</span>
        ${isAdmin?`<div class="flex gap-6" onclick="event.stopPropagation()">
          <button class="btn btn-ghost btn-xs" onclick="openBBCaseEditor('${c.id}')">Edit</button>
          <button class="btn btn-danger btn-xs" onclick="deleteBBCase('${c.id}')">Delete</button>
        </div>`:''}
      </div>
      ${collapsed?'':`
        <div style="margin-top:16px">
          ${c.scenario?`<div class="case-scenario" style="margin-bottom:20px;font-size:15px;line-height:1.85">${escNL(c.scenario)}</div>`:''}
          ${c.table_data&&tblHasContent(c.table_data)?renderDataTable(c.table_data,{small:true}):''}  
          ${caseImageRowHTML(imgs,'object-fit:contain;background:var(--bg3);')}
          ${qs.length?`
            <div class="divider"></div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
              <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px">Questions</div>
              ${caseAnswersAvailable()&&!bbAllChecked(c.id,qs.length)?`<button class="btn btn-primary btn-sm" onclick="checkAllBB('${c.id}',${qs.length})">Check All</button>`:''}
              ${bbAnyAnswered(c.id)?`<button class="btn btn-ghost btn-sm" onclick="resetAllBB('${c.id}')">Reset All</button>`:''}
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;align-items:start">
              ${qs.map((q,qi)=>renderBBQuestion(c.id,q,qi,selState)).join('')}
            </div>
          `:`<div class="empty" style="padding:16px;text-align:left">No questions added yet.</div>`}
        </div>
      `}

  `;

function renderBBQuestion(caseId,q,qi,selState){
  const checked=selState[qi]?.checked===true;
  const chosen=selState[qi]?.choice;
  const reveal=caseAnswersAvailable();
  const letters=['a','b','c','d'];
  const correctIdx=letters.indexOf(q.correct);
  return `
    <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:16px 18px;box-shadow:0 2px 8px #0002">
      <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;font-family:var(--mono);letter-spacing:.5px">Q${qi+1}</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.65">${escNL(q.question)}</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${(q.options||[]).map((opt,oi)=>{
          if(!opt)return '';
          const letter=letters[oi];
          let bg='var(--bg4)';let bd='var(--border)';let color='var(--text)';let weight='400';
          if(chosen===letter&&!checked){bg='var(--bg4)';bd='var(--accent)';color='var(--accent)';weight='500';}
          if(checked&&reveal){
            if(letter===q.correct){bg='var(--bg4)';bd='var(--success)';color='var(--success)';weight='600';}
            else if(letter===chosen&&chosen!==q.correct){bg='var(--bg4)';bd='var(--danger)';color='var(--danger)';weight='500';}
          }
          return `<button onclick="selectBBQ('${caseId}',${qi},'${letter}')" ${checked?'disabled':''} style="display:flex;align-items:flex-start;gap:10px;background:${bg};border:1px solid ${bd};border-radius:var(--r);padding:9px 13px;cursor:${checked?'default':'pointer'};text-align:left;width:100%;transition:all .12s">
            <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:${color};min-width:20px;margin-top:1px">${letter.toUpperCase()}.</span>
            <span style="font-size:13px;color:${color};font-weight:${weight};line-height:1.5">${opt}</span>
          </button>`;
        }).filter(Boolean).join('')}
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:32px">
        ${reveal&&!checked&&chosen?`<button class="btn btn-primary btn-sm" onclick="checkBBQ('${caseId}',${qi})">Check Answer</button>`:''}
        ${chosen?`<button class="btn btn-ghost btn-sm" onclick="resetBBQ('${caseId}',${qi})">Reset</button>`:''}
      </div>
      ${checked&&reveal?`
        <div class="case-feedback ${chosen===q.correct?'correct':'wrong'}" style="margin-top:8px;font-size:13px">
          ${chosen===q.correct
            ?'✓ Correct!'
            :`✗ Incorrect — Correct: ${(q.correct||'a').toUpperCase()}. ${(q.options||[])[correctIdx]||''}`}
        </div>
        ${q.explanation?`<div class="explanation" style="margin-top:8px;font-size:13px">${q.explanation}</div>`:''}`:''}
    </div>
  `;
}

function bbAllChecked(caseId,count){
  const s=appState.bbAnswers[caseId]||{};
  for(let i=0;i<count;i++){if(!s[i]?.checked)return false;}
  return count>0;
}
function bbAnyAnswered(caseId){
  return Object.values(appState.bbAnswers[caseId]||{}).some(v=>v?.choice);
}
function selectBBQ(caseId,qi,letter){
  if(!appState.bbAnswers[caseId])appState.bbAnswers[caseId]={};
  if(appState.bbAnswers[caseId][qi]?.checked)return;
  appState.bbAnswers[caseId][qi]={choice:letter,checked:false};
  renderTab();
}
function checkAllBB(caseId,count){
  if(!caseAnswersAvailable()){alert('Answers are available in Admin mode only for case activities.');return;}
  if(!appState.bbAnswers[caseId])appState.bbAnswers[caseId]={};
  for(let i=0;i<count;i++){
    if(appState.bbAnswers[caseId][i]?.choice&&!appState.bbAnswers[caseId][i]?.checked)
      appState.bbAnswers[caseId][i].checked=true;
  }
  renderTab();
}
function resetAllBB(caseId){appState.bbAnswers[caseId]={};renderTab();}
function checkBBQ(caseId,qi){
  if(!caseAnswersAvailable()){alert('Answers are available in Admin mode only for case activities.');return;}

  renderTab();
}

function compressCaseImageFile(file,max=1200,quality=0.78){
  return new Promise((resolve,reject)=>{
    if(!file||!file.type.startsWith('image/')){reject(new Error('Choose an image file.'));return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        try{
          let w=img.width,h=img.height;
          if(w>max||h>max){
            const scale=Math.min(max/w,max/h);
            w=Math.max(1,Math.round(w*scale));
            h=Math.max(1,Math.round(h*scale));
          }
          const cv=document.createElement('canvas');cv.width=w;cv.height=h;
          const ctx=cv.getContext('2d');
          ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
          ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='medium';
          ctx.drawImage(img,0,0,w,h);
          resolve(cv.toDataURL('image/jpeg',quality));
        }catch(err){reject(err);}
      };
      img.onerror=()=>reject(new Error('Could not read image.'));
      img.src=ev.target.result;
    };
    reader.onerror=()=>reject(new Error('Could not read image.'));
    reader.readAsDataURL(file);
  });
}

async function addBBImageFiles(files){
  const selected=Array.from(files||[]).filter(f=>f.type&&f.type.startsWith('image/'));
  if(!selected.length)return;
  const current=(window._bbEditorImages||[]).filter(Boolean);
  for(const file of selected.slice(0,4-current.length)){
    try{current.push(await compressCaseImageFile(file));}
    catch(err){alert('Image upload failed: '+err.message);}
  }
  window._bbEditorImages=current.slice(0,4);
  refreshBBImageEditor();
}

function handleBBImageFile(e){
  addBBImageFiles(e.target.files);
  e.target.value='';
}

function handleBBImageDrop(e){
  e.preventDefault();e.currentTarget.classList.remove('dragover');
  addBBImageFiles(e.dataTransfer.files);
}

function addBBQuestion(){
  if((window._bbQCount||0)>=5){alert('Maximum 5 questions per case.');return;}
  const i=window._bbQCount++;
  const container=document.getElementById('bb-questions-list');
  if(!container)return;
  const div=document.createElement('div');
  div.innerHTML=bbQuestionEditor(i,null);
  container.appendChild(div.firstElementChild);
  if(window._bbQCount>=5){
    const btn=document.getElementById('bb-add-q-btn');
    if(btn)btn.style.display='none';
  }
}

function removeBBQuestion(i){
  const el=document.getElementById('bb-q-'+i);
  if(el)el.remove();
  window._bbQCount=Math.max(0,(window._bbQCount||1)-1);
  const btn=document.getElementById('bb-add-q-btn');
  if(btn)btn.style.display='';
}

async function saveBBCase(caseId){
  const title=document.getElementById('bb-title')?.value.trim();
  const scenario=document.getElementById('bb-scenario')?.value.trim();
  const isDraft=document.getElementById('bb-draft')?.value==='true';
  if(!title){alert('Case title is required.');return;}

  const rawBB=tblReadData('bb');
  const table_data=tblHasContent(rawBB)?rawBB:null;

  const questions=[];
  for(let i=0;i<(window._bbQCount||0);i++){
    const qEl=document.getElementById('bb-q-'+i);
    if(!qEl||!qEl.isConnected)continue;
    const question=document.getElementById('bb-qq-'+i)?.value.trim()||'';
    if(!question)continue;
    const options=['a','b','c','d'].map(l=>document.getElementById('bb-qo-'+i+'-'+l)?.value.trim()||'');
    const correct=document.getElementById('bb-qc-'+i)?.value||'a';
    const explanation=document.getElementById('bb-qe-'+i)?.value.trim()||'';
    questions.push({question,options,correct,explanation});
  }

  const images=(window._bbEditorImages||[]).filter(Boolean);
  const payload={title,scenario:scenario||'',table_data,questions,is_draft:isDraft,images};

  let error;
  if(caseId){
    ({error}=await sb.from('mlsboc_bb_cases').update(payload).eq('id',caseId));
  }else{
    ({error}=await sb.from('mlsboc_bb_cases').insert(payload));
  }
  if(error){alert('Save failed: '+error.message);return;}
  document.getElementById('condition-modal').classList.add('hidden');
  appState.bbAnswers={};
  renderTab();
}

async function deleteBBCase(id){
  if(!confirm('Delete this case and all its questions?'))return;
  await sb.from('mlsboc_bb_cases').delete().eq('id',id);
  delete appState.bbAnswers[id];
  renderTab();
}


// ─── FORMULAS VIEW ────────────────────────────────────────────────────────────
// ─── CALCULATIONS / REFERENCE RANGES ─────────────────────────────────────────
// Two types stored in mlsboc_formulas:
//   type='calc'  → name, category, numerator, denominator, steps[], notes, example
//   type='rr'    → name, category, conventional_value, conventional_unit,
//                  si_value, si_unit, notes

function mergeFormulaPlaceholders(rows,placeholders){
  const seen=new Set((rows||[]).map(f=>`${String(f.category||'General').toLowerCase()}::${String(f.name||'').toLowerCase()}`));
  return [...(rows||[]),...placeholders.filter(f=>!seen.has(`${String(f.category||'General').toLowerCase()}::${String(f.name||'').toLowerCase()}`))];
}

function splitFormulaRows(allRows){
  const calcData=[],rrData=[];
  (allRows||[]).forEach(f=>{
    if(f.type==='rr')rrData.push(f);
    else calcData.push(f);
  });
  return {
    calcData:mergeFormulaPlaceholders(calcData,CALC_PLACEHOLDERS),
    rrData:mergeFormulaPlaceholders(rrData,RR_PLACEHOLDERS)
  };
}

async function renderFormulasView(v){
  // Fetch all rows then split by type — works even if 'type' column not yet added to Supabase
  let calcData=[],rrData=[];
  try{
    const {data:allRows}=await sb.from('mlsboc_formulas').select('*').order('category,name');
    ({calcData,rrData}=splitFormulaRows(allRows));
  }catch(e){
    console.warn('Formulas fetch failed:',e);
    calcData=CALC_PLACEHOLDERS;
    rrData=RR_PLACEHOLDERS;
  }

  // Group by category
  const groupBy=(arr)=>{const g={};arr.forEach(f=>{const c=f.category||'General';if(!g[c])g[c]=[];g[c].push(f);});return g;};
  const calcCats=groupBy(calcData);
  const rrCats=groupBy(rrData);
  const activeTab=appState._fmTab||'calc';

  v.innerHTML=`
    <div class="flex-center gap-12 mb-16 flex-wrap">
      <button class="btn btn-ghost btn-sm" onclick="goHome()">← Home</button>
      <div class="section-title">Calculations / Reference Ranges</div>
      <div class="flex gap-8 ml-auto flex-wrap">
        <button class="btn btn-ghost btn-sm" onclick="openFormulasExport()">📄 Export</button>
        ${isAdmin?`<button class="btn btn-primary btn-sm" onclick="openFormulaEditor(null,'${activeTab}')">+ Add ${activeTab==='calc'?'Calculation':'Reference Range'}</button>`:''}
      </div>
    </div>
    <div class="tabs mb-16">
      <button class="tab ${activeTab==='calc'?'active':''}" onclick="appState._fmTab='calc';renderView()">Calculations</button>
      <button class="tab ${activeTab==='rr'?'active':''}" onclick="appState._fmTab='rr';renderView()">Reference Ranges</button>
    </div>
    ${activeTab==='calc'?renderCalcTab(calcCats,calcData):renderRRTab(rrCats,rrData)}
  `;
}

    const {data}=await sb.from('mlsboc_formulas').select('*').eq('id',id).single();

  const steps=(f.steps||['','','']).concat(['','','']).slice(0,5);

async function saveFormula(id,type){
  type=type||'calc';
  const name=document.getElementById('fm-name')?.value.trim();
  const category=document.getElementById('fm-cat')?.value.trim()||'General';
  if(!name){alert('Name required.');return;}
  let payload={name,category,type};
  if(type==='rr'){
    payload.formula=''; // required by DB constraint, not used for RR
    payload.conventional_value=document.getElementById('fm-conv-val')?.value.trim()||'';
    payload.conventional_unit=document.getElementById('fm-conv-unit')?.value.trim()||'';
    payload.si_value=document.getElementById('fm-si-val')?.value.trim()||'';
    payload.si_unit=document.getElementById('fm-si-unit')?.value.trim()||'';
    payload.notes=document.getElementById('fm-notes')?.value.trim()||'';
  }else{
    payload.result_label=document.getElementById('fm-result-label')?.value.trim()||'';
    payload.numerator=document.getElementById('fm-numerator')?.value.trim()||'';
    payload.denominator=document.getElementById('fm-denominator')?.value.trim()||'';
    payload.multiplier=document.getElementById('fm-multiplier')?.value.trim()||'';
    payload.steps=Array.from({length:5},(_,i)=>document.getElementById('fm-step-'+i)?.value.trim()||'').filter(Boolean);
    payload.notes=document.getElementById('fm-notes')?.value.trim()||'';
    payload.example='';
    // Keep formula column satisfied (build from numerator/denominator or use name)
    payload.formula=[payload.numerator,payload.denominator].filter(Boolean).join(' / ')||payload.result_label||payload.name||'';
  }
  let error;
  if(id){({error}=await sb.from('mlsboc_formulas').update(payload).eq('id',id));}
  else{({error}=await sb.from('mlsboc_formulas').insert(payload));}
  if(error){alert('Save failed: '+error.message);return;}
  document.getElementById('condition-modal').classList.add('hidden');
  renderView();
}

async function deleteFormula(id){
  if(!confirm('Delete this?'))return;
  await sb.from('mlsboc_formulas').delete().eq('id',id);
  renderView();
}

function calcFormulaText(f){
  if(!f)return '';
  if((f.steps||[]).filter(Boolean).length)return (f.steps||[]).filter(Boolean).join(' | ');
  const left=f.result_label?f.result_label+' = ':'';
  if(f.numerator||f.denominator){
    const frac=(f.numerator||'...')+' / '+(f.denominator||'...');
    return left+frac+(f.multiplier?' x '+f.multiplier:'');
  }
  return f.formula||f.name||'';
}

function drawCalcOnePage(doc,calcData,pageW,pageH,margin){
  const cW=pageW-margin*2;
  doc.setFillColor(38,96,207);
  doc.rect(0,0,pageW,18,'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');
  doc.setFontSize(14);
  doc.text('Calculations - One Page',margin,12);
  doc.setFontSize(8);
  doc.setFont('helvetica','normal');
  doc.text('Formula-only study sheet',pageW-margin,12,{align:'right'});

  const cols=2;
  const gap=5;
  const colW=(cW-gap)/cols;
  const rowH=13.2;
  const startY=24;
  const rowsPerCol=Math.floor((pageH-startY-14)/rowH);
  const maxItems=rowsPerCol*cols;
  const items=(calcData||[]).slice(0,maxItems);
  items.forEach((f,i)=>{
    const col=Math.floor(i/rowsPerCol);
    const row=i%rowsPerCol;
    const x=margin+col*(colW+gap);
    const y=startY+row*rowH;
    doc.setFillColor(i%2===0?246:255,i%2===0?248:255,i%2===0?252:255);
    doc.setDrawColor(198,205,226);
    doc.roundedRect(x,y,colW,rowH-1.4,1.8,1.8,'FD');
    doc.setFont('helvetica','bold');
    doc.setFontSize(7.6);
    doc.setTextColor(18,25,45);
    doc.text(doc.splitTextToSize(String(f.name||''),colW-5).slice(0,1),x+2.5,y+4.3);
    doc.setFont('courier','bold');
    doc.setFontSize(6.8);
    doc.setTextColor(28,92,185);
    doc.text(doc.splitTextToSize(calcFormulaText(f),colW-5).slice(0,2),x+2.5,y+8.2);
  });
  if((calcData||[]).length>maxItems){
    doc.setFont('helvetica','normal');
    doc.setFontSize(7);
    doc.setTextColor(180,50,60);
    doc.text(`Showing ${maxItems} of ${calcData.length} calculations on this one-page sheet.`,margin,pageH-8);
  }
}

function generateFormulasPDF(){
  const exportData=window._formulaExportData||{};
  const calcData=exportData.calcData||[];
  const rrData=exportData.rrData||[];
  const inclCalc=document.getElementById('exp-calc')?.checked;
  const inclRR=document.getElementById('exp-rr')?.checked;
  const blankCalc=document.getElementById('exp-calc-blank')?.checked;
  if(!inclCalc&&!inclRR){alert('Select at least one section.');return;}
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4',orientation:'landscape'});
    const margin=10;
    let pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight(),cW=pageW-margin*2;
    let y=margin;
    const refreshPage=()=>{pageW=doc.internal.pageSize.getWidth();pageH=doc.internal.pageSize.getHeight();cW=pageW-margin*2;};
    const checkPage=(n=10)=>{refreshPage();if(y+n>pageH-margin){doc.addPage('a4','landscape');refreshPage();y=margin;}};
    const sectionHeader=(title)=>{checkPage(14);doc.setFillColor(40,60,100);doc.rect(margin,y,cW,10,'F');doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);doc.text(title,margin+4,y+7);y+=14;};
    const catHeader=(title)=>{checkPage(8);doc.setFontSize(9.5);doc.setFont('helvetica','bold');doc.setTextColor(60,80,140);doc.text(title.toUpperCase(),margin,y);y+=2;doc.setDrawColor(60,80,140);doc.setLineWidth(0.3);doc.line(margin,y,pageW-margin,y);y+=5;};

    if(inclCalc&&calcData.length){
      if(blankCalc)drawBlankCalcPracticePage(doc,calcData,pageW,pageH,margin);
      else drawCalcOnePage(doc,calcData,pageW,pageH,margin);
      y=pageH;
    }
    if(inclRR&&rrData.length){
      if(inclCalc)doc.addPage('a4','landscape');
      refreshPage();
      y=margin;
      sectionHeader('Reference Ranges');
      const cats={};rrData.forEach(f=>{const c=f.category||'General';if(!cats[c])cats[c]=[];cats[c].push(f);});
      Object.entries(cats).forEach(([cat,items])=>{
        catHeader(cat);
        checkPage(20);
        const colW=[cW*0.30,cW*0.24,cW*0.24,cW*0.22];
        ['Analyte','Conventional Units','SI Units'].forEach((h,i)=>{
          const x=margin+colW.slice(0,i).reduce((a,b)=>a+b,0);
          doc.setFillColor(220,225,240);doc.rect(x,y,colW[i],8,'F');doc.setDrawColor(180,185,210);doc.setLineWidth(0.2);doc.rect(x,y,colW[i],8,'S');
          doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(40,40,80);doc.text(h,x+2,y+5.5);
        });
        const nx=margin+colW[0]+colW[1]+colW[2];
        doc.setFillColor(220,225,240);doc.rect(nx,y,colW[3],8,'F');doc.setDrawColor(180,185,210);doc.rect(nx,y,colW[3],8,'S');
        doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(40,40,80);doc.text('Notes',nx+2,y+5.5);
        y+=8;
        items.forEach((f,ri)=>{
          checkPage(8);
          const bg=ri%2===0?[245,246,250]:[255,255,255];
          const noteLines=doc.splitTextToSize(String(f.notes||''),colW[3]-4).slice(0,2);
          const rowH=Math.max(8,4+noteLines.length*3.6);
          checkPage(rowH);
          doc.setFillColor(...bg);
          colW.forEach((w,ci)=>{const x=margin+colW.slice(0,ci).reduce((a,b)=>a+b,0);doc.rect(x,y,w,rowH,'F');doc.setDrawColor(200,205,220);doc.rect(x,y,w,rowH,'S');});
          doc.setFontSize(8.5);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
          doc.text(doc.splitTextToSize(String(f.name||''),colW[0]-4).slice(0,2),margin+2,y+4.8);
          doc.setFont('helvetica','normal');doc.setTextColor(40,40,80);
          const cv=(f.conventional_value||'—')+(f.conventional_unit?' '+f.conventional_unit:'');
          const sv=(f.si_value||'—')+(f.si_unit?' '+f.si_unit:'');
          doc.text(doc.splitTextToSize(cv,colW[1]-4).slice(0,2),margin+colW[0]+2,y+4.8);
          doc.text(doc.splitTextToSize(sv,colW[2]-4).slice(0,2),margin+colW[0]+colW[1]+2,y+4.8);
          doc.setFontSize(7.2);doc.setTextColor(90,90,105);
          if(noteLines.length)doc.text(noteLines,margin+colW[0]+colW[1]+colW[2]+2,y+4.6);
          y+=rowH;
        });
        y+=6;
      });
    }
    const tot=doc.internal.getNumberOfPages();
    for(let p=1;p<=tot;p++){doc.setPage(p);refreshPage();doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);doc.text('MLS BOC Prep — Calculations & Reference Ranges · Page '+p+' of '+tot,margin,pageH-6);doc.text(new Date().toLocaleDateString(),pageW-margin,pageH-6,{align:'right'});}
    doc.save(blankCalc&&inclCalc&&!inclRR?'mls_calc_blank_practice.pdf':'mls_calc_rr.pdf');
    document.getElementById('condition-modal').classList.add('hidden');
  }catch(err){alert('PDF export failed: '+err.message);}
}

async function startAllExam(){
  const total=100;
  const allQ=[];
  for(const s of SUBJECTS){
    if(s._combined)continue; // skip UI-only card
    const key=s.key;
    const w=BOC_WEIGHTS[key]||0;
    if(!w)continue;
    const count=Math.round(total*w/100);
    if(key==='microbiology'){
      // Microbiology weight pool includes parasitology & mycology (ASCP BOC 2025)
      const [mRes,pRes,myRes]=await Promise.all([
        sb.from('mlsboc_questions').select('*').eq('subject','microbiology'),
        sb.from('mlsboc_questions').select('*').eq('subject','parasitology'),
        sb.from('mlsboc_questions').select('*').eq('subject','mycology')
      ]);
      const microPool=shuffle([...(mRes.data||[]),...(pRes.data||[]),...(myRes.data||[])]);
      if(microPool.length)allQ.push(...microPool.slice(0,count));
    }else{
      const {data}=await sb.from('mlsboc_questions').select('*').eq('subject',key);
      if(data&&data.length)allQ.push(...shuffle(data).slice(0,count));
    }
  }
  // Also pull lab_operations if exists
  const labW=BOC_WEIGHTS['lab_operations']||7.5;
  const labCount=Math.round(total*labW/100);
  const {data:labQ}=await sb.from('mlsboc_questions').select('*').eq('subject','lab_operations');
  if(labQ&&labQ.length)allQ.push(...shuffle(labQ).slice(0,labCount));

  window._kqOpts={};appState.allQ=shuffle(allQ).slice(0,Math.min(total,allQ.length));
  appState.allIdx=0;appState.allAns=[];appState.allStarted=true;appState.allDone=false;appState.allSeconds=0;
  clearInterval(appState.allTimer);
  appState.allTimer=setInterval(()=>{appState.allSeconds++;updateAllTimer();},1000);
  renderView();
}

function updateAllTimer(){
  const el=document.getElementById('all-timer');
  if(el)el.textContent=fmtTime(appState.allSeconds);
}

              <span class="bbq-opt-letter">${emojis[oi]}</span>

            ${q.explanation?`<div style="font-size:13px;color:var(--text2);background:var(--bg3);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 var(--r) var(--r) 0;text-align:left;max-width:500px;margin:0 auto">${q.explanation}</div>`:''}

async function exportAttempt(attemptId){
  const {data:attempt}=await sb.from('mlsboc_attempts').select('*').eq('id',attemptId).single();
  if(!attempt)return;
  const ids=attempt.incorrect_ids||[];
  if(!ids.length){alert('No missed questions in this attempt.');return;}
  const {data:qs}=await sb.from('mlsboc_questions').select('*').in('id',ids);
  const rows=[['Question','Correct Answer','Subject']];
  (qs||[]).forEach(q=>rows.push([csvEsc(q.question),csvEsc(q['option_'+q.correct_answer]),q.subject]));

async function adminBulkQ(e){

  const text=await file.text();

async function adminBulkConditions(e){
  const file=e.target.files&&e.target.files[0];
  if(!file)return;
  const status=document.getElementById('heme-bulk-status');
  if(status)status.textContent='Uploading...';
  const text=await file.text();
  const records=parseCSVRecords(text);
  const rows=records.length?records:parseCSV(text);
  const existing=await sb.from('mlsboc_heme_conditions').select('name');
  const seen=new Set((existing.data||[]).map(r=>String(r.name||'').trim().toLowerCase()).filter(Boolean));
  let inserted=0,skipped=0,failed=0;
  for(const r of rows){
    const name=String(csvField(r,['name','diagnosis','possible_diagnosis','condition','title'],0)||'').trim();
    if(!name){skipped++;continue;}
    const key=name.toLowerCase();
    if(seen.has(key)){skipped++;continue;}
    const type=String(csvField(r,['type','category'],2)||'').trim();
    const folder=normalizeHemeFolderKey(String(csvField(r,['folder'],1)||'').trim()||hemeFolderFromType(type,name));
    const featureText=String(csvField(r,['key_features','key_feature','features'],3)||csvField(r,['key_features','key_feature','features'],2)||'');
    const features=featureText.split(/;|\n/).map(x=>x.trim()).filter(Boolean);
    const {error}=await sb.from('mlsboc_heme_conditions').insert({name,folder,key_features:features,notes:'',images:[]});
    if(error)failed++;
    else{inserted++;seen.add(key);}
  }
  window._hemeCondsCache=null;
  if(status)status.textContent=`Bulk upload complete: ${inserted} added, ${skipped} skipped, ${failed} failed.`;
  e.target.value='';
  renderTab();
}

async function generateCasePDF(){
  const selected = [];
  document.querySelectorAll('.export-cb:checked').forEach(cb=>{
    const key = cb.dataset.key;
    const id  = cb.dataset.id;
    const src = _exportCases.find(s=>s.key===key);
    if(!src) return;
    const c = src.data.find(x=>x.id===id);
    if(c) selected.push({src, c});
  });
  if(!selected.length){alert('Select at least one case.');return;}

  const btn = document.querySelector('#condition-modal-body .btn-primary');
  if(btn){btn.textContent='Generating...';btn.disabled=true;}

  try{
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const margin = 18;
    const contentW = pageW - margin*2;
    let y = margin;
    let isFirstPage = true;

    const checkPage = (needed=10)=>{
      if(y + needed > pageH - margin){doc.addPage();y=margin;}
    };

    const writeText = (text, opts={})=>{
      const {size=11, bold=false, color=[30,30,30], indent=0, maxWidth=contentW}=opts;
      doc.setFontSize(size);
      doc.setFont('helvetica', bold?'bold':'normal');
      doc.setTextColor(...color);
      const lines = doc.splitTextToSize(String(text||''), maxWidth - indent);
      lines.forEach(line=>{
        checkPage(6);
        doc.text(line, margin+indent, y);
        y += size * 0.4 + 1.2;
      });
    };

    const writeHR = (color=[200,200,200])=>{
      checkPage(4);
      doc.setDrawColor(...color);
      doc.setLineWidth(0.3);
      doc.line(margin, y, pageW-margin, y);
      y += 4;
    };

    selected.forEach(({src, c}, ci)=>{
      if(!isFirstPage){doc.addPage();y=margin;}
      isFirstPage = false;

      // Case header bar
      doc.setFillColor(210,210,210);
      doc.rect(margin, y, contentW, 10, 'F');
      doc.setDrawColor(160,160,160);doc.setLineWidth(0.2);
      doc.rect(margin, y, contentW, 10, 'S');
      doc.setFontSize(13);
      doc.setFont('helvetica','bold');
      doc.setTextColor(20,20,20);
      doc.text(`${src.label} — Case ${ci+1}: ${c.title||'Untitled'}`, margin+3, y+7);
      y += 14;

      // Scenario
      if(c.scenario){
        writeText('Patient Scenario', {size:10, bold:true, color:[40,40,40]});
        writeText(c.scenario, {size:10, indent:2, color:[30,30,30]});
        y += 3;
      }

      // Table (typing / lab results / test results)
      const tableD2=c.table_data;
      if(tableD2&&tableD2.headers&&tableD2.headers.length){
        checkPage(20);
        writeText(src.tableLabel,{size:10,bold:true,color:[40,40,40]});
        const hdrs2=tableD2.headers;const rows2=tableD2.rows||[];const meta2=tableD2.meta||[];
        const colW2=Math.min(contentW/hdrs2.length,44);const tableW2=colW2*hdrs2.length;
        doc.setFillColor(220,220,220);doc.rect(margin,y,tableW2,8,'F');doc.setDrawColor(160,160,160);doc.setLineWidth(0.2);doc.rect(margin,y,tableW2,8,'S');
        doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);
        hdrs2.forEach((h,i)=>doc.text(String(h||'').substring(0,14),margin+i*colW2+2,y+5.5));y+=8;
        rows2.forEach((row,ri)=>{
          checkPage(9);
          doc.setFillColor(245,245,245);doc.rect(margin,y,tableW2,9,'F');doc.rect(margin,y,tableW2,9,'S');
          row.forEach((cell,ci)=>{
            const m2=(meta2[ri]||[])[ci]||{};
            const rgb2=m2.color?hexToRgb(m2.color):[30,30,30];
            doc.setFontSize(10);doc.setFont('helvetica',m2.bold?'bold':'normal');doc.setTextColor(...rgb2);
            doc.text(String(cell||'').substring(0,12),margin+ci*colW2+2,y+6.2);
          });y+=9;
        });y+=3;
      }

      // Questions — no answers, plain black
      const qs = c.questions||[];
      if(qs.length){
        y += 2;
        writeHR([180,180,180]);
        writeText('Questions', {size:10, bold:true, color:[40,40,40]});
        y += 1;
        const letters=['a','b','c','d'];
        qs.forEach((q,qi)=>{
          checkPage(28);
          writeText(`Q${qi+1}. ${q.question}`, {size:10, bold:true, indent:2, color:[20,20,20]});
          (q.options||[]).forEach((opt,oi)=>{
            if(!opt)return;
            writeText(`${letters[oi].toUpperCase()}. ${opt}`, {size:9.5, indent:6, color:[30,30,30]});
          });
          y += 4;
        });
      }
    });

    // ── Answer Key — final page ──
    const hasAnyQuestions=selected.some(({c})=>(c.questions||[]).length>0);
    const includeAnswerKey=hasAnyQuestions&&caseAnswersAvailable();
    if(includeAnswerKey){
      doc.addPage();y=margin;
      doc.setFillColor(40,40,40);doc.rect(margin,y,contentW,12,'F');
      doc.setFontSize(14);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
      doc.text('ANSWER KEY',(pageW/2),y+8.5,{align:'center'});y+=16;

      let globalQ=1;
      selected.forEach(({src,c},ci)=>{
        const qs=c.questions||[];if(!qs.length)return;
        checkPage(16);
        doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(40,40,40);
        doc.text(`${src.label} — Case ${ci+1}: ${c.title||'Untitled'}`,margin,y);y+=7;
        const letters=['a','b','c','d'];
        qs.forEach((q,qi)=>{
          checkPage(14);
          const correctIdx=letters.indexOf(q.correct||'a');
          const correctText=(q.options||[])[correctIdx]||q[q.correct]||'';
          writeText(`Q${globalQ}. ${(q.correct||'').toUpperCase()}. ${correctText}`,{size:10,bold:true,color:[20,120,60]});
          if(q.explanation){
            doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(80,80,100);
            doc.splitTextToSize(q.explanation,contentW-16).forEach(line=>{checkPage();doc.text(line,margin+12,y);y+=4;});
          }
          y+=3;globalQ++;
        });
        y+=4;
      });
    }

    // Footer on all pages
    const totalPages = doc.internal.getNumberOfPages();
    for(let p=1;p<=totalPages;p++){
      doc.setPage(p);
      doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
      const label=p===totalPages&&includeAnswerKey?'Answer Key':`Page ${p} of ${includeAnswerKey?totalPages-1:totalPages}`;
      doc.text(`MLS BOC Prep — Case Export · ${label}`, margin, pageH-8);
      doc.text(new Date().toLocaleDateString(), pageW-margin, pageH-8, {align:'right'});
    }

    doc.save('mls-cases.pdf');
    document.getElementById('condition-modal').classList.add('hidden');
  }catch(err){
    console.error(err);
    alert('PDF generation failed: '+err.message);
    const btn=document.querySelector('#condition-modal-body .btn-primary');
    if(btn){btn.textContent='📄 Generate PDF';btn.disabled=false;}
  }
}

    </div>
    <div id="cs-q-list"></div>
    <div class="flex gap-8 mt-16 flex-wrap">
      <button class="btn btn-ghost" onclick="csSaveQState();csAddQ()">+ Add Question</button>
      <button class="btn btn-ghost" onclick="document.getElementById('condition-modal').classList.add('hidden')">Cancel</button>
      <button class="btn btn-primary" onclick="saveClassSet()">Save Set</button>
    </div>
  `;
  renderQList();
  document.getElementById('condition-modal').classList.remove('hidden');
}



async function csImportFile(e){
  const file=e.target.files[0];if(!file)return;
  window.csSaveQState?.();
  const name=file.name.toLowerCase();

  const processRows=(rows)=>{
    let added=0;
    rows.forEach(r=>{
      if(!r[0])return;
      window._csQs.push({
        question:String(r[0]).trim(),
        a:String(r[1]||'').trim(),
        b:String(r[2]||'').trim(),
        c:String(r[3]||'').trim(),
        d:String(r[4]||'').trim(),
        correct:(String(r[5]||'a')).toLowerCase().trim(),
        explanation:String(r[6]||'').trim()
      });
      added++;
    });
    // re-render question list
    const container=document.getElementById('cs-q-list');
    if(!container)return;
    if(!window._csQs.length){container.innerHTML='<div style="font-size:12px;color:var(--text3);padding:8px">No questions yet.</div>';return;}
    container.innerHTML=window._csQs.map((q,i)=>`
      <div class="card-sm mb-8" id="csq-${i}">
        <div class="flex-center gap-8 mb-8">
          <span style="font-size:11px;font-weight:700;color:var(--accent);font-family:var(--mono)">Q${i+1}</span>
          <button class="btn btn-danger btn-xs ml-auto" onclick="csRemoveQ(${i})">✕ Remove</button>
        </div>
        <div class="form-group"><label>Question</label><textarea id="csqq-${i}" style="min-height:54px">${esc(q.question||'')}</textarea></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
          ${['a','b','c','d'].map(l=>`<div><label>${l.toUpperCase()}.</label><input type="text" id="csqo-${i}-${l}" value="${esc(q[l]||'')}"></div>`).join('')}
        </div>
        <div class="form-group"><label>Correct Answer</label>
          <select id="csqc-${i}">${['a','b','c','d'].map(l=>`<option value="${l}" ${q.correct===l?'selected':''}>${l.toUpperCase()}</option>`).join('')}</select>
        </div>
        <div class="form-group" style="margin-bottom:0"><label>Explanation (optional)</label>
          <input type="text" id="csqe-${i}" value="${esc(q.explanation||'')}">
        </div>
      </div>`).join('');
    alert(`✓ Imported ${added} question${added!==1?'s':''}.`);
  };

  if(name.endsWith('.csv')){
    const text=await file.text();
    const rows=parseCSV(text);
    processRows(rows);
  }else if(name.endsWith('.xlsx')||name.endsWith('.xls')||name.endsWith('.ods')){
    if(typeof XLSX==='undefined'){alert('Excel library not loaded yet. Try again in a moment.');return;}
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    // Skip header row if first cell looks like a header
    const startRow=raw[0]&&String(raw[0][0]).toLowerCase().includes('question')?1:0;
    processRows(raw.slice(startRow));
  }else{
    alert('Unsupported file type. Use .csv, .xlsx, or .xls');
  }
}

async function saveClassSet(){
  window.csSaveQState?.();
  const name=document.getElementById('cs-name')?.value.trim();
  const topic=document.getElementById('cs-topic')?.value.trim();
  if(!name){alert('Set name required.');return;}
  const questions=window._csQs.filter(q=>q.question);
  const payload={subject:appState.classSubject,name,topic:topic||'',questions};
  let error;
  if(window._csId){({error}=await sb.from('mlsboc_class_sets').update(payload).eq('id',window._csId));}
  else{({error}=await sb.from('mlsboc_class_sets').insert(payload));}
  if(error){alert('Save failed: '+error.message);return;}
  document.getElementById('condition-modal').classList.add('hidden');
  appState.classView='subject';
  renderView();
}

// ── Class Quiz (Kahoot style) ────────────────────────────────────────────────
async function startClassQuiz(id,forceNew=false,count=null){
  const {data}=await sb.from('mlsboc_class_sets').select('*').eq('id',id).single();
  if(!data||(data.questions||[]).length===0){alert('No questions in this set.');return;}

  const inProgress = window._classQuizQs
    && window._classQuizSetId===id
    && !appState.classQuizDone
    && appState.classQuizIdx>0
    && appState.classQuizIdx<(window._classQuizQs||[]).length;

  if(inProgress&&!forceNew&&count===null){
    appState.classSet=data;
    appState.classView='quiz';
    window._classShowQuizResume=true;
    renderView();
    return;
  }

  // If no count specified yet, show picker
  if(count===null){
    openClassQuizCountPicker(id,data);
    return;
  }

  // Fresh start with chosen count
  const allQs=shuffle(data.questions||[]);
  const chosen=Math.min(Math.max(1,count),allQs.length);
  appState.classSet=data;
  appState.classView='quiz';
  appState.classQuizIdx=0;
  appState.classQuizAns={};
  appState.classQuizDone=false;
  appState.classMissed=[];
  appState._quizAttempt=1;
  appState._quizStartNum=1;
  appState.classQuizStreak=0;
  appState.classQuizBestStreak=0;
  appState._quizResultMap={};
  appState._quizOriginalTotal=chosen; // remember full set size for visual %
  window._classQuizQs=allQs.slice(0,chosen).map((q,i)=>({...q,_quizTrackKey:'q'+i}));
  window._classQuizQs._setId=id;
  window._classQuizSetId=id;
  window._kqOpts={};
  window._classShowQuizResume=false;
  renderView();
}

async function exportClassSetPDF(id){
  const {data:s}=await sb.from('mlsboc_class_sets').select('*').eq('id',id).single();
  if(!s){alert('Could not load set.');return;}
  const qs=s.questions||[];
  if(!qs.length){alert('No questions to export.');return;}
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4'});
    const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight(),margin=18,cW=pageW-margin*2;
    let y=margin;
    const checkPage=(n=8)=>{if(y+n>pageH-margin){doc.addPage();y=margin;}};
    const write=(text,opts={})=>{
      const{size=11,bold=false,color=[30,30,30],indent=0}=opts;
      doc.setFontSize(size);doc.setFont('helvetica',bold?'bold':'normal');doc.setTextColor(...color);
      doc.splitTextToSize(String(text||''),cW-indent).forEach(line=>{checkPage();doc.text(line,margin+indent,y);y+=size*0.4+1.2;});
    };
    const drawTable=(td)=>{
      if(!td||!tblHasContent(td))return;
      const hdrs=(td.headers||[]).filter((_,i)=>i<5);
      const rows=(td.rows||[]).slice(0,5);
      const meta=td.meta||[];
      if(!hdrs.length&&!rows.length)return;
      const cols=Math.max(1,hdrs.length,Math.max(0,...rows.map(r=>(r||[]).length)));
      const colW=cW/cols;
      checkPage(10+(rows.length+1)*8);
      doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);
      for(let c=0;c<cols;c++){
        doc.setFillColor(225,225,225);doc.rect(margin+c*colW,y,colW,8,'F');doc.setDrawColor(165,165,165);doc.rect(margin+c*colW,y,colW,8,'S');
        doc.text(doc.splitTextToSize(String(hdrs[c]||''),colW-3).slice(0,1),margin+c*colW+1.5,y+5.4);
      }
      y+=8;
      rows.forEach((row,ri)=>{
        checkPage(8);
        for(let c=0;c<cols;c++){
          const m=(meta[ri]||[])[c]||{};
          const rgb=m.color?hexToRgb(m.color):[40,40,40];
          doc.setFillColor(248,248,248);doc.rect(margin+c*colW,y,colW,8,'F');doc.setDrawColor(180,180,180);doc.rect(margin+c*colW,y,colW,8,'S');
          doc.setFontSize(7.5);doc.setFont('helvetica',m.bold?'bold':'normal');doc.setTextColor(...rgb);
          doc.text(doc.splitTextToSize(String((row||[])[c]||''),colW-3).slice(0,1),margin+c*colW+1.5,y+5.4);
        }
        y+=8;
      });
      y+=4;
    };

    // ── Page 1+: Questions only (no answers shown) ──
    write(`${s.name}${s.topic?' - '+s.topic:''}`,{size:14,bold:true,color:[20,20,20]});
    write('Answer key on final page',{size:8,color:[100,100,100]});
    y+=4;

    const letters=['a','b','c','d'];
    qs.forEach((q,i)=>{
      checkPage(32);
      write(`Q${i+1}. ${q.question}`,{size:11,bold:true});
      if(q.table_data&&tblHasContent(q.table_data))drawTable(q.table_data);
      letters.forEach(l=>{
        if(!q[l])return;
        write(`${l.toUpperCase()}. ${q[l]}`,{size:10,indent:4,color:[40,40,40]});
      });
      y+=4;
    });

    // ── Answer Key: last page ──
    doc.addPage();y=margin;
    doc.setFillColor(40,40,40);doc.rect(margin,y,cW,12,'F');
    doc.setFontSize(14);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text('ANSWER KEY',(pageW/2),y+8.5,{align:'center'});y+=16;
    doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);
    doc.text(`${s.name}${s.topic?' — '+s.topic:''}`,margin,y);y+=10;

    qs.forEach((q,i)=>{
      checkPage(20);
      // Question number + correct letter
      const correctLetter=(q.correct||'').toUpperCase();
      const correctText=q[q.correct]||'';
      write(`Q${i+1}. ${correctLetter}. ${correctText}`,{size:10,bold:true,color:[20,120,60]});
      if(q.explanation){
        write(q.explanation,{size:8.5,indent:8,color:[80,80,100]});
      }
      y+=3;
    });

    // Footer all pages
    const total=doc.internal.getNumberOfPages();
    for(let p=1;p<=total;p++){
      doc.setPage(p);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);
      const label=p===total?'Answer Key':`Page ${p} of ${total-1}`;
      doc.text(`MLS BOC Prep — ${s.name} · ${label}`,margin,pageH-8);
      doc.text(new Date().toLocaleDateString(),pageW-margin,pageH-8,{align:'right'});
    }
    doc.save((s.name||'questions').replace(/\s+/g,'_')+'.pdf');
  }catch(err){alert('PDF export failed: '+err.message);}
}

function renderClassQuiz(v){
  const s=appState.classSet;
  const attempt=appState._quizAttempt||1;
  const attemptLabel=attempt>1?`${attempt}${attempt===2?'nd':attempt===3?'rd':'th'} Attempt — Wrong Only`:'';

  // If questions not loaded yet for this set, build them
  if(!window._classQuizQs||window._classQuizQs._setId!==window._classQuizSetId){
    window._classQuizQs=shuffle(s.questions||[]).map((q,i)=>({...q,_quizTrackKey:'q'+i}));
    window._classQuizQs._setId=s.id;
    window._classQuizSetId=s.id;
    appState._quizOriginalTotal=window._classQuizQs.length;
  }
  const questions=window._classQuizQs;

  // Resume prompt
  if(window._classShowQuizResume){
    window._classShowQuizResume=false;
    v.innerHTML=`
      <div class="bbq-overlay">
        <div class="bbq-header">
          <button class="btn btn-ghost btn-sm" onclick="appState.classView='subject';renderView()">← Back</button>
        </div>
        <div class="bbq-body" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center">
          <div style="font-size:36px;margin-bottom:16px">⚡</div>
          <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px">${esc(s.name)}</div>
          <div style="font-size:14px;color:var(--text2);margin-bottom:28px">You're on question ${appState.classQuizIdx+1} of ${questions.length}</div>
          <div class="flex gap-12 flex-wrap" style="justify-content:center">
            <button class="btn btn-primary" style="font-size:15px;padding:12px 28px" onclick="window._classShowQuizResume=false;renderView()">Resume →</button>
            <button class="btn btn-ghost" style="font-size:15px;padding:12px 28px" onclick="startClassQuiz('${s.id}',true)">Restart from beginning</button>
          </div>
        </div>
      </div>`;
    return;
  }

  if(appState.classQuizDone){
    const ans=appState.classQuizAns;
    let correct=0;
    const missed=[];
    questions.forEach((q,i)=>{
      if(ans[i]===q.correct)correct++;
      else missed.push({q,given:ans[i]});
    });
    appState.classMissed=missed;
    const pct=Math.round(correct/questions.length*100);
    const resultMap=appState._quizResultMap||{};
    const origTotal=appState._quizOriginalTotal||questions.length;
    const rightCount=Object.values(resultMap).filter(v=>v==='right').length;
    const wrongCount=Object.values(resultMap).filter(v=>v==='wrong').length;
    const rightPct=Math.round(rightCount/origTotal*100);
    const wrongPct=Math.round(wrongCount/origTotal*100);
    const subj=appState.classSubject||'';
    const resultMascot=renderClassMascotVisual(subj,rightPct,wrongPct,rightCount===origTotal,false);
    const startNum=appState._quizStartNum||1;
    let reviewHtml=missed.map(({q,given},mi)=>`
      <div style="background:var(--bg2);border:1px solid #f0647433;border-radius:var(--r);padding:14px 16px;margin-bottom:8px">
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px">${escNL(q.question)}</div>
        <div style="font-size:12px;color:var(--danger)">✗ Your answer: ${esc(q[given]||'(none)')}</div>
        <div style="font-size:12px;color:var(--success);margin-top:2px">✓ Correct: ${esc(q[q.correct]||'')}</div>
        ${q.explanation?`<div style="font-size:12px;color:var(--text2);margin-top:6px">${esc(q.explanation)}</div>`:''}
      </div>`).join('');
    v.innerHTML=`
      <div class="bbq-overlay">
        <div class="bbq-header">
          <button class="btn btn-ghost btn-sm" onclick="appState.classView='subject';renderView()">← Back</button>
          <div class="ml-auto" style="color:var(--text);font-size:13px;font-family:var(--mono)">Quiz Complete</div>
        </div>
        <div class="bbq-body">
          <div style="text-align:center;padding:24px 0 28px">
            ${resultMascot}
            <div class="bbq-score-big">${pct}%</div>
            <div style="font-size:16px;color:var(--text2)">${correct} of ${questions.length} correct</div>
          </div>
          <div class="result-grid" style="margin-bottom:24px;grid-template-columns:repeat(4,1fr)">
            <div class="stat-card"><div class="stat-num text-success">${correct}</div><div class="stat-label">Correct</div></div>
            <div class="stat-card"><div class="stat-num text-danger">${questions.length-correct}</div><div class="stat-label">Missed</div></div>
            <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${pct}%</div><div class="stat-label">Score</div></div>
            <div class="stat-card"><div class="stat-num" style="color:#f5a623">${appState.classQuizBestStreak||0}</div><div class="stat-label">Best Streak</div></div>
          </div>
          <div class="flex gap-8 mb-20 flex-wrap">
            <button class="btn btn-primary" onclick="startClassQuiz('${s.id}',true,${questions.length})">Restart All</button>
            ${missed.length?`<button class="btn btn-warn" onclick="retryClassWrongOnly()">Quiz Wrong Only (${missed.length})</button>`:''}
            <button class="btn btn-ghost" onclick="appState.classView='subject';renderView()">Back</button>
            ${missed.length?`<button class="btn btn-ghost btn-sm" onclick="exportClassMissed()">Export Missed</button>`:''}
          </div>
          ${missed.length?`<div style="font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px">Missed (${missed.length})</div>${reviewHtml}`:'<div style="color:var(--success);font-weight:600;text-align:center;font-size:18px">Perfect score!</div>'}
        </div>
      </div>`;
    return;
  }

  const idx=appState.classQuizIdx;
  const q=questions[idx];
  const startNum=appState._quizStartNum||1;
  const displayNum=startNum+idx; // e.g. 61 on 2nd attempt wrong-only
  const displayTotal=(startNum-1)+questions.length;
  const answered=appState.classQuizAns[idx]!==undefined;
  const chosen=appState.classQuizAns[idx];
  const pct=Math.round((idx+1)/questions.length*100);
  const colors=['#e63946','#2196f3','#f5a623','#3ddc84'];
  const textColors=['#fff','#fff','#fff','#1a2a1a'];
  const optionLabels=['A','B','C','D'];
  const letters=['a','b','c','d'];

  const optsHtml=letters.map((l,oi)=>{
    if(!q[l])return '';
    let extra='';
    if(answered){if(l===q.correct)extra=' correct-ans';else if(l===chosen&&chosen!==q.correct)extra=' wrong-ans';}
    return `<button class="bbq-opt${extra}" style="background:${colors[oi]};color:${textColors[oi]}" onclick="classQuizAnswer('${l}')" ${answered?'disabled':''}>
      <span class="bbq-opt-letter">${optionLabels[oi]}</span><span>${esc(q[l])}</span></button>`;
  }).filter(Boolean).join('');

  let afterHtml='';
  if(answered){
    const isCorrect=chosen===q.correct;
    afterHtml=`

      </div>
      <div style="text-align:center;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        ${idx>0?`<button class="btn btn-ghost" style="font-size:15px;padding:12px 24px" onclick="classQuizPrev()">← Prev</button>`:''}
        ${idx<questions.length-1
          ?`<button class="btn btn-primary" style="font-size:15px;padding:12px 32px" onclick="classQuizNext()">Next →</button>`
          :`<button class="btn btn-success" style="font-size:15px;padding:12px 32px" onclick="appState.classQuizDone=true;renderView()">See Results</button>`}

  // Compute right/wrong fill percentages based on question outcomes
  const resultMap=appState._quizResultMap||{};
  // Use original total so retries don't inflate the %
  const origTotal=appState._quizOriginalTotal||questions.length;
  const rightCount=Object.values(resultMap).filter(v=>v==='right').length;
  const wrongCount=Object.values(resultMap).filter(v=>v==='wrong').length;
  const rightPct=Math.round(rightCount/origTotal*100);
  const wrongPct=Math.round(wrongCount/origTotal*100);
  const isDone100=appState.classQuizDone&&(rightCount===origTotal);
  const subjectVisual=renderClassMascotVisual(subj,rightPct,wrongPct,isDone100,answered&&chosen!==q.correct);
  v.innerHTML=`
    <div class="bbq-overlay">
      <div class="bbq-header" style="gap:8px">
        <button class="btn btn-ghost btn-sm" style="flex-shrink:0" onclick="appState.classView='subject';renderView()">✕ Exit</button>
        <div class="progress-bar" style="margin:0 4px">
          <div class="progress-fill ${tintClass}" style="width:${pct}%"></div>
        </div>
        <span class="question-num" style="white-space:nowrap;font-size:12px">${displayNum}/${displayTotal}</span>
        <div class="${streakWrapClass}" title="Streak: ${streak} in a row">
          <svg class="streak-flame" viewBox="0 0 56 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="fgo" cx="50%" cy="70%" r="60%">
                <stop offset="0%" stop-color="#ffe44d"/>
                <stop offset="45%" stop-color="#f5a623"/>
                <stop offset="100%" stop-color="#d43a0a"/>
              </radialGradient>
              <radialGradient id="igo" cx="50%" cy="80%" r="50%">
                <stop offset="0%" stop-color="#fffde0"/>
                <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="glow" cx="50%" cy="90%" r="60%">
                <stop offset="0%" stop-color="#ff6a00" stop-opacity=".5"/>
                <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>

            </defs>
            <!-- glow base -->
            <ellipse cx="28" cy="62" rx="18" ry="8" fill="url(#glow)"/>

            <path d="M28 20C28 20 34 28 34 36C34 42 31 46 28 47C25 46 22 42 22 36C22 30 25 25 28 20Z" fill="url(#igo)" opacity=".85"/>

function classQuizAnswer(letter){
  if(appState.classQuizAns[appState.classQuizIdx]!==undefined)return;
  appState.classQuizAns[appState.classQuizIdx]=letter;
  const q=(window._classQuizQs||[])[appState.classQuizIdx];
  if(q){
    const isRight=letter===q.correct;
    if(isRight){
      appState.classQuizStreak=(appState.classQuizStreak||0)+1;
      appState.classQuizBestStreak=Math.max(appState.classQuizBestStreak||0,appState.classQuizStreak);
    }else{
      appState.classQuizStreak=0;
    }
    // Only mark wrong if not already right from a previous attempt
    if(!appState._quizResultMap) appState._quizResultMap={};
    const trackKey=q._quizTrackKey??appState.classQuizIdx;
    if(appState._quizResultMap[trackKey]!=='right'){
      appState._quizResultMap[trackKey]=isRight?'right':'wrong';
    }
  }
  renderView();
}
function classQuizNext(){appState.classQuizIdx++;renderView();}
function classQuizPrev(){appState.classQuizIdx=Math.max(0,appState.classQuizIdx-1);renderView();}

function retryClassWrongOnly(){

function exportClassMissed(){
  const missed=appState.classMissed||[];
  if(!missed.length){alert('Nothing to export.');return;}
  const s=appState.classSet;
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4'});
    const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight(),margin=18,cW=pageW-margin*2;
    let y=margin;
    const checkPage=(n=8)=>{if(y+n>pageH-margin){doc.addPage();y=margin;}};
    const write=(text,opts={})=>{
      const{size=11,bold=false,color=[30,30,30],indent=0}=opts;
      doc.setFontSize(size);doc.setFont('helvetica',bold?'bold':'normal');doc.setTextColor(...color);
      doc.splitTextToSize(String(text||''),cW-indent).forEach(line=>{checkPage();doc.text(line,margin+indent,y);y+=size*0.4+1.2;});
    };
    const drawTable=(td)=>{
      if(!td||!tblHasContent(td))return;
      const hdrs=(td.headers||[]).slice(0,5);
      const rows=(td.rows||[]).slice(0,5);
      const meta=td.meta||[];
      const cols=Math.max(1,hdrs.length,Math.max(0,...rows.map(r=>(r||[]).length)));
      const colW=cW/cols;
      checkPage(10+(rows.length+1)*8);
      for(let c=0;c<cols;c++){
        doc.setFillColor(225,225,225);doc.rect(margin+c*colW,y,colW,8,'F');doc.setDrawColor(165,165,165);doc.rect(margin+c*colW,y,colW,8,'S');
        doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);
        doc.text(doc.splitTextToSize(String(hdrs[c]||''),colW-3).slice(0,1),margin+c*colW+1.5,y+5.4);
      }
      y+=8;
      rows.forEach((row,ri)=>{
        checkPage(8);
        for(let c=0;c<cols;c++){
          const m=(meta[ri]||[])[c]||{};
          const rgb=m.color?hexToRgb(m.color):[40,40,40];
          doc.setFillColor(248,248,248);doc.rect(margin+c*colW,y,colW,8,'F');doc.setDrawColor(180,180,180);doc.rect(margin+c*colW,y,colW,8,'S');
          doc.setFontSize(7.5);doc.setFont('helvetica',m.bold?'bold':'normal');doc.setTextColor(...rgb);
          doc.text(doc.splitTextToSize(String((row||[])[c]||''),colW-3).slice(0,1),margin+c*colW+1.5,y+5.4);
        }
        y+=8;
      });
      y+=4;
    };
    // Header
    write(`Missed Questions - ${s?.name||'Quiz'}${s?.topic?' ('+s.topic+')':''}`,{size:13,bold:true,color:[20,20,20]});
    y+=4;
    missed.forEach(({q,given},i)=>{
      checkPage(30);
      write(`Q${i+1}. ${q.question}`,{size:11,bold:true});
      if(q.table_data&&tblHasContent(q.table_data))drawTable(q.table_data);
      ['a','b','c','d'].forEach(l=>{
        if(!q[l])return;
        const isCorrect=l===q.correct,isGiven=l===given;
        write(`${l.toUpperCase()}. ${q[l]}${isCorrect?' ✓ CORRECT':isGiven?' ← your answer':''}`,{size:10,indent:4,color:isCorrect?[20,120,60]:isGiven?[180,40,40]:[50,50,50]});
      });
      if(q.explanation){y+=2;write(`Explanation: ${q.explanation}`,{size:9,indent:4,color:[80,80,80]});}
      y+=5;
    });
    const total=doc.internal.getNumberOfPages();
    for(let p=1;p<=total;p++){
      doc.setPage(p);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);
      doc.text(`MLS BOC Prep — Missed Questions · Page ${p} of ${total}`,margin,pageH-8);
      doc.text(new Date().toLocaleDateString(),pageW-margin,pageH-8,{align:'right'});
    }
    doc.save('missed_'+(s?.name||'questions').replace(/\s+/g,'_')+'.pdf');
  }catch(err){alert('PDF export failed: '+err.message);}
}

async function startClassFlashcard(id,forceNew=false){
  const {data}=await sb.from('mlsboc_class_sets').select('*').eq('id',id).single();
  if(!data||(data.questions||[]).length===0){alert('No questions in this set.');return;}

  // Check if there's a resume-able session for this set
  const hasProgress = window._classFlashQs
    && window._classFlashSetId===id
    && appState.classFlashIdx>0
    && appState.classFlashIdx<(window._classFlashQs||[]).length;

  if(hasProgress&&!forceNew){
    appState.classSet=data;
    appState.classView='flashcard';
    // Don't reset idx or qs — resume from where we left off
    renderView();
    return;
  }

  appState.classSet=data;
  appState.classView='flashcard';
  appState.classFlashIdx=0;
  appState.classFlashFlipped=false;
  window._classFlashQs=shuffle(data.questions||[]);
  window._classFlashSetId=id;
  renderView();
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}
function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}
function esc(s){return String(s||'').replace(/'/g,"&#39;").replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function jsAttr(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');}
function isLocalInteractiveUrl(url){return !!String(url||'').match(/^[^/:?#]+\.html(?:[?#].*)?$/);}
// escNL: same as esc but preserves newlines as <br> tags — used for question/scenario text
function escNL(s){return esc(s).replace(/\n/g,'<br>');} 
function csvEsc(s){s=String(s||'');if(s.includes(',')||s.includes('"')||s.includes('\n'))s='"'+s.replace(/"/g,'""')+'"';return s;}
function dlCSV(rows,filename){
  const csv=rows.map(r=>r.map(csvEsc).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=filename;a.click();
}
function parseCSVRows(text){
  text=String(text||'').replace(/^\uFEFF/,'');
  const rows=[];
  let row=[],cell='',inQuotes=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i],next=text[i+1];
    if(inQuotes){
      if(ch==='"'&&next==='"'){cell+='"';i++;}
      else if(ch==='"')inQuotes=false;
      else cell+=ch;
    }else if(ch==='"'){
      inQuotes=true;
    }else if(ch===','){
      row.push(cell);cell='';
    }else if(ch==='\n'||ch==='\r'){
      if(ch==='\r'&&next==='\n')i++;
      row.push(cell);rows.push(row);
      row=[];cell='';
    }else{
      cell+=ch;
    }
  }
  if(cell!==''||row.length){row.push(cell);rows.push(row);}
  return rows
    .map(r=>r.map(c=>String(c||'').trim()))
    .filter(r=>r.some(c=>c!==''));
}
function normalizeCSVHeader(h){
  return String(h||'').toLowerCase().trim().replace(/^\uFEFF/,'').replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
}
function looksLikeCSVHeader(row){
  const known=new Set(['question','prompt','stem','name','title','folder','key_features','notes','description','scenario','case_data','answer','group_label','a','b','c','d','option_a','option_b','option_c','option_d','correct','correct_answer','explanation']);
  return (row||[]).map(normalizeCSVHeader).some(h=>known.has(h));
}
function parseCSV(text){
  const rows=parseCSVRows(text);
  if(!rows.length)return [];
  return looksLikeCSVHeader(rows[0])?rows.slice(1):rows;
}
function parseCSVRecords(text){
  const rows=parseCSVRows(text);
  if(!rows.length||!looksLikeCSVHeader(rows[0]))return [];
  const headers=rows[0].map(normalizeCSVHeader);
  return rows.slice(1).map(r=>{
    const rec={};
    headers.forEach((h,i)=>{if(h)rec[h]=r[i]||'';});
    return rec;
  }).filter(r=>Object.values(r).some(v=>String(v||'').trim()));
}
function csvField(row,names,idx){
  if(Array.isArray(row))return row[idx]||'';
  for(const n of names){
    const key=normalizeCSVHeader(n);
    if(Object.prototype.hasOwnProperty.call(row,key))return row[key]||'';
  }
  return '';
}
function imageEntrySrc(entry){
  if(!entry)return '';
  if(typeof entry==='string')return entry;
  return entry.url||entry.src||entry.dataUrl||entry.data_url||entry.image_url||entry.imageUrl||entry.data||'';
}
function imageEntryList(images){
  if(!images)return [];
  if(Array.isArray(images))return images;
  if(typeof images==='string'){
    const trimmed=images.trim();
    if(!trimmed)return [];
    if(trimmed.startsWith('[')||trimmed.startsWith('{')){
      try{
        const parsed=JSON.parse(trimmed);
        return Array.isArray(parsed)?parsed:[parsed];
      }catch(e){}
    }
    return [trimmed];
  }
  return [images];
}
function wait(ms){
  return new Promise(resolve=>setTimeout(resolve,ms));
}
async function fetchRowsWithRetry(fetcher, attempts=3, retryEmpty=false){
  let lastError=null;
  for(let i=0;i<attempts;i++){
    try{
      const res=await fetcher();
      if(res&&res.error)throw res.error;
      const rows=Array.isArray(res?.data)?res.data:(res?.data?res.data:[]);
      if(retryEmpty&&!rows.length&&i<attempts-1){
        await wait(250*(i+1));
        continue;
      }
      return rows;
    }catch(err){
      lastError=err;
      if(i<attempts-1)await wait(300*(i+1));
    }
  }
  throw lastError||new Error('Load failed');
}
