<!-- Splash/loading screen shown instantly before JS loads -->
<style>
#pwa-splash{position:fixed;inset:0;background:#0d0f12;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
#pwa-splash .sp-logo{font-family:monospace;font-size:22px;color:#4f8ef7;letter-spacing:-1px}
#pwa-splash .sp-sub{font-size:13px;color:#5c6380;font-family:sans-serif}
#pwa-splash .sp-dot{display:inline-block;animation:blink 1.2s infinite}
#pwa-splash .sp-dot:nth-child(2){animation-delay:.2s}
#pwa-splash .sp-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<style>
:root {
  --bg:#0d0f12;--bg2:#141720;--bg3:#1c2030;--bg4:#242840;
  --border:#2a2f4a;--border2:#3a4060;
  --accent:#4f8ef7;--accent2:#7fb3ff;
  --success:#3ddc84;--danger:#f06474;--warn:#f5a623;
  --text:#e8eaf6;--text2:#9aa0c0;--text3:#5c6380;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --r:8px;--r2:12px;
}
body.light-mode {
  --bg:#f0f2f8;--bg2:#ffffff;--bg3:#e8eaf2;--bg4:#dde0ee;
  --border:#c8cce0;--border2:#aab0cc;
  --accent:#2563d4;--accent2:#1a4eaa;
  --success:#1a8a4a;--danger:#c0303f;--warn:#b36000;
  --text:#1a1d2e;--text2:#4a5070;--text3:#8890b0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
button{font-family:var(--sans);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--sans);outline:none}
img{display:block}

/* Layout */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--accent);letter-spacing:-0.5px;line-height:1.3}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:0.3px}
main{flex:1;padding:24px;max-width:1100px;margin:0 auto;width:100}
#app{display:flex;flex-direction:column;min-height:100vh}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid #f0647444}
.btn-danger:hover{background:#f0647422}
.btn-success{background:#3ddc8422;color:var(--success);border:1px solid #3ddc8444}
.btn-warn{background:#f5a62322;color:var(--warn);border:1px solid #f5a62344}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r);padding:3px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);background:transparent;cursor:pointer;border:none;transition:all .15s}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px #0004}
.tab:hover:not(.active){color:var(--text)}

/* Forms */
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
input[type=text],input[type=password],input[type=number],textarea,select{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);padding:9px 12px;font-size:13px;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--bg3)}

/* Subject grid */
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px}
.subject-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all .2s;text-align:left;display:flex;flex-direction:column;gap:0;width:100%;padding:0}
.subject-card:hover{border-color:#4f8ef766;background:var(--bg3);transform:translateY(-1px)}
.subject-card.all-subjects{border-color:#4f8ef744;background:linear-gradient(135deg,var(--bg2),var(--bg3))}
.subject-icon{font-size:22px}
.subject-name{font-size:14px;font-weight:600;color:var(--text)}
.subject-count{font-size:11px;color:var(--text3);font-family:var(--mono)}
.home-dashboard{max-width:1180px;margin:0 auto;padding-bottom:28px}
.home-hero{background:linear-gradient(135deg,color-mix(in srgb,var(--bg2) 94%,var(--accent)),var(--bg2));border:1px solid var(--border);border-radius:22px;padding:30px;box-shadow:0 18px 42px rgba(18,35,74,.10);display:grid;grid-template-columns:1fr auto;gap:22px;align-items:center}
.home-kicker{display:inline-flex;align-items:center;gap:8px;background:color-mix(in srgb,var(--accent) 9%,transparent);border:1px solid color-mix(in srgb,var(--accent) 22%,var(--border));color:var(--accent);border-radius:999px;padding:6px 10px;font-size:11px;font-weight:700;letter-spacing:.04em;margin-bottom:14px}
.home-title{font-size:clamp(30px,4vw,48px);line-height:1.02;letter-spacing:-.03em;color:var(--text);font-weight:700;margin-bottom:10px}
.home-subtitle{font-size:clamp(15px,2vw,19px);color:var(--text2);max-width:620px;line-height:1.45}
.home-hero-mark{position:relative;width:148px;aspect-ratio:1/1;border-radius:16px;background:color-mix(in srgb,var(--accent) 8%,var(--bg2));border:1px solid color-mix(in srgb,var(--accent) 22%,var(--border));display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 12px 24px rgba(41,78,150,.10);overflow:hidden}
.home-hero-mark img,.home-hero-mark svg{width:100%;height:100%;display:block;object-fit:cover}
.home-section{margin-top:26px}
.home-section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:13px}
.home-section-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.home-section-sub{font-size:13px;color:var(--text2)}
.home-subject-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.home-subject-card{position:relative;background:var(--bg2);border:1px solid var(--border);border-top:4px solid var(--subject-color,var(--accent));border-radius:18px;padding:14px;min-height:146px;aspect-ratio:auto;text-align:left;width:100%;cursor:pointer;transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease,background .18s ease;box-shadow:0 10px 24px rgba(18,35,74,.07);overflow:hidden;display:flex;flex-direction:column}
.home-subject-card:hover{transform:translateY(-2px);border-color:color-mix(in srgb,var(--subject-color,var(--accent)) 38%,var(--border));box-shadow:0 16px 34px rgba(18,35,74,.12);background:color-mix(in srgb,var(--bg2) 96%,var(--subject-color,var(--accent)))}
.home-subject-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.home-subject-mark{display:flex;align-items:center;gap:9px;min-width:0}
.home-subject-icon{width:40px;height:40px;border-radius:14px;background:color-mix(in srgb,var(--subject-color,var(--accent)) 13%,var(--bg3));border:1px solid color-mix(in srgb,var(--subject-color,var(--accent)) 22%,var(--border));display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--subject-color,var(--accent));font-size:21px;font-weight:900;box-shadow:inset 0 1px 0 rgba(255,255,255,.45)}
.home-subject-icon img{width:100%;height:100%;object-fit:cover;border-radius:12px;display:block}
.home-subject-code{display:none}
.home-subject-arrow{color:var(--text3);font-size:22px;line-height:1}
.home-subject-name{font-size:15px;font-weight:750;color:var(--text);line-height:1.18;margin-bottom:7px;letter-spacing:-.01em}
.home-subject-desc{font-size:12px;color:var(--text2);line-height:1.35;margin-bottom:10px}
.home-subject-count{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:auto}
.home-utility-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:14px}
.home-utility-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;cursor:pointer;display:flex;align-items:center;gap:12px;text-align:left;transition:all .18s ease;box-shadow:0 8px 20px rgba(18,35,74,.06)}
.home-utility-card:hover{transform:translateY(-1px);border-color:color-mix(in srgb,var(--accent) 30%,var(--border));box-shadow:0 13px 28px rgba(18,35,74,.10)}
.home-utility-icon{width:40px;height:40px;border-radius:13px;background:color-mix(in srgb,var(--accent) 9%,var(--bg3));display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:20px;flex-shrink:0}
.home-utility-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.2}
.home-utility-sub{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.35}
.home-practice-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.home-practice-card{position:relative;overflow:hidden;min-height:152px;border:0;border-radius:20px;padding:20px;text-align:left;color:#fff;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 18px 36px rgba(18,35,74,.16);background:linear-gradient(135deg,var(--practice-color),color-mix(in srgb,var(--practice-color) 74%,#0f172a));transition:transform .18s ease,box-shadow .18s ease,filter .18s ease}
.home-practice-card::before{content:'';position:absolute;inset:-30% -10% auto auto;width:190px;height:190px;border-radius:50%;background:rgba(255,255,255,.18)}
.home-practice-card::after{content:'';position:absolute;inset:auto 18px 18px auto;width:64px;height:64px;border-radius:18px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22)}
.home-practice-card:hover{transform:translateY(-2px);box-shadow:0 23px 46px rgba(18,35,74,.22);filter:saturate(1.05)}
.home-practice-card.featured{grid-column:span 2}
.home-practice-icon{position:relative;z-index:1;width:48px;height:48px;border-radius:16px;display:grid;place-items:center;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.26);font-size:23px;font-weight:900;margin-bottom:18px}
.home-practice-title{position:relative;z-index:1;font-size:22px;font-weight:800;line-height:1.08;letter-spacing:-.02em;margin-bottom:8px;max-width:420px}
.home-practice-sub{position:relative;z-index:1;font-size:13px;line-height:1.4;color:rgba(255,255,255,.83);max-width:520px}
.home-practice-meta{position:relative;z-index:1;margin-top:20px;font-family:var(--mono);font-size:12px;color:rgba(255,255,255,.76)}
.home-hubs-card{position:relative;overflow:hidden;background:linear-gradient(135deg,#cb3f72 0%,#e85d63 52%,#eea84b 100%);border:0;border-radius:22px;padding:22px;display:grid;grid-template-columns:minmax(0,1fr) minmax(300px,460px);gap:22px;align-items:center;box-shadow:0 22px 46px rgba(203,63,114,.24);cursor:pointer;transition:all .2s ease;color:#fff}
.home-hubs-card::before{content:'';position:absolute;inset:-40% -12% auto auto;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.17);pointer-events:none}
.home-hubs-card::after{content:'';position:absolute;inset:auto 24px 22px auto;width:82px;height:82px;border-radius:22px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.24);pointer-events:none}
.home-hubs-card:hover{transform:translateY(-2px);box-shadow:0 28px 58px rgba(203,63,114,.32);filter:saturate(1.04)}
.home-hubs-label{position:relative;z-index:1;font-size:12px;color:rgba(255,255,255,.86);font-weight:800;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.home-hubs-title{position:relative;z-index:1;font-size:25px;font-weight:750;color:#fff;letter-spacing:-.02em;margin-bottom:7px}
.home-hubs-copy{position:relative;z-index:1;font-size:14px;color:rgba(255,255,255,.86);max-width:520px;line-height:1.45;margin-bottom:16px}
.home-hubs-button{position:relative;z-index:1;display:inline-flex;align-items:center;gap:8px;background:#fff;color:#b73562;border-radius:999px;padding:10px 15px;font-size:13px;font-weight:800;box-shadow:0 10px 22px rgba(88,28,64,.18)}
.home-hubs-preview{position:relative;z-index:1;min-height:168px;border-radius:18px;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.34);overflow:hidden;padding:16px}
.home-hubs-preview-track{display:flex;gap:12px;position:absolute;left:16px;top:16px;animation:hub-preview-slide 16s linear infinite}
.home-hubs-card:hover .home-hubs-preview-track{animation-duration:9s}
.home-hub-tile{position:relative;width:260px;height:154px;border-radius:16px;background:var(--bg2);border:1px solid var(--border);border-top:4px solid var(--hub-color,var(--accent));padding:0;display:block;box-shadow:0 10px 22px rgba(18,35,74,.12);overflow:hidden}
.home-hub-shot{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;filter:saturate(.98) contrast(.98)}
.home-hub-tile::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,23,42,.02) 0%,rgba(15,23,42,.08) 38%,rgba(15,23,42,.84) 100%);pointer-events:none}
.home-hub-tile-dot{position:absolute;left:12px;top:12px;width:36px;height:36px;border-radius:12px;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;color:var(--hub-color,var(--accent));font-weight:800;border:1px solid rgba(255,255,255,.65);box-shadow:0 8px 18px rgba(15,23,42,.20);z-index:2}
.home-hub-tile-caption{position:absolute;left:0;right:0;bottom:0;padding:34px 12px 10px;color:#fff;z-index:2}
.home-hub-tile-title{font-size:13px;font-weight:800;color:#fff;line-height:1.2;text-shadow:0 1px 4px rgba(0,0,0,.35)}
.home-hub-tile-sub{font-size:10px;color:rgba(255,255,255,.80);font-family:var(--mono);margin-top:4px;line-height:1.25;text-shadow:0 1px 4px rgba(0,0,0,.35)}
.home-hub-feature-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.home-hub-feature-list span{display:inline-flex;border-radius:999px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.24);color:#fff;font-size:9px;font-weight:700;padding:3px 6px;line-height:1;text-shadow:0 1px 3px rgba(0,0,0,.28)}
.interactive-topic-section{margin-top:26px}
.interactive-topic-head{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.interactive-topic-title{color:var(--topic-color,var(--accent));font-size:13px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}
.interactive-topic-head::after{content:'';height:1px;background:color-mix(in srgb,var(--topic-color,var(--accent)) 28%,var(--border));flex:1}
.home-recall-card{position:relative;overflow:hidden;width:100%;background:linear-gradient(135deg,#dceecf 0%,#efe7a8 100%);border:2px solid #a7c979;border-radius:22px;padding:22px 24px;display:flex;align-items:center;justify-content:space-between;gap:18px;text-align:left;cursor:pointer;box-shadow:0 18px 38px rgba(102,132,54,.18);transition:all .18s ease;color:#182516}
.home-recall-card::before{content:'';position:absolute;inset:-70px -40px auto auto;width:190px;height:190px;border-radius:50%;background:rgba(255,255,255,.28);pointer-events:none}
.home-recall-card::after{content:'';position:absolute;inset:auto 22px 18px auto;width:66px;height:66px;border-radius:18px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.30);pointer-events:none}
.home-recall-card:hover{transform:translateY(-2px);box-shadow:0 23px 48px rgba(102,132,54,.25);border-color:#8fb95b;filter:saturate(1.03)}
.home-recall-label{position:relative;z-index:1;font-size:12px;color:#597e20;font-weight:900;text-transform:uppercase;letter-spacing:.12em;margin-bottom:7px}
.home-recall-title{position:relative;z-index:1;font-size:24px;color:#182516;font-weight:800;letter-spacing:-.02em;line-height:1.15}
.home-recall-sub{position:relative;z-index:1;font-size:13px;color:#46583c;margin-top:6px;line-height:1.4}
.home-recall-pill{position:relative;z-index:1;flex-shrink:0;border-radius:999px;background:#4f7f3d;color:#fff;font-size:13px;font-weight:800;padding:11px 16px;box-shadow:0 10px 22px rgba(60,102,45,.18)}
body:not(.light-mode) .home-recall-card{background:linear-gradient(135deg,#b8d977 0%,#d8c75d 100%);border-color:#7fa04b;box-shadow:0 18px 40px rgba(0,0,0,.28)}
@keyframes hub-preview-slide{0%{transform:translateX(0)}100%{transform:translateX(-1632px)}}
@keyframes hub-preview-slide-mobile{0%{transform:translateX(0)}100%{transform:translateX(-1452px)}}
@media(max-width:1100px){.home-subject-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:900px){.home-hero,.home-hubs-card{grid-template-columns:1fr}.home-hero-mark{justify-self:center;width:min(126px,42vw)}.home-subject-grid,.home-utility-grid{grid-template-columns:1fr 1fr}.home-practice-grid{grid-template-columns:1fr}.home-practice-card.featured{grid-column:auto}.home-hubs-preview{min-height:145px}}
@media(max-width:560px){header{padding:0 12px}.theme-toggle-btn{min-width:auto;padding-left:10px;padding-right:10px}main{padding:16px}.home-hero{padding:22px;border-radius:18px}.home-hero-mark{width:min(72px,20vw);border-radius:10px}.home-subject-grid,.home-utility-grid{grid-template-columns:1fr}.home-subject-card{aspect-ratio:auto;min-height:130px}.home-section-head{display:block}.home-section-sub{margin-top:3px}.home-hubs-card{padding:18px;border-radius:18px}.home-hubs-preview{min-height:150px;padding:12px}.home-hubs-preview-track{position:absolute;left:12px;top:12px;display:flex;grid-template-columns:none;gap:10px;animation:hub-preview-slide-mobile 18s linear infinite}.home-hubs-card:hover .home-hubs-preview-track{animation-duration:11s}.home-hub-tile{width:232px;height:126px;min-height:126px}.home-hub-tile-title{font-size:12px}.home-hub-tile-sub{display:none}.home-hub-feature-list{gap:4px;margin-top:6px}.home-hub-feature-list span{font-size:8px;padding:3px 5px}.home-kicker{font-size:10px}.home-title{font-size:32px}}
@media(prefers-reduced-motion:reduce){.home-hubs-preview-track{animation:none!important}}
.class-material-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.class-material-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:12px;min-height:92px;text-align:left;width:100%;position:relative;overflow:hidden}
.class-material-card::before{content:'';position:absolute;inset:0 auto 0 0;width:4px;background:var(--cm-accent,var(--accent));opacity:.9}
.class-material-card:hover{border-color:color-mix(in srgb,var(--cm-accent,var(--accent)) 55%,var(--border));background:var(--bg3);transform:translateY(-1px);box-shadow:0 8px 22px rgba(0,0,0,.16)}

/* Quiz */
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
/* ── Progress bar — liquid glass fill ──────────────────────────────────── */
.progress-bar{
  height:8px;
  background:var(--bg3);
  border-radius:99px;
  overflow:hidden;
  position:relative;
  box-shadow:inset 0 1px 3px #0002;
  flex:1;
}
.progress-fill{
  height:100%;
  border-radius:99px;
  transition:width .45s cubic-bezier(.4,0,.2,1);
  position:relative;
  background:linear-gradient(90deg,var(--accent) 0%,color-mix(in srgb,var(--accent) 70%,#fff) 100%);
  box-shadow:0 0 8px color-mix(in srgb,var(--accent) 50%,transparent);
}
.progress-fill::after{
  content:'';
  position:absolute;
  top:1px;left:4px;right:4px;
  height:3px;
  border-radius:99px;
  background:rgba(255,255,255,0.35);
}
/* subject-tinted fills */
.progress-fill.tint-bb   { background:linear-gradient(90deg,#b22222,#e05a5a); box-shadow:0 0 8px #b2222260; }
.progress-fill.tint-chem { background:linear-gradient(90deg,#2980b9,#74c8f5); box-shadow:0 0 8px #2980b960; }
.progress-fill.tint-ua   { background:linear-gradient(90deg,#c8a800,#ffe066); box-shadow:0 0 8px #c8a80060; }
.progress-fill.tint-micro{ background:linear-gradient(90deg,#27ae60,#a8e6c0); box-shadow:0 0 8px #27ae6060; }

/* ── Streak counter — flame style ────────────────────────────────────── */
.streak-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;flex-shrink:0;
}
.streak-flame{
  width:36px;height:36px;
  transition:transform .2s,filter .3s;
  display:block;
}
.streak-num{
  font-size:13px;font-weight:900;font-family:var(--mono);
  line-height:1;color:var(--text3);
  transition:color .3s;
  text-align:center;
}
/* cold — greyed out flame */
.streak-wrap.streak-0 .streak-flame{ opacity:.28;filter:grayscale(1); }
.streak-wrap.streak-0 .streak-num{ color:var(--text3); }
/* warm — 1–2 correct */
.streak-wrap.streak-warm .streak-flame{ filter:none; }
.streak-wrap.streak-warm .streak-num{ color:#e8901a; }
/* hot — 3+ in a row */
.streak-wrap.streak-hot .streak-flame{
  filter:drop-shadow(0 0 5px #f5a62388);
  animation:flame-pulse .8s ease-in-out infinite alternate;
}
.streak-wrap.streak-hot .streak-num{ color:#e8731a; }
@keyframes flame-pulse{
  from{transform:scale(1) translateY(0) rotate(-2deg);}
  to{transform:scale(1.22) translateY(-3px) rotate(2deg);}
}

/* ── Subject progress visual (cartoon, bottom of question area) ──────────── */
.btn-active{
  background:var(--accent)!important;
  color:#fff!important;
  border-color:var(--accent)!important;
}
.tbl-editor table td, .tbl-editor table th{ min-width:80px; }

.spv-wrap{
  display:flex;justify-content:center;align-items:flex-end;
  padding:10px 0 4px;
  pointer-events:none;
  min-height:90px;
}
.spv-wrap svg{ overflow:visible; }
/* liquid wave animation inside containers */
@keyframes spv-wave{
  0%{d:path("M0,6 Q20,0 40,6 Q60,12 80,6 Q100,0 120,6 L120,40 L0,40 Z")}
  50%{d:path("M0,10 Q20,4 40,10 Q60,16 80,10 Q100,4 120,10 L120,40 L0,40 Z")}
  100%{d:path("M0,6 Q20,0 40,6 Q60,12 80,6 Q100,0 120,6 L120,40 L0,40 Z")}
}
@keyframes spv-float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-4px)}
}
@keyframes confetti-fall{
  0%  {transform:translateY(-10px) rotate(0deg);  opacity:1}
  80% {opacity:.8}
  100%{transform:translateY(80px) rotate(360deg); opacity:0}
}
@keyframes spv-colony{
  0%{transform:scale(0);opacity:0}
  60%{transform:scale(1.15);opacity:.9}
  100%{transform:scale(1);opacity:1}
}
@keyframes spv-bubble{
  0%{transform:translateY(0);opacity:.7}
  100%{transform:translateY(-12px);opacity:0}
}

.divider{height:1px;background:var(--border);margin:20px 0}
.flex{display:flex}.flex-center{display:flex;align-items:center}
.flex-wrap{flex-wrap:wrap}

/* Quiz arena */
.bbq-overlay{
  --quiz-lab-bg:var(--custom-quiz-bg,url("assets/quiz-bg/lab-quiz-bg.jpg"));

  --quiz-bg-opacity:var(--custom-quiz-bg-opacity,.45);

  inset:0;
  background:var(--bg);
  z-index:500;
  display:flex;
  flex-direction:column;
  overflow-y:auto;
}
.bbq-overlay::before{
  content:"";

function activeQuizOverlay(){
  const overlay=document.querySelector('.bbq-overlay');
  const subjectCaseQuizKeys=['uaQuizMode','immQuizMode','chemQuizMode','paraQuizMode','mycoQuizMode'];
  const caseStudyActive=appState.view==='subject'&&appState.subjectTab==='cases';
  const caseQuizActive=appState.view==='subject'
    && appState.subjectTab==='cases'
    && (
      (appState.bbQuizMode&&!appState.bbQuizDone)
      || subjectCaseQuizKeys.some(k=>appState[k]&&!appState[k+'Done'])
    );
  const imageQuizActive=appState.view==='subject'
    && appState.subjectTab==='images'
    && (
      appState.imgFlashMode
      ||
      (appState.uaImgMode==='quiz'&&!appState.uaQuizDone)
      || (appState.hemeImgMode==='quiz'&&!appState.hemeQuizDone)
      || (appState.microImgMode==='quiz'&&!appState.microQuizDone)
    );
  const classRecallActive=appState.view==='class'
    && (
      (appState.classView==='quiz'&&!appState.classQuizDone&&!window._classShowQuizResume)
      || appState.classView==='flashcard'
    );
  const active=(
    (appState.view==='subject'&&appState.subjectTab==='quiz'&&appState.quizStarted&&!appState.quizDone)
    || (appState.view==='all'&&appState.allStarted&&!appState.allDone)
    || classRecallActive
    || imageQuizActive
    || caseStudyActive
    || caseQuizActive
  );
  return active?(overlay||document.body):null;
}

function syncQuizShell(){
  const overlay=activeQuizOverlay();
  let dock=document.getElementById('quiz-audio-dock');
  if(!overlay){
    if(dock)dock.remove();
    if(quizAudio.on)stopQuizMusic(false);
    return;
  }
  if(!dock){
    dock=document.createElement('div');
    dock.id='quiz-audio-dock';
    dock.className='quiz-audio-dock';
    dock.innerHTML=`
      <button class="quiz-audio-btn" id="quiz-audio-btn" onclick="toggleQuizMusic()" title="Optional music">
        <span id="quiz-audio-icon">♪</span><span id="quiz-audio-label">Off</span>
      </button>

    overlay.appendChild(dock);
  }else if(dock.parentElement!==overlay){

  }

}

function updateQuizMusicButton(){
  const btn=document.getElementById('quiz-audio-btn');

  label.textContent=quizAudio.on?'On':'Off';
}

function makeLofiHipHopLoop(ctx){
  const bpm=96;
  const beat=60/bpm;
  const seconds=beat*32;
  const sr=ctx.sampleRate;
  const len=Math.floor(sr*seconds);
  const buffer=ctx.createBuffer(1,len,sr);
  const data=buffer.getChannelData(0);
  const barLen=beat*4;
  const chords=[
    {notes:[261.63,329.63,392.00,493.88],bass:130.81},
    {notes:[220.00,261.63,329.63,440.00],bass:110.00},
    {notes:[293.66,349.23,440.00,523.25],bass:146.83},
    {notes:[196.00,246.94,293.66,392.00],bass:98.00}
  ];
  const env=(phase,attack,release)=>Math.min(1,phase/attack)*Math.exp(-phase/release);
  const pulse=(center,width)=>Math.max(0,1-Math.abs(center)/width);
  for(let i=0;i<len;i++){
    const t=i/sr;
    const bar=Math.floor(t/barLen)%chords.length;
    const local=t%barLen;
    const chord=chords[bar];
    let sample=0;
    const wobble=1+Math.sin(2*Math.PI*.18*t)*.0018;

    chord.notes.forEach((f,ci)=>{
      const chordPhase=local%barLen;
      const amp=.16+env(chordPhase,.18,2.7);
      sample+=Math.sin(2*Math.PI*f*wobble*t)*(ci===0?.018:.011)*amp;
      sample+=Math.sin(2*Math.PI*(f/2)*wobble*t)*.006;
    });

    const beatPhase=local%beat;
    const beatNo=Math.floor(local/beat);
    const kickPhase=(beatNo===0)?beatPhase:(beatNo===2&&beatPhase>beat*.52?beatPhase-beat*.52:99);
    if(kickPhase<.24){
      sample+=Math.sin(2*Math.PI*62*t)*.10*Math.exp(-kickPhase*11);
      sample+=Math.sin(2*Math.PI*chord.bass*.5*t)*.028*Math.exp(-kickPhase*5);
    }

    const snarePhase=Math.min(Math.abs(local-beat),Math.abs(local-beat*3));
    if(snarePhase<.11){
      const sEnv=Math.exp(-snarePhase*28);
      sample+=Math.sin(2*Math.PI*186*t)*.020*sEnv;
      sample+=Math.sin(2*Math.PI*248*t)*.010*sEnv;
    }

    const backbeat=pulse(beatPhase-beat*.48,beat*.16);
    if(backbeat>0){
      sample+=Math.sin(2*Math.PI*chord.bass*t)*.025*backbeat;
    }

    const fade=Math.min(1,i/(sr*.25),(len-i-1)/(sr*.25));
    data[i]=Math.tanh(sample*.95)*fade;
  }
  return buffer;
}

const QUIZ_MUSIC_DB='mlsboc_quiz_media';
const QUIZ_MUSIC_STORE='files';
const QUIZ_MUSIC_KEY='quiz_music';
const QUIZ_MUSIC_META_KEY='mlsboc_quiz_music_meta';
const QUIZ_MUSIC_VOLUME_KEY='mlsboc_quiz_music_volume';
const QUIZ_MUSIC_MAX_SIZE=12*1024*1024;

function getQuizMusicVolume(){
  const raw=Number(localStorage.getItem(QUIZ_MUSIC_VOLUME_KEY));
  if(Number.isFinite(raw))return Math.max(0,Math.min(1,raw));
  return .45;
}

function setMediaStatus(msg){
  const el=document.getElementById('quiz-media-status');
  if(el){el.textContent=msg||'';if(msg)setTimeout(()=>{if(el.textContent===msg)el.textContent='';},3200);}
}

function refreshQuizMediaAdminUi(){
  const vol=document.getElementById('quiz-music-volume');
  if(vol)vol.value=String(Math.round(getQuizMusicVolume()*100));
  const blur=document.getElementById('quiz-bg-blur');
  if(blur)blur.value=String(getQuizBgBlur());
  const opacity=document.getElementById('quiz-bg-opacity');
  if(opacity)opacity.value=String(Math.round(getQuizBgOpacity()*100));
}

function openQuizMediaDB(){
  return new Promise((resolve,reject)=>{
    if(!window.indexedDB){reject(new Error('IndexedDB is not supported in this browser.'));return;}
    const req=indexedDB.open(QUIZ_MUSIC_DB,1);
    req.onupgradeneeded=()=>{
      const db=req.result;
      if(!db.objectStoreNames.contains(QUIZ_MUSIC_STORE))db.createObjectStore(QUIZ_MUSIC_STORE);
    };
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error||new Error('Could not open music storage.'));
  });
}

async function quizMusicStore(mode,fn){
  const db=await openQuizMediaDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(QUIZ_MUSIC_STORE,mode);
    const store=tx.objectStore(QUIZ_MUSIC_STORE);
    const req=fn(store);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error||new Error('Music storage failed.'));
    tx.oncomplete=()=>db.close();
    tx.onerror=()=>{try{db.close();}catch(e){};reject(tx.error||new Error('Music storage failed.'));};
  });
}

async function loadQuizMusicUrl(){
  if(quizAudio.customUrl)return quizAudio.customUrl;
  try{
    const rec=await quizMusicStore('readonly',store=>store.get(QUIZ_MUSIC_KEY));
    if(!rec||!rec.blob)return '';
    quizAudio.customUrl=URL.createObjectURL(rec.blob);
    quizAudio.customReady=true;
    return quizAudio.customUrl;
  }catch(e){
    console.warn('Music load failed',e);
    return '';
  }
}

async function startQuizMusic(){
  try{
    if(quizAudio.on)return;
    const url=await loadQuizMusicUrl();
    if(!url){
      alert('No music file loaded yet. Log in as Admin, click Music, and choose an audio file first.');
      return;
    }
    if(quizAudio.audio){try{quizAudio.audio.pause();}catch(e){}}
    const audio=new Audio(url);
    audio.loop=true;
    audio.volume=getQuizMusicVolume();
    audio.preload='auto';
    await audio.play();
    quizAudio.audio=audio;
    quizAudio.on=true;
    updateQuizMusicButton();
  }catch(err){
    console.warn('Quiz music failed',err);
    alert('Music could not start in this browser. You can keep quizzing without it.');
  }
}

function stopQuizMusic(persist=true){
  if(quizAudio.source){try{quizAudio.source.stop();}catch(e){}quizAudio.source=null;}
  if(quizAudio.audio){
    try{quizAudio.audio.pause();quizAudio.audio.currentTime=0;}catch(e){}
    quizAudio.audio=null;
  }
  quizAudio.on=false;
  updateQuizMusicButton();
}

function toggleQuizMusic(){
  if(quizAudio.on)stopQuizMusic(true);
  else startQuizMusic();
}

async function handleQuizMusicFile(e){
  const file=e.target.files&&e.target.files[0];
  if(!file)return;
  if(!file.type.startsWith('audio/')&&!/\.(mp3|m4a|aac|ogg|wav)$/i.test(file.name||'')){
    alert('Choose an audio file, like MP3, M4A, OGG, or WAV.');
    return;
  }
  if(file.size>QUIZ_MUSIC_MAX_SIZE){
    alert('Music file is too large. Please use a file under 12 MB.');
    if(e.target)e.target.value='';
    return;
  }
  try{
    setMediaStatus('saving music...');
    await quizMusicStore('readwrite',store=>store.put({
      blob:file,
      name:file.name||'music',
      type:file.type||'audio/mpeg',
      size:file.size,
      updatedAt:new Date().toISOString()
    },QUIZ_MUSIC_KEY));
    localStorage.setItem(QUIZ_MUSIC_META_KEY,JSON.stringify({name:file.name||'music',size:file.size,type:file.type||''}));
    if(quizAudio.customUrl){URL.revokeObjectURL(quizAudio.customUrl);quizAudio.customUrl=null;}
    if(quizAudio.on){stopQuizMusic(false);await startQuizMusic();}
    setMediaStatus('music saved');
    if(e.target)e.target.value='';
  }catch(err){
    console.warn(err);
    alert('Music upload failed: '+(err.message||err));
    setMediaStatus('');
  }
}

function handleQuizMusicVolume(value){
  const vol=Math.max(0,Math.min(1,Number(value)/100));
  localStorage.setItem(QUIZ_MUSIC_VOLUME_KEY,String(vol));
  if(quizAudio.audio)quizAudio.audio.volume=vol;
}

async function resetQuizMusic(){
  try{
    stopQuizMusic(false);
    await quizMusicStore('readwrite',store=>store.delete(QUIZ_MUSIC_KEY));
    localStorage.removeItem(QUIZ_MUSIC_META_KEY);
    if(quizAudio.customUrl){URL.revokeObjectURL(quizAudio.customUrl);quizAudio.customUrl=null;}
    quizAudio.customReady=false;
    setMediaStatus('music reset');
  }catch(err){
    console.warn(err);
    alert('Could not reset music: '+(err.message||err));
  }
}

const QUIZ_BG_KEY='mlsboc_quiz_bg';
const QUIZ_BG_BLUR_KEY='mlsboc_quiz_bg_blur';
const QUIZ_BG_OPACITY_KEY='mlsboc_quiz_bg_opacity';

function clampNumber(value,min,max,fallback){
  const n=Number(value);
  if(!Number.isFinite(n))return fallback;
  return Math.max(min,Math.min(max,n));
}

function getQuizBgBlur(){
  return clampNumber(localStorage.getItem(QUIZ_BG_BLUR_KEY),0,10,3.5);
}

function getQuizBgOpacity(){
  return clampNumber(localStorage.getItem(QUIZ_BG_OPACITY_KEY),.15,1,.45);
}

function applyQuizBackgroundSettings(){
  const root=document.documentElement;
  root.style.setProperty('--custom-quiz-bg-blur',`${getQuizBgBlur()}px`);
  root.style.setProperty('--custom-quiz-bg-opacity',String(getQuizBgOpacity()));
}

function applyQuizBackgroundFromStorage(){
  try{
    const stored=localStorage.getItem(QUIZ_BG_KEY);
    if(stored){
      document.documentElement.style.setProperty('--custom-quiz-bg',`url("${stored}")`);
    }else{
      document.documentElement.style.removeProperty('--custom-quiz-bg');
    }
    applyQuizBackgroundSettings();
  }catch(e){}
}
function setQuizBgStatus(msg){
  setMediaStatus(msg);
}
function handleQuizBackgroundFile(e){
  const file=e.target.files&&e.target.files[0];
  if(!file)return;
  if(!file.type.startsWith('image/')){alert('Choose an image file.');return;}
  setQuizBgStatus('optimizing...');
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const maxW=760;
        const scale=Math.min(1,maxW/img.width);
        const w=Math.max(1,Math.round(img.width*scale));
        const h=Math.max(1,Math.round(img.height*scale));
        const cv=document.createElement('canvas');
        cv.width=w;cv.height=h;
        const ctx=cv.getContext('2d');
        ctx.fillStyle='#111827';
        ctx.fillRect(0,0,w,h);
        if('filter' in ctx)ctx.filter='blur(.7px) brightness(1.03) saturate(1.03)';
        ctx.drawImage(img,0,0,w,h);
        const url=cv.toDataURL('image/jpeg',0.62);
        localStorage.setItem(QUIZ_BG_KEY,url);
        applyQuizBackgroundFromStorage();
        setQuizBgStatus('saved for this browser');
        if(e.target)e.target.value='';
      }catch(err){
        console.warn(err);
        alert('That image was too large to save in this browser. Try a smaller image.');
        setQuizBgStatus('');
      }
    };
    img.onerror=()=>{alert('Could not read that image.');setQuizBgStatus('');};
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
function handleQuizBgBlur(value){
  const blur=clampNumber(value,0,10,3.5);
  localStorage.setItem(QUIZ_BG_BLUR_KEY,String(blur));
  applyQuizBackgroundSettings();
}
function handleQuizBgOpacity(value){
  const opacity=clampNumber(Number(value)/100,.15,1,.45);
  localStorage.setItem(QUIZ_BG_OPACITY_KEY,String(opacity));
  applyQuizBackgroundSettings();
}
function resetQuizBackground(){
  try{
    localStorage.removeItem(QUIZ_BG_KEY);
    localStorage.removeItem(QUIZ_BG_BLUR_KEY);
    localStorage.removeItem(QUIZ_BG_OPACITY_KEY);
  }catch(e){}
  applyQuizBackgroundFromStorage();
  refreshQuizMediaAdminUi();
  setQuizBgStatus('default restored');
}

window.__appInit = async function(){
  // Guard: only run once even if called multiple times
  if(window.__appInitDone)return;
  window.__appInitDone=true;
  clearStaleAppCaches();
  applyQuizBackgroundFromStorage();
  applySavedTheme();
  try{
    sb = supabase.createClient(SB_URL, SB_KEY);
    const _t=(ms)=>new Promise((_,r)=>setTimeout(()=>r('to'),ms));
    localStorage.setItem('mlsboc_seeded','disabled');
    await Promise.race([
      Promise.all([loadIconCache(),loadFolderIconCache(),loadClassIconCache()]),
      _t(5000)
    ]).catch(()=>{});
    // Restore last navigation position
    try{
      const saved=sessionStorage.getItem('mlsboc_nav');
      if(saved){
        const nav=JSON.parse(saved);
        // Only restore safe views — skip quiz/exam in-progress states
        if(nav.view==='subject'&&nav.subject){
          appState.view='subject';appState.subject=nav.subject;
          appState.subjectTab=nav.subjectTab||'quiz';
        }else if(nav.view==='formulas'){
          appState.view='formulas';
        }else if(nav.view==='class'&&nav.classSubject){
          appState.view='class';appState.classView='subject';
          appState.classSubject=nav.classSubject;
        }else if(nav.view==='class'){
          appState.view='class';appState.classView=null;
        }
        // 'all' exam and quiz mid-session intentionally not restored
      }
    }catch(e){}
    if(location.hash==='#interactive'){
      appState.view='interactive';
    }
  }catch(e){console.warn('Init error',e);}
  // Hide splash and show app
  const splash=document.getElementById('pwa-splash');
  if(splash)splash.style.display='none';
  renderView();
};

function clearStaleAppCaches(){
  try{
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(reg=>reg.unregister())).catch(()=>{});
    }
    if(window.caches){
      caches.keys().then(keys=>keys.forEach(key=>caches.delete(key))).catch(()=>{});
    }
  }catch(e){}
}

});

// ─── SHARED IMAGE SECTION PDF GENERATOR ──────────────────────────────────────
// Layout: 2x2 image grid on top (like the app cards), name + key features below
async function generateImageSectionPDF(items, title, filename, options={}){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const pageW=doc.internal.pageSize.getWidth();
  const pageH=doc.internal.pageSize.getHeight();
  const margin=14,gap=5;
  // Grid takes upper ~60% of page, text below
  const gridW=(pageW-margin*2-gap)/2;
  const gridH=gridW*0.68;
  const gridY=margin;
  const textY=gridY+2*(gridH+gap)+6; // text starts below 2x2 grid
  const getImgDims=(src)=>new Promise(res=>{
    const img=new Image();
    img.onload=()=>res({w:img.naturalWidth||4,h:img.naturalHeight||3});
    img.onerror=()=>res({w:4,h:3});
    img.src=src;
  });
  let first=true;
  for(const item of items){
    if(!first)doc.addPage(); first=false;
    // ── 2x2 image grid (top of page, like the card)
    const imgs=imageEntryList(item.images).slice(0,4);
    for(let i=0;i<4;i++){
      const col=i%2,row=Math.floor(i/2);
      const cx=margin+col*(gridW+gap);
      const cy=gridY+row*(gridH+gap);
      const entry=imgs[i];
      const src=imageEntrySrc(entry);
      const overlayMeta=options.imageMetaPosition==='overlay';
      const labelH=options.showImageMeta&&!overlayMeta?5:0;
      const imgPad=Number(options.imagePadding||0);
      const imageW=gridW-imgPad*2;
      const imageH=gridH-labelH-imgPad*2;
      if(options.imageFrame!==false){
        doc.setFillColor(245,245,245);doc.rect(cx,cy,gridW,gridH,'F');
        doc.setDrawColor(210,210,210);doc.setLineWidth(0.3);doc.rect(cx,cy,gridW,gridH,'S');
      }
      if(src){
        try{
          let dims={w:4,h:3};
          try{dims=await getImgDims(src);}catch(e){}
          const ar=dims.w/dims.h,car=imageW/imageH;
          let dw,dh;
          if(ar>car){dw=imageW;dh=imageW/ar;}else{dh=imageH;dw=imageH*ar;}
          const ox=cx+imgPad+(imageW-dw)/2;
          const oy=cy+imgPad+(imageH-dh)/2;
          const fmt=(src.startsWith('data:image/png')||src.toLowerCase().includes('.png'))?'PNG':'JPEG';
          doc.addImage(src,fmt,ox,oy,dw,dh,'','NONE');
          if(options.showImageMeta&&overlayMeta){
            const meta=hemeImageLabel(entry,i);
            doc.setFontSize(7.5);doc.setFont('helvetica','bold');
            const pillW=doc.getTextWidth(meta)+4;
            const pillX=ox+1.4,pillY=oy+dh-5.4;
            doc.setFillColor(255,255,255);doc.roundedRect(pillX,pillY,pillW,4.6,1.4,1.4,'F');
            doc.setTextColor(70,70,88);doc.text(meta,pillX+2,pillY+3.2);
          }
        }catch(e){}
        if(options.showImageMeta&&!overlayMeta){
          doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(80,80,95);
          doc.text(hemeImageLabel(entry,i),cx+3,cy+gridH-1.8);
        }
      }
    }
    // ── Divider line between images and text
    doc.setDrawColor(200,200,200);doc.setLineWidth(0.4);
    doc.line(margin,textY-3,pageW-margin,textY-3);
    let nameY=textY+3;
    if(options.showCategory){
      const category=hemeFolderLabel(item.folder);
      doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(80,80,105);
      doc.text('Category: '+category,margin,nameY);
      nameY+=6;
    }
    // ── Name (bold, larger) — below images like the app card
    doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(15,15,15);
    doc.text(item.name||'',margin,nameY);
    // ── Key features
    const feats=(item.key_features||[]).filter(Boolean);
    let ty=nameY+7;
    if(feats.length){
      doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(40,40,80);
      doc.text('Key Features',margin,ty);ty+=5;
      doc.setFont('helvetica','normal');doc.setTextColor(50,50,50);
      const featLines=doc.splitTextToSize(feats.join('  |  '),pageW-margin*2);
      featLines.forEach(l=>{doc.text(l,margin,ty);ty+=4.5;});
      ty+=3;
    }else if(options.missingFeaturesText){
      doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(190,45,65);
      doc.text(options.missingFeaturesText,margin,ty);ty+=5;
    }
    // ── Notes
    if(item.notes&&item.notes.trim()){
      doc.setFontSize(8.5);doc.setFont('helvetica','italic');doc.setTextColor(70,70,70);
      const noteLines=doc.splitTextToSize(item.notes,pageW-margin*2);
      noteLines.slice(0,4).forEach(l=>{doc.text(l,margin,ty);ty+=4.2;});
    }
  }
  // Footer
  const tot=doc.internal.getNumberOfPages();
  for(let p=1;p<=tot;p++){
    doc.setPage(p);
    doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);
    doc.text('MLS BOC Prep - '+title+' | Page '+p+' of '+tot,margin,pageH-6);
    doc.text(new Date().toLocaleDateString(),pageW-margin,pageH-6,{align:'right'});
  }
  doc.save(filename);
  document.getElementById('condition-modal').classList.add('hidden');
}

async function generateUASingleImagePDF(items, title, filename, options={}){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const pageW=doc.internal.pageSize.getWidth();
  const pageH=doc.internal.pageSize.getHeight();
  const margin=12;
  const gap=5;
  const cols=2;
  const rows=options.includeFeatures?3:4;
  const itemsPerPage=cols*rows;
  const cardW=(pageW-margin*2-gap*(cols-1))/cols;
  const cardH=(pageH-margin*2-10-gap*(rows-1))/rows;
  const imgH=options.includeFeatures?Math.max(34,cardH-36):cardH-16;
  const makePDFImage=(src)=>new Promise(res=>{
    let done=false;
    const fmt=(src&&src.startsWith('data:image/png'))?'PNG':'JPEG';
    const finish=(val)=>{if(done)return;done=true;res(val);};
    const img=new Image();
    img.onload=()=>{
      try{
        const maxW=720,maxH=480;
        const nw=img.naturalWidth||4,nh=img.naturalHeight||3;
        const scale=Math.min(maxW/nw,maxH/nh,1);
        const w=Math.max(1,Math.round(nw*scale));
        const h=Math.max(1,Math.round(nh*scale));
        const cv=document.createElement('canvas');
        cv.width=w;cv.height=h;
        const ctx=cv.getContext('2d');
        ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
        ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='medium';
        ctx.drawImage(img,0,0,w,h);
        finish({src:cv.toDataURL('image/jpeg',0.72),fmt:'JPEG',w,h});
      }catch(e){
        finish({src,fmt,w:img.naturalWidth||4,h:img.naturalHeight||3});
      }
    };
    img.onerror=()=>finish({src:null,fmt:'JPEG',w:4,h:3});
    setTimeout(()=>finish({src,fmt,w:4,h:3}),5000);
    if(src&&!src.startsWith('data:'))img.crossOrigin='anonymous';
    img.src=src;
  });
  for(let idx=0;idx<items.length;idx++){
    if(idx>0&&idx%itemsPerPage===0)doc.addPage();
    const item=items[idx];
    const pos=idx%itemsPerPage;
    const col=pos%cols,row=Math.floor(pos/cols);
    const x=margin+col*(cardW+gap);
    const y=margin+row*(cardH+gap);
    const imgX=x+3,imgY=y+3,imgW=cardW-6;
    const img=imageEntryList(item.images).map(imageEntrySrc).filter(Boolean)[0];
    doc.setFillColor(248,248,248);doc.rect(x,y,cardW,cardH,'F');
    doc.setDrawColor(210,210,210);doc.setLineWidth(0.3);doc.rect(x,y,cardW,cardH,'S');
    doc.setFillColor(245,245,245);doc.rect(imgX,imgY,imgW,imgH,'F');
    if(img){
      try{
        const pdfImg=await makePDFImage(img);
        if(!pdfImg.src)throw new Error('Image could not be loaded');
        const ar=pdfImg.w/pdfImg.h,car=imgW/imgH;
        let dw,dh;
        if(ar>car){dw=imgW;dh=imgW/ar;}else{dh=imgH;dw=imgH*ar;}
        const ox=imgX+(imgW-dw)/2,oy=imgY+(imgH-dh)/2;
        doc.addImage(pdfImg.src,pdfImg.fmt,ox,oy,dw,dh,'','FAST');
      }catch(e){}
    }
    let textY=y+imgH+8;
    if(options.showCategory){
      doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(38,92,165);
      doc.text(uaCategoryLabel(item),x+3,textY);
      textY+=4.5;
    }
    doc.setFontSize(9.2);doc.setFont('helvetica','bold');doc.setTextColor(15,15,15);
    const nameLines=doc.splitTextToSize(item.name||'',cardW-6);
    doc.text(nameLines.slice(0,2),x+3,textY);
    textY+=Math.min(nameLines.length,2)*4.2+1;
    if(options.includeFeatures){
      const feats=(item.key_features||[]).filter(Boolean);
      doc.setFontSize(7.4);doc.setFont('helvetica','normal');
      if(feats.length){
        doc.setTextColor(55,55,70);
        const lines=doc.splitTextToSize(feats.join('  |  '),cardW-6).slice(0,4);
        lines.forEach(line=>{doc.text(line,x+3,textY);textY+=3.6;});
      }else{
        doc.setFont('helvetica','bold');doc.setTextColor(190,45,65);
        doc.text('No key features added yet',x+3,textY);
      }
    }
  }
  const tot=doc.internal.getNumberOfPages();
  for(let p=1;p<=tot;p++){
    doc.setPage(p);
    doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);
    doc.text('MLS BOC Prep - '+title+' | Page '+p+' of '+tot,margin,pageH-6);
    doc.text(new Date().toLocaleDateString(),pageW-margin,pageH-6,{align:'right'});
  }
  doc.save(filename);
  document.getElementById('condition-modal').classList.add('hidden');
}

async function checkAdmin(){
  const input=document.getElementById('admin-pw').value;
  if(!input){document.getElementById('admin-err').textContent='Enter a password.';return;}
  const msgBuf=new TextEncoder().encode(input);
  const hashBuf=await crypto.subtle.digest('SHA-256',msgBuf);
  const hashHex=Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if(hashHex===ADMIN_PW_HASH){
    isAdmin=true;
    document.getElementById('admin-bar-el').classList.remove('hidden');
    refreshQuizMediaAdminUi();
    closeAdminModal();renderView();
  }else{document.getElementById('admin-err').textContent='Wrong password.';}
}

async function handleClassIconFile(e,key){
  const file=e.target.files[0];if(!file)return;
  const img=new Image();
  const rdr=new FileReader();
  rdr.onload=ev=>{
    img.onload=async()=>{
      const M=600;let w=img.width,h=img.height;
      if(w>M){h=Math.round(h*M/w);w=M;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const url=cv.toDataURL('image/jpeg',0.75);
      classIconCache[key]=url;
      // Upsert into supabase
      const {data:existing}=await sb.from('mlsboc_class_icons').select('id').eq('key',key).single().catch(()=>({data:null}));
      if(existing&&existing.id){
        await sb.from('mlsboc_class_icons').update({image_url:url}).eq('key',key);
      }else{
        await sb.from('mlsboc_class_icons').insert({key,image_url:url});
      }
      renderView();
    };
    img.src=ev.target.result;
  };
  rdr.readAsDataURL(file);
}

function renderInteractiveTopicGroups(allLinks){
  const groups={};
  allLinks.forEach(lnk=>{
    const topic=lnk.topic || (lnk._builtin?'Interactive':'Saved Links');
    if(!groups[topic])groups[topic]=[];
    groups[topic].push(lnk);
  });
  const preferred=['Blood Bank','Urinalysis','Chemistry','Hematology','Microbiology','Lab Operations','Immunology','Saved Links','Interactive'];
  const ordered=[
    ...preferred.filter(topic=>groups[topic]),
    ...Object.keys(groups).filter(topic=>!preferred.includes(topic)).sort()
  ];
  return ordered.map(topic=>{
    const items=groups[topic]||[];
    const color=(items[0]&&items[0].color)||'var(--accent)';
    return '<section class="interactive-topic-section" style="--topic-color:'+color+'">'
      + '<div class="interactive-topic-head"><div class="interactive-topic-title">'+esc(topic)+'</div></div>'
      + '<div class="interactive-tool-grid">' + items.map(renderInteractiveLinkCard).join('') + '</div>'
      + '</section>';
  }).join('');
}

function normalizeInteractiveUrl(url){
  const raw=String(url||'').trim();
  const file=(raw.match(/([^/?#]+\.html)(?:[?#].*)?$/i)||[])[1];
  return (file||raw).toLowerCase();
}

function inferInteractiveLinkMeta(link){
  const l={...link};
  const text=(String(l.title||'')+' '+String(l.url||'')).toLowerCase();
  if(/blood|abo|lewis|secretor|rh|haplotype|antigen|bb_group/.test(text)){
    l.topic='Blood Bank';
    l.icon='BB';
    l.color='#b22222';
    l.force_icon=true;
  }else if(/urine|urinalysis|urinary|renal|reagent/.test(text)){
    l.topic='Urinalysis';
    l.icon=l.icon||'UA';
    l.color='#c8a800';
  }else if(/thyroid|parathyroid|chem/.test(text)){
    l.topic='Chemistry';
    l.icon=l.icon||'CH';
    l.color='#2980b9';
  }
  return l;
}

function handleEILImgFile(e,id){
  const file=e.target.files[0];if(!file)return;
  const rdr=new FileReader();
  rdr.onload=ev=>{
    const t=new Image();
    t.onload=()=>{
      const M=600;let w=t.width,ht=t.height;
      if(w>M){ht=Math.round(ht*M/w);w=M;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=ht;
      cv.getContext('2d').drawImage(t,0,0,w,ht);
      const url=cv.toDataURL('image/jpeg',0.75);
      const hid=document.getElementById('eil-img-data');if(hid)hid.value=url;
      const dz=document.getElementById('eil-img-dz');
      if(dz)dz.innerHTML=`<img src="${url}" style="max-height:80px;border-radius:4px;max-width:100%"><input type="file" id="eil-img-file" accept="image/*" style="display:none" onchange="handleEILImgFile(event,'${id}')">`;
    };
    t.src=ev.target.result;
  };
  rdr.readAsDataURL(file);
}

function handleEILImgDrop(e,id){
  e.preventDefault();e.currentTarget.style.borderColor='var(--border2)';
  const file=e.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;
  const inp=document.createElement('input');inp.type='file';
  const dt=new DataTransfer();dt.items.add(file);inp.files=dt.files;
  handleEILImgFile({target:inp},id);
}

    const questions=await loadCurrentQuizQuestions();

    el.innerHTML=`

        <div class="card">
          <div class="section-title" style="font-size:15px">Subject Quiz</div>

          <div class="divider"></div>
          <div class="form-group">
            <label>Number of questions</label>
            <input type="number" id="q-count" value="${Math.min(10,Math.max(count,1))}" min="1" max="${count||50}">

  const answered=appState.quizAns[appState.quizIdx];
  const pct=Math.round((appState.quizIdx+1)/appState.quizQ.length*100);
  const colors=['#e63946','#2196f3','#f5a623','#3ddc84'];
  const textColors=['#fff','#fff','#fff','#1a2a1a'];
  const emojis=['🔴','🔵','🟡','🟢'];
  const opts=['a','b','c','d'];
  el.innerHTML=`
    <div class="bbq-overlay">
      <div class="bbq-header">
        <button class="btn btn-ghost btn-sm" onclick="switchTab('quiz')">✕ Exit</button>
        <div class="progress-bar" style="flex:1;margin:0 8px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span class="question-num" style="white-space:nowrap">${appState.quizIdx+1} / ${appState.quizQ.length}</span>
      </div>
      <div class="bbq-body">
        <div class="bbq-question">${escNL(q.question)}</div>
        <div class="bbq-options">
          ${opts.map((opt,oi)=>`
            <button class="bbq-opt${answered?(opt===q.correct_answer?' correct-ans':(opt===answered&&answered!==q.correct_answer?' wrong-ans':'')):''}
              " style="background:${colors[oi]};color:${textColors[oi]}" onclick="answerQ('${opt}')" ${answered?'disabled':''}>
              <span class="bbq-opt-letter">${emojis[oi]}</span>
              <span>${q['option_'+opt]}</span>
            </button>`).join('')}

          <div style="text-align:center;margin-bottom:16px">
            <div style="font-size:20px;font-weight:800;color:${answered===q.correct_answer?'var(--success)':'var(--danger)'};margin-bottom:8px">${answered===q.correct_answer?'✓ Correct!':'✗ Incorrect — '+q['option_'+q.correct_answer]}</div>
            ${q.explanation?`<div style="font-size:13px;color:var(--text2);background:var(--bg3);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 var(--r) var(--r) 0;text-align:left;max-width:500px;margin:0 auto">${q.explanation}</div>`:''}
          </div>
          <div style="text-align:center;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">

            ${appState.quizIdx<appState.quizQ.length-1
              ?`<button class="btn btn-primary" style="font-size:15px;padding:12px 32px" onclick="qNext()">Next →</button>`

function quizSubjectKeys(){
  return appState.subject==='para_myco'?['parasitology','mycology']:[appState.subject];
}

function subjectLabel(key){
  const subject=SUBJECTS.find(s=>s.key===key);
  if(subject)return subject.name;
  if(key==='parasitology')return 'Parasitology';
  if(key==='mycology')return 'Mycology';
  return String(key||'').replace(/_/g,' ').replace(/\b\w/g,m=>m.toUpperCase());
}

function normalizeQuizSubjectKey(raw){
  const key=String(raw||'').toLowerCase().trim().replace(/[\s-]+/g,'_');
  const aliases={
    para:'parasitology',
    parasites:'parasitology',
    parasite:'parasitology',
    parasitology:'parasitology',
    myco:'mycology',
    fungi:'mycology',
    fungus:'mycology',
    mycology:'mycology'
  };
  const normalized=aliases[key]||key;
  return quizSubjectKeys().includes(normalized)?normalized:null;
}

async function loadCurrentQuizQuestions(){
  const keys=quizSubjectKeys();
  const results=await Promise.all(keys.map(key=>
    sb.from('mlsboc_questions').select('*').eq('subject',key)
  ));
  return results.flatMap((res,idx)=>(res.data||[]).map(q=>({...q,_subject:q.subject||keys[idx]})))
    .sort((a,b)=>String(b.created_at||'').localeCompare(String(a.created_at||'')));
}

async function startSubjectQuiz(){
  const cnt=parseInt(document.getElementById('q-count').value)||10;
  let data;
  if(appState.subject==='para_myco'){
    const [r1,r2]=await Promise.all([
      sb.from('mlsboc_questions').select('*').eq('subject','parasitology'),
      sb.from('mlsboc_questions').select('*').eq('subject','mycology')
    ]);
    data=[...(r1.data||[]),...(r2.data||[])];
  }else{
    const res=await sb.from('mlsboc_questions').select('*').eq('subject',appState.subject);
    data=res.data||[];
  }
  if(!data||!data.length){alert('No questions found.');return;}
  window._kqOpts={};appState.quizQ=shuffle(data).slice(0,cnt);
  appState.quizIdx=0;appState.quizAns=[];appState.quizStarted=true;appState.quizDone=false;
  renderTab();
}

function answerQ(opt){appState.quizAns[appState.quizIdx]=opt;renderTab();}
function qNext(){appState.quizIdx++;renderTab();}
function qPrev(){appState.quizIdx--;renderTab();}

function renderQuizResults(el,isAll){
  const qs=isAll?appState.allQ:appState.quizQ;
  const ans=isAll?appState.allAns:appState.quizAns;
  let correct=0,missed=[];
  qs.forEach((q,i)=>{if(ans[i]===q.correct_answer)correct++;else missed.push({q,given:ans[i]});});
  const pct=Math.round(correct/qs.length*100);
  const timeStr=isAll?fmtTime(appState.allSeconds):'';
  // Per-subject breakdown
  const subjStats={};
  qs.forEach((q,i)=>{
    const s=q.subject||'unknown';
    if(!subjStats[s])subjStats[s]={correct:0,total:0};
    subjStats[s].total++;
    if(ans[i]===q.correct_answer)subjStats[s].correct++;
  });
  // Merge parasitology & mycology into microbiology for suggestion display
  const MICRO_GROUP=['microbiology','parasitology','mycology'];
  const microCombined={correct:0,total:0,subs:[]};
  MICRO_GROUP.forEach(k=>{if(subjStats[k]){microCombined.correct+=subjStats[k].correct;microCombined.total+=subjStats[k].total;if(k!=='microbiology'&&subjStats[k].total>0)microCombined.subs.push({k,pct:Math.round(subjStats[k].correct/subjStats[k].total*100)});}});
  const mergedStats={};
  Object.entries(subjStats).forEach(([s,st])=>{if(!MICRO_GROUP.includes(s))mergedStats[s]=st;});
  if(microCombined.total>0)mergedStats['microbiology']=microCombined;

  const weakSubjects=Object.entries(mergedStats)
    .map(([s,st])=>{
      const pct=Math.round(st.correct/st.total*100);
      // build sub-note for micro if para/myco dragging it down
      let subNote='';
      if(s==='microbiology'&&st.subs&&st.subs.length){
        const weakSubs=st.subs.filter(x=>x.pct<75);
        if(weakSubs.length)subNote=' (particularly: '+weakSubs.map(x=>x.k+' '+x.pct+'%').join(', ')+')';
      }
      return {s,pct,total:st.total,correct:st.correct,subNote};
    })
    .filter(x=>x.pct<75&&x.total>=2)
    .sort((a,b)=>a.pct-b.pct);
  el.innerHTML=`
    <div class="result-grid" style="grid-template-columns:repeat(${isAll?4:3},1fr)">
      <div class="stat-card"><div class="stat-num" style="color:${pct>=60?'var(--success)':'var(--danger)'}">${pct}%</div><div class="stat-label">Score</div></div>
      <div class="stat-card"><div class="stat-num text-success">${correct}</div><div class="stat-label">Correct</div></div>
      <div class="stat-card"><div class="stat-num text-danger">${qs.length-correct}</div><div class="stat-label">Missed</div></div>
      ${isAll?`<div class="stat-card"><div class="stat-num" style="color:var(--accent);font-size:16px">${timeStr}</div><div class="stat-label">Time</div></div>`:''}
    </div>
    ${isAll?`<div class="card-sm mb-12" style="background:color-mix(in srgb,var(--warn) 10%,transparent);border-color:var(--warn);font-size:12px;color:var(--text2)">⚠ Results are not saved. Export a PDF now to keep a record of this attempt.</div>`:''}
    ${isAll&&weakSubjects.length?`
      <div class="card-sm mb-16" style="border-left:3px solid var(--danger)">
        <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px">📌 Suggested Focus Areas</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:10px">Sections below 75% — prioritize these before your next attempt.</div>
        <div style="display:flex;flex-direction:column;gap:7px">
          ${weakSubjects.map(x=>`
            <div style="display:flex;align-items:center;gap:10px">
              <div style="flex:1">
                <div style="font-size:12px;font-weight:600;color:var(--text)">${x.s==='microbiology'?'Microbiology (incl. Parasitology & Mycology)':x.s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</div>
                <div style="font-size:11px;color:var(--text3)">${x.correct}/${x.total} correct${x.subNote||''}</div>
              </div>
              <div style="width:120px;background:var(--bg3);border-radius:99px;height:7px;overflow:hidden">
                <div style="width:${x.pct}%;height:100%;border-radius:99px;background:${x.pct<50?'var(--danger)':x.pct<65?'#f5a623':'#d4b800'};transition:width .4s"></div>
              </div>
              <div style="font-size:12px;font-weight:700;color:${x.pct<50?'var(--danger)':x.pct<65?'#f5a623':'#c8a800'};min-width:34px;text-align:right">${x.pct}%</div>
            </div>`).join('')}
        </div>
      </div>`:''}
    <div class="flex gap-8 mb-16 flex-wrap">
      ${isAll?`<button class="btn btn-primary" onclick="startAllExam()">Retake Exam</button>`:`<button class="btn btn-primary" onclick="switchTab('quiz')">New Quiz</button>`}
      ${isAll&&missed.length?`<button class="btn btn-warn" onclick="exportResultsPDF()">📄 Export Missed Questions PDF</button>`:''}
      ${isAll?`<button class="btn btn-ghost btn-sm" onclick="exportFromResults()">📊 Export CSV</button>`:''}
    </div>
    ${missed.length?`<div style="font-size:14px;font-weight:600;margin-bottom:12px">Missed Questions (${missed.length})</div>`:''}
    ${missed.map(({q,given})=>`
      <div class="missed-item">
        <div class="missed-q">${escNL(q.question)}</div>
        ${q.table_data&&tblHasContent(q.table_data)?`<div style="margin:6px 0">${renderDataTable(q.table_data,{small:true})}</div>`:''}
        <div class="missed-wrong">Your answer: ${given?esc(q['option_'+given]):'(unanswered)'}</div>
        <div class="missed-a">Correct: ${esc(q['option_'+q.correct_answer])}</div>
        ${q.explanation?`<div style="font-size:12px;color:var(--text2);margin-top:6px">${esc(q.explanation)}</div>`:''}
      </div>`).join('')}
  `;
}

function exportResultsPDF(){
  const qs=appState.allQ,ans=appState.allAns;
  let correct=0,missed=[];
  qs.forEach((q,i)=>{if(ans[i]===q.correct_answer)correct++;else missed.push({q,given:ans[i]});});
  const pct=Math.round(correct/qs.length*100);
  const timeStr=fmtTime(appState.allSeconds);
  if(!missed.length){alert('No missed questions — perfect score!');return;}
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4'});
    const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight(),margin=18,cW=pageW-margin*2;
    let y=margin;
    const checkPage=(n=8)=>{if(y+n>pageH-margin){doc.addPage();y=margin;}};
    const writeText=(text,opts={})=>{
      const {size=10,bold=false,color=[30,30,30],indent=0}=opts;
      doc.setFontSize(size);doc.setFont('helvetica',bold?'bold':'normal');doc.setTextColor(...color);
      doc.splitTextToSize(String(text||''),cW-indent).forEach(l=>{checkPage(6);doc.text(l,margin+indent,y);y+=size*0.4+1.5;});
    };
    // Header
    doc.setFillColor(30,30,30);doc.rect(margin,y,cW,14,'F');
    doc.setFontSize(14);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text('MLS BOC Prep — Practice Exam Results',margin+4,y+9);y+=18;
    // Score summary box
    doc.setFillColor(245,245,245);doc.rect(margin,y,cW,18,'F');doc.setDrawColor(200,200,200);doc.rect(margin,y,cW,18,'S');
    doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);
    doc.text(`Score: ${correct}/${qs.length} (${pct}%)`,margin+4,y+7);
    doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);
    doc.text(`Time: ${timeStr}   |   Date: ${new Date().toLocaleDateString()}`,margin+4,y+13);
    doc.text(`Missed: ${missed.length} of ${qs.length} questions`,margin+cW/2,y+13);
    y+=22;
    // Section header
    doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(20,20,80);
    doc.text('Questions to Review',margin,y);y+=6;
    doc.setDrawColor(20,20,80);doc.setLineWidth(0.5);doc.line(margin,y,pageW-margin,y);y+=6;
    // Missed questions
    missed.forEach(({q,given},mi)=>{
      checkPage(36);
      doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(100,100,140);
      doc.text((q.subject||'').replace(/_/g,' ').toUpperCase()+' · Q'+(mi+1),margin,y);y+=5;
      writeText(q.question,{size:10,bold:true,color:[20,20,20]});
      const opts=['a','b','c','d'];
      opts.forEach(l=>{
        const opt=q['option_'+l];if(!opt)return;
        const isCorrect=l===q.correct_answer,isGiven=l===given;
        doc.setFontSize(9);doc.setFont('helvetica',isCorrect?'bold':'normal');
        doc.setTextColor(...(isCorrect?[20,120,60]:isGiven?[180,40,40]:[50,50,50]));
        checkPage(5);doc.text(l.toUpperCase()+'. '+opt+(isCorrect?' ✓':isGiven?' ✗':''),margin+4,y);y+=5;
      });
      if(q.explanation){
        y+=1;doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(80,80,100);
        doc.splitTextToSize('Note: '+q.explanation,cW-6).forEach(l=>{checkPage(5);doc.text(l,margin+4,y);y+=4.5;});
      }
      y+=6;
    });
    // Footer on each page
    const tot=doc.internal.getNumberOfPages();
    for(let p=1;p<=tot;p++){
      doc.setPage(p);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);
      doc.text('MLS BOC Prep — Practice Exam · Items to Improve · Page '+p+' of '+tot,margin,pageH-8);
      doc.text(new Date().toLocaleDateString(),pageW-margin,pageH-8,{align:'right'});
    }
    doc.save('boc_exam_missed_'+new Date().toISOString().slice(0,10)+'.pdf');
  }catch(err){alert('PDF export failed: '+err.message);}
}

// ─── URINALYSIS IMAGES — categorized list with bulk upload + quiz ─────────────
const UA_CATEGORY_TYPES=['Normal','Abnormal'];
const UA_PH_GROUPS=['Acidic','Alkaline','Unspecified'];
const UA_CAT_META_RE=/^\s*\[\[UA_CATEGORY:([^|\]]+)\|([^\]]+)\]\]\s*\n?/i;
function normalizeUACatType(v){
  const val=String(v||'').trim().toLowerCase();
  if(val==='normal')return 'Normal';
  if(val==='abnormal')return 'Abnormal';
  return '';
}
function normalizeUAPh(v){
  const val=String(v||'').trim().toLowerCase();
  if(val==='acidic'||val==='acid')return 'Acidic';
  if(val==='alkaline'||val==='basic')return 'Alkaline';
  return 'Unspecified';
}
function stripUACategoryNote(notes){
  return String(notes||'').replace(UA_CAT_META_RE,'').trim();
}
function uaTextForGuess(item){
  return [
    item?.name,
    ...(Array.isArray(item?.key_features)?item.key_features:[]),
    stripUACategoryNote(item?.notes)
  ].join(' ').toLowerCase();
}
function inferUACategory(item){
  const notes=String(item?.notes||'');
  const match=notes.match(UA_CAT_META_RE);
  if(match){
    return {type:normalizeUACatType(match[1])||'Abnormal',ph:normalizeUAPh(match[2])};
  }
  const text=uaTextForGuess(item);
  const ph=/alkaline|basic|ammonium biurate|triple phosphate|struvite|calcium carbonate|phosphate/.test(text)
    ?'Alkaline'
    :(/acidic|acid urine|uric acid|cystine|calcium oxalate/.test(text)?'Acidic':'Unspecified');
  const type=/\bnormal\b|normal finding|normal sediment|hyaline cast/.test(text)?'Normal':'Abnormal';
  return {type,ph};
}
function composeUANotesWithCategory(notes,type,ph){
  const clean=stripUACategoryNote(notes);
  return `[[UA_CATEGORY:${normalizeUACatType(type)||'Abnormal'}|${normalizeUAPh(ph)}]]${clean?`\n${clean}`:''}`;
}
function uaCategoryKey(item){
  const cat=inferUACategory(item);
  return `${cat.type}|${cat.ph}`;
}
function uaCategoryLabel(item){
  const cat=inferUACategory(item);
  return cat.ph==='Unspecified'?cat.type:`${cat.type} / ${cat.ph}`;
}
function uaCategoryControls(prefix,item={}){
  const cat=inferUACategory(item);
  return `
    <div class="form-grid" style="grid-template-columns:repeat(2,minmax(0,1fr));gap:10px">
      <div class="form-group">
        <label>Normal / Abnormal</label>
        <select id="${prefix}-type">
          ${UA_CATEGORY_TYPES.map(v=>`<option value="${v}" ${cat.type===v?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Acidic / Alkaline</label>
        <select id="${prefix}-ph">
          ${UA_PH_GROUPS.map(v=>`<option value="${v}" ${cat.ph===v?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
    </div>`;
}
function uaSortItems(items){
  const typeRank={Normal:0,Abnormal:1};
  const phRank={Acidic:0,Alkaline:1,Unspecified:2};
  return [...(items||[])].sort((a,b)=>{
    const ca=inferUACategory(a),cb=inferUACategory(b);
    return (typeRank[ca.type]??9)-(typeRank[cb.type]??9)
      ||(phRank[ca.ph]??9)-(phRank[cb.ph]??9)
      ||String(a.name||'').localeCompare(String(b.name||''));
  });
}
function groupedUAImages(items){
  const groups={};
  uaSortItems(items).forEach(item=>{
    const key=uaCategoryKey(item);
    if(!groups[key])groups[key]=[];
    groups[key].push(item);
  });
  return groups;
}

function filterUAItems(query){

  document.querySelectorAll('.ua-item').forEach(card=>{

  document.querySelectorAll('.ua-image-group').forEach(group=>{

async function generateUAPDF(){
  if(window._uaExportBusy)return;
  const ids=[...document.querySelectorAll('.ua-exp-cb:checked')].map(cb=>cb.dataset.id);
  const selectedGroups=[...document.querySelectorAll('.ua-exp-group:checked')].map(cb=>cb.dataset.group);
  const includeFeatures=!!document.getElementById('ua-exp-features')?.checked;
  const source=Array.isArray(window._uaExportItems)?window._uaExportItems:[];
  const selectedMap=new Map();
  source.forEach(item=>{
    if(ids.includes(String(item.id))||selectedGroups.includes(uaCategoryKey(item)))selectedMap.set(String(item.id),item);
  });
  const ordered=uaSortItems([...selectedMap.values()]);
  if(!ordered.length){alert('Select at least one category or image.');return;}
  window._uaExportBusy=true;
  const btn=document.querySelector('#condition-modal-body .btn-primary');
  if(btn){btn.textContent='Generating...';btn.disabled=true;}
  try{
    await new Promise(r=>setTimeout(r,30));
    await generateUASingleImagePDF(ordered,'Urinalysis Findings','urinalysis_findings.pdf',{includeFeatures,showCategory:true});
  }catch(err){
    alert('PDF failed: '+err.message);
    if(btn){btn.textContent='📄 Generate PDF';btn.disabled=false;}
  }finally{
    window._uaExportBusy=false;
  }
}

async function handleUAImgFile(e,itemId,slot){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const {data}=await sb.from('mlsboc_ua_images').select('images').eq('id',itemId).single();
    const imgs=[...imageEntryList(data?.images)];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=ev.target.result;
    await sb.from('mlsboc_ua_images').update({images:imgs}).eq('id',itemId);window._uaCache=null;
    openUAImage(itemId);
  };
  reader.readAsDataURL(file);
}

async function handleUAImgDrop(e,itemId,slot){
  e.preventDefault();e.currentTarget.classList.remove('dragover');
  const file=e.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const {data}=await sb.from('mlsboc_ua_images').select('images').eq('id',itemId).single();
    const imgs=[...imageEntryList(data?.images)];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=ev.target.result;
    await sb.from('mlsboc_ua_images').update({images:imgs}).eq('id',itemId);window._uaCache=null;
    openUAImage(itemId);
  };
  reader.readAsDataURL(file);
}

async function processUABulkFiles(files){
  const queueEl=document.getElementById('ua-bulk-queue');
  if(queueEl)queueEl.innerHTML=`<div style="font-size:12px;color:var(--text2);margin-bottom:8px">Adding ${files.length} image(s)...</div>`;
  let done=0;
  for(const file of files){
    const name=file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
    const dataUrl=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});
    const guess=inferUACategory({name,key_features:[],notes:''});
    const {error}=await sb.from('mlsboc_ua_images').insert({name,key_features:[],notes:composeUANotesWithCategory('',guess.type,guess.ph),images:[dataUrl]});
    if(!error)done++;
  }
  if(queueEl)queueEl.innerHTML=`<div style="font-size:12px;color:var(--success)">✓ Added ${done} of ${files.length} images. You can edit names/features by clicking each card.</div>`;
  renderTab();
}

async function startUAQuiz(forceNew=false){
  // Resume if in progress
  if(!forceNew && appState.uaImgMode==='quiz' && appState.uaQuizItems&&appState.uaQuizItems.length && !appState.uaQuizDone && appState.uaQuizIdx>0){
    renderTab();return;
  }
  if(!forceNew && appState.uaQuizItems&&appState.uaQuizItems.length && !appState.uaQuizDone && appState.uaQuizIdx>0){
    appState.uaImgMode='quiz';
    window._uaShowResume=true;
    renderTab();return;
  }
  if(!window._uaCache){try{const r=await sb.from('mlsboc_ua_images').select('*').order('name');window._uaCache=r.data||[];}catch(e){}}
  const valid=(window._uaCache||[]).filter(o=>o.images&&o.images.filter(Boolean).length>0);
  if(!valid.length){alert('No images to quiz on yet.');return;}
  appState.uaImgMode='quiz';
  window._uaShowResume=false;
  window._kqOpts={};appState.uaQuizItems=shuffle(valid);
  appState.uaQuizIdx=0;appState.uaQuizAns=[];appState.uaQuizDone=false;
  renderTab();
}

function renderUAImageQuiz(el){
  // Show resume prompt if returning mid-quiz
  if(appState.uaQuizIdx>0 && !appState.uaQuizDone && window._uaShowResume){
    window._uaShowResume=false;
    el.innerHTML=`
      <div class="bbq-overlay">
        <div class="bbq-header"><button class="btn btn-ghost btn-sm" onclick="appState.uaImgMode='browse';renderTab()">← Back</button></div>
        <div class="bbq-body" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center">
          <div style="font-size:36px;margin-bottom:16px">🧪</div>
          <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px">UA Image Quiz</div>
          <div style="font-size:14px;color:var(--text2);margin-bottom:28px">You're on image ${appState.uaQuizIdx+1} of ${appState.uaQuizItems.length}</div>
          <div class="flex gap-12 flex-wrap" style="justify-content:center">
            <button class="btn btn-primary" style="font-size:15px;padding:12px 28px" onclick="window._uaShowResume=false;renderTab()">Resume →</button>
            <button class="btn btn-ghost" style="font-size:15px;padding:12px 28px" onclick="startUAQuiz(true)">Restart</button>
          </div>
        </div>
      </div>`;
    return;
  }
  renderKahootImageQuiz(el,{
    items:appState.uaQuizItems,
    idx:appState.uaQuizIdx,
    ans:appState.uaQuizAns,
    done:appState.uaQuizDone,
    prompt:'What is this urinalysis finding?',
    placeholder:'🧪',
    onAnswer:id=>{appState.uaQuizAns[appState.uaQuizIdx]=id;renderTab();},
    onPrev:()=>{appState.uaQuizIdx=Math.max(0,appState.uaQuizIdx-1);renderTab();},
    onNext:()=>{appState.uaQuizIdx++;renderTab();},
    onDone:()=>{appState.uaQuizDone=true;renderTab();},
    onRetry:()=>startUAQuiz(true),
    onExit:()=>{appState.uaImgMode='browse';appState.uaQuizDone=false;renderTab();},
    onRetryWrong:(wrongItems)=>{
      if(!wrongItems.length)return;
      window._kqOpts={};appState.uaQuizItems=shuffle(wrongItems);
      appState.uaQuizIdx=0;appState.uaQuizAns=[];appState.uaQuizDone=false;
      renderTab();
    }
  });
}

function answerUAImgQ(id){appState.uaQuizAns[appState.uaQuizIdx]=id;renderTab();}
