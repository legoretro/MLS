<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MLS BOC Prep</title>

<!-- PWA / Apple home screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="MLS BOC">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0f12">

<!-- Apple touch icon (shown on home screen) -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230d0f12'/%3E%3Ctext x='90' y='115' font-size='80' text-anchor='middle' fill='%234f8ef7'%3E🩸%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Splash/loading screen shown instantly before JS loads -->
<style>
#pwa-splash{position:fixed;inset:0;background:#0d0f12;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
#pwa-splash .sp-logo{font-family:monospace;font-size:22px;color:#4f8ef7;letter-spacing:-1px}
#pwa-splash .sp-sub{font-size:13px;color:#5c6380;font-family:sans-serif}
#pwa-splash .sp-dot{display:inline-block;animation:blink 1.2s infinite}
#pwa-splash .sp-dot:nth-child(2){animation-delay:.2s}
#pwa-splash .sp-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<style>
:root {
  --bg:#0d0f12;--bg2:#141720;--bg3:#1c2030;--bg4:#242840;
  --border:#2a2f4a;--border2:#3a4060;
  --accent:#4f8ef7;--accent2:#7fb3ff;
  --success:#3ddc84;--danger:#f06474;--warn:#f5a623;
  --text:#e8eaf6;--text2:#9aa0c0;--text3:#5c6380;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --r:8px;--r2:12px;
}
body.light-mode {
  --bg:#f0f2f8;--bg2:#ffffff;--bg3:#e8eaf2;--bg4:#dde0ee;
  --border:#c8cce0;--border2:#aab0cc;
  --accent:#2563d4;--accent2:#1a4eaa;
  --success:#1a8a4a;--danger:#c0303f;--warn:#b36000;
  --text:#1a1d2e;--text2:#4a5070;--text3:#8890b0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
button{font-family:var(--sans);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--sans);outline:none}
img{display:block}

/* Layout */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--accent);letter-spacing:-0.5px;line-height:1.3}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:0.3px}
main{flex:1;padding:24px;max-width:1100px;margin:0 auto;width:100}
#app{display:flex;flex-direction:column;min-height:100vh}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid #f0647444}
.btn-danger:hover{background:#f0647422}
.btn-success{background:#3ddc8422;color:var(--success);border:1px solid #3ddc8444}
.btn-warn{background:#f5a62322;color:var(--warn);border:1px solid #f5a62344}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r);padding:3px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);background:transparent;cursor:pointer;border:none;transition:all .15s}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px #0004}
.tab:hover:not(.active){color:var(--text)}

/* Forms */
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
input[type=text],input[type=password],input[type=number],textarea,select{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);padding:9px 12px;font-size:13px;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--bg3)}

/* Subject grid */
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px}
.subject-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all .2s;text-align:left;display:flex;flex-direction:column;gap:0;width:100%;padding:0}
.subject-card:hover{border-color:#4f8ef766;background:var(--bg3);transform:translateY(-1px)}
.subject-card.all-subjects{border-color:#4f8ef744;background:linear-gradient(135deg,var(--bg2),var(--bg3))}
.subject-icon{font-size:22px}
.subject-name{font-size:14px;font-weight:600;color:var(--text)}
.subject-count{font-size:11px;color:var(--text3);font-family:var(--mono)}

/* Quiz */
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
/* ── Progress bar — liquid glass fill ──────────────────────────────────── */
.progress-bar{
  height:8px;
  background:var(--bg3);
  border-radius:99px;
  overflow:hidden;
  position:relative;
  box-shadow:inset 0 1px 3px #0002;
  flex:1;
}
.progress-fill{
  height:100%;
  border-radius:99px;
  transition:width .45s cubic-bezier(.4,0,.2,1);
  position:relative;
  background:linear-gradient(90deg,var(--accent) 0%,color-mix(in srgb,var(--accent) 70%,#fff) 100%);
  box-shadow:0 0 8px color-mix(in srgb,var(--accent) 50%,transparent);
}
.progress-fill::after{
  content:'';
  position:absolute;
  top:1px;left:4px;right:4px;
  height:3px;
  border-radius:99px;
  background:rgba(255,255,255,0.35);
}
/* subject-tinted fills */
.progress-fill.tint-bb   { background:linear-gradient(90deg,#b22222,#e05a5a); box-shadow:0 0 8px #b2222260; }
.progress-fill.tint-chem { background:linear-gradient(90deg,#2980b9,#74c8f5); box-shadow:0 0 8px #2980b960; }
.progress-fill.tint-ua   { background:linear-gradient(90deg,#c8a800,#ffe066); box-shadow:0 0 8px #c8a80060; }
.progress-fill.tint-micro{ background:linear-gradient(90deg,#27ae60,#a8e6c0); box-shadow:0 0 8px #27ae6060; }

/* ── Streak counter — flame style ────────────────────────────────────── */
.streak-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;flex-shrink:0;
}
.streak-flame{
  width:36px;height:36px;
  transition:transform .2s,filter .3s;
  display:block;
}
.streak-num{
  font-size:13px;font-weight:900;font-family:var(--mono);
  line-height:1;color:var(--text3);
  transition:color .3s;
  text-align:center;
}
/* cold — greyed out flame */
.streak-wrap.streak-0 .streak-flame{ opacity:.28;filter:grayscale(1); }
.streak-wrap.streak-0 .streak-num{ color:var(--text3); }
/* warm — 1–2 correct */
.streak-wrap.streak-warm .streak-flame{ filter:none; }
.streak-wrap.streak-warm .streak-num{ color:#e8901a; }
/* hot — 3+ in a row */
.streak-wrap.streak-hot .streak-flame{
  filter:drop-shadow(0 0 5px #f5a62388);
  animation:flame-pulse .8s ease-in-out infinite alternate;
}
.streak-wrap.streak-hot .streak-num{ color:#e8731a; }
@keyframes flame-pulse{
  from{transform:scale(1) translateY(0) rotate(-2deg);}
  to{transform:scale(1.22) translateY(-3px) rotate(2deg);}
}

/* ── Subject progress visual (cartoon, bottom of question area) ──────────── */
.btn-active{
  background:var(--accent)!important;
  color:#fff!important;
  border-color:var(--accent)!important;
}
.tbl-editor table td, .tbl-editor table th{ min-width:80px; }

.spv-wrap{
  display:flex;justify-content:center;align-items:flex-end;
  padding:10px 0 4px;
  pointer-events:none;
  min-height:90px;
}
.spv-wrap svg{ overflow:visible; }
/* liquid wave animation inside containers */
@keyframes spv-wave{
  0%{d:path("M0,6 Q20,0 40,6 Q60,12 80,6 Q100,0 120,6 L120,40 L0,40 Z")}
  50%{d:path("M0,10 Q20,4 40,10 Q60,16 80,10 Q100,4 120,10 L120,40 L0,40 Z")}
  100%{d:path("M0,6 Q20,0 40,6 Q60,12 80,6 Q100,0 120,6 L120,40 L0,40 Z")}
}
@keyframes spv-float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-4px)}
}
@keyframes confetti-fall{
  0%  {transform:translateY(-10px) rotate(0deg);  opacity:1}
  80% {opacity:.8}
  100%{transform:translateY(80px) rotate(360deg); opacity:0}
}
@keyframes spv-colony{
  0%{transform:scale(0);opacity:0}
  60%{transform:scale(1.15);opacity:.9}
  100%{transform:scale(1);opacity:1}
}
@keyframes spv-bubble{
  0%{transform:translateY(0);opacity:.7}
  100%{transform:translateY(-12px);opacity:0}
}
/* streak flame — bigger, sparks visible when hot */
.streak-wrap.streak-0 .spark{ display:none }
.streak-wrap:not(.streak-hot) .spark{ display:none }
.question-num{font-family:var(--mono);font-size:12px;color:var(--text3)}
.question-text{font-size:15px;font-weight:500;color:var(--text);margin-bottom:20px;line-height:1.75}
.options{display:flex;flex-direction:column;gap:8px}
.option{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px;text-align:left;width:100%;color:var(--text);font-size:14px}
.option:hover:not(.selected):not(.correct):not(.wrong){border-color:var(--border2);background:var(--bg4)}
.option.correct{border-color:var(--success);background:#3ddc8415;color:var(--success)}
.option.wrong{border-color:var(--danger);background:#f0647415;color:var(--danger)}
.option-letter{font-family:var(--mono);font-size:12px;font-weight:500;min-width:18px;margin-top:1px}
.explanation{background:var(--bg3);border-left:3px solid var(--accent);border-radius:0 var(--r) var(--r) 0;padding:12px 16px;margin-top:16px;font-size:13px;color:var(--text2)}

/* Timer */
.timer{font-family:var(--mono);font-size:15px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:6px 14px}

/* Results */
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.stat-num{font-size:28px;font-weight:600;font-family:var(--mono)}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.missed-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px}
.missed-q{font-size:13px;color:var(--text);margin-bottom:6px}
.missed-a{font-size:12px;color:var(--success);font-family:var(--mono)}
.missed-wrong{font-size:12px;color:var(--danger);font-family:var(--mono)}

/* Attempts */
.attempt-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.attempt-meta{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:4px}
.score-badge{font-family:var(--mono);font-size:14px;font-weight:600}
.score-pass{color:var(--success)}
.score-fail{color:var(--danger)}

/* Images */
.image-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.image-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.image-card img{width:100%;height:180px;object-fit:cover;background:var(--bg3)}
.image-placeholder{width:100%;height:180px;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:28px}
.image-card-body{padding:12px}
.image-title{font-size:13px;font-weight:500;color:var(--text)}
.image-desc{font-size:12px;color:var(--text2);margin-top:4px}

/* Hematology folder system */
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.folder-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;cursor:pointer;transition:all .2s;text-align:center;width:100%;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.folder-card:hover{border-color:#4f8ef766;background:var(--bg3);transform:translateY(-1px)}
.folder-icon{font-size:26px}
.folder-name{font-size:13px;font-weight:600;color:var(--text)}
.folder-count{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:4px}
.condition-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.condition-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.condition-card:hover{border-color:#4f8ef766;transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.18)}
.condition-imgs{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:160px;background:var(--bg3);flex-shrink:0}
.condition-imgs img{width:100%;height:100%;object-fit:contain;cursor:zoom-in;background:var(--bg3);display:block}
.condition-imgs .img-ph{width:100%;height:100%;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:20px}
/* UA single-image card — full width, taller */
.ua-single-img{height:160px;background:var(--bg3);overflow:hidden}
.ua-single-img img{width:100%;height:100%;object-fit:contain;background:var(--bg3)}
/* full-screen image viewer */
body.light-mode .case-card{background:#f8f9fc}
body.light-mode [style*="var(--bg3)"][style*="var(--border2)"][style*="padding:16px 18px"]{background:#eef0fa!important;border-color:#aab0cc!important}
#img-viewer{position:fixed;inset:0;background:#000d;z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px}
#img-viewer img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:var(--r);box-shadow:0 4px 32px #0008}
#img-viewer-close{position:absolute;top:16px;right:16px;background:#fff2;border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.condition-body{padding:10px 12px;background:var(--bg2);flex:1}
.condition-name{font-size:13px;font-weight:700;color:var(--text);word-break:break-word;line-height:1.4;margin-bottom:4px}
.condition-features{font-size:11px;color:var(--text2);line-height:1.5}

/* Cases */
.case-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:16px}
.case-scenario{font-size:14px;color:var(--text);line-height:1.8;margin-bottom:16px}
.case-data{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;font-family:var(--mono);font-size:12px;color:var(--text2);white-space:pre-wrap}
.case-img-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.case-img-row img{width:160px;height:120px;object-fit:cover;border-radius:var(--r);border:1px solid var(--border)}
.case-img-ph{width:160px;height:120px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:20px}
.case-step{margin-bottom:16px}
.case-step-label{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500}
.case-options{display:flex;flex-wrap:wrap;gap:8px}
.case-opt{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:7px 14px;cursor:pointer;font-size:13px;color:var(--text);transition:all .15s}
.case-opt:hover{border-color:var(--border2)}
.case-opt.selected{border-color:var(--accent);color:var(--accent);background:#4f8ef715}
.case-feedback{margin-top:12px;padding:12px 16px;border-radius:var(--r);font-size:13px;font-weight:500}
.case-feedback.correct{background:#3ddc8415;color:var(--success)}
.case-feedback.wrong{background:#f0647415;color:var(--danger)}

/* Gram+/- page */
.gram-nav{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.gram-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 20px;cursor:pointer;transition:all .2s;text-align:left;flex:1;min-width:180px}
.gram-btn:hover{border-color:#4f8ef766;background:var(--bg3)}
.gram-btn.gram-pos{border-color:#f5a62344}
.gram-btn.gram-neg{border-color:#4f8ef744}
.gram-btn-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.gram-btn-sub{font-size:12px;color:var(--text2)}

/* Blood bank ABO */
.abo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.abo-cell{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.abo-cell:hover{border-color:var(--border2)}
.abo-cell.pos{border-color:var(--success);background:#3ddc8415;color:var(--success)}
.abo-cell.neg{border-color:var(--danger);background:#f0647415;color:var(--danger)}
.abo-badge{font-family:var(--mono);font-size:11px;padding:2px 6px;border-radius:4px;background:var(--bg4)}

/* Draft badge */
.draft-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:#f5a62322;color:var(--warn);border:1px solid #f5a62344;margin-left:8px;text-transform:uppercase;letter-spacing:.5px}
.published-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:#3ddc8422;color:var(--success);border:1px solid #3ddc8444;margin-left:8px;text-transform:uppercase;letter-spacing:.5px}

/* Drop zone */
.drop-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text3);font-size:13px}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:#4f8ef710;color:var(--text2)}
.drop-zone input{display:none}

/* Misc */
.section-title{font-size:18px;font-weight:600;margin-bottom:4px}
.section-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.empty{text-align:center;padding:48px 24px;color:var(--text3);font-size:14px}
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-info{background:#4f8ef722;color:var(--accent2)}
.tag-success{background:#3ddc8422;color:var(--success)}
.tag-warn{background:#f5a62322;color:var(--warn)}
.tag-gram-pos{background:#f5a62322;color:var(--warn)}
.tag-gram-neg{background:#4f8ef722;color:var(--accent2)}
.divider{height:1px;background:var(--border);margin:20px 0}
.flex{display:flex}.flex-center{display:flex;align-items:center}
.flex-wrap{flex-wrap:wrap}
.gap-6{gap:6px}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.ml-auto{margin-left:auto}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}

    if(!localStorage.getItem('mlsboc_seeded')){

    await Promise.race([
      Promise.all([loadIconCache(),loadFolderIconCache(),loadClassIconCache()]),

    ]).catch(()=>{});

      const saved=sessionStorage.getItem('mlsboc_nav');

// ─── SHARED IMAGE SECTION PDF GENERATOR ──────────────────────────────────────
// Layout: 2x2 image grid on top (like the app cards), name + key features below
async function generateImageSectionPDF(items, title, filename){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const pageW=doc.internal.pageSize.getWidth();
  const pageH=doc.internal.pageSize.getHeight();
  const margin=14,gap=5;
  // Grid takes upper ~60% of page, text below
  const gridW=(pageW-margin*2-gap)/2;
  const gridH=gridW*0.68;
  const gridY=margin;
  const textY=gridY+2*(gridH+gap)+6; // text starts below 2x2 grid
  const getImgDims=(src)=>new Promise(res=>{
    const img=new Image();
    img.onload=()=>res({w:img.naturalWidth||4,h:img.naturalHeight||3});
    img.onerror=()=>res({w:4,h:3});
    img.src=src;
  });
  let first=true;
  for(const item of items){
    if(!first)doc.addPage(); first=false;
    // ── 2x2 image grid (top of page, like the card)
    const imgs=(item.images||[]).filter(Boolean).slice(0,4);
    for(let i=0;i<4;i++){
      const col=i%2,row=Math.floor(i/2);
      const cx=margin+col*(gridW+gap);
      const cy=gridY+row*(gridH+gap);
      doc.setFillColor(245,245,245);doc.rect(cx,cy,gridW,gridH,'F');
      doc.setDrawColor(210,210,210);doc.setLineWidth(0.3);doc.rect(cx,cy,gridW,gridH,'S');
      if(imgs[i]){
        try{
          let dims={w:4,h:3};
          try{dims=await getImgDims(imgs[i]);}catch(e){}
          const ar=dims.w/dims.h,car=gridW/gridH;
          let dw,dh;
          if(ar>car){dw=gridW;dh=gridW/ar;}else{dh=gridH;dw=gridH*ar;}
          const ox=cx+(gridW-dw)/2,oy=cy+(gridH-dh)/2;
          const fmt=(imgs[i].startsWith('data:image/png')||imgs[i].toLowerCase().includes('.png'))?'PNG':'JPEG';
          doc.addImage(imgs[i],fmt,ox,oy,dw,dh,'','NONE');
        }catch(e){}
      }
    }
    // ── Divider line between images and text
    doc.setDrawColor(200,200,200);doc.setLineWidth(0.4);
    doc.line(margin,textY-3,pageW-margin,textY-3);
    // ── Name (bold, larger) — below images like the app card
    doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(15,15,15);
    doc.text(item.name||'',margin,textY+3);
    // ── Key features
    const feats=(item.key_features||[]).filter(Boolean);
    let ty=textY+10;
    if(feats.length){
      doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(40,40,80);
      doc.text('Key Features',margin,ty);ty+=5;
      doc.setFont('helvetica','normal');doc.setTextColor(50,50,50);
      const featLines=doc.splitTextToSize(feats.join('  |  '),pageW-margin*2);
      featLines.forEach(l=>{doc.text(l,margin,ty);ty+=4.5;});
      ty+=3;
    }
    // ── Notes
    if(item.notes&&item.notes.trim()){
      doc.setFontSize(8.5);doc.setFont('helvetica','italic');doc.setTextColor(70,70,70);
      const noteLines=doc.splitTextToSize(item.notes,pageW-margin*2);
      noteLines.slice(0,4).forEach(l=>{doc.text(l,margin,ty);ty+=4.2;});
    }
  }
  // Footer
  const tot=doc.internal.getNumberOfPages();
  for(let p=1;p<=tot;p++){
    doc.setPage(p);
    doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);
    doc.text('MLS BOC Prep - '+title+' | Page '+p+' of '+tot,margin,pageH-6);
    doc.text(new Date().toLocaleDateString(),pageW-margin,pageH-6,{align:'right'});
  }
  doc.save(filename);
  document.getElementById('condition-modal').classList.add('hidden');
}

function openAdminModal(){document.getElementById('admin-modal').classList.remove('hidden');}
function closeAdminModal(){document.getElementById('admin-modal').classList.add('hidden');document.getElementById('admin-err').textContent='';document.getElementById('admin-pw').value='';}
async function checkAdmin(){
  const input=document.getElementById('admin-pw').value;
  if(!input){document.getElementById('admin-err').textContent='Enter a password.';return;}
  const msgBuf=new TextEncoder().encode(input);
  const hashBuf=await crypto.subtle.digest('SHA-256',msgBuf);
  const hashHex=Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if(hashHex===ADMIN_PW_HASH){
    isAdmin=true;
    document.getElementById('admin-bar-el').classList.remove('hidden');
    closeAdminModal();renderView();
  }else{document.getElementById('admin-err').textContent='Wrong password.';}
}
function exitAdmin(){isAdmin=false;document.getElementById('admin-bar-el').classList.add('hidden');renderView();}

function renderView(){
  // Persist navigation state so refresh restores position
  try{sessionStorage.setItem('mlsboc_nav',JSON.stringify({
    view:appState.view,
    subject:appState.subject,
    subjectTab:appState.subjectTab,
    classView:appState.classView,
    classSubject:appState.classSubject
  }));}catch(e){}
  const v=document.getElementById('view-main');
  if(appState.view==='home')renderHome(v);
  else if(appState.view==='subject')renderSubjectView(v);
  else if(appState.view==='interactive')renderInteractiveView(v);
  else if(appState.view==='all')renderAllView(v);
  else if(appState.view==='formulas')renderFormulasView(v);
  else if(appState.view==='class')renderClassView(v);
}

let iconCache = {}; // key -> base64 data url, populated at startup
let folderIconCache = {}; // 'heme_KEY' or 'micro_KEY' -> base64
let classIconCache = {}; // class subject key -> base64

async function loadIconCache(){
  try{

    if(!error&&data) data.forEach(row=>{ iconCache[row.key]=row.image_url; });
  }catch(e){ console.warn('Icon cache load failed:',e); }
}

async function loadFolderIconCache(){

    if(!error&&data) data.forEach(row=>{ folderIconCache[row.key]=row.image_url; });
  }catch(e){}
}

async function loadClassIconCache(){
  try{
    const {data,error} = await sb.from('mlsboc_class_icons').select('key,image_url');
    if(!error&&data) data.forEach(row=>{ classIconCache[row.key]=row.image_url; });

function getClassSubjectIcon(key,fallback){
  const stored = classIconCache[key];
  if(stored) return '<div style="width:100%;height:130px;overflow:hidden;flex-shrink:0"><img src="'+stored+'" style="width:100%;height:130px;object-fit:cover;display:block"></div>';
  return '<div style="width:100%;height:130px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:42px;flex-shrink:0">'+fallback+'</div>';
}

async function handleClassIconFile(e,key){
  const file=e.target.files[0];if(!file)return;
  const img=new Image();
  const rdr=new FileReader();
  rdr.onload=ev=>{
    img.onload=async()=>{
      const M=600;let w=img.width,h=img.height;
      if(w>M){h=Math.round(h*M/w);w=M;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const url=cv.toDataURL('image/jpeg',0.75);
      classIconCache[key]=url;
      // Upsert into supabase
      const {data:existing}=await sb.from('mlsboc_class_icons').select('id').eq('key',key).single().catch(()=>({data:null}));
      if(existing&&existing.id){
        await sb.from('mlsboc_class_icons').update({image_url:url}).eq('key',key);
      }else{
        await sb.from('mlsboc_class_icons').insert({key,image_url:url});
      }
      renderView();
    };
    img.src=ev.target.result;
  };
  rdr.readAsDataURL(file);
}

function getSubjectIcon(key,fallback){
  const stored = iconCache[key];
  if(stored) return '<div style="width:100%;height:130px;overflow:hidden;flex-shrink:0"><img src="'+stored+'" style="width:100%;height:130px;object-fit:cover;display:block"></div>';
  return '<div style="width:100%;height:130px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:42px;flex-shrink:0">'+fallback+'</div>';
}

function handleEILImgFile(e,id){
  const file=e.target.files[0];if(!file)return;
  const rdr=new FileReader();
  rdr.onload=ev=>{
    const t=new Image();
    t.onload=()=>{
      const M=600;let w=t.width,ht=t.height;
      if(w>M){ht=Math.round(ht*M/w);w=M;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=ht;
      cv.getContext('2d').drawImage(t,0,0,w,ht);
      const url=cv.toDataURL('image/jpeg',0.75);
      const hid=document.getElementById('eil-img-data');if(hid)hid.value=url;
      const dz=document.getElementById('eil-img-dz');
      if(dz)dz.innerHTML=`<img src="${url}" style="max-height:80px;border-radius:4px;max-width:100%"><input type="file" id="eil-img-file" accept="image/*" style="display:none" onchange="handleEILImgFile(event,'${id}')">`;
    };
    t.src=ev.target.result;
  };
  rdr.readAsDataURL(file);
}

function handleEILImgDrop(e,id){
  e.preventDefault();e.currentTarget.style.borderColor='var(--border2)';
  const file=e.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;
  const inp=document.createElement('input');inp.type='file';
  const dt=new DataTransfer();dt.items.add(file);inp.files=dt.files;
  handleEILImgFile({target:inp},id);
}

  const colors=['#e63946','#2196f3','#f5a623','#3ddc84'];
  const textColors=['#fff','#fff','#fff','#1a2a1a'];

async function startSubjectQuiz(){
  const cnt=parseInt(document.getElementById('q-count').value)||10;
  let data;
  if(appState.subject==='para_myco'){
    const [r1,r2]=await Promise.all([
      sb.from('mlsboc_questions').select('*').eq('subject','parasitology'),
      sb.from('mlsboc_questions').select('*').eq('subject','mycology')
    ]);
    data=[...(r1.data||[]),...(r2.data||[])];
  }else{
    const res=await sb.from('mlsboc_questions').select('*').eq('subject',appState.subject);
    data=res.data||[];
  }
  if(!data||!data.length){alert('No questions found.');return;}
  window._kqOpts={};appState.quizQ=shuffle(data).slice(0,cnt);
  appState.quizIdx=0;appState.quizAns=[];appState.quizStarted=true;appState.quizDone=false;
  renderTab();
}

function answerQ(opt){appState.quizAns[appState.quizIdx]=opt;renderTab();}
function qNext(){appState.quizIdx++;renderTab();}
function qPrev(){appState.quizIdx--;renderTab();}

function renderQuizResults(el,isAll){
  const qs=isAll?appState.allQ:appState.quizQ;
  const ans=isAll?appState.allAns:appState.quizAns;
  let correct=0,missed=[];
  qs.forEach((q,i)=>{if(ans[i]===q.correct_answer)correct++;else missed.push({q,given:ans[i]});});
  const pct=Math.round(correct/qs.length*100);
  const timeStr=isAll?fmtTime(appState.allSeconds):'';
  // Per-subject breakdown
  const subjStats={};
  qs.forEach((q,i)=>{
    const s=q.subject||'unknown';
    if(!subjStats[s])subjStats[s]={correct:0,total:0};
    subjStats[s].total++;
    if(ans[i]===q.correct_answer)subjStats[s].correct++;
  });
  // Merge parasitology & mycology into microbiology for suggestion display
  const MICRO_GROUP=['microbiology','parasitology','mycology'];
  const microCombined={correct:0,total:0,subs:[]};
  MICRO_GROUP.forEach(k=>{if(subjStats[k]){microCombined.correct+=subjStats[k].correct;microCombined.total+=subjStats[k].total;if(k!=='microbiology'&&subjStats[k].total>0)microCombined.subs.push({k,pct:Math.round(subjStats[k].correct/subjStats[k].total*100)});}});
  const mergedStats={};
  Object.entries(subjStats).forEach(([s,st])=>{if(!MICRO_GROUP.includes(s))mergedStats[s]=st;});
  if(microCombined.total>0)mergedStats['microbiology']=microCombined;

  const weakSubjects=Object.entries(mergedStats)
    .map(([s,st])=>{
      const pct=Math.round(st.correct/st.total*100);
      // build sub-note for micro if para/myco dragging it down
      let subNote='';
      if(s==='microbiology'&&st.subs&&st.subs.length){
        const weakSubs=st.subs.filter(x=>x.pct<75);
        if(weakSubs.length)subNote=' (particularly: '+weakSubs.map(x=>x.k+' '+x.pct+'%').join(', ')+')';
      }
      return {s,pct,total:st.total,correct:st.correct,subNote};
    })
    .filter(x=>x.pct<75&&x.total>=2)
    .sort((a,b)=>a.pct-b.pct);
  el.innerHTML=`
    <div class="result-grid" style="grid-template-columns:repeat(${isAll?4:3},1fr)">
      <div class="stat-card"><div class="stat-num" style="color:${pct>=60?'var(--success)':'var(--danger)'}">${pct}%</div><div class="stat-label">Score</div></div>
      <div class="stat-card"><div class="stat-num text-success">${correct}</div><div class="stat-label">Correct</div></div>
      <div class="stat-card"><div class="stat-num text-danger">${qs.length-correct}</div><div class="stat-label">Missed</div></div>
      ${isAll?`<div class="stat-card"><div class="stat-num" style="color:var(--accent);font-size:16px">${timeStr}</div><div class="stat-label">Time</div></div>`:''}
    </div>
    ${isAll?`<div class="card-sm mb-12" style="background:color-mix(in srgb,var(--warn) 10%,transparent);border-color:var(--warn);font-size:12px;color:var(--text2)">⚠ Results are not saved. Export a PDF now to keep a record of this attempt.</div>`:''}
    ${isAll&&weakSubjects.length?`
      <div class="card-sm mb-16" style="border-left:3px solid var(--danger)">
        <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px">📌 Suggested Focus Areas</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:10px">Sections below 75% — prioritize these before your next attempt.</div>
        <div style="display:flex;flex-direction:column;gap:7px">
          ${weakSubjects.map(x=>`
            <div style="display:flex;align-items:center;gap:10px">
              <div style="flex:1">
                <div style="font-size:12px;font-weight:600;color:var(--text)">${x.s==='microbiology'?'Microbiology (incl. Parasitology & Mycology)':x.s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</div>
                <div style="font-size:11px;color:var(--text3)">${x.correct}/${x.total} correct${x.subNote||''}</div>
              </div>
              <div style="width:120px;background:var(--bg3);border-radius:99px;height:7px;overflow:hidden">

function exportResultsPDF(){
  const qs=appState.allQ,ans=appState.allAns;
  let correct=0,missed=[];
  qs.forEach((q,i)=>{if(ans[i]===q.correct_answer)correct++;else missed.push({q,given:ans[i]});});
  const pct=Math.round(correct/qs.length*100);
  const timeStr=fmtTime(appState.allSeconds);
  if(!missed.length){alert('No missed questions — perfect score!');return;}
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4'});
    const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight(),margin=18,cW=pageW-margin*2;
    let y=margin;
    const checkPage=(n=8)=>{if(y+n>pageH-margin){doc.addPage();y=margin;}};
    const writeText=(text,opts={})=>{
      const {size=10,bold=false,color=[30,30,30],indent=0}=opts;
      doc.setFontSize(size);doc.setFont('helvetica',bold?'bold':'normal');doc.setTextColor(...color);
      doc.splitTextToSize(String(text||''),cW-indent).forEach(l=>{checkPage(6);doc.text(l,margin+indent,y);y+=size*0.4+1.5;});
    };
    // Header
    doc.setFillColor(30,30,30);doc.rect(margin,y,cW,14,'F');
    doc.setFontSize(14);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text('MLS BOC Prep — Practice Exam Results',margin+4,y+9);y+=18;
    // Score summary box
    doc.setFillColor(245,245,245);doc.rect(margin,y,cW,18,'F');doc.setDrawColor(200,200,200);doc.rect(margin,y,cW,18,'S');
    doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);
    doc.text(`Score: ${correct}/${qs.length} (${pct}%)`,margin+4,y+7);
    doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);
    doc.text(`Time: ${timeStr}   |   Date: ${new Date().toLocaleDateString()}`,margin+4,y+13);
    doc.text(`Missed: ${missed.length} of ${qs.length} questions`,margin+cW/2,y+13);
    y+=22;
    // Section header
    doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(20,20,80);
    doc.text('Questions to Review',margin,y);y+=6;
    doc.setDrawColor(20,20,80);doc.setLineWidth(0.5);doc.line(margin,y,pageW-margin,y);y+=6;
    // Missed questions
    missed.forEach(({q,given},mi)=>{
      checkPage(36);
      doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(100,100,140);
      doc.text((q.subject||'').replace(/_/g,' ').toUpperCase()+' · Q'+(mi+1),margin,y);y+=5;
      writeText(q.question,{size:10,bold:true,color:[20,20,20]});
      const opts=['a','b','c','d'];
      opts.forEach(l=>{
        const opt=q['option_'+l];if(!opt)return;
        const isCorrect=l===q.correct_answer,isGiven=l===given;
        doc.setFontSize(9);doc.setFont('helvetica',isCorrect?'bold':'normal');
        doc.setTextColor(...(isCorrect?[20,120,60]:isGiven?[180,40,40]:[50,50,50]));
        checkPage(5);doc.text(l.toUpperCase()+'. '+opt+(isCorrect?' ✓':isGiven?' ✗':''),margin+4,y);y+=5;
      });
      if(q.explanation){
        y+=1;doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(80,80,100);
        doc.splitTextToSize('Note: '+q.explanation,cW-6).forEach(l=>{checkPage(5);doc.text(l,margin+4,y);y+=4.5;});
      }
      y+=6;
    });
    // Footer on each page
    const tot=doc.internal.getNumberOfPages();
    for(let p=1;p<=tot;p++){
      doc.setPage(p);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);
      doc.text('MLS BOC Prep — Practice Exam · Items to Improve · Page '+p+' of '+tot,margin,pageH-8);
      doc.text(new Date().toLocaleDateString(),pageW-margin,pageH-8,{align:'right'});
    }
    doc.save('boc_exam_missed_'+new Date().toISOString().slice(0,10)+'.pdf');
  }catch(err){alert('PDF export failed: '+err.message);}
}

async function saveUAEdit(id){
  const name=document.getElementById('uaedit-name')?.value.trim();
  if(!name){alert('Name is required.');return;}
  const featText=document.getElementById('uaedit-features')?.value||'';
  const notes=document.getElementById('uaedit-notes')?.value.trim()||'';
  const features=featText.split('\n').map(x=>x.trim()).filter(Boolean);
  const {error}=await sb.from('mlsboc_ua_images').update({name,key_features:features,notes}).eq('id',id);window._uaCache=null;
  if(error){alert('Save failed: '+error.message);return;}
  document.getElementById('condition-modal').classList.add('hidden');
  renderTab();
}

async function handleUASingleImgUpload(e,id){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    await sb.from('mlsboc_ua_images').update({images:[ev.target.result]}).eq('id',id);
    openUAEditModal(id);
  };
  reader.readAsDataURL(file);
}

async function clearUAImage(id){
  if(!confirm('Remove the image?'))return;
  await sb.from('mlsboc_ua_images').update({images:[]}).eq('id',id);
  openUAEditModal(id);
}

async function handleUAImgFile(e,itemId,slot){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const {data}=await sb.from('mlsboc_ua_images').select('images').eq('id',itemId).single();
    const imgs=[...(data?.images||[])];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=ev.target.result;
    await sb.from('mlsboc_ua_images').update({images:imgs}).eq('id',itemId);
    openUAImage(itemId);
  };
  reader.readAsDataURL(file);
}

async function handleUAImgDrop(e,itemId,slot){
  e.preventDefault();e.currentTarget.classList.remove('dragover');
  const file=e.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const {data}=await sb.from('mlsboc_ua_images').select('images').eq('id',itemId).single();
    const imgs=[...(data?.images||[])];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=ev.target.result;
    await sb.from('mlsboc_ua_images').update({images:imgs}).eq('id',itemId);
    openUAImage(itemId);
  };
  reader.readAsDataURL(file);
}

async function handleUABulkFile(e){

  await processUABulkFiles(files);
}

async function handleUABulkDrop(e){
  e.preventDefault();e.currentTarget.classList.remove('dragover');
  const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
  if(!files.length)return;
  await processUABulkFiles(files);
}

async function processUABulkFiles(files){
  const queueEl=document.getElementById('ua-bulk-queue');
  if(queueEl)queueEl.innerHTML=`<div style="font-size:12px;color:var(--text2);margin-bottom:8px">Adding ${files.length} image(s)...</div>`;
  let done=0;
  for(const file of files){
    const name=file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
    const dataUrl=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});
    const {error}=await sb.from('mlsboc_ua_images').insert({name,key_features:[],notes:'',images:[dataUrl]});
    if(!error)done++;
  }
  if(queueEl)queueEl.innerHTML=`<div style="font-size:12px;color:var(--success)">✓ Added ${done} of ${files.length} images. You can edit names/features by clicking each card.</div>`;
  renderTab();
}

  await sb.from('mlsboc_ua_images').delete().eq('id',id);window._uaCache=null;
  renderTab();
}

async function startUAQuiz(forceNew=false){
  // Resume if in progress
  if(!forceNew && appState.uaImgMode==='quiz' && appState.uaQuizItems&&appState.uaQuizItems.length && !appState.uaQuizDone && appState.uaQuizIdx>0){
    renderTab();return;
  }
  if(!forceNew && appState.uaQuizItems&&appState.uaQuizItems.length && !appState.uaQuizDone && appState.uaQuizIdx>0){
    appState.uaImgMode='quiz';
    window._uaShowResume=true;
    renderTab();return;
  }
  if(!window._uaCache){try{const r=await sb.from('mlsboc_ua_images').select('*').order('name');window._uaCache=r.data||[];}catch(e){}}
  const valid=(window._uaCache||[]).filter(o=>o.images&&o.images.filter(Boolean).length>0);
  if(!valid.length){alert('No images to quiz on yet.');return;}
  appState.uaImgMode='quiz';
  window._uaShowResume=false;
  window._kqOpts={};appState.uaQuizItems=shuffle(valid);
  appState.uaQuizIdx=0;appState.uaQuizAns=[];appState.uaQuizDone=false;
  renderTab();
}

function renderUAImageQuiz(el){
  // Show resume prompt if returning mid-quiz
  if(appState.uaQuizIdx>0 && !appState.uaQuizDone && window._uaShowResume){
    window._uaShowResume=false;
    el.innerHTML=`
      <div class="bbq-overlay">
        <div class="bbq-header"><button class="btn btn-ghost btn-sm" onclick="appState.uaImgMode='browse';renderTab()">← Back</button></div>
        <div class="bbq-body" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center">
          <div style="font-size:36px;margin-bottom:16px">🧪</div>
          <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px">UA Image Quiz</div>
          <div style="font-size:14px;color:var(--text2);margin-bottom:28px">You're on image ${appState.uaQuizIdx+1} of ${appState.uaQuizItems.length}</div>
          <div class="flex gap-12 flex-wrap" style="justify-content:center">
            <button class="btn btn-primary" style="font-size:15px;padding:12px 28px" onclick="window._uaShowResume=false;renderTab()">Resume →</button>
            <button class="btn btn-ghost" style="font-size:15px;padding:12px 28px" onclick="startUAQuiz(true)">Restart</button>
          </div>
        </div>
      </div>`;
    return;
  }
  renderKahootImageQuiz(el,{
    items:appState.uaQuizItems,
    idx:appState.uaQuizIdx,
    ans:appState.uaQuizAns,
    done:appState.uaQuizDone,
    prompt:'What is this urinalysis finding?',
    placeholder:'🧪',
    onAnswer:id=>{appState.uaQuizAns[appState.uaQuizIdx]=id;renderTab();},
    onNext:()=>{appState.uaQuizIdx++;renderTab();},
    onDone:()=>{appState.uaQuizDone=true;renderTab();},
    onRetry:()=>startUAQuiz(true),
    onExit:()=>{appState.uaImgMode='browse';appState.uaQuizDone=false;renderTab();},
    onRetryWrong:(wrongItems)=>{
      if(!wrongItems.length)return;
      window._kqOpts={};appState.uaQuizItems=shuffle(wrongItems);
      appState.uaQuizIdx=0;appState.uaQuizAns=[];appState.uaQuizDone=false;
      renderTab();
    }
  });
}

function answerUAImgQ(id){appState.uaQuizAns[appState.uaQuizIdx]=id;renderTab();}
function uaQuizNext(){appState.uaQuizIdx++;renderTab();}

// ─── SHARED KAHOOT IMAGE QUIZ RENDERER ───────────────────────────────────────
function renderKahootImageQuiz(el,{items,idx,ans,done,prompt,placeholder,onAnswer,onNext,onDone,onRetry,onExit,onRetryWrong}){
  const colors=['#e63946','#2196f3','#f5a623','#3ddc84'];
  const textColors=['#fff','#fff','#fff','#1a2a1a'];
  const emojis=['🔴','🔵','🟡','🟢'];

  if(done){
    let correct=0;
    const missed=[];
    items.forEach((o,i)=>{
      if(ans[i]===o.id)correct++;
      else missed.push({item:o,givenId:ans[i]});
    });
    const pct=Math.round(correct/items.length*100);
    let reviewHtml='';
    items.forEach((o,i)=>{
      const wasCorrect=ans[i]===o.id;
      const chosen=items.find(x=>x.id===ans[i]);
      reviewHtml+='<div style="background:var(--bg2);border:1px solid '+(wasCorrect?'var(--border)':'#f0647433')+';border-radius:var(--r);padding:14px 16px;margin-bottom:8px">'
        +'<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px">'+o.name+'</div>'
        +(wasCorrect
          ?'<div style="font-size:12px;color:var(--success)">✓ Correct</div>'
          :'<div style="font-size:12px;color:var(--danger)">✗ Your answer: '+(chosen?chosen.name:'(none)')+'</div>'
          +'<div style="font-size:12px;color:var(--success);margin-top:2px">Correct: '+o.name+'</div>')
        +(o.key_features&&o.key_features.length?'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">'+o.key_features.map(f=>'<span class="tag tag-info">'+f+'</span>').join('')+'</div>':'')
        +'</div>';
    });

    const exportMissedFn=()=>{
      if(!missed.length){alert('No missed items.');return;}
      try{
        const {jsPDF}=window.jspdf;
        const doc=new jsPDF({unit:'mm',format:'a4'});
        const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight(),margin=18,cW=pageW-margin*2;
        let y=margin;
        const checkPage=(n=8)=>{if(y+n>pageH-margin){doc.addPage();y=margin;}};
        doc.setFillColor(210,210,210);doc.rect(margin,y,cW,10,'F');
        doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
        doc.text('Missed Items',(pageW/2),y+7,{align:'center'});y+=16;
        missed.forEach(({item:o,givenId},i)=>{
          checkPage(20);
          const given=items.find(x=>x.id===givenId);
          doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);
          doc.splitTextToSize(`${i+1}. ${o.name}`,cW).forEach(l=>{checkPage();doc.text(l,margin,y);y+=5.5;});
          if(given){doc.setFontSize(9.5);doc.setFont('helvetica','normal');doc.setTextColor(160,40,40);doc.text(`Your answer: ${given.name}`,margin+4,y);y+=5;}
          if(o.key_features&&o.key_features.length){doc.setFontSize(9);doc.setTextColor(60,60,60);doc.text(`Features: ${o.key_features.join(', ')}`,margin+4,y);y+=5;}
          y+=3;
        });
        const total=doc.internal.getNumberOfPages();
        for(let p=1;p<=total;p++){doc.setPage(p);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);doc.text(`MLS BOC Prep — Missed Items · Page ${p} of ${total}`,margin,pageH-8);}
        doc.save('missed_images.pdf');
      }catch(err){alert('PDF export failed: '+err.message);}
    };
    window._kqExportMissed=exportMissedFn;
    window._kqRetryWrong=onRetryWrong?()=>onRetryWrong(missed.map(m=>m.item)):null;

    el.innerHTML='<div class="bbq-overlay"><div class="bbq-header">'
      +'<button class="btn btn-ghost btn-sm" onclick="('+onExit.toString()+')()">← Back</button>'
      +'<div class="ml-auto" style="color:var(--text);font-size:13px;font-family:var(--mono)">Quiz Complete</div>'
      +'</div><div class="bbq-body">'
      +'<div style="text-align:center;padding:24px 0 28px">'
      +'<div style="font-size:48px;margin-bottom:8px">'+(pct>=80?'🏆':pct>=60?'✅':'📚')+'</div>'
      +'<div class="bbq-score-big">'+pct+'%</div>'
      +'<div style="font-size:16px;color:var(--text2)">'+correct+' of '+items.length+' correct</div>'
      +'</div>'
      +'<div class="result-grid" style="margin-bottom:24px">'
      +'<div class="stat-card"><div class="stat-num text-success">'+correct+'</div><div class="stat-label">Correct</div></div>'
      +'<div class="stat-card"><div class="stat-num text-danger">'+(items.length-correct)+'</div><div class="stat-label">Missed</div></div>'
      +'<div class="stat-card"><div class="stat-num" style="color:var(--accent)">'+pct+'%</div><div class="stat-label">Score</div></div>'
      +'</div>'
      +'<div class="flex gap-8 mb-20 flex-wrap">'
      +'<button class="btn btn-primary" onclick="('+onRetry.toString()+')()">🔄 Retry All</button>'
      +(missed.length&&window._kqRetryWrong?'<button class="btn btn-warn" onclick="window._kqRetryWrong()">⚡ Retry Wrong Only ('+missed.length+')</button>':'')
      +(missed.length?'<button class="btn btn-ghost btn-sm" onclick="window._kqExportMissed()">📥 Export Missed</button>':'')
      +'<button class="btn btn-ghost" onclick="('+onExit.toString()+')()">Back</button>'
      +'</div>'
      +(missed.length?'<div style="font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px">Review</div>'+reviewHtml:'<div style="color:var(--success);font-weight:600;text-align:center;font-size:18px">Perfect score! 🎉</div>')
      +'</div></div>';
    return;
  }

  const item=items[idx];
  const answered=ans[idx]!==undefined;
  const chosen=ans[idx];
  const imgs=(item.images||[]).filter(Boolean);
  const pct=Math.round((idx+1)/items.length*100);
  const pool=items.filter(x=>x.id!==item.id);
  const wrongItems=shuffle(pool).slice(0,Math.min(3,pool.length));
  // Store shuffled opts per question so they don't re-shuffle on re-render
  if(!window._kqOpts)window._kqOpts={};
  const optKey=item.id+'_'+idx;
  if(!window._kqOpts[optKey])window._kqOpts[optKey]=shuffle([item,...wrongItems]);
  const opts=window._kqOpts[optKey];

  const imgsHtml=imgs.length
    ?'<div style="display:grid;grid-template-columns:'+(imgs.length===1?'1fr':'1fr 1fr')+';gap:6px;margin-bottom:16px">'
      +imgs.slice(0,4).map(url=>'<img src="'+url+'" onclick="openImgViewer(\''+url+'\')" style="width:100%;height:'+(imgs.length<=2?'200px':'140px')+';object-fit:contain;border-radius:var(--r);border:1px solid var(--border);cursor:zoom-in;background:var(--bg3)" alt="">').join('')+'</div>'
    :'<div style="height:80px;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:12px">'+placeholder+'</div>';

  const optsHtml=opts.map((o,oi)=>{
    let extra='';
    if(answered){
      if(o.id===item.id)extra=' correct-ans';
      else if(o.id===chosen&&chosen!==item.id)extra=' wrong-ans';
    }
    return '<button class="bbq-opt'+extra+'" style="background:'+colors[oi]+';color:'+textColors[oi]+'" onclick="('+onAnswer.toString()+')(\''+o.id+'\')" '+(answered?'disabled':'')+'>'
      +'<span class="bbq-opt-letter">'+emojis[oi]+'</span><span>'+o.name+'</span></button>';
  }).join('');

  const feedbackHtml=answered?'<div style="text-align:center;margin-bottom:16px">'
    +'<div style="font-size:20px;font-weight:800;color:'+(chosen===item.id?'var(--success)':'var(--danger)')+';margin-bottom:6px">'+(chosen===item.id?'✓ Correct!':'✗ Incorrect — '+item.name)+'</div>'
    +(item.key_features&&item.key_features.length?'<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:12px">'+item.key_features.map(f=>'<span class="tag tag-info">'+f+'</span>').join('')+'</div>':'')
    +'</div>'
    +'<div style="text-align:center">'
    +(idx<items.length-1

function buildConditionThumbs(c){
  const imgs=c.images||[];
  const slots=4;
  let html='';
  for(let i=0;i<slots;i++){
    if(imgs[i]) html+=`<img src="${imgs[i]}" alt="" onerror="this.style.display='none'">`;
    else html+=`<div class="img-ph">${i===0?'🖼️':''}</div>`;
  }
  return html;
}

  const imgs=condition.images||[];

async function handleConditionImgFile(e, conditionId, slot){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const dataUrl=ev.target.result;
    const {data}=await sb.from('mlsboc_heme_conditions').select('images').eq('id',conditionId).single();
    const imgs=[...(data?.images||[])];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=dataUrl;
    await sb.from('mlsboc_heme_conditions').update({images:imgs}).eq('id',conditionId);
    openCondition(conditionId);
  };
  reader.readAsDataURL(file);
}

async function handleConditionImgDrop(e, conditionId, slot){
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const file=e.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const dataUrl=ev.target.result;
    const {data}=await sb.from('mlsboc_heme_conditions').select('images').eq('id',conditionId).single();
    const imgs=[...(data?.images||[])];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=dataUrl;
    await sb.from('mlsboc_heme_conditions').update({images:imgs}).eq('id',conditionId);
    openCondition(conditionId);
  };
  reader.readAsDataURL(file);
}

  if(!ids.length){alert('Select at least one.');return;}
  const btn=document.querySelector('#condition-modal-body .btn-primary');
  if(btn){btn.textContent='Generating...';btn.disabled=true;}
  try{
    const rawAll=(window._microOrgsCache||[]).filter(o=>ids.includes(o.id));
    // Normalize micro organisms to match shared PDF format
    const all=rawAll.map(o=>({name:o.name,key_features:o.key_features||[],notes:o.notes||'',images:o.images||[]}));
    // Use shared generator
    await generateImageSectionPDF(all,'Microbiology Organisms','microbiology_organisms.pdf');
    return;
    const {jsPDF}=window.jspdf;
    // Landscape A4 for 2x2 grid of images
    const doc=new jsPDF({unit:'mm',format:'a4',orientation:'landscape'});
    const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight();
    const margin=12,gap=8;
    const cellW=(pageW-margin*2-gap)/2;
    const cellH=(pageH-margin*2-gap)/2;
    const getImgDims=(src)=>new Promise(res=>{const img=new Image();img.onload=()=>res({w:img.naturalWidth||4,h:img.naturalHeight||3});img.onerror=()=>res({w:4,h:3});img.src=src;});
    let first=true;
    for(const o of (all||[])){
      if(!first)doc.addPage();first=false;
      // Organism name header
      doc.setFillColor(30,30,30);doc.rect(margin,margin,pageW-margin*2,10,'F');
      doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
      doc.text(o.name,margin+4,margin+7);
      // Key features on same line if space
      if(o.key_features&&o.key_features.length){
        doc.setFontSize(9);doc.setFont('helvetica','normal');
        const feat=o.key_features.slice(0,4).join(' | ');
        doc.text(feat,margin+4,margin+14);
      }
      const imgY=margin+18;
      const imgs=(o.images||[]).filter(Boolean).slice(0,4);
      for(let i=0;i<4;i++){
        const col=i%2,row=Math.floor(i/2);
        const x=margin+col*(cellW+gap);
        const y=imgY+row*(cellH+gap);
        // Draw cell border (empty placeholder)
        doc.setDrawColor(200,200,200);doc.setLineWidth(0.3);
        doc.rect(x,y,cellW,cellH,'S');
        if(imgs[i]){
          try{
            let dims={w:4,h:3};
            try{dims=await getImgDims(imgs[i]);}catch(e){}
            // Fit image inside cell preserving aspect ratio (no crop, no distort)
            const imgAr=dims.w/dims.h;
            const cellAr=cellW/cellH;
            let dw,dh;
            if(imgAr>cellAr){dw=cellW;dh=cellW/imgAr;}
            else{dh=cellH;dw=cellH*imgAr;}
            const ox=x+(cellW-dw)/2;
            const oy=y+(cellH-dh)/2;
            const fmt=imgs[i].startsWith('data:image/png')?'PNG':'JPEG';
            doc.addImage(imgs[i],fmt,ox,oy,dw,dh,'','NONE');
          }catch(e){}
        }else{
          // Empty cell label
          doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(180,180,180);
          doc.text('(no image)',x+cellW/2,y+cellH/2,{align:'center'});
        }
      }
    }
    const total=doc.internal.getNumberOfPages();
    for(let p=1;p<=total;p++){
      doc.setPage(p);doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);
      doc.text('MLS BOC Prep - Microbiology | Page '+p+' of '+total,margin,pageH-5);
    }
    doc.save('microbiology_organisms.pdf');
    document.getElementById('condition-modal').classList.add('hidden');
  }catch(err){alert('PDF failed: '+err.message);if(btn){btn.textContent='Generate PDF';btn.disabled=false;}}
}

// handleOrganismImgFile and handleOrganismImgDrop reopen edit modal so slots refresh


async function handleOrganismImgFile(e,orgId,slot){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const dataUrl=ev.target.result;
    const {data}=await sb.from('mlsboc_micro_organisms').select('images').eq('id',orgId).single();
    const imgs=[...(data?.images||[])];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=dataUrl;
    await sb.from('mlsboc_micro_organisms').update({images:imgs}).eq('id',orgId);
    openOrganismEditModal(orgId);
  };
  reader.readAsDataURL(file);
}

async function handleOrganismImgDrop(e,orgId,slot){
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const file=e.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const dataUrl=ev.target.result;
    const {data}=await sb.from('mlsboc_micro_organisms').select('images').eq('id',orgId).single();
    const imgs=[...(data?.images||[])];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=dataUrl;
    await sb.from('mlsboc_micro_organisms').update({images:imgs}).eq('id',orgId);
    openOrganismEditModal(orgId);
  };
  reader.readAsDataURL(file);
}

function renderHemeCaseQuestion(caseId,q,qi,selState){
  const checked=selState[qi]?.checked===true;
  const chosen=selState[qi]?.choice;
  const letters=['a','b','c','d'];
  const correctIdx=letters.indexOf(q.correct);
  return `
    <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:16px 18px;box-shadow:0 2px 8px #0002">
      <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;font-family:var(--mono)">Q${qi+1}</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.65">${escNL(q.question)}</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${(q.options||[]).map((opt,oi)=>{
          if(!opt)return '';
          const letter=letters[oi];
          let bg='var(--bg4)';let bd='var(--border)';let color='var(--text)';let weight='400';
          if(chosen===letter&&!checked){bg='var(--bg4)';bd='var(--accent)';color='var(--accent)';weight='500';}
          if(checked){
            if(letter===q.correct){bg='var(--bg4)';bd='var(--success)';color='var(--success)';weight='600';}
            else if(letter===chosen&&chosen!==q.correct){bg='var(--bg4)';bd='var(--danger)';color='var(--danger)';weight='500';}
          }
          return `<button onclick="selectHemeCaseQ('${caseId}',${qi},'${letter}')" ${checked?'disabled':''} style="display:flex;align-items:flex-start;gap:10px;background:${bg};border:1px solid ${bd};border-radius:var(--r);padding:9px 13px;cursor:${checked?'default':'pointer'};text-align:left;width:100%;transition:all .12s">
            <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:${color};min-width:20px;margin-top:1px">${letter.toUpperCase()}.</span>
            <span style="font-size:13px;color:${color};font-weight:${weight};line-height:1.5">${opt}</span>
          </button>`;
        }).filter(Boolean).join('')}
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:32px">
        ${!checked&&chosen?`<button class="btn btn-primary btn-sm" onclick="checkHemeCaseQ('${caseId}',${qi})">Check Answer</button>`:''}
        ${chosen?`<button class="btn btn-ghost btn-sm" onclick="resetHemeCaseQ('${caseId}',${qi})">Reset</button>`:''}
      </div>
      ${checked?`
        <div class="case-feedback ${chosen===q.correct?'correct':'wrong'}" style="margin-top:8px;font-size:13px">
          ${chosen===q.correct?'✓ Correct!':`✗ Incorrect — Correct: ${(q.correct||'a').toUpperCase()}. ${(q.options||[])[correctIdx]||''}`}
        </div>
        ${q.explanation?`<div class="explanation" style="margin-top:8px;font-size:13px">${q.explanation}</div>`:''}`:''}
    </div>
  `;
}

async function saveHemeCase(caseId){
  const title=document.getElementById('hc-title')?.value.trim();

// ═══════════════════════════════════════════════════════════════════════════════
// SHARED TABLE UTILITY — 5×5 grid with per-cell bold/color, used everywhere
// Data format: {headers:['Col1',...], rows:[['val',...], ...], meta:[[{bold,color}...],...]}
// headers = array of column header strings (up to 5)
// rows    = 2D array of cell strings (up to 5 rows × 5 cols)
// meta    = 2D array matching rows, each cell: {bold:bool, color:string|null}
// ═══════════════════════════════════════════════════════════════════════════════


// ─── LEGACY TABLE MIGRATION ─────────────────────────────────────────────────
function migrateTableData(c){
  if(c.table_data&&c.table_data.headers) return c.table_data;
  const legacy=c.typing_table||c.results_table||c.test_results;
  if(!legacy||!Array.isArray(legacy)||!legacy.length) return null;
  const headers=legacy.map(col=>col.label||'');
  const row=legacy.map(col=>col.value||'');
  const meta=legacy.map(col=>{
    let color='';
    if(col.flag==='high') color='#e05a5a';
    else if(col.flag==='low') color='#2980b9';
    return {bold:!!col.flag,color};
  });
  return {headers,rows:[row],meta:[meta]};
}
function withTableData(c){
  if(c.table_data&&c.table_data.headers) return c;
  const td=migrateTableData(c);
  return td?{...c,table_data:td}:c;
}

const TABLE_COLORS = [
  {label:'Default', value:''},
  {label:'Red',     value:'#e05a5a'},
  {label:'Blue',    value:'#2980b9'},
  {label:'Green',   value:'#27ae60'},
  {label:'Orange',  value:'#e67e22'},
  {label:'Purple',  value:'#8e44ad'},
  {label:'Teal',    value:'#16a085'},
  {label:'Gray',    value:'#7f8c8d'},
];

// Render a table for display (view/quiz/flashcard)
function renderDataTable(tableData, opts={}){
  if(!tableData||!tableData.headers||!tableData.headers.length) return '';
  const {headers, rows=[], meta=[]} = tableData;
  const colCount = headers.length;
  const fontSize = opts.small ? '12px' : '14px';
  const padH = opts.small ? '6px 10px' : '10px 16px';
  const padC = opts.small ? '7px 10px' : '11px 16px';
  let html = '<div style="overflow-x:auto;margin:10px 0">';
  html += '<table style="border-collapse:collapse;width:100%;min-width:'+Math.max(280,colCount*110)+'px">';
  // Header row
  html += '<thead><tr>';
  headers.forEach(h=>{
    html += `<th style="background:var(--bg4);border:1px solid var(--border2);padding:${padH};text-align:center;font-weight:700;font-size:${fontSize};color:var(--text);white-space:nowrap">${esc(h)}</th>`;
  });
  html += '</tr></thead><tbody>';
  // Data rows
  (rows||[]).forEach((row,ri)=>{
    html += '<tr>';
    (row||[]).forEach((cell,ci)=>{
      const m = (meta[ri]||[])[ci]||{};
      const bold = m.bold ? 'font-weight:800;' : 'font-weight:500;';
      const color = m.color ? `color:${m.color};` : 'color:var(--text);';
      html += `<td style="border:1px solid var(--border);padding:${padC};text-align:center;font-family:var(--mono);font-size:${opts.small?'13px':'15px'};${bold}${color}background:var(--bg3)">${esc(cell||'')}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

// Render the table editor UI (shared by all case editors + class question editor)
// prefix: unique string to namespace input IDs (e.g. 'sc', 'heme', 'csq-0')
// tableData: existing data object or null
function renderTableEditor(prefix, tableData){
  const headers = (tableData&&tableData.headers)||[''];
  const rows    = (tableData&&tableData.rows)||[['']];
  const meta    = (tableData&&tableData.meta)||[[{}]];
  const numCols = Math.min(5, Math.max(1, headers.length));
  const numRows = Math.min(5, Math.max(1, rows.length));

  let html = `
    <div class="tbl-editor" id="tbl-${prefix}" data-cols="${numCols}" data-rows="${numRows}">
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
        <span style="font-size:12px;font-weight:600;color:var(--text2)">Columns:</span>
        ${Array.from({length:5},(_,i)=>`<button class="btn btn-ghost btn-xs tbl-col-btn ${i<numCols?'btn-active':''}" onclick="tblSetCols('${prefix}',${i+1})">${i+1}</button>`).join('')}
        <span style="font-size:12px;font-weight:600;color:var(--text2);margin-left:8px">Rows:</span>
        ${Array.from({length:5},(_,i)=>`<button class="btn btn-ghost btn-xs tbl-row-btn ${i<numRows?'btn-active':''}" onclick="tblSetRows('${prefix}',${i+1})">${i+1}</button>`).join('')}
      </div>
      <div id="tbl-${prefix}-grid" style="overflow-x:auto">
        ${buildTableEditorGrid(prefix,numCols,numRows,headers,rows,meta)}
      </div>
    </div>`;
  return html;
}

function buildTableEditorGrid(prefix,numCols,numRows,headers,rows,meta){
  let html='<table style="border-collapse:collapse;width:100%">';
  // Header row
  html+='<thead><tr>';
  for(let c=0;c<numCols;c++){
    html+=`<th style="padding:4px 2px"><input type="text" id="tbl-${prefix}-h${c}" value="${esc((headers[c]||''))}" placeholder="Header ${c+1}" style="width:100%;font-size:12px;font-weight:600;padding:6px 8px;text-align:center;border-radius:var(--r);border:1px solid var(--accent);background:var(--bg4);color:var(--text)"></th>`;
  }
  html+='</tr></thead><tbody>';
  // Data rows
  for(let r=0;r<numRows;r++){
    html+='<tr>';
    for(let c=0;c<numCols;c++){
      const val=(rows[r]||[])[c]||'';
      const m=((meta[r]||[])[c])||{};
      const colorVal=m.color||'';
      const isBold=m.bold?'checked':'';
      html+=`<td style="padding:3px 2px;vertical-align:top">
        <div style="display:flex;flex-direction:column;gap:3px">
          <input type="text" id="tbl-${prefix}-r${r}c${c}" value="${esc(val)}" placeholder="…"
            style="width:100%;font-size:12px;padding:6px 8px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);color:${colorVal||'var(--text)'};"
            oninput="tblUpdateCellStyle('${prefix}',${r},${c})">
          <div style="display:flex;gap:4px;align-items:center">
            <label style="font-size:10px;display:flex;align-items:center;gap:3px;cursor:pointer;color:var(--text2)">
              <input type="checkbox" id="tbl-${prefix}-b${r}c${c}" ${isBold} style="margin:0" onchange="tblUpdateCellStyle('${prefix}',${r},${c})">B
            </label>
            <select id="tbl-${prefix}-color${r}c${c}" style="font-size:10px;padding:1px 2px;border-radius:3px;border:1px solid var(--border);background:var(--bg3);color:var(--text);flex:1" onchange="tblUpdateCellStyle('${prefix}',${r},${c})">
              ${TABLE_COLORS.map(tc=>`<option value="${tc.value}" ${colorVal===tc.value?'selected':''}>${tc.label}</option>`).join('')}
            </select>
          </div>
        </div>
      </td>`;
    }
    html+='</tr>';
  }
  html+='</tbody></table>';
  return html;
}

function tblUpdateCellStyle(prefix,r,c){
  const inp=document.getElementById('tbl-'+prefix+'-r'+r+'c'+c);
  const colorSel=document.getElementById('tbl-'+prefix+'-color'+r+'c'+c);
  if(!inp||!colorSel)return;
  const color=colorSel.value;
  inp.style.color=color||'var(--text)';
}

function tblSetCols(prefix,n){
  const editor=document.getElementById('tbl-'+prefix);if(!editor)return;
  const curRows=parseInt(editor.dataset.rows)||1;
  editor.dataset.cols=n;
  // update button active state
  editor.querySelectorAll('.tbl-col-btn').forEach((b,i)=>b.classList.toggle('btn-active',i<n));
  _tblRebuild(prefix,n,curRows);
}
function tblSetRows(prefix,n){
  const editor=document.getElementById('tbl-'+prefix);if(!editor)return;
  const curCols=parseInt(editor.dataset.cols)||1;
  editor.dataset.rows=n;
  editor.querySelectorAll('.tbl-row-btn').forEach((b,i)=>b.classList.toggle('btn-active',i<n));
  _tblRebuild(prefix,curCols,n);
}
function _tblRebuild(prefix,numCols,numRows){
  // Save current values before rebuild
  const cur=tblReadData(prefix);
  const grid=document.getElementById('tbl-'+prefix+'-grid');if(!grid)return;
  grid.innerHTML=buildTableEditorGrid(prefix,numCols,numRows,
    cur.headers, cur.rows, cur.meta);
}

// Read current table data from DOM inputs
function tblReadData(prefix){
  const editor=document.getElementById('tbl-'+prefix);
  if(!editor)return{headers:[],rows:[],meta:[]};
  const numCols=parseInt(editor.dataset.cols)||1;
  const numRows=parseInt(editor.dataset.rows)||1;
  const headers=[];
  for(let c=0;c<numCols;c++){
    const el=document.getElementById('tbl-'+prefix+'-h'+c);
    headers.push(el?el.value.trim():'');
  }
  const rows=[];const meta=[];
  for(let r=0;r<numRows;r++){
    const row=[];const metaRow=[];
    for(let c=0;c<numCols;c++){
      const inp=document.getElementById('tbl-'+prefix+'-r'+r+'c'+c);
      const bold=document.getElementById('tbl-'+prefix+'-b'+r+'c'+c);
      const color=document.getElementById('tbl-'+prefix+'-color'+r+'c'+c);
      row.push(inp?inp.value.trim():'');
      metaRow.push({bold:bold?bold.checked:false, color:color?color.value:''});
    }
    rows.push(row);meta.push(metaRow);
  }
  return {headers,rows,meta};
}

// Check if a table has any content worth saving
function hexToRgb(hex){
  if(!hex)return [30,30,30];
  const r=parseInt(hex.slice(1,3),16)||30;
  const g=parseInt(hex.slice(3,5),16)||30;
  const b=parseInt(hex.slice(5,7),16)||30;
  return [r,g,b];
}
function tblHasContent(td){
  if(!td||!td.headers)return false;
  if(td.headers.some(h=>h))return true;
  return (td.rows||[]).some(row=>row.some(cell=>cell));
}

  if(!appState[cfg.collapsedKey])appState[cfg.collapsedKey]={};
  const allQs=(data||[]).flatMap(c=>(c.questions||[]).filter(q=>q.question).map(q=>({...q,_caseTitle:c.title,_scenario:c.scenario,_table:c[cfg.tableField]||[],_imgs:c.images||[]})));
  el.innerHTML=`
    ${isAdmin?`<div class="mb-16"><div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:12px">Admin: ${cfg.label}</div><button class="btn btn-primary" onclick="${cfg.adminFn}(null)">+ New Case</button></div></div>`:''}
    <div class="flex-center gap-12 mb-16 flex-wrap">
      <div>
        <div style="font-size:15px;font-weight:600;margin-bottom:2px">${cfg.label}</div>
        <p class="text-muted" style="font-size:13px">${cfg.desc}</p>
      </div>
      <div class="flex gap-8 ml-auto flex-wrap">
        <button class="btn btn-ghost btn-sm" onclick="openSubjectExportModal('${cfg.dbTable}','${cfg.tableField}','${cfg.tableLabel}','${cfg.exportTitle}')">📄 Export</button>
        ${allQs.length?`<button class="btn btn-primary" onclick="startSubjectCaseQuiz('${qmKey}','${cfg.dbTable}','${cfg.tableField}')">⚡ Quiz Mode <span style="font-size:11px;opacity:.8">${allQs.length} questions</span></button>`:''}

}

    <div class="case-card" id="sc-${c.id}" style="margin-bottom:12px">

        <span style="font-size:17px;font-weight:700">${c.title||'Untitled Case'}</span>

        <span class="ml-auto" style="font-size:18px;color:var(--text3);transition:transform .2s;transform:rotate(${collapsed?'0':'180'}deg)">⌃</span>
        ${isAdmin?`<div class="flex gap-6" onclick="event.stopPropagation()">
          <button class="btn btn-ghost btn-xs" onclick="${cfg.adminFn}('${c.id}')">Edit</button>
          <button class="btn btn-danger btn-xs" onclick="${cfg.deleteFn}('${c.id}')">Delete</button>
        </div>`:''}

      ${collapsed?'':`
        <div style="margin-top:16px">
          ${c.scenario?`<div class="case-scenario" style="margin-bottom:20px;font-size:15px;line-height:1.85">${escNL(c.scenario)}</div>`:''}

            <div style="margin-bottom:20px">
              <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">${cfg.tableLabel}</div>

            <div class="divider"></div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
              <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px">Questions</div>
              ${scAllChecked(c.id,qs.length,cfg.answerKey)?'':`<button class="btn btn-primary btn-sm" onclick="checkAllSC('${c.id}',${qs.length},'${cfg.answerKey}')">Check All</button>`}
              ${scAnyAnswered(c.id,cfg.answerKey)?`<button class="btn btn-ghost btn-sm" onclick="resetAllSC('${c.id}','${cfg.answerKey}')">Reset All</button>`:''}
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;align-items:start">

          `:`<div class="empty" style="padding:16px;text-align:left">No questions added yet.</div>`}
