<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLS BOC Prep — Student Created · For Studying Purposes Only</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0d0f12;--bg2:#141720;--bg3:#1c2030;--bg4:#242840;
  --border:#2a2f4a;--border2:#3a4060;
  --accent:#4f8ef7;--accent2:#7fb3ff;
  --success:#3ddc84;--danger:#f06474;--warn:#f5a623;
  --text:#e8eaf6;--text2:#9aa0c0;--text3:#5c6380;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --r:8px;--r2:12px;
}
body.light-mode {
  --bg:#f0f2f8;--bg2:#ffffff;--bg3:#e8eaf2;--bg4:#dde0ee;
  --border:#c8cce0;--border2:#aab0cc;
  --accent:#2563d4;--accent2:#1a4eaa;
  --success:#1a8a4a;--danger:#c0303f;--warn:#b36000;
  --text:#1a1d2e;--text2:#4a5070;--text3:#8890b0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
button{font-family:var(--sans);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--sans);outline:none}
img{display:block}

/* Layout */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--accent);letter-spacing:-0.5px;line-height:1.3}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:0.3px}
main{flex:1;padding:24px;max-width:1100px;margin:0 auto;width:100}
#app{display:flex;flex-direction:column;min-height:100vh}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid #f0647444}
.btn-danger:hover{background:#f0647422}
.btn-success{background:#3ddc8422;color:var(--success);border:1px solid #3ddc8444}
.btn-warn{background:#f5a62322;color:var(--warn);border:1px solid #f5a62344}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r);padding:3px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);background:transparent;cursor:pointer;border:none;transition:all .15s}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px #0004}
.tab:hover:not(.active){color:var(--text)}

/* Forms */
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
input[type=text],input[type=password],input[type=number],textarea,select{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);padding:9px 12px;font-size:13px;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--bg3)}

/* Subject grid */
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px}
.subject-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all .2s;text-align:left;display:flex;flex-direction:column;gap:0;width:100%;padding:0}
.subject-card:hover{border-color:#4f8ef766;background:var(--bg3);transform:translateY(-1px)}
.subject-card.all-subjects{border-color:#4f8ef744;background:linear-gradient(135deg,var(--bg2),var(--bg3))}
.subject-icon{font-size:22px}
.subject-name{font-size:14px;font-weight:600;color:var(--text)}
.subject-count{font-size:11px;color:var(--text3);font-family:var(--mono)}

/* Quiz */
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.progress-bar{height:4px;background:var(--bg3);border-radius:2px;margin-bottom:24px}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.question-num{font-family:var(--mono);font-size:12px;color:var(--text3)}
.question-text{font-size:15px;font-weight:500;color:var(--text);margin-bottom:20px;line-height:1.75}
.options{display:flex;flex-direction:column;gap:8px}
.option{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px;text-align:left;width:100%;color:var(--text);font-size:14px}
.option:hover:not(.selected):not(.correct):not(.wrong){border-color:var(--border2);background:var(--bg4)}
.option.correct{border-color:var(--success);background:#3ddc8415;color:var(--success)}
.option.wrong{border-color:var(--danger);background:#f0647415;color:var(--danger)}
.option-letter{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text3);min-width:18px;margin-top:1px}
.explanation{background:var(--bg3);border-left:3px solid var(--accent);border-radius:0 var(--r) var(--r) 0;padding:12px 16px;margin-top:16px;font-size:13px;color:var(--text2)}

/* Timer */
.timer{font-family:var(--mono);font-size:15px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:6px 14px}

/* Results */
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.stat-num{font-size:28px;font-weight:600;font-family:var(--mono)}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.missed-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px}
.missed-q{font-size:13px;color:var(--text);margin-bottom:6px}
.missed-a{font-size:12px;color:var(--success);font-family:var(--mono)}
.missed-wrong{font-size:12px;color:var(--danger);font-family:var(--mono)}

/* Attempts */
.attempt-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.attempt-meta{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:4px}
.score-badge{font-family:var(--mono);font-size:14px;font-weight:600}
.score-pass{color:var(--success)}
.score-fail{color:var(--danger)}

/* Images */
.image-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.image-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.image-card img{width:100%;height:180px;object-fit:cover;background:var(--bg3)}
.image-placeholder{width:100%;height:180px;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:28px}
.image-card-body{padding:12px}
.image-title{font-size:13px;font-weight:500;color:var(--text)}
.image-desc{font-size:12px;color:var(--text2);margin-top:4px}

/* Hematology folder system */
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.folder-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;cursor:pointer;transition:all .2s;text-align:center;width:100%;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.folder-card:hover{border-color:#4f8ef766;background:var(--bg3);transform:translateY(-1px)}
.folder-icon{font-size:26px}
.folder-name{font-size:13px;font-weight:600;color:var(--text)}
.folder-count{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:4px}
.condition-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.condition-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all .2s}
.condition-card:hover{border-color:#4f8ef766;transform:translateY(-1px)}
.condition-imgs{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:130px;background:var(--bg3)}
.condition-imgs img{width:100%;height:100%;object-fit:cover;cursor:zoom-in}
.condition-imgs .img-ph{width:100%;height:100%;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:20px}
/* full-screen image viewer */
body.light-mode .case-card{background:#f8f9fc}
body.light-mode [style*="var(--bg3)"][style*="var(--border2)"][style*="padding:16px 18px"]{background:#eef0fa!important;border-color:#aab0cc!important}
#img-viewer{position:fixed;inset:0;background:#000d;z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px}
#img-viewer img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:var(--r);box-shadow:0 4px 32px #0008}
#img-viewer-close{position:absolute;top:16px;right:16px;background:#fff2;border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.condition-body{padding:12px}
.condition-name{font-size:12px;font-weight:600;color:var(--text);word-break:break-word;line-height:1.4;overflow-wrap:anywhere}
.condition-features{font-size:11px;color:var(--text2);margin-top:6px;line-height:1.6}

/* Cases */
.case-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:16px}
.case-scenario{font-size:14px;color:var(--text);line-height:1.8;margin-bottom:16px}
.case-data{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;font-family:var(--mono);font-size:12px;color:var(--text2);white-space:pre-wrap}
.case-img-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.case-img-row img{width:160px;height:120px;object-fit:cover;border-radius:var(--r);border:1px solid var(--border)}
.case-img-ph{width:160px;height:120px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:20px}
.case-step{margin-bottom:16px}
.case-step-label{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500}
.case-options{display:flex;flex-wrap:wrap;gap:8px}
.case-opt{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:7px 14px;cursor:pointer;font-size:13px;color:var(--text);transition:all .15s}
.case-opt:hover{border-color:var(--border2)}
.case-opt.selected{border-color:var(--accent);color:var(--accent);background:#4f8ef715}
.case-feedback{margin-top:12px;padding:12px 16px;border-radius:var(--r);font-size:13px;font-weight:500}
.case-feedback.correct{background:#3ddc8415;color:var(--success)}
.case-feedback.wrong{background:#f0647415;color:var(--danger)}

/* Gram+/- page */
.gram-nav{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.gram-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 20px;cursor:pointer;transition:all .2s;text-align:left;flex:1;min-width:180px}
.gram-btn:hover{border-color:#4f8ef766;background:var(--bg3)}
.gram-btn.gram-pos{border-color:#f5a62344}
.gram-btn.gram-neg{border-color:#4f8ef744}
.gram-btn-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.gram-btn-sub{font-size:12px;color:var(--text2)}

/* Blood bank ABO */
.abo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.abo-cell{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.abo-cell:hover{border-color:var(--border2)}
.abo-cell.pos{border-color:var(--success);background:#3ddc8415;color:var(--success)}
.abo-cell.neg{border-color:var(--danger);background:#f0647415;color:var(--danger)}
.abo-badge{font-family:var(--mono);font-size:11px;padding:2px 6px;border-radius:4px;background:var(--bg4)}

/* Draft badge */
.draft-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:#f5a62322;color:var(--warn);border:1px solid #f5a62344;margin-left:8px;text-transform:uppercase;letter-spacing:.5px}
.published-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:#3ddc8422;color:var(--success);border:1px solid #3ddc8444;margin-left:8px;text-transform:uppercase;letter-spacing:.5px}

/* Drop zone */
.drop-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text3);font-size:13px}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:#4f8ef710;color:var(--text2)}
.drop-zone input{display:none}

/* Misc */
.section-title{font-size:18px;font-weight:600;margin-bottom:4px}
.section-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.empty{text-align:center;padding:48px 24px;color:var(--text3);font-size:14px}
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-info{background:#4f8ef722;color:var(--accent2)}
.tag-success{background:#3ddc8422;color:var(--success)}
.tag-warn{background:#f5a62322;color:var(--warn)}
.tag-gram-pos{background:#f5a62322;color:var(--warn)}
.tag-gram-neg{background:#4f8ef722;color:var(--accent2)}
.divider{height:1px;background:var(--border);margin:20px 0}
.flex{display:flex}.flex-center{display:flex;align-items:center}
.flex-wrap{flex-wrap:wrap}
.gap-6{gap:6px}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.ml-auto{margin-left:auto}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}
.text-sm{font-size:12px}.text-mono{font-family:var(--mono)}.text-muted{color:var(--text2)}
.text-danger{color:var(--danger)}.text-success{color:var(--success)}.text-warn{color:var(--warn)}
.admin-bar{background:#f5a62311;border-bottom:1px solid #f5a62333;padding:6px 24px;display:flex;align-items:center;gap:12px;font-size:12px;color:var(--warn)}
.modal-overlay{position:fixed;inset:0;background:#000a;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:24px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px}
.hidden{display:none!important}
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.breadcrumb-sep{color:var(--text3)}
.breadcrumb-link{color:var(--accent);cursor:pointer;font-size:13px}
.breadcrumb-link:hover{color:var(--accent2)}
.breadcrumb-cur{font-size:13px;color:var(--text2)}
.image-quiz-img{width:100%;max-width:500px;height:320px;object-fit:cover;border-radius:var(--r2);border:1px solid var(--border);margin-bottom:20px}
</style>
</head>

<div id="app">

<!-- ADMIN MODAL -->
<div id="admin-modal" class="modal-overlay hidden">
  <div class="modal" style="max-width:360px">

    </div>

      <button class="btn btn-ghost" onclick="closeAdminModal()">Cancel</button>
      <button class="btn btn-primary" onclick="checkAdmin()">Login</button>
    </div>
  </div>
</div>

<!-- CONDITION DETAIL MODAL (Hematology Images) -->
<div id="condition-modal" class="modal-overlay hidden">
  <div class="modal" style="max-width:700px">
    <div id="condition-modal-body"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app">
  <div id="admin-bar-el" class="admin-bar hidden">

    <button class="btn btn-sm btn-ghost" onclick="exitAdmin()" style="margin-left:auto">Exit Admin</button>
  </div>
  <header>
    <div>
      <div class="logo">MLS<span style="color:var(--text3)">/</span>BOC<span style="color:var(--text3);font-size:12px;margin-left:8px">PREP</span></div>

    </div>
    <div class="flex gap-8 flex-center">

      <button class="btn btn-ghost btn-sm" onclick="openAdminModal()">Admin</button>
    </div>
  </header>
  <main id="view-main"></main>
</div>
</div>

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async ()=>{
  sb = supabase.createClient(SB_URL, SB_KEY);
  await seedIfEmpty();
  renderView();
});

function getUID(){
  if(!sessionUserId){
    let id=localStorage.getItem('mlsboc_uid');
    if(!id){id='u_'+Math.random().toString(36).slice(2,10);localStorage.setItem('mlsboc_uid',id);}
    sessionUserId=id;
  }
  return sessionUserId;
}

// ─── SEEDING ──────────────────────────────────────────────────────────────────
async function seedIfEmpty(){
  try{
    const {data}=await sb.from('mlsboc_questions').select('id').limit(1);
    if(data&&data.length>0)return;
    const samples={
      hematology:[
        {question:"Which cell is the precursor to platelets?",option_a:"Megakaryocyte",option_b:"Proerythroblast",option_c:"Myeloblast",option_d:"Lymphoblast",correct_answer:"a",explanation:"Megakaryocytes fragment their cytoplasm to produce platelets."},

        {question:"Pseudohyponatremia is associated with:",option_a:"SIADH",option_b:"Hyperlipidemia or hyperproteinemia",option_c:"Diabetes insipidus",option_d:"Addison's disease",correct_answer:"b",explanation:"Pseudohyponatremia occurs with hyperlipidemia or hyperproteinemia causing falsely low sodium."},

// ─── ADMIN ────────────────────────────────────────────────────────────────────
function openAdminModal(){document.getElementById('admin-modal').classList.remove('hidden');}
function closeAdminModal(){document.getElementById('admin-modal').classList.add('hidden');document.getElementById('admin-err').textContent='';document.getElementById('admin-pw').value='';}
function checkAdmin(){
  if(document.getElementById('admin-pw').value===ADMIN_PW){
    isAdmin=true;
    document.getElementById('admin-bar-el').classList.remove('hidden');
    closeAdminModal();renderView();
  }else{document.getElementById('admin-err').textContent='Wrong password.';}
}
function exitAdmin(){isAdmin=false;document.getElementById('admin-bar-el').classList.add('hidden');renderView();}

// ─── ROUTING ──────────────────────────────────────────────────────────────────
function renderView(){
  const v=document.getElementById('view-main');
  if(appState.view==='home')renderHome(v);
  else if(appState.view==='subject')renderSubjectView(v);
  else if(appState.view==='all')renderAllView(v);
  else if(appState.view==='formulas')renderFormulasView(v);
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function getSubjectIcon(key,fallback){
  const stored=localStorage.getItem('mlsboc_icon_'+key);
  if(stored) return '<div style="width:100%;height:130px;overflow:hidden;flex-shrink:0"><img src="'+stored+'" style="width:100%;height:130px;object-fit:cover;display:block"></div>';
  return '<div style="width:100%;height:130px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:42px;flex-shrink:0">'+fallback+'</div>';
}

function renderHome(v){
  const cards = SUBJECTS.map(s=>{
    const uploadBtn = isAdmin
      ? '<label style="position:absolute;bottom:4px;right:4px;background:#000b;color:#fff;font-size:11px;padding:4px 8px;border-radius:4px;cursor:pointer;z-index:10">📷<input type="file" accept="image/*" style="display:none" onchange="handleSubjectIconFile(event,\'' + s.key + '\')"></label>'
      : '';
    return '<div style="position:relative">'
      + '<div class="subject-card" onclick="goSubject(\'' + s.key + '\')">'
      + '<div id="sicon-' + s.key + '">' + getSubjectIcon(s.key, s.icon) + '</div>'
      + '<div style="padding:10px 12px 12px">'
      + '<div class="subject-name">' + s.name + '</div>'
      + '<div class="subject-count" id="cnt-' + s.key + '">loading...</div>'
      + '</div></div>'
      + uploadBtn + '</div>';
  }).join('');

  const fmlAdminDrop = isAdmin ? '<label style="position:absolute;bottom:4px;right:4px;background:#000b;color:#fff;font-size:11px;padding:4px 8px;border-radius:4px;cursor:pointer;z-index:10">📷<input type="file" accept="image/*" style="display:none" onchange="handleSubjectIconFile(event,\'formulas\')"></label>' : '';

  v.innerHTML = '<div class="mb-16"><div class="section-title">BOC Exam Prep</div><div class="section-sub">Medical Laboratory Scientist · ASCP Board of Certification</div></div>'
    + '<div class="subject-grid">' + cards
    + '<div style="position:relative">'
    + '<div class="subject-card all-subjects" onclick="goAll()">'
    + getSubjectIcon('all','📋')
    + '<div style="padding:10px 12px 12px"><div class="subject-name">All Subjects</div><div class="subject-count">Practice Exam · 100 questions · Timed</div></div>'
    + '</div>'
    + (isAdmin ? '<label style="position:absolute;bottom:4px;right:4px;background:#000b;color:#fff;font-size:11px;padding:4px 8px;border-radius:4px;cursor:pointer;z-index:10">📷<input type="file" accept="image/*" style="display:none" onchange="handleSubjectIconFile(event,\'all\')"></label>' : '')
    + '</div>'
    + '<div style="position:relative">'
    + '<div class="subject-card" style="border-color:#f5a62344" onclick="goFormulas()">'
    + '<div id="sicon-formulas">' + getSubjectIcon('formulas','📐') + '</div>'
    + '<div style="padding:10px 12px 12px"><div class="subject-name">Formulas / Equations</div><div class="subject-count" id="cnt-formulas">loading...</div></div>'
    + '</div>'
    + fmlAdminDrop + '</div>'
    + '</div>'
    + '<div class="mt-24">'
    + '<div class="section-title" style="font-size:16px;margin-bottom:4px">Interactive Learning</div>'
    + '<div class="section-sub" style="margin-bottom:14px">External tools and simulations</div>'
    + '<div id="interactive-links-grid"></div>'
    + (isAdmin ? '<div class="mt-12" id="interactive-admin"></div>' : '')
    + '</div>'
    + '<div class="mt-24" id="attempts-home"></div>';

  SUBJECTS.forEach(async s=>{
    const {count}=await sb.from('mlsboc_questions').select('id',{count:'exact',head:true}).eq('subject',s.key);
    const el=document.getElementById('cnt-'+s.key);
    if(el)el.textContent=(count||0)+' questions';
  });
  sb.from('mlsboc_formulas').select('id',{count:'exact',head:true}).then(({count})=>{
    const el=document.getElementById('cnt-formulas');
    if(el)el.textContent=(count||0)+' formulas';
  }).catch(()=>{});
  loadAttemptsHome();
  loadInteractiveLinks();
}

async function loadInteractiveLinks(){
  const {data:links} = await sb.from('mlsboc_interactive_links').select('*').order('created_at',{ascending:true});
  const grid = document.getElementById('interactive-links-grid');
  const adminDiv = document.getElementById('interactive-admin');

  if(grid){
    if(!links||!links.length){
      grid.innerHTML = '<div class="card-sm" style="color:var(--text3);font-size:13px">No tools linked yet.' + (isAdmin?' Use the form below to add one.':'') + '</div>';
    } else {
      grid.innerHTML = '<div class="subject-grid">' + links.map((lnk) =>
        '<div class="subject-card" style="position:relative;cursor:pointer" onclick="window.open(\'' + lnk.url + '\',\'_blank\')">'
        + (lnk.image_url ? '<div style="width:100%;height:130px;overflow:hidden"><img src="'+lnk.image_url+'" style="width:100%;height:130px;object-fit:cover;display:block"></div>'
          : '<div style="width:100%;height:130px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:42px">🔗</div>')
        + '<div style="padding:10px 12px 12px">'
        + '<div class="subject-name" style="color:var(--accent)">' + lnk.title + '</div>'
        + (lnk.description ? '<div class="subject-count">' + lnk.description + '</div>' : '')
        + '</div>'
        + (isAdmin ? '<div style="display:flex;gap:6px;padding:4px 10px 8px" onclick="event.stopPropagation()">'
          + '<button onclick="editInteractiveLink(\''+lnk.id+'\')" style="flex:1;padding:5px;font-size:11px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);cursor:pointer">✏️ Edit</button>'
          + '<button onclick="removeInteractiveLink(\''+lnk.id+'\')" style="flex:1;padding:5px;font-size:11px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);color:var(--danger);cursor:pointer">✕ Remove</button>'
          + '</div>' : '')
        + '</div>'
      ).join('') + '</div>';
    }
  }

  if(isAdmin && adminDiv){
    adminDiv.innerHTML = '<div class="card">'
      + '<div style="font-size:13px;font-weight:600;margin-bottom:12px">Admin: Add Link</div>'
      + '<div class="form-group"><label>Title</label><input type="text" id="il-title" placeholder="e.g. Blood Cell Identifier"></div>'
      + '<div class="form-group"><label>URL</label><input type="text" id="il-url" placeholder="https://..."></div>'
      + '<div class="form-group" style="margin-bottom:12px"><label>Description (optional)</label><input type="text" id="il-desc" placeholder="Short note about this tool"></div>'
      + '<div class="form-group" style="margin-bottom:12px"><label>Image (drag & drop or click)</label>'
      + '<div style="border:1px dashed var(--border2);border-radius:var(--r);padding:10px;font-size:12px;color:var(--text3);cursor:pointer;min-height:48px;display:flex;align-items:center;justify-content:center;gap:8px" id="il-img-dz" ondrop="handleILImgDrop(event)" ondragover="event.preventDefault();this.style.borderColor=\'var(--accent)\'" ondragleave="this.style.borderColor=\'var(--border2)\'" onclick="document.getElementById(\'il-img-file\').click()">📷 Drop image or click'
      + '<input type="file" id="il-img-file" accept="image/*" style="display:none" onchange="handleILImgFile(event)">'
      + '</div>'
      + '<input type="hidden" id="il-img-data" value="">'
      + '</div>'
      + '<button class="btn btn-primary btn-sm" onclick="addInteractiveLink()">Add Link</button>'
      + '</div>';
  }
}

async function addInteractiveLink(){
  const title = document.getElementById('il-title')?.value.trim();
  const url   = document.getElementById('il-url')?.value.trim();
  const desc  = document.getElementById('il-desc')?.value.trim();
  if(!title || !url){ alert('Title and URL are required.'); return; }
  const image_url = document.getElementById('il-img-data')?.value || '';
  const {error} = await sb.from('mlsboc_interactive_links').insert({title, url, description:desc||'', image_url});
  if(error){alert('Error: '+error.message);return;}
  document.getElementById('il-title').value='';
  document.getElementById('il-url').value='';
  document.getElementById('il-desc').value='';
  const dz=document.getElementById('il-img-dz');if(dz)dz.innerHTML='📷 Drop image or click<input type="file" id="il-img-file" accept="image/*" style="display:none" onchange="handleILImgFile(event)">';
  const hid=document.getElementById('il-img-data');if(hid)hid.value='';
  loadInteractiveLinks();
}

async function editInteractiveLink(id){
  const {data:lnk}=await sb.from('mlsboc_interactive_links').select('*').eq('id',id).single();
  if(!lnk)return;
  document.getElementById('condition-modal-body').innerHTML=`
    <div class="flex-center gap-8 mb-16">
      <div style="font-size:16px;font-weight:600">Edit Link</div>
      <button class="btn btn-ghost btn-sm ml-auto" onclick="document.getElementById('condition-modal').classList.add('hidden')">✕</button>
    </div>
    <div class="form-group"><label>Title</label><input type="text" id="eil-title" value="${esc(lnk.title||'')}"></div>
    <div class="form-group"><label>URL</label><input type="text" id="eil-url" value="${esc(lnk.url||'')}"></div>
    <div class="form-group"><label>Description</label><input type="text" id="eil-desc" value="${esc(lnk.description||'')}"></div>
    <div class="form-group">
      <label>Image (drag & drop or click to change)</label>
      <div style="border:1px dashed var(--border2);border-radius:var(--r);padding:10px;font-size:12px;color:var(--text3);cursor:pointer;min-height:80px;display:flex;align-items:center;justify-content:center;gap:8px;flex-direction:column"
        id="eil-img-dz"
        ondrop="handleEILImgDrop(event,'${id}')"
        ondragover="event.preventDefault();this.style.borderColor='var(--accent)'"
        ondragleave="this.style.borderColor='var(--border2)'"
        onclick="document.getElementById('eil-img-file').click()">
        ${lnk.image_url?`<img src="${lnk.image_url}" style="max-height:80px;border-radius:4px;max-width:100%">`:'<div style="font-size:28px">📷</div><div>Drop image or click to change</div>'}
        <input type="file" id="eil-img-file" accept="image/*" style="display:none" onchange="handleEILImgFile(event,'${id}')">
      </div>
    </div>
    <input type="hidden" id="eil-img-data" value="${esc(lnk.image_url||'')}">
    <div class="flex gap-8 mt-8">
      <button class="btn btn-ghost" onclick="document.getElementById('condition-modal').classList.add('hidden')">Cancel</button>
      <button class="btn btn-primary" onclick="saveInteractiveLink('${id}')">Save</button>
    </div>
  `;

}

function handleEILImgFile(e,id){
  const file=e.target.files[0];if(!file)return;
  const rdr=new FileReader();
  rdr.onload=ev=>{
    const t=new Image();
    t.onload=()=>{
      const M=600;let w=t.width,ht=t.height;
      if(w>M){ht=Math.round(ht*M/w);w=M;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=ht;
      cv.getContext('2d').drawImage(t,0,0,w,ht);
      const url=cv.toDataURL('image/jpeg',0.75);
      const hid=document.getElementById('eil-img-data');if(hid)hid.value=url;
      const dz=document.getElementById('eil-img-dz');
      if(dz)dz.innerHTML=`<img src="${url}" style="max-height:80px;border-radius:4px;max-width:100%"><input type="file" id="eil-img-file" accept="image/*" style="display:none" onchange="handleEILImgFile(event,'${id}')">`;
    };
    t.src=ev.target.result;
  };
  rdr.readAsDataURL(file);
}

function handleEILImgDrop(e,id){
  e.preventDefault();e.currentTarget.style.borderColor='var(--border2)';
  const file=e.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;
  const inp=document.createElement('input');inp.type='file';
  const dt=new DataTransfer();dt.items.add(file);inp.files=dt.files;
  handleEILImgFile({target:inp},id);
}

async function renderQuizTab(el){
  if(appState.quizDone){renderQuizResults(el,false);return;}
  if(!appState.quizStarted){
    const {count}=await sb.from('mlsboc_questions').select('id',{count:'exact',head:true}).eq('subject',appState.subject);
    el.innerHTML=`
      <div class="card" style="max-width:480px">
        <div class="section-title" style="font-size:15px">Subject Quiz</div>
        <p class="text-muted mt-8" style="font-size:13px">${count||0} questions available. Practice only — results not saved.</p>

        <div class="form-group">
          <label>Number of questions</label>
          <input type="number" id="q-count" value="10" min="1" max="${count||50}">
        </div>
        <button class="btn btn-primary" onclick="startSubjectQuiz()">Start Quiz</button>
      </div>
      ${isAdmin?adminQuizControls():''}
    `;
    return;
  }
  if(!appState.quizQ.length){el.innerHTML='<div class="empty">No questions found for this subject.</div>';return;}
  const q=appState.quizQ[appState.quizIdx];
  const answered=appState.quizAns[appState.quizIdx];
  const pct=Math.round((appState.quizIdx+1)/appState.quizQ.length*100);
  el.innerHTML=`
    <div class="quiz-header">
      <span class="question-num">Question ${appState.quizIdx+1} of ${appState.quizQ.length}</span>
      <div class="flex gap-8">
        ${appState.quizIdx>0?`<button class="btn btn-ghost btn-sm" onclick="qPrev()">← Prev</button>`:''}
        ${answered&&appState.quizIdx<appState.quizQ.length-1?`<button class="btn btn-primary btn-sm" onclick="qNext()">Next →</button>`:''}
        ${answered&&appState.quizIdx===appState.quizQ.length-1?`<button class="btn btn-success btn-sm" onclick="()=>{appState.quizDone=true;renderTab()}">Finish</button>`:''}
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="question-text">${q.question}</div>
    <div class="options">
      ${['a','b','c','d'].map(opt=>{
        let cls='option';
        if(answered){if(opt===q.correct_answer)cls+=' correct';else if(opt===answered&&answered!==q.correct_answer)cls+=' wrong';}
        return `<button class="${cls}" onclick="answerQ('${opt}')" ${answered?'disabled':''}>
          <span class="option-letter">${opt.toUpperCase()}.</span>
          <span>${q['option_'+opt]}</span>
        </button>`;
      }).join('')}
    </div>
    ${answered&&q.explanation?`<div class="explanation">${q.explanation}</div>`:''}
  `;
}

async function startSubjectQuiz(){
  const cnt=parseInt(document.getElementById('q-count').value)||10;
  const {data}=await sb.from('mlsboc_questions').select('*').eq('subject',appState.subject);
  if(!data||!data.length){alert('No questions found.');return;}
  appState.quizQ=shuffle(data).slice(0,cnt);
  appState.quizIdx=0;appState.quizAns=[];appState.quizStarted=true;appState.quizDone=false;
  renderTab();
}

function answerQ(opt){appState.quizAns[appState.quizIdx]=opt;renderTab();}
function qNext(){appState.quizIdx++;renderTab();}
function qPrev(){appState.quizIdx--;renderTab();}

function renderQuizResults(el,isAll){
  const qs=isAll?appState.allQ:appState.quizQ;
  const ans=isAll?appState.allAns:appState.quizAns;
  let correct=0,missed=[];
  qs.forEach((q,i)=>{if(ans[i]===q.correct_answer)correct++;else missed.push({q,given:ans[i]});});
  const pct=Math.round(correct/qs.length*100);
  el.innerHTML=`
    <div class="result-grid">
      <div class="stat-card"><div class="stat-num" style="color:${pct>=60?'var(--success)':'var(--danger)'}">${pct}%</div><div class="stat-label">Score</div></div>
      <div class="stat-card"><div class="stat-num text-success">${correct}</div><div class="stat-label">Correct</div></div>
      <div class="stat-card"><div class="stat-num text-danger">${qs.length-correct}</div><div class="stat-label">Missed</div></div>
    </div>
    ${isAll?`<div class="card-sm mb-16 flex-center gap-12"><span class="text-muted" style="font-size:13px">Time used:</span><span class="timer">${fmtTime(appState.allSeconds)}</span></div>`:''}
    <div class="flex gap-8 mb-16 flex-wrap">
      ${isAll?`<button class="btn btn-primary" onclick="startAllExam()">Retake Exam</button>`:`<button class="btn btn-primary" onclick="switchTab('quiz')">New Quiz</button>`}
      ${isAll?`<button class="btn btn-ghost" onclick="exportFromResults()">Export Missed CSV</button>`:''}
    </div>
    ${missed.length?`<div style="font-size:14px;font-weight:600;margin-bottom:12px">Missed Questions (${missed.length})</div>`:''}
    ${missed.map(({q,given})=>`
      <div class="missed-item">
        <div class="missed-q">${q.question}</div>
        <div class="missed-wrong">Your answer: ${given?q['option_'+given]:'(unanswered)'}</div>
        <div class="missed-a">Correct: ${q['option_'+q.correct_answer]}</div>
        ${q.explanation?`<div style="font-size:12px;color:var(--text2);margin-top:6px">${q.explanation}</div>`:''}
      </div>`).join('')}
  `;
}

}

async function handleUAImgFile(e,itemId,slot){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const {data}=await sb.from('mlsboc_ua_images').select('images').eq('id',itemId).single();
    const imgs=[...(data?.images||[])];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=ev.target.result;
    await sb.from('mlsboc_ua_images').update({images:imgs}).eq('id',itemId);
    openUAImage(itemId);
  };
  reader.readAsDataURL(file);
}

async function handleUAImgDrop(e,itemId,slot){
  e.preventDefault();e.currentTarget.classList.remove('dragover');
  const file=e.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const {data}=await sb.from('mlsboc_ua_images').select('images').eq('id',itemId).single();
    const imgs=[...(data?.images||[])];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=ev.target.result;
    await sb.from('mlsboc_ua_images').update({images:imgs}).eq('id',itemId);
    openUAImage(itemId);
  };
  reader.readAsDataURL(file);
}

  e.preventDefault();e.currentTarget.classList.remove('dragover');

  if(!files.length)return;

async function processUABulkFiles(files){
  const queueEl=document.getElementById('ua-bulk-queue');
  if(queueEl)queueEl.innerHTML=`<div style="font-size:12px;color:var(--text2);margin-bottom:8px">Adding ${files.length} image(s)...</div>`;
  let done=0;
  for(const file of files){
    const name=file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
    const dataUrl=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});
    const {error}=await sb.from('mlsboc_ua_images').insert({name,key_features:[],notes:'',images:[dataUrl]});
    if(!error)done++;
  }

function buildConditionImageEditor(condition){
  const imgs=condition.images||[];
  return `

      ${[0,1,2,3].map(i=>`

          ondrop="handleConditionImgDrop(event,'${condition.id}',${i})"

  `;

async function handleConditionImgFile(e, conditionId, slot){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const dataUrl=ev.target.result;
    const {data}=await sb.from('mlsboc_heme_conditions').select('images').eq('id',conditionId).single();
    const imgs=[...(data?.images||[])];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=dataUrl;
    await sb.from('mlsboc_heme_conditions').update({images:imgs}).eq('id',conditionId);
    openCondition(conditionId);
  };
  reader.readAsDataURL(file);
}

async function handleConditionImgDrop(e, conditionId, slot){
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const file=e.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const dataUrl=ev.target.result;
    const {data}=await sb.from('mlsboc_heme_conditions').select('images').eq('id',conditionId).single();
    const imgs=[...(data?.images||[])];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=dataUrl;
    await sb.from('mlsboc_heme_conditions').update({images:imgs}).eq('id',conditionId);
    openCondition(conditionId);
  };
  reader.readAsDataURL(file);
}

function buildOrganismImageEditor(organism){
  const imgs=organism.images||[];
  return `

      ${[0,1,2,3].map(i=>`

async function handleOrganismImgFile(e,orgId,slot){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const dataUrl=ev.target.result;
    const {data}=await sb.from('mlsboc_micro_organisms').select('images').eq('id',orgId).single();
    const imgs=[...(data?.images||[])];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=dataUrl;
    await sb.from('mlsboc_micro_organisms').update({images:imgs}).eq('id',orgId);
    openOrganism(orgId);
  };
  reader.readAsDataURL(file);
}

async function handleOrganismImgDrop(e,orgId,slot){
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const file=e.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const dataUrl=ev.target.result;
    const {data}=await sb.from('mlsboc_micro_organisms').select('images').eq('id',orgId).single();
    const imgs=[...(data?.images||[])];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=dataUrl;
    await sb.from('mlsboc_micro_organisms').update({images:imgs}).eq('id',orgId);
    openOrganism(orgId);
  };
  reader.readAsDataURL(file);
}

function renderMicroImageQuiz(el){
  const items=appState.microQuizItems;
  if(appState.microQuizDone){
    const ans=appState.microQuizAns;
    let correct=0;
    items.forEach((o,i)=>{if(ans[i]===o.id)correct++;});
    let reviewHtml='';
    items.forEach((o,i)=>{
      const wasCorrect=ans[i]===o.id;
      const chosen=items.find(x=>x.id===ans[i]);
      reviewHtml+='<div class="missed-item"><div class="missed-q">'+o.name+'</div>'
        +(wasCorrect?'<div class="missed-a">✓ Correct</div>':'<div class="missed-wrong">Your answer: '+(chosen?chosen.name:'(none)')+'</div><div class="missed-a">Correct: '+o.name+'</div>')
        +'</div>';
    });
    el.innerHTML='<div class="result-grid">'
      +'<div class="stat-card"><div class="stat-num" style="color:'+(correct/items.length>=0.6?'var(--success)':'var(--danger)')+'">'+Math.round(correct/items.length*100)+'%</div><div class="stat-label">Score</div></div>'
      +'<div class="stat-card"><div class="stat-num text-success">'+correct+'</div><div class="stat-label">Correct</div></div>'
      +'<div class="stat-card"><div class="stat-num text-danger">'+(items.length-correct)+'</div><div class="stat-label">Missed</div></div>'
      +'</div><div class="flex gap-8 mb-16">'
      +'<button class="btn btn-primary" onclick="startMicroQuiz()">Retry All</button>'
      +'<button class="btn btn-ghost" onclick="appState.microImgMode=\'browse\';appState.microImgPage=null;appState.microQuizDone=false;renderTab()">Back to Browse</button>'
      +'</div>'+reviewHtml;
    return;
  }
  const item=items[appState.microQuizIdx];
  const answered=appState.microQuizAns[appState.microQuizIdx]!==undefined;
  const chosen=appState.microQuizAns[appState.microQuizIdx];
  const imgs=(item.images||[]).filter(Boolean);
  const pct=Math.round((appState.microQuizIdx+1)/items.length*100);

  const pool=items.filter(x=>x.id!==item.id);
  const wrong=shuffle(pool).slice(0,Math.min(3,pool.length));
  const opts=shuffle([item,...wrong]);

  let imgsHtml='<div class="image-placeholder" style="height:180px;margin-bottom:16px;border-radius:var(--r2)">🔬</div>';
  if(imgs.length){
    const cols=imgs.length===1?'1fr':'1fr 1fr';
    imgsHtml='<div style="display:grid;grid-template-columns:'+cols+';gap:6px;margin-bottom:16px">'
      +imgs.slice(0,4).map(url=>'<img src="'+url+'" onclick="openImgViewer(\''+url+'\')" style="width:100%;height:160px;object-fit:contain;border-radius:var(--r);border:1px solid var(--border);cursor:zoom-in;background:var(--bg3)" alt="">').join('')
      +'</div>';
  }

  let optHtml='';
  opts.forEach(o=>{
    let cls='option';
    if(answered){
      if(o.id===item.id)cls+=' correct';
      else if(o.id===chosen&&chosen!==item.id)cls+=' wrong';
    }
    optHtml+='<button class="'+cls+'" onclick="answerMicroImgQ(\''+o.id+'\')" '+(answered?'disabled':'')+'>'
      +'<span class="option-letter" style="min-width:12px"></span><span>'+o.name+'</span></button>';
  });

  let afterHtml='';
  if(answered){
    afterHtml='<div class="case-feedback '+(chosen===item.id?'correct':'wrong')+'" style="margin-top:14px">'
      +(chosen===item.id?'✓ Correct!':'✗ Incorrect — '+item.name)+'</div>';
    if(item.key_features&&item.key_features.length)
      afterHtml+='<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px">'+item.key_features.map(f=>'<span class="tag tag-info">'+f+'</span>').join('')+'</div>';
    afterHtml+='<div class="flex gap-8 mt-16">'
      +(appState.microQuizIdx<items.length-1
        ?'<button class="btn btn-primary" onclick="microQuizNext()">Next →</button>'
        :'<button class="btn btn-success" onclick="appState.microQuizDone=true;renderTab()">View Results</button>')
      +'</div>';
  }

  el.innerHTML='<div class="quiz-header"><span class="question-num">Image '+(appState.microQuizIdx+1)+' of '+items.length+'</span>'
    +'<button class="btn btn-ghost btn-sm" onclick="appState.microImgMode=\'browse\';renderTab()">Exit Quiz</button></div>'
    +'<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'
    +'<p class="text-muted mb-12" style="font-size:13px">Identify this organism.</p>'
    +imgsHtml+'<div class="options">'+optHtml+'</div>'+afterHtml;
}

function renderHemeCaseQuestion(caseId,q,qi,selState){
  const checked=selState[qi]?.checked===true;
  const chosen=selState[qi]?.choice;
  const letters=['a','b','c','d'];
  const correctIdx=letters.indexOf(q.correct);
  return `
    <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:16px 18px;box-shadow:0 2px 8px #0002">
      <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;font-family:var(--mono)">Q${qi+1}</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.65">${q.question}</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${(q.options||[]).map((opt,oi)=>{
          if(!opt)return '';
          const letter=letters[oi];
          let bg='var(--bg4)';let bd='var(--border)';let color='var(--text)';let weight='400';
          if(chosen===letter&&!checked){bg='var(--bg4)';bd='var(--accent)';color='var(--accent)';weight='500';}
          if(checked){
            if(letter===q.correct){bg='var(--bg4)';bd='var(--success)';color='var(--success)';weight='600';}
            else if(letter===chosen&&chosen!==q.correct){bg='var(--bg4)';bd='var(--danger)';color='var(--danger)';weight='500';}
          }
          return `<button onclick="selectHemeCaseQ('${caseId}',${qi},'${letter}')" ${checked?'disabled':''} style="display:flex;align-items:flex-start;gap:10px;background:${bg};border:1px solid ${bd};border-radius:var(--r);padding:9px 13px;cursor:${checked?'default':'pointer'};text-align:left;width:100%;transition:all .12s">
            <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:${color};min-width:20px;margin-top:1px">${letter.toUpperCase()}.</span>
            <span style="font-size:13px;color:${color};font-weight:${weight};line-height:1.5">${opt}</span>
          </button>`;
        }).filter(Boolean).join('')}
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:32px">
        ${!checked&&chosen?`<button class="btn btn-primary btn-sm" onclick="checkHemeCaseQ('${caseId}',${qi})">Check Answer</button>`:''}
        ${chosen?`<button class="btn btn-ghost btn-sm" onclick="resetHemeCaseQ('${caseId}',${qi})">Reset</button>`:''}
      </div>
      ${checked?`
        <div class="case-feedback ${chosen===q.correct?'correct':'wrong'}" style="margin-top:8px;font-size:13px">
          ${chosen===q.correct?'✓ Correct!':`✗ Incorrect — Correct: ${(q.correct||'a').toUpperCase()}. ${(q.options||[])[correctIdx]||''}`}
        </div>
        ${q.explanation?`<div class="explanation" style="margin-top:8px;font-size:13px">${q.explanation}</div>`:''}`:''}
    </div>
  `;
}

function hcAllChecked(caseId,count){
  const s=(appState.hemeCaseAnswers||{})[caseId]||{};
  for(let i=0;i<count;i++){if(!s[i]?.checked)return false;}
  return count>0;
}
function hcAnyAnswered(caseId){
  return Object.values((appState.hemeCaseAnswers||{})[caseId]||{}).some(v=>v?.choice);
}
function selectHemeCaseQ(caseId,qi,letter){
  if(!appState.hemeCaseAnswers)appState.hemeCaseAnswers={};
  if(!appState.hemeCaseAnswers[caseId])appState.hemeCaseAnswers[caseId]={};
  if(appState.hemeCaseAnswers[caseId][qi]?.checked)return;
  appState.hemeCaseAnswers[caseId][qi]={choice:letter,checked:false};
  renderTab();
}
function checkAllHC(caseId,count){
  if(!appState.hemeCaseAnswers)appState.hemeCaseAnswers={};
  if(!appState.hemeCaseAnswers[caseId])appState.hemeCaseAnswers[caseId]={};
  for(let i=0;i<count;i++){
    if(appState.hemeCaseAnswers[caseId][i]?.choice&&!appState.hemeCaseAnswers[caseId][i]?.checked)
      appState.hemeCaseAnswers[caseId][i].checked=true;
  }
  renderTab();
}
function resetAllHC(caseId){if(!appState.hemeCaseAnswers)appState.hemeCaseAnswers={};appState.hemeCaseAnswers[caseId]={};renderTab();}
function checkHemeCaseQ(caseId,qi){if(appState.hemeCaseAnswers?.[caseId]?.[qi])appState.hemeCaseAnswers[caseId][qi].checked=true;renderTab();}
function resetHemeCaseQ(caseId,qi){if(appState.hemeCaseAnswers?.[caseId])delete appState.hemeCaseAnswers[caseId][qi];renderTab();}

async function openHemeCaseEditor(caseId){
  let c={title:'',scenario:'',results_table:[],questions:[],images:[],is_draft:false};
  if(caseId){
    const {data}=await sb.from('mlsboc_heme_cases').select('*').eq('id',caseId).single();
    if(data)c=data;
  }
  const qs=c.questions||[];
  const table=c.results_table||[];
  window._hemeCaseQCount=qs.length;
  window._hemeCaseTableCount=table.length;
  document.getElementById('condition-modal-body').innerHTML=`
    <div class="flex-center gap-8 mb-16">
      <div style="font-size:16px;font-weight:600">${caseId?'Edit':'New'} Hematology Case</div>
      <button class="btn btn-ghost btn-sm ml-auto" onclick="document.getElementById('condition-modal').classList.add('hidden')">✕</button>
    </div>
    <div class="form-group"><label>Title</label><input type="text" id="hc-title" value="${esc(c.title||'')}" placeholder="e.g. Microcytic Anemia Case"></div>
    <div class="form-group"><label>Scenario</label><textarea id="hc-scenario" style="min-height:100px">${c.scenario||''}</textarea></div>
    <div class="form-group">
      <label>Lab Results Table Columns</label>
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Each column = one lab value. Optionally flag as high/low.</div>
      <div style="display:grid;grid-template-columns:1fr 80px 80px auto;gap:6px;margin-bottom:6px">
        <div style="font-size:11px;color:var(--text3)">Label</div>
        <div style="font-size:11px;color:var(--text3)">Value</div>
        <div style="font-size:11px;color:var(--text3)">Flag</div>
        <div></div>
      </div>
      <div id="hc-table-rows">${table.map((col,i)=>hemeCaseTableRow(i,col.label,col.value,col.flag||'')).join('')}</div>
      <button class="btn btn-ghost btn-sm mt-8" onclick="addHemeCaseTableCol()">+ Add Column</button>
    </div>
    <div class="divider"></div>
    <div class="flex-center gap-8 mb-12">
      <span style="font-size:13px;font-weight:600">Questions</span>
      <span style="font-size:11px;color:var(--text3)">(up to 5)</span>
    </div>
    <div id="hc-questions-list">${qs.map((q,i)=>hemeCaseQuestionEditor(i,q)).join('')}</div>
    <button class="btn btn-ghost btn-sm mb-16" id="hc-add-q-btn" onclick="addHemeCaseQuestion()" ${qs.length>=5?'style="display:none"':''}>+ Add Question</button>
    <div class="divider"></div>
    <div class="form-group"><label>Status</label>
      <select id="hc-draft">
        <option value="false" ${!c.is_draft?'selected':''}>Published</option>
        <option value="true" ${c.is_draft?'selected':''}>Draft</option>
      </select>
    </div>
    <div class="flex gap-8">
      <button class="btn btn-ghost" onclick="document.getElementById('condition-modal').classList.add('hidden')">Cancel</button>
      <button class="btn btn-primary" onclick="saveHemeCase('${caseId||''}')">Save Case</button>
    </div>
  `;
  document.getElementById('condition-modal').classList.remove('hidden');
}

function hemeCaseTableRow(i,label,value,flag){
  return `<div class="flex-center gap-6 mb-6" id="hc-tr-${i}">
    <input type="text" placeholder="e.g. WBC" value="${esc(label||'')}" id="hc-tl-${i}" style="flex:1">
    <input type="text" placeholder="e.g. 3.2" value="${esc(value||'')}" id="hc-tv-${i}" style="width:80px">
    <select id="hc-tf-${i}" style="width:80px"><option value="" ${!flag?'selected':''}>Normal</option><option value="high" ${flag==='high'?'selected':''}>↑ High</option><option value="low" ${flag==='low'?'selected':''}>↓ Low</option></select>
    <button class="btn btn-danger btn-xs" onclick="document.getElementById('hc-tr-${i}').remove()">✕</button>
  </div>`;
}

function addHemeCaseTableCol(){
  const i=window._hemeCaseTableCount++;
  const container=document.getElementById('hc-table-rows');if(!container)return;
  const div=document.createElement('div');div.innerHTML=hemeCaseTableRow(i,'','','');
  container.appendChild(div.firstElementChild);
}

function hemeCaseQuestionEditor(i,q){
  q=q||{question:'',options:['','','',''],correct:'a',explanation:''};
  const opts=q.options||['','','',''];
  return `<div class="card-sm mb-12" id="hc-q-${i}" style="border-left:3px solid var(--accent)">
    <div class="flex-center gap-8 mb-10">
      <span style="font-size:12px;font-weight:600;color:var(--accent);font-family:var(--mono)">Q${i+1}</span>
      <button class="btn btn-danger btn-xs ml-auto" onclick="removeHemeCaseQuestion(${i})">Remove</button>
    </div>
    <div class="form-group"><label>Question</label><textarea id="hc-qq-${i}" style="min-height:60px">${q.question||''}</textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      ${['a','b','c','d'].map((l,oi)=>`<div><label>${l.toUpperCase()}.</label><input type="text" id="hc-qo-${i}-${l}" value="${esc(opts[oi]||'')}"></div>`).join('')}
    </div>
    <div class="form-group"><label>Correct Answer</label>
      <select id="hc-qc-${i}">${['a','b','c','d'].map(l=>`<option value="${l}" ${(q.correct||'a')===l?'selected':''}>${l.toUpperCase()}</option>`).join('')}</select>
    </div>
    <div class="form-group" style="margin-bottom:0"><label>Explanation (optional)</label>
      <input type="text" id="hc-qe-${i}" value="${esc(q.explanation||'')}" placeholder="Why this answer is correct">
    </div>
  </div>`;
}

function addHemeCaseQuestion(){
  if((window._hemeCaseQCount||0)>=5){alert('Max 5 questions per case.');return;}
  const i=window._hemeCaseQCount++;
  const container=document.getElementById('hc-questions-list');if(!container)return;
  const div=document.createElement('div');div.innerHTML=hemeCaseQuestionEditor(i,null);
  container.appendChild(div.firstElementChild);
  if(window._hemeCaseQCount>=5){const b=document.getElementById('hc-add-q-btn');if(b)b.style.display='none';}
}
function removeHemeCaseQuestion(i){
  const el=document.getElementById('hc-q-'+i);if(el)el.remove();
  window._hemeCaseQCount=Math.max(0,(window._hemeCaseQCount||1)-1);
  const b=document.getElementById('hc-add-q-btn');if(b)b.style.display='';
}

async function saveHemeCase(caseId){
  const title=document.getElementById('hc-title')?.value.trim();
  const scenario=document.getElementById('hc-scenario')?.value.trim();
  const isDraft=document.getElementById('hc-draft')?.value==='true';
  if(!title){alert('Title required.');return;}
  const results_table=[];
  for(let i=0;i<(window._hemeCaseTableCount||0);i++){
    const lbl=document.getElementById('hc-tl-'+i);
    const val=document.getElementById('hc-tv-'+i);
    const flag=document.getElementById('hc-tf-'+i);
    if(lbl&&lbl.isConnected&&lbl.value.trim())results_table.push({label:lbl.value.trim(),value:val?val.value.trim():'',flag:flag?flag.value:''});
  }
  const questions=[];
  for(let i=0;i<(window._hemeCaseQCount||0);i++){
    const qEl=document.getElementById('hc-q-'+i);if(!qEl||!qEl.isConnected)continue;
    const question=document.getElementById('hc-qq-'+i)?.value.trim()||'';if(!question)continue;
    const options=['a','b','c','d'].map(l=>document.getElementById('hc-qo-'+i+'-'+l)?.value.trim()||'');
    const correct=document.getElementById('hc-qc-'+i)?.value||'a';
    const explanation=document.getElementById('hc-qe-'+i)?.value.trim()||'';
    questions.push({question,options,correct,explanation});
  }
  const payload={title,scenario:scenario||'',results_table,questions,is_draft:isDraft,images:[]};
  let error;
  if(caseId){({error}=await sb.from('mlsboc_heme_cases').update(payload).eq('id',caseId));}
  else{({error}=await sb.from('mlsboc_heme_cases').insert(payload));}
  if(error){alert('Save failed: '+error.message);return;}
  document.getElementById('condition-modal').classList.add('hidden');
  if(!appState.hemeCaseAnswers)appState.hemeCaseAnswers={};
  renderTab();
}
async function deleteHemeCase(id){
  if(!confirm('Delete this case?'))return;
  await sb.from('mlsboc_heme_cases').delete().eq('id',id);
  renderTab();
}

// Generic cases
async function renderGenericCases(el){
  const {data}=await sb.from('mlsboc_cases').select('*').eq('subject',appState.subject).order('created_at');
  el.innerHTML=`
    ${isAdmin?`<div class="mb-16">${adminCaseControls()}</div>`:''}
    ${!data||!data.length?'<div class="empty">No cases yet for this subject.</div>':''}
    ${(data||[]).map((c,i)=>renderCaseCard(c,i)).join('')}
  `;
}

function renderCaseCard(c,idx){
  const steps=parseSteps(c.steps);
  const fb=appState.caseSelections[c.id]?.feedback;
  const imgs=c.images||[];
  return `
    <div class="case-card" id="ccard-${c.id}">
      <div class="flex-center gap-8 mb-8 flex-wrap">
        <span class="tag tag-info">Case ${idx+1}</span>
        <span style="font-size:14px;font-weight:600">${c.title}</span>
        ${c.is_draft?`<span class="draft-badge">Draft</span>`:''}
      </div>
      <div class="case-scenario">${c.scenario}</div>
      ${c.case_data?`<div class="case-data">${c.case_data}</div>`:''}
      ${imgs.filter(Boolean).length?`<div class="case-img-row">${imgs.filter(Boolean).map(url=>`<img src="${url}" alt="">`).join('')}</div>`:''}
      ${steps.map((step,si)=>renderCaseStep(c.id,step,si,fb)).join('')}
      ${!fb?`<button class="btn btn-primary btn-sm mt-8" onclick="submitGenericCase('${c.id}','${esc(c.answer)}')">Submit</button>`:''}
      ${fb?`<div class="case-feedback ${fb.correct?'correct':'wrong'}">${fb.correct?'✓ Correct':'✗ Incorrect'} — ${fb.note||c.answer}</div>`:''}
      ${isAdmin?`<div class="flex gap-8 mt-8">
        ${c.is_draft?`<button class="btn btn-success btn-xs" onclick="publishCase('${c.id}')">Publish</button>`:''}
        <button class="btn btn-danger btn-xs" onclick="deleteCase('${c.id}')">Delete</button>
        <button class="btn btn-ghost btn-xs" onclick="openCaseImageEditor('${c.id}')">Edit Images</button>
      </div>`:''}
    </div>
  `;
}

function renderCaseStep(caseId,step,si,fb){
  const sel=appState.caseSelections[caseId]?.steps||{};
  const disabled=fb?'disabled':'';
  if(step.type==='select'){
    return `<div class="case-step">
      <div class="case-step-label">${step.label}</div>
      <div class="case-options">
        ${step.options.map(o=>`<button class="case-opt ${sel[step.key]===o?'selected':''}" onclick="selectCaseOpt('${caseId}','${step.key}','${esc(o)}','single')" ${disabled}>${o}</button>`).join('')}
      </div>
    </div>`;
  }
  if(step.type==='multi'){
    const msel=sel[step.key]||[];
    return `<div class="case-step">
      <div class="case-step-label">${step.label} (select all that apply)</div>
      <div class="case-options">
        ${step.options.map(o=>`<button class="case-opt ${msel.includes(o)?'selected':''}" onclick="selectCaseOpt('${caseId}','${step.key}','${esc(o)}','multi')" ${disabled}>${o}</button>`).join('')}
      </div>
    </div>`;
  }
  return '';
}

function selectCaseOpt(caseId,key,val,type){
  if(!appState.caseSelections[caseId])appState.caseSelections[caseId]={steps:{}};
  if(!appState.caseSelections[caseId].steps)appState.caseSelections[caseId].steps={};
  if(type==='single'){
    appState.caseSelections[caseId].steps[key]=val;
  }else{
    const arr=appState.caseSelections[caseId].steps[key]||[];
    appState.caseSelections[caseId].steps[key]=arr.includes(val)?arr.filter(x=>x!==val):[...arr,val];
  }
  renderTab();
}

function submitGenericCase(caseId,answer){
  if(!appState.caseSelections[caseId])appState.caseSelections[caseId]={steps:{}};
  const allVals=Object.values(appState.caseSelections[caseId].steps||{}).flat().join(' ').toLowerCase();
  const correct=answer&&allVals.includes(answer.toLowerCase().split(' ')[0]);
  appState.caseSelections[caseId].feedback={correct,note:'Expected: '+answer};
  renderTab();
}

async function renderMicroCases(el){
  const {data}=await sb.from('mlsboc_micro_cases').select('*').order('created_at');
  if(!appState.microCaseCollapsed)appState.microCaseCollapsed={};
  el.innerHTML=`
    ${isAdmin?`<div class="mb-16">${adminMicroCaseControls()}</div>`:''}
    <div style="font-size:15px;font-weight:600;margin-bottom:4px">Microbiology Cases</div>
    <p class="text-muted mb-20" style="font-size:13px">Read the scenario and test results, then answer each question.</p>
    ${!data||!data.length?'<div class="empty">No Microbiology cases yet. Use Admin mode to add one.</div>':''}
    ${(data||[]).map((c,i)=>renderMicroCase(c,i)).join('')}
  `;
}

function renderMicroCase(c,idx){
  const qs=c.questions||[];
  const selState=(appState.microCaseAnswers||{})[c.id]||{};
  const table=c.test_results||[];
  const imgs=c.images||[];
  const collapsed=!appState.microCaseCollapsed||appState.microCaseCollapsed[c.id]!==false;
  const tagCls=c.group_label==='gram_positive'?'tag-gram-pos':c.group_label==='gram_negative'?'tag-gram-neg':'tag-info';
  const tagLabel=c.group_label==='gram_positive'?'Gram (+)':c.group_label==='gram_negative'?'Gram (-)':'';
  return `
    <div class="case-card" id="mccase-${c.id}" style="margin-bottom:12px">
      <div class="flex-center gap-8 flex-wrap" style="cursor:pointer" onclick="toggleMicroCaseCollapse('${c.id}')">
        <span class="tag tag-info" style="font-size:13px;font-weight:700;padding:4px 12px">Case ${idx+1}</span>
        ${tagLabel?`<span class="tag ${tagCls}">${tagLabel}</span>`:''}
        <span style="font-size:17px;font-weight:700">${c.title||'Untitled Case'}</span>
        ${c.is_draft?`<span class="draft-badge">Draft</span>`:''}
        <span class="ml-auto" style="font-size:18px;color:var(--text3);transition:transform .2s;transform:rotate(${collapsed?'0':'180'}deg)">⌃</span>
        ${isAdmin?`<div class="flex gap-6" onclick="event.stopPropagation()">
          <button class="btn btn-ghost btn-xs" onclick="openMicroCaseEditor('${c.id}')">Edit</button>
          <button class="btn btn-danger btn-xs" onclick="deleteMicroCase('${c.id}')">Delete</button>
        </div>`:''}
      </div>
      ${collapsed?'':`
        <div style="margin-top:16px">
          ${c.scenario?`<div class="case-scenario" style="margin-bottom:20px;font-size:15px;line-height:1.85">${c.scenario}</div>`:''}
          ${table.length?`
            <div style="margin-bottom:24px">
              <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">Test Results</div>
              <div style="overflow-x:auto">
                <table style="border-collapse:collapse;width:100%">
                  <thead><tr>${table.map(col=>`<th style="background:var(--bg4);border:1px solid var(--border2);padding:12px 18px;text-align:center;font-weight:600;font-size:15px;color:var(--text);white-space:nowrap">${col.label}</th>`).join('')}</tr></thead>
                  <tbody><tr>${table.map(col=>`<td style="border:1px solid var(--border);padding:12px 18px;text-align:center;font-family:var(--mono);font-size:17px;font-weight:600;color:var(--text);background:var(--bg3)">${col.value}</td>`).join('')}</tr></tbody>
                </table>
              </div>
            </div>`:''}
          ${imgs.filter(Boolean).length?`<div class="case-img-row">${imgs.filter(Boolean).map(url=>`<img src="${url}" alt="" onclick="openImgViewer('${url}')" style="cursor:zoom-in">`).join('')}</div>`:''}
          ${qs.length?`
            <div class="divider"></div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
              <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px">Questions</div>
              ${mcAllChecked(c.id,qs.length)?'':`<button class="btn btn-primary btn-sm" onclick="checkAllMC('${c.id}',${qs.length})">Check All</button>`}
              ${mcAnyAnswered(c.id)?`<button class="btn btn-ghost btn-sm" onclick="resetAllMC('${c.id}')">Reset All</button>`:''}
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;align-items:start">
              ${qs.map((q,qi)=>renderMicroCaseQuestion(c.id,q,qi,selState)).join('')}
            </div>
          `:'<div class="empty" style="padding:16px;text-align:left">No questions added yet.</div>'}
        </div>
      `}
    </div>
  `;
}

function renderMicroCaseQuestion(caseId,q,qi,selState){
  const checked=selState[qi]?.checked===true;
  const chosen=selState[qi]?.choice;
  const letters=['a','b','c','d'];
  const correctIdx=letters.indexOf(q.correct);
  return `
    <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:16px 18px;box-shadow:0 2px 8px #0002">
      <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;font-family:var(--mono)">Q${qi+1}</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.65">${q.question}</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${(q.options||[]).map((opt,oi)=>{
          if(!opt)return '';
          const letter=letters[oi];
          let bg='var(--bg4)';let bd='var(--border)';let color='var(--text)';let weight='400';
          if(chosen===letter&&!checked){bg='var(--bg4)';bd='var(--accent)';color='var(--accent)';weight='500';}
          if(checked){
            if(letter===q.correct){bg='var(--bg4)';bd='var(--success)';color='var(--success)';weight='600';}
            else if(letter===chosen&&chosen!==q.correct){bg='var(--bg4)';bd='var(--danger)';color='var(--danger)';weight='500';}
          }
          return `<button onclick="selectMCQ('${caseId}',${qi},'${letter}')" ${checked?'disabled':''} style="display:flex;align-items:flex-start;gap:10px;background:${bg};border:1px solid ${bd};border-radius:var(--r);padding:9px 13px;cursor:${checked?'default':'pointer'};text-align:left;width:100%;transition:all .12s">
            <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:${color};min-width:20px;margin-top:1px">${letter.toUpperCase()}.</span>
            <span style="font-size:13px;color:${color};font-weight:${weight};line-height:1.5">${opt}</span>
          </button>`;
        }).filter(Boolean).join('')}
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:32px">
        ${!checked&&chosen?`<button class="btn btn-primary btn-sm" onclick="checkMCQ('${caseId}',${qi})">Check Answer</button>`:''}
        ${chosen?`<button class="btn btn-ghost btn-sm" onclick="resetMCQ('${caseId}',${qi})">Reset</button>`:''}
      </div>
      ${checked?`
        <div class="case-feedback ${chosen===q.correct?'correct':'wrong'}" style="margin-top:8px;font-size:13px">
          ${chosen===q.correct?'✓ Correct!':`✗ Incorrect — Correct: ${(q.correct||'a').toUpperCase()}. ${(q.options||[])[correctIdx]||''}`}
        </div>
        ${q.explanation?`<div class="explanation" style="margin-top:8px;font-size:13px">${q.explanation}</div>`:''}`:''}
    </div>
  `;
}

function mcAllChecked(caseId,count){
  const s=(appState.microCaseAnswers||{})[caseId]||{};
  for(let i=0;i<count;i++){if(!s[i]?.checked)return false;}
  return count>0;
}
function mcAnyAnswered(caseId){
  return Object.values((appState.microCaseAnswers||{})[caseId]||{}).some(v=>v?.choice);
}
function selectMCQ(caseId,qi,letter){
  if(!appState.microCaseAnswers)appState.microCaseAnswers={};
  if(!appState.microCaseAnswers[caseId])appState.microCaseAnswers[caseId]={};
  if(appState.microCaseAnswers[caseId][qi]?.checked)return;
  appState.microCaseAnswers[caseId][qi]={choice:letter,checked:false};
  renderTab();
}
function checkAllMC(caseId,count){
  if(!appState.microCaseAnswers)appState.microCaseAnswers={};
  if(!appState.microCaseAnswers[caseId])appState.microCaseAnswers[caseId]={};
  for(let i=0;i<count;i++){
    if(appState.microCaseAnswers[caseId][i]?.choice&&!appState.microCaseAnswers[caseId][i]?.checked)
      appState.microCaseAnswers[caseId][i].checked=true;
  }
  renderTab();
}
function resetAllMC(caseId){if(!appState.microCaseAnswers)appState.microCaseAnswers={};appState.microCaseAnswers[caseId]={};renderTab();}
function checkMCQ(caseId,qi){if(appState.microCaseAnswers?.[caseId]?.[qi])appState.microCaseAnswers[caseId][qi].checked=true;renderTab();}
function resetMCQ(caseId,qi){if(appState.microCaseAnswers?.[caseId])delete appState.microCaseAnswers[caseId][qi];renderTab();}
function toggleMicroCaseCollapse(id){
  if(!appState.microCaseCollapsed)appState.microCaseCollapsed={};
  appState.microCaseCollapsed[id]=appState.microCaseCollapsed[id]===false?true:false;
  renderTab();
}

function adminMicroCaseControls(){
  return `<div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px">Admin: Microbiology Cases</div>
    <button class="btn btn-primary" onclick="openMicroCaseEditor(null)">+ New Case</button>
  </div>`;
}

async function openMicroCaseEditor(caseId){
  let c={title:'',scenario:'',test_results:[],questions:[],images:[],group_label:'gram_positive',is_draft:false};
  if(caseId){
    const {data}=await sb.from('mlsboc_micro_cases').select('*').eq('id',caseId).single();
    if(data)c=data;
  }
  const qs=c.questions||[];
  const table=c.test_results||[];
  window._mcQCount=qs.length;
  window._mcTableCount=table.length;
  document.getElementById('condition-modal-body').innerHTML=`
    <div class="flex-center gap-8 mb-16">
      <div style="font-size:16px;font-weight:600">${caseId?'Edit':'New'} Microbiology Case</div>
      <button class="btn btn-ghost btn-sm ml-auto" onclick="document.getElementById('condition-modal').classList.add('hidden')">✕</button>
    </div>
    <div class="form-group"><label>Case Title</label><input type="text" id="mc-title" value="${esc(c.title||'')}" placeholder="e.g. Unknown GPC Cluster"></div>
    <div class="form-group"><label>Gram Group</label>
      <select id="mc-group">
        <option value="gram_positive" ${(c.group_label||'')==='gram_positive'?'selected':''}>Gram Positive</option>
        <option value="gram_negative" ${(c.group_label||'')==='gram_negative'?'selected':''}>Gram Negative</option>
        <option value="" ${!(c.group_label)?'selected':''}>None</option>

async function saveMicroCase(caseId){
  const title=document.getElementById('mc-title')?.value.trim();
  const scenario=document.getElementById('mc-scenario')?.value.trim();
  const group_label=document.getElementById('mc-group')?.value||'';
  const isDraft=document.getElementById('mc-draft')?.value==='true';
  if(!title){alert('Title required.');return;}
  const test_results=[];
  for(let i=0;i<(window._mcTableCount||0);i++){
    const lbl=document.getElementById('mc-tl-'+i);
    const val=document.getElementById('mc-tv-'+i);
    if(lbl&&lbl.isConnected&&lbl.value.trim())test_results.push({label:lbl.value.trim(),value:val?val.value.trim():''});
  }
  const questions=[];
  for(let i=0;i<(window._mcQCount||0);i++){
    const qEl=document.getElementById('mc-q-'+i);if(!qEl||!qEl.isConnected)continue;
    const question=document.getElementById('mc-qq-'+i)?.value.trim()||'';if(!question)continue;
    const options=['a','b','c','d'].map(l=>document.getElementById('mc-qo-'+i+'-'+l)?.value.trim()||'');
    const correct=document.getElementById('mc-qc-'+i)?.value||'a';
    const explanation=document.getElementById('mc-qe-'+i)?.value.trim()||'';
    questions.push({question,options,correct,explanation});
  }
  const payload={title,scenario:scenario||'',test_results,questions,group_label,is_draft:isDraft,images:[]};
  let error;
  if(caseId){({error}=await sb.from('mlsboc_micro_cases').update(payload).eq('id',caseId));}
  else{({error}=await sb.from('mlsboc_micro_cases').insert(payload));}
  if(error){alert('Save failed: '+error.message);return;}
  document.getElementById('condition-modal').classList.add('hidden');
  if(!appState.microCaseAnswers)appState.microCaseAnswers={};
  renderTab();
}
async function deleteMicroCase(id){
  if(!confirm('Delete this case?'))return;
  await sb.from('mlsboc_micro_cases').delete().eq('id',id);
  renderTab();
}

function renderBBQuestion(caseId,q,qi,selState){
  const checked=selState[qi]?.checked===true;
  const chosen=selState[qi]?.choice;
  const letters=['a','b','c','d'];
  const correctIdx=letters.indexOf(q.correct);
  return `
    <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:16px 18px;box-shadow:0 2px 8px #0002">
      <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;font-family:var(--mono);letter-spacing:.5px">Q${qi+1}</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.65">${q.question}</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${(q.options||[]).map((opt,oi)=>{
          if(!opt)return '';
          const letter=letters[oi];
          let bg='var(--bg4)';let bd='var(--border)';let color='var(--text)';let weight='400';
          if(chosen===letter&&!checked){bg='var(--bg4)';bd='var(--accent)';color='var(--accent)';weight='500';}
          if(checked){
            if(letter===q.correct){bg='var(--bg4)';bd='var(--success)';color='var(--success)';weight='600';}
            else if(letter===chosen&&chosen!==q.correct){bg='var(--bg4)';bd='var(--danger)';color='var(--danger)';weight='500';}
          }
          return `<button onclick="selectBBQ('${caseId}',${qi},'${letter}')" ${checked?'disabled':''} style="display:flex;align-items:flex-start;gap:10px;background:${bg};border:1px solid ${bd};border-radius:var(--r);padding:9px 13px;cursor:${checked?'default':'pointer'};text-align:left;width:100%;transition:all .12s">
            <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:${color};min-width:20px;margin-top:1px">${letter.toUpperCase()}.</span>
            <span style="font-size:13px;color:${color};font-weight:${weight};line-height:1.5">${opt}</span>
          </button>`;
        }).filter(Boolean).join('')}
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:32px">
        ${!checked&&chosen?`<button class="btn btn-primary btn-sm" onclick="checkBBQ('${caseId}',${qi})">Check Answer</button>`:''}
        ${chosen?`<button class="btn btn-ghost btn-sm" onclick="resetBBQ('${caseId}',${qi})">Reset</button>`:''}
      </div>
      ${checked?`
        <div class="case-feedback ${chosen===q.correct?'correct':'wrong'}" style="margin-top:8px;font-size:13px">
          ${chosen===q.correct
            ?'✓ Correct!'
            :`✗ Incorrect — Correct: ${(q.correct||'a').toUpperCase()}. ${(q.options||[])[correctIdx]||''}`}
        </div>
        ${q.explanation?`<div class="explanation" style="margin-top:8px;font-size:13px">${q.explanation}</div>`:''}`:''}
    </div>
  `;
}

function bbAllChecked(caseId,count){
  const s=appState.bbAnswers[caseId]||{};
  for(let i=0;i<count;i++){if(!s[i]?.checked)return false;}
  return count>0;
}
function bbAnyAnswered(caseId){
  return Object.values(appState.bbAnswers[caseId]||{}).some(v=>v?.choice);
}
function selectBBQ(caseId,qi,letter){
  if(!appState.bbAnswers[caseId])appState.bbAnswers[caseId]={};
  if(appState.bbAnswers[caseId][qi]?.checked)return;
  appState.bbAnswers[caseId][qi]={choice:letter,checked:false};
  renderTab();
}
function checkAllBB(caseId,count){
  if(!appState.bbAnswers[caseId])appState.bbAnswers[caseId]={};
  for(let i=0;i<count;i++){
    if(appState.bbAnswers[caseId][i]?.choice&&!appState.bbAnswers[caseId][i]?.checked)
      appState.bbAnswers[caseId][i].checked=true;
  }
  renderTab();
}
function resetAllBB(caseId){appState.bbAnswers[caseId]={};renderTab();}
function checkBBQ(caseId,qi){if(appState.bbAnswers[caseId]?.[qi])appState.bbAnswers[caseId][qi].checked=true;renderTab();}
function resetBBQ(caseId,qi){if(appState.bbAnswers[caseId])delete appState.bbAnswers[caseId][qi];renderTab();}

    const correct=document.getElementById('bb-qc-'+i)?.value||'a';
    const explanation=document.getElementById('bb-qe-'+i)?.value.trim()||'';
    questions.push({question,options,correct,explanation});
  }

  const payload={title,scenario:scenario||'',typing_table,questions,is_draft:isDraft,images:[]};

  let error;
  if(caseId){
    ({error}=await sb.from('mlsboc_bb_cases').update(payload).eq('id',caseId));
  }else{
    ({error}=await sb.from('mlsboc_bb_cases').insert(payload));
  }
  if(error){alert('Save failed: '+error.message);return;}
  document.getElementById('condition-modal').classList.add('hidden');
  appState.bbAnswers={};
  renderTab();
}
