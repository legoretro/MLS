function normalizeQuizCSVRow(row){
  const payload={
    question:String(csvField(row,['question','prompt','stem'],0)||'').trim(),
    option_a:String(csvField(row,['option_a','a','choice_a','answer_a'],1)||'').trim(),
    option_b:String(csvField(row,['option_b','b','choice_b','answer_b'],2)||'').trim(),
    option_c:String(csvField(row,['option_c','c','choice_c','answer_c'],3)||'').trim(),
    option_d:String(csvField(row,['option_d','d','choice_d','answer_d'],4)||'').trim(),
    explanation:String(csvField(row,['explanation','rationale','notes'],6)||'').trim()
  };
  const raw=String(csvField(row,['correct_answer','correct','answer','key'],5)||'').toLowerCase().trim();
  const cleaned=raw.replace(/^option[_\s-]*/,'').replace(/^choice[_\s-]*/,'').replace(/^answer[_\s-]*/,'');
  const map={a:'a',b:'b',c:'c',d:'d','1':'a','2':'b','3':'c','4':'d'};
  let ans=map[cleaned]||map[cleaned.charAt(0)]||'';
  if(!ans){
    ans=['a','b','c','d'].find(l=>payload['option_'+l].toLowerCase()===raw)||'';
  }
  payload.correct_answer=ans;
  if(!payload.question||!payload.option_a||!payload.option_b||!payload.option_c||!payload.option_d||!payload.correct_answer)return null;
  return payload;
}
function parseSteps(s){
  try{return typeof s==='string'?JSON.parse(s||'[]'):(s||[]);}catch{return [];}
}
function applySavedTheme(){
  if(!localStorage.getItem('mlsboc_theme')){
    localStorage.setItem('mlsboc_theme','light');
  }
  const saved=localStorage.getItem('mlsboc_theme')||'light';
  document.body.classList.toggle('light-mode', saved!=='dark');
  updateThemeButton();
}
function updateThemeButton(){
  const btn=document.getElementById('theme-btn');
  if(!btn)return;
  const isLight=document.body.classList.contains('light-mode');
  btn.textContent=isLight?'🔬🐱 Switch to dark':'💤🐱 Switch to light';
  btn.title=isLight?'Switch to dark mode':'Switch to light mode';
}
function toggleTheme(){
  const isLight=document.body.classList.toggle('light-mode');
  localStorage.setItem('mlsboc_theme', isLight?'light':'dark');
  updateThemeButton();
}
function handleILImgFile(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    const t=new Image();
    t.onload=()=>{
      const M=600;let w=t.width,ht=t.height;
      if(w>M){ht=Math.round(ht*M/w);w=M;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=ht;
      cv.getContext('2d').drawImage(t,0,0,w,ht);
      const url=cv.toDataURL('image/jpeg',0.75);
      const dz=document.getElementById('il-img-dz');
      const hid=document.getElementById('il-img-data');
      if(hid)hid.value=url;
      if(dz)dz.innerHTML='<img src="'+url+'" style="max-height:60px;border-radius:4px">';
    };
    t.src=ev.target.result;
  };
  r.readAsDataURL(file);
}
function handleILImgDrop(e){
  e.preventDefault();e.currentTarget.style.borderColor='var(--border2)';
  const file=e.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;
  readFileAsDataURL(file,url=>{
    const dz=document.getElementById('il-img-dz');
    const hid=document.getElementById('il-img-data');
    if(hid)hid.value=url;
    if(dz)dz.innerHTML='<img src="'+url+'" style="max-height:60px;border-radius:4px">';
  });
}
async function handleSubjectIconFile(e,key){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=async ev=>{
    const t=new Image();
    t.onload=async ()=>{
      const M=600;let w=t.width,ht=t.height;
      if(w>M){ht=Math.round(ht*M/w);w=M;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=ht;
      cv.getContext('2d').drawImage(t,0,0,w,ht);
      const url=cv.toDataURL('image/jpeg',0.75);
      const {error}=await sb.from('mlsboc_subject_icons').upsert({key,image_url:url},{onConflict:'key'});
      if(error){alert('Upload failed: '+error.message);return;}
      iconCache[key]=url;
      renderView();
    };
    t.src=ev.target.result;
  };
  r.readAsDataURL(file);
}

async function handleFolderIconFile(e,key){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=async ev=>{
    const t=new Image();
    t.onload=async ()=>{
      const M=600;let w=t.width,ht=t.height;
      if(w>M){ht=Math.round(ht*M/w);w=M;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=ht;
      cv.getContext('2d').drawImage(t,0,0,w,ht);
      const url=cv.toDataURL('image/jpeg',0.75);
      const {error}=await sb.from('mlsboc_folder_icons').upsert({key,image_url:url},{onConflict:'key'});
      if(error){
        if(error.message&&error.message.includes('mlsboc_folder_icons')){
          alert('Table missing. Run this SQL in Supabase:\n\ncreate table mlsboc_folder_icons (\n  key text primary key,\n  image_url text not null,\n  updated_at timestamptz default now()\n);\nalter table mlsboc_folder_icons enable row level security;\ncreate policy "public all folder_icons"\n  on mlsboc_folder_icons for all using (true) with check (true);');
        }else{
          alert('Upload failed: '+error.message);
        }
        return;
      }
      folderIconCache[key]=url;
      renderTab();
    };
    t.src=ev.target.result;
  };
  r.readAsDataURL(file);
}

function readFileAsDataURL(file,cb){
  const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(file);
}
function openImgViewer(src){
  const v=document.getElementById('img-viewer');
  const i=document.getElementById('img-viewer-img');
  if(!v||!i)return;
  i.src=src;
  v.style.display='flex';
  document.body.style.overflow='hidden';
}
function closeImgViewer(){
  const v=document.getElementById('img-viewer');
  if(v)v.style.display='none';
  document.body.style.overflow='';
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeImgViewer();});
