// ─── SHARED KAHOOT IMAGE QUIZ RENDERER ───────────────────────────────────────
function renderKahootImageQuiz(el,{items,idx,ans,done,prompt,placeholder,onAnswer,onPrev,onNext,onDone,onRetry,onExit,onRetryWrong}){
  const colors=['#e63946','#2196f3','#f5a623','#3ddc84'];
  const textColors=['#fff','#fff','#fff','#1a2a1a'];
  const emojis=['🔴','🔵','🟡','🟢'];

  if(done){
    let correct=0;
    const missed=[];
    items.forEach((o,i)=>{
      if(ans[i]===o.id)correct++;
      else missed.push({item:o,givenId:ans[i]});
    });
    const pct=Math.round(correct/items.length*100);
    let reviewHtml='';
    items.forEach((o,i)=>{
      const wasCorrect=ans[i]===o.id;
      const chosen=items.find(x=>x.id===ans[i]);
      reviewHtml+='<div style="background:var(--bg2);border:1px solid '+(wasCorrect?'var(--border)':'#f0647433')+';border-radius:var(--r);padding:14px 16px;margin-bottom:8px">'
        +'<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px">'+o.name+'</div>'
        +(wasCorrect
          ?'<div style="font-size:12px;color:var(--success)">✓ Correct</div>'
          :'<div style="font-size:12px;color:var(--danger)">✗ Your answer: '+(chosen?chosen.name:'(none)')+'</div>'
          +'<div style="font-size:12px;color:var(--success);margin-top:2px">Correct: '+o.name+'</div>')
        +(o.key_features&&o.key_features.length?'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">'+o.key_features.map(f=>'<span class="tag tag-info">'+f+'</span>').join('')+'</div>':'')
        +'</div>';
    });

    const exportMissedFn=()=>{
      if(!missed.length){alert('No missed items.');return;}
      try{
        const {jsPDF}=window.jspdf;
        const doc=new jsPDF({unit:'mm',format:'a4'});
        const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight(),margin=18,cW=pageW-margin*2;
        let y=margin;
        const checkPage=(n=8)=>{if(y+n>pageH-margin){doc.addPage();y=margin;}};
        doc.setFillColor(210,210,210);doc.rect(margin,y,cW,10,'F');
        doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
        doc.text('Missed Items',(pageW/2),y+7,{align:'center'});y+=16;
        missed.forEach(({item:o,givenId},i)=>{
          checkPage(20);
          const given=items.find(x=>x.id===givenId);
          doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);
          doc.splitTextToSize(`${i+1}. ${o.name}`,cW).forEach(l=>{checkPage();doc.text(l,margin,y);y+=5.5;});
          if(given){doc.setFontSize(9.5);doc.setFont('helvetica','normal');doc.setTextColor(160,40,40);doc.text(`Your answer: ${given.name}`,margin+4,y);y+=5;}
          if(o.key_features&&o.key_features.length){doc.setFontSize(9);doc.setTextColor(60,60,60);doc.text(`Features: ${o.key_features.join(', ')}`,margin+4,y);y+=5;}
          y+=3;
        });
        const total=doc.internal.getNumberOfPages();
        for(let p=1;p<=total;p++){doc.setPage(p);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);doc.text(`MLS BOC Prep — Missed Items · Page ${p} of ${total}`,margin,pageH-8);}
        doc.save('missed_images.pdf');
      }catch(err){alert('PDF export failed: '+err.message);}
    };
    window._kqExportMissed=exportMissedFn;
    window._kqRetryWrong=onRetryWrong?()=>onRetryWrong(missed.map(m=>m.item)):null;

    el.innerHTML='<div class="bbq-overlay"><div class="bbq-header">'
      +'<button class="btn btn-ghost btn-sm" onclick="('+onExit.toString()+')()">← Back</button>'
      +'<div class="ml-auto" style="color:var(--text);font-size:13px;font-family:var(--mono)">Quiz Complete</div>'
      +'</div><div class="bbq-body">'
      +'<div style="text-align:center;padding:24px 0 28px">'
      +'<div style="font-size:48px;margin-bottom:8px">'+(pct>=80?'🏆':pct>=60?'✅':'📚')+'</div>'
      +'<div class="bbq-score-big">'+pct+'%</div>'
      +'<div style="font-size:16px;color:var(--text2)">'+correct+' of '+items.length+' correct</div>'
      +'</div>'
      +'<div class="result-grid" style="margin-bottom:24px">'
      +'<div class="stat-card"><div class="stat-num text-success">'+correct+'</div><div class="stat-label">Correct</div></div>'
      +'<div class="stat-card"><div class="stat-num text-danger">'+(items.length-correct)+'</div><div class="stat-label">Missed</div></div>'
      +'<div class="stat-card"><div class="stat-num" style="color:var(--accent)">'+pct+'%</div><div class="stat-label">Score</div></div>'
      +'</div>'
      +'<div class="flex gap-8 mb-20 flex-wrap">'
      +'<button class="btn btn-primary" onclick="('+onRetry.toString()+')()">🔄 Retry All</button>'
      +(missed.length&&window._kqRetryWrong?'<button class="btn btn-warn" onclick="window._kqRetryWrong()">⚡ Retry Wrong Only ('+missed.length+')</button>':'')
      +(missed.length?'<button class="btn btn-ghost btn-sm" onclick="window._kqExportMissed()">📥 Export Missed</button>':'')
      +'<button class="btn btn-ghost" onclick="('+onExit.toString()+')()">Back</button>'
      +'</div>'
      +(missed.length?'<div style="font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px">Review</div>'+reviewHtml:'<div style="color:var(--success);font-weight:600;text-align:center;font-size:18px">Perfect score! 🎉</div>')
      +'</div></div>';
    return;
  }

  const item=items[idx];
  const answered=ans[idx]!==undefined;
  const chosen=ans[idx];
  const imgs=imageEntryList(item.images).map(imageEntrySrc).filter(Boolean);
  const pct=Math.round((idx+1)/items.length*100);
  const pool=items.filter(x=>x.id!==item.id);
  const wrongItems=shuffle(pool).slice(0,Math.min(3,pool.length));
  // Store shuffled opts per question so they don't re-shuffle on re-render
  if(!window._kqOpts)window._kqOpts={};
  const optKey=item.id+'_'+idx;
  if(!window._kqOpts[optKey])window._kqOpts[optKey]=shuffle([item,...wrongItems]);
  const opts=window._kqOpts[optKey];

  const imgsHtml=imgs.length
    ?'<div style="display:grid;grid-template-columns:'+(imgs.length===1?'1fr':'1fr 1fr')+';gap:6px;margin-bottom:16px">'
      +imgs.slice(0,4).map(url=>'<img src="'+esc(url)+'" onclick="openImgViewer(\''+jsAttr(url)+'\')" onerror="retryImageLoad(this)" style="width:100%;height:'+(imgs.length<=2?'200px':'140px')+';object-fit:contain;border-radius:var(--r);border:1px solid var(--border);cursor:zoom-in;background:var(--bg3)" alt="">').join('')+'</div>'
    :'<div style="height:80px;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:12px">'+placeholder+'</div>';

  const optsHtml=opts.map((o,oi)=>{
    let extra='';
    if(answered){
      if(o.id===item.id)extra=' correct-ans';
      else if(o.id===chosen&&chosen!==item.id)extra=' wrong-ans';
    }
    return '<button class="bbq-opt'+extra+'" style="background:'+colors[oi]+';color:'+textColors[oi]+'" onclick="('+onAnswer.toString()+')(\''+o.id+'\')" '+(answered?'disabled':'')+'>'
      +'<span class="bbq-opt-letter">'+emojis[oi]+'</span><span>'+o.name+'</span></button>';
  }).join('');

  const feedbackHtml=answered?'<div style="text-align:center;margin-bottom:16px">'
    +'<div style="font-size:20px;font-weight:800;color:'+(chosen===item.id?'var(--success)':'var(--danger)')+';margin-bottom:6px">'+(chosen===item.id?'✓ Correct!':'✗ Incorrect — '+item.name)+'</div>'
    +(item.key_features&&item.key_features.length?'<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:12px">'+item.key_features.map(f=>'<span class="tag tag-info">'+f+'</span>').join('')+'</div>':'')
    +'</div>'
    +'<div style="text-align:center;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">'
    +(idx>0&&onPrev?'<button class="btn btn-ghost" style="font-size:15px;padding:12px 24px" onclick="('+onPrev.toString()+')()">← Prev</button>':'')
    +(idx<items.length-1
      ?'<button class="btn btn-primary" style="font-size:15px;padding:12px 32px" onclick="('+onNext.toString()+')()">Next →</button>'
      :'<button class="btn btn-success" style="font-size:15px;padding:12px 32px" onclick="('+onDone.toString()+')()">See Results</button>')
    +'</div>':'';

  el.innerHTML='<div class="bbq-overlay">'
    +'<div class="bbq-header">'
    +'<button class="btn btn-ghost btn-sm" onclick="('+onExit.toString()+')()">✕ Exit</button>'
    +'<div class="progress-bar" style="flex:1;margin:0 8px"><div class="progress-fill" style="width:'+pct+'%"></div></div>'
    +'<span class="question-num" style="white-space:nowrap">'+(idx+1)+' / '+items.length+'</span>'
    +'</div>'
    +'<div class="bbq-body">'
    +'<p style="font-size:13px;color:var(--text3);text-align:center;margin-bottom:12px">'+prompt+'</p>'
    +imgsHtml
    +'<div class="bbq-options">'+optsHtml+'</div>'
    +feedbackHtml
    +'</div></div>';
}

// Hematology images — folder system
function hemeDefaultConditions(){
  return HEME_DEFAULT_CONDITIONS.map(item=>({
    ...item,
    images:item.images||[],
    notes:item.notes||'',
    key_features:[...(item.key_features||[])]
  }));
}

function hemeConditionsOrDefaults(data){
  return Array.isArray(data)&&data.length?data:hemeDefaultConditions();
}

function normalizeHemeFolderKey(key){
  const map={
    reactive_physiologic:'reactive',
    non_malignant_morphologic:'non_malignant',
    chronic_leukemias:'malignancies_chronic',
    acute_leukemias:'malignancies_acute',
    other_malignancies:'malignancies_other'
  };
  return map[key]||key||'non_malignant';
}

function hemeFolderLabel(key){
  const normalized=normalizeHemeFolderKey(key);
  const folderDef=HEME_FOLDERS.find(x=>x.key===normalized);
  return folderDef?folderDef.name:normalized;
}

function hemeFolderFromType(type,name){
  const t=String(type||'').toLowerCase();
  const n=String(name||'').toLowerCase();
  if(t.includes('acute leukemia')||n.includes('acute'))return 'malignancies_acute';
  if(t.includes('hemolytic anemia')||t.includes('non-hemolytic anemia')||t==='anemia'||n.includes('anemia')||n.includes('thalassemia'))return 'anemias';
  if(n.includes('malaria')||n.includes('bacteria')||n.includes('spirochete')||n.includes('viral'))return 'infectious';
  if(n.includes('leukemoid')||n.includes('reactive')||n.includes('kiddie'))return 'reactive';
  if(n.includes('pelger')||n.includes('platelet')||n.includes('nrbc'))return 'non_malignant';
  if(t.includes('lymphoproliferative')){
    if(n.includes('myeloma')||n.includes('plasma')||n.includes('sezary'))return 'malignancies_other';
    return 'malignancies_chronic';
  }
  if(t.includes('myeloproliferative')||t.includes('myelodysplastic'))return 'malignancies_chronic';
  return 'non_malignant';
}

function filterHemeConditions(query){
  const q=query.toLowerCase().trim();
  document.querySelectorAll('.heme-item').forEach(card=>{
    const name=card.dataset.name||'';
    card.style.display=(!q||name.includes(q))?'':'none';
  });
  // Hide empty sections
  document.querySelectorAll('.heme-section').forEach(section=>{
    const visible=[...section.querySelectorAll('.heme-item')].some(c=>c.style.display!=='none');
    section.style.display=visible?'':'none';
  });
}

  try{
    const res=await sb.from('mlsboc_heme_conditions').select('*').order('name');

  }catch(error){
    conditions=hemeDefaultConditions();
  }

  const byFolder={};

    byFolder[folder].push(c);
  });

      <button class="btn btn-ghost btn-sm" onclick="document.querySelectorAll('.heme-exp-cb').forEach(c=>c.checked=true)">Select All</button>
      <button class="btn btn-ghost btn-sm" onclick="document.querySelectorAll('.heme-exp-cb').forEach(c=>c.checked=false)">Deselect All</button>
    </div>`;

  HEME_FOLDER_GROUPS.flatMap(g=>g.keys).concat(Object.keys(byFolder).filter(k=>!HEME_FOLDER_GROUPS.flatMap(g=>g.keys).includes(k))).forEach(fkey=>{
    const items=byFolder[fkey];if(!items||!items.length)return;
    const folderDef=HEME_FOLDERS.find(x=>x.key===fkey);
    html+=`<div style="font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;margin-top:12px">${folderDef?folderDef.name:fkey}</div>`;
    items.forEach(c=>{
      html+=`<label style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border-radius:var(--r);margin-bottom:6px;cursor:pointer;font-size:13px">

    </div>`;

  document.getElementById('condition-modal-body').innerHTML=html;
  document.getElementById('condition-modal').classList.remove('hidden');
}

async function generateHemeConditionsPDF(){
  const selectedIds=[...document.querySelectorAll('.heme-exp-cb:checked')].map(cb=>cb.dataset.id);
  if(!selectedIds.length){alert('Select at least one condition.');return;}
  const btn=document.querySelector('#condition-modal-body .btn-primary');
  if(btn){btn.textContent='Generating...';btn.disabled=true;}
  try{
    let all=window._hemeAllConditions||window._hemeCondsCache||[];
    if(!all.length){
      try{
        const res=await sb.from('mlsboc_heme_conditions').select('*').in('id',selectedIds);
        all=hemeConditionsOrDefaults(res.data||[]);
      }catch(error){
        all=hemeDefaultConditions();
      }
    }
    if(!all||!all.length){alert('Could not load conditions.');return;}
    const {jsPDF}=window.jspdf;
    const ordered=selectedIds.map(id=>all.find(item=>item.id===id)).filter(Boolean);

    await generateImageSectionPDF(ordered,'Hematology Conditions','hematology_conditions.pdf',{
      showImageMeta:true,
      imageFrame:false,
      imagePadding:0,
      imageMetaPosition:'overlay',
      showCategory:true,
      missingFeaturesText:'No key features need to add'
    });
  }catch(err){
    console.error(err);alert('PDF generation failed: '+err.message);
    if(btn){btn.textContent='📄 Generate PDF';btn.disabled=false;}
  }
}

function buildConditionThumbs(c){
  const imgs=imageEntryList(c.images);
  const slots=4;
  let html='';
  for(let i=0;i<slots;i++){
    const src=imageEntrySrc(imgs[i]);
    if(src) html+=`<div class="heme-thumb-wrap"><img src="${esc(src)}" alt="" onerror="retryImageLoad(this)"><span class="heme-img-meta">${esc(hemeImageLabel(imgs[i],i))}</span></div>`;
    else html+=`<div class="img-ph">${i===0?'🖼️':''}</div>`;
  }
  return html;
}

async function handleConditionImgFile(e, conditionId, slot){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const dataUrl=ev.target.result;
    const {data}=await sb.from('mlsboc_heme_conditions').select('images').eq('id',conditionId).single();
    const imgs=[...imageEntryList(data?.images)];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=hemeImageEntry(dataUrl,imgs[slot],slot);
    await sb.from('mlsboc_heme_conditions').update({images:imgs}).eq('id',conditionId);
    window._hemeCondsCache=null;
    openCondition(conditionId);
  };
  reader.readAsDataURL(file);
}

async function handleConditionImgDrop(e, conditionId, slot){
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const files=Array.from(e.dataTransfer.files||[]).filter(file=>file.type.startsWith('image/'));
  if(files.length>1){await handleConditionBulkFiles(files,conditionId,slot);return;}
  const file=files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const dataUrl=ev.target.result;
    const {data}=await sb.from('mlsboc_heme_conditions').select('images').eq('id',conditionId).single();
    const imgs=[...imageEntryList(data?.images)];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=hemeImageEntry(dataUrl,imgs[slot],slot);
    await sb.from('mlsboc_heme_conditions').update({images:imgs}).eq('id',conditionId);
    window._hemeCondsCache=null;
    openCondition(conditionId);
  };
  reader.readAsDataURL(file);
}

function readHemeImageFile(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=ev=>resolve(ev.target.result);
    reader.onerror=()=>reject(reader.error||new Error('Could not read image'));
    reader.readAsDataURL(file);
  });
}

async function handleConditionBulkImgFile(e,conditionId){
  const files=Array.from(e.target.files||[]).filter(file=>file.type.startsWith('image/'));
  if(files.length)await handleConditionBulkFiles(files,conditionId,0);
  e.target.value='';
}

async function handleConditionBulkImgDrop(e,conditionId){
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const files=Array.from(e.dataTransfer.files||[]).filter(file=>file.type.startsWith('image/'));
  if(files.length)await handleConditionBulkFiles(files,conditionId,0);
}

async function handleConditionBulkFiles(files,conditionId,startSlot=0){
  const imageFiles=files.filter(file=>file&&file.type.startsWith('image/')).slice(0,4-startSlot);
  if(!imageFiles.length)return;
  const {data}=await sb.from('mlsboc_heme_conditions').select('images').eq('id',conditionId).single();
  const imgs=[...imageEntryList(data?.images)];
  while(imgs.length<4)imgs.push(null);
  for(let i=0;i<imageFiles.length;i++){
    const slot=startSlot+i;
    const dataUrl=await readHemeImageFile(imageFiles[i]);
    imgs[slot]=hemeImageEntry(dataUrl,imgs[slot],slot);
  }
  await sb.from('mlsboc_heme_conditions').update({images:imgs}).eq('id',conditionId);
  window._hemeCondsCache=null;
  openCondition(conditionId);
}

async function updateConditionImageMeta(conditionId,slot,field,value){
  const {data}=await sb.from('mlsboc_heme_conditions').select('images').eq('id',conditionId).single();
  const imgs=[...imageEntryList(data?.images)];
  while(imgs.length<=slot)imgs.push(null);
  const current=imgs[slot];
  const next=typeof current==='object'&&current?{...current}:{url:imageEntrySrc(current),mag:imageEntryMag(current,slot),specimen:imageEntrySpecimen(current,slot)};
  if(field==='specimen')next.specimen=String(value||'PB').toUpperCase()==='BM'?'BM':'PB';
  else next.mag=String(value||'100x').trim()||'100x';
  imgs[slot]=next;
  await sb.from('mlsboc_heme_conditions').update({images:imgs}).eq('id',conditionId);
  window._hemeCondsCache=null;
  openCondition(conditionId);
}

async function generateMicroPDF(){
  const ids=[...document.querySelectorAll('.micro-exp-cb:checked')].map(cb=>cb.dataset.id);
  if(!ids.length){alert('Select at least one.');return;}
  const btn=document.querySelector('#condition-modal-body .btn-primary');
  if(btn){btn.textContent='Generating...';btn.disabled=true;}
  try{
    const rawAll=(window._microOrgsCache||[]).filter(o=>ids.includes(o.id));
    // Normalize micro organisms to match shared PDF format
    const all=rawAll.map(o=>({name:o.name,key_features:o.key_features||[],notes:o.notes||'',images:imageEntryList(o.images)}));
    // Use shared generator
    await generateImageSectionPDF(all,'Microbiology Organisms','microbiology_organisms.pdf');
    return;
    const {jsPDF}=window.jspdf;
    // Landscape A4 for 2x2 grid of images
    const doc=new jsPDF({unit:'mm',format:'a4',orientation:'landscape'});
    const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight();
    const margin=12,gap=8;
    const cellW=(pageW-margin*2-gap)/2;
    const cellH=(pageH-margin*2-gap)/2;
    const getImgDims=(src)=>new Promise(res=>{const img=new Image();img.onload=()=>res({w:img.naturalWidth||4,h:img.naturalHeight||3});img.onerror=()=>res({w:4,h:3});img.src=src;});
    let first=true;
    for(const o of (all||[])){
      if(!first)doc.addPage();first=false;
      // Organism name header
      doc.setFillColor(30,30,30);doc.rect(margin,margin,pageW-margin*2,10,'F');
      doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
      doc.text(o.name,margin+4,margin+7);
      // Key features on same line if space
      if(o.key_features&&o.key_features.length){
        doc.setFontSize(9);doc.setFont('helvetica','normal');
        const feat=o.key_features.slice(0,4).join(' | ');
        doc.text(feat,margin+4,margin+14);
      }
      const imgY=margin+18;
      const imgs=(o.images||[]).filter(Boolean).slice(0,4);
      for(let i=0;i<4;i++){
        const col=i%2,row=Math.floor(i/2);
        const x=margin+col*(cellW+gap);
        const y=imgY+row*(cellH+gap);
        // Draw cell border (empty placeholder)
        doc.setDrawColor(200,200,200);doc.setLineWidth(0.3);
        doc.rect(x,y,cellW,cellH,'S');
        if(imgs[i]){
          try{
            let dims={w:4,h:3};
            try{dims=await getImgDims(imgs[i]);}catch(e){}
            // Fit image inside cell preserving aspect ratio (no crop, no distort)
            const imgAr=dims.w/dims.h;
            const cellAr=cellW/cellH;
            let dw,dh;
            if(imgAr>cellAr){dw=cellW;dh=cellW/imgAr;}
            else{dh=cellH;dw=cellH*imgAr;}
            const ox=x+(cellW-dw)/2;
            const oy=y+(cellH-dh)/2;
            const fmt=imgs[i].startsWith('data:image/png')?'PNG':'JPEG';
            doc.addImage(imgs[i],fmt,ox,oy,dw,dh,'','NONE');
          }catch(e){}
        }else{
          // Empty cell label
          doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(180,180,180);
          doc.text('(no image)',x+cellW/2,y+cellH/2,{align:'center'});
        }
      }
    }
    const total=doc.internal.getNumberOfPages();
    for(let p=1;p<=total;p++){
      doc.setPage(p);doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);
      doc.text('MLS BOC Prep - Microbiology | Page '+p+' of '+total,margin,pageH-5);
    }
    doc.save('microbiology_organisms.pdf');
    document.getElementById('condition-modal').classList.add('hidden');
  }catch(err){alert('PDF failed: '+err.message);if(btn){btn.textContent='Generate PDF';btn.disabled=false;}}
}

function buildOrganismThumbs(o){

}

// handleOrganismImgFile and handleOrganismImgDrop reopen edit modal so slots refresh


async function handleOrganismImgFile(e,orgId,slot){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const dataUrl=ev.target.result;
    const {data}=await sb.from('mlsboc_micro_organisms').select('images').eq('id',orgId).single();
    const imgs=[...imageEntryList(data?.images)];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=dataUrl;
    await sb.from('mlsboc_micro_organisms').update({images:imgs}).eq('id',orgId);
    openOrganismEditModal(orgId);
  };
  reader.readAsDataURL(file);
}

async function handleOrganismImgDrop(e,orgId,slot){
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const file=e.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const dataUrl=ev.target.result;
    const {data}=await sb.from('mlsboc_micro_organisms').select('images').eq('id',orgId).single();
    const imgs=[...imageEntryList(data?.images)];
    while(imgs.length<=slot)imgs.push(null);
    imgs[slot]=dataUrl;
    await sb.from('mlsboc_micro_organisms').update({images:imgs}).eq('id',orgId);
    openOrganismEditModal(orgId);
  };
  reader.readAsDataURL(file);
}

async function startMicroQuiz(){

  const valid=(window._microOrgsCache||[]).filter(o=>o.images&&o.images.filter(Boolean).length>0);
  if(!valid.length){alert('No organisms with images to quiz on yet.');return;}
  appState.microImgMode='quiz';
  window._kqOpts={};appState.microQuizItems=shuffle(valid);
  appState.microQuizIdx=0;appState.microQuizAns=[];appState.microQuizDone=false;
  renderTab();
}

  appState.microImgMode='quiz';

function renderMicroImageQuiz(el){
  renderKahootImageQuiz(el,{
    items:appState.microQuizItems,
    idx:appState.microQuizIdx,
    ans:appState.microQuizAns,
    done:appState.microQuizDone,
    prompt:'Identify this organism.',
    placeholder:'🔬',
    onAnswer:id=>{appState.microQuizAns[appState.microQuizIdx]=id;renderTab();},
    onPrev:()=>{appState.microQuizIdx=Math.max(0,appState.microQuizIdx-1);renderTab();},
    onNext:()=>{appState.microQuizIdx++;renderTab();},
    onDone:()=>{appState.microQuizDone=true;renderTab();},
    onRetry:()=>startMicroQuiz(),
    onExit:()=>{appState.microImgMode='browse';appState.microImgPage=null;appState.microQuizDone=false;renderTab();},
    onRetryWrong:(wrongItems)=>{
      if(!wrongItems.length)return;
      window._kqOpts={};appState.microQuizItems=shuffle(wrongItems);
      appState.microQuizIdx=0;appState.microQuizAns=[];appState.microQuizDone=false;
      renderTab();
    }
  });
}

function renderHemeCaseQuestion(caseId,q,qi,selState){
  const checked=selState[qi]?.checked===true;
  const chosen=selState[qi]?.choice;
  const reveal=caseAnswersAvailable();
  const letters=['a','b','c','d'];
  const correctIdx=letters.indexOf(q.correct);
  return `
    <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:16px 18px;box-shadow:0 2px 8px #0002">
      <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;font-family:var(--mono)">Q${qi+1}</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.65">${escNL(q.question)}</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${(q.options||[]).map((opt,oi)=>{
          if(!opt)return '';
          const letter=letters[oi];
          let bg='var(--bg4)';let bd='var(--border)';let color='var(--text)';let weight='400';
          if(chosen===letter&&!checked){bg='var(--bg4)';bd='var(--accent)';color='var(--accent)';weight='500';}
          if(checked&&reveal){
            if(letter===q.correct){bg='var(--bg4)';bd='var(--success)';color='var(--success)';weight='600';}
            else if(letter===chosen&&chosen!==q.correct){bg='var(--bg4)';bd='var(--danger)';color='var(--danger)';weight='500';}
          }
          return `<button onclick="selectHemeCaseQ('${caseId}',${qi},'${letter}')" ${checked?'disabled':''} style="display:flex;align-items:flex-start;gap:10px;background:${bg};border:1px solid ${bd};border-radius:var(--r);padding:9px 13px;cursor:${checked?'default':'pointer'};text-align:left;width:100%;transition:all .12s">
            <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:${color};min-width:20px;margin-top:1px">${letter.toUpperCase()}.</span>
            <span style="font-size:13px;color:${color};font-weight:${weight};line-height:1.5">${opt}</span>
          </button>`;
        }).filter(Boolean).join('')}
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:32px">
        ${reveal&&!checked&&chosen?`<button class="btn btn-primary btn-sm" onclick="checkHemeCaseQ('${caseId}',${qi})">Check Answer</button>`:''}
        ${chosen?`<button class="btn btn-ghost btn-sm" onclick="resetHemeCaseQ('${caseId}',${qi})">Reset</button>`:''}
      </div>
      ${checked&&reveal?`
        <div class="case-feedback ${chosen===q.correct?'correct':'wrong'}" style="margin-top:8px;font-size:13px">
          ${chosen===q.correct?'✓ Correct!':`✗ Incorrect — Correct: ${(q.correct||'a').toUpperCase()}. ${(q.options||[])[correctIdx]||''}`}
        </div>
        ${q.explanation?`<div class="explanation" style="margin-top:8px;font-size:13px">${q.explanation}</div>`:''}`:''}
    </div>
  `;
}

function toggleHemeCaseCollapse(id){

function hcAllChecked(caseId,count){
  const s=(appState.hemeCaseAnswers||{})[caseId]||{};
  for(let i=0;i<count;i++){if(!s[i]?.checked)return false;}
  return count>0;
}
function hcAnyAnswered(caseId){
  return Object.values((appState.hemeCaseAnswers||{})[caseId]||{}).some(v=>v?.choice);
}
function selectHemeCaseQ(caseId,qi,letter){
  if(!appState.hemeCaseAnswers)appState.hemeCaseAnswers={};
  if(!appState.hemeCaseAnswers[caseId])appState.hemeCaseAnswers[caseId]={};
  if(appState.hemeCaseAnswers[caseId][qi]?.checked)return;
  appState.hemeCaseAnswers[caseId][qi]={choice:letter,checked:false};
  renderTab();
}
function checkAllHC(caseId,count){
  if(!caseAnswersAvailable()){alert('Answers are available in Admin mode only for case activities.');return;}
  if(!appState.hemeCaseAnswers)appState.hemeCaseAnswers={};
  if(!appState.hemeCaseAnswers[caseId])appState.hemeCaseAnswers[caseId]={};
  for(let i=0;i<count;i++){
    if(appState.hemeCaseAnswers[caseId][i]?.choice&&!appState.hemeCaseAnswers[caseId][i]?.checked)
      appState.hemeCaseAnswers[caseId][i].checked=true;
  }
  renderTab();
}
function resetAllHC(caseId){if(!appState.hemeCaseAnswers)appState.hemeCaseAnswers={};appState.hemeCaseAnswers[caseId]={};renderTab();}
function checkHemeCaseQ(caseId,qi){
  if(!caseAnswersAvailable()){alert('Answers are available in Admin mode only for case activities.');return;}
  if(appState.hemeCaseAnswers?.[caseId]?.[qi])appState.hemeCaseAnswers[caseId][qi].checked=true;renderTab();

async function saveHemeCase(caseId){
  const title=document.getElementById('hc-title')?.value.trim();
  const scenario=document.getElementById('hc-scenario')?.value.trim();
  const isDraft=document.getElementById('hc-draft')?.value==='true';
  if(!title){alert('Title required.');return;}
  const rawT=tblReadData('heme');
  const table_data=tblHasContent(rawT)?rawT:null;
  const questions=[];
  for(let i=0;i<(window._hemeCaseQCount||0);i++){
    const qEl=document.getElementById('hc-q-'+i);if(!qEl||!qEl.isConnected)continue;
    const question=document.getElementById('hc-qq-'+i)?.value.trim()||'';if(!question)continue;
    const options=['a','b','c','d'].map(l=>document.getElementById('hc-qo-'+i+'-'+l)?.value.trim()||'');
    const correct=document.getElementById('hc-qc-'+i)?.value||'a';
    const explanation=document.getElementById('hc-qe-'+i)?.value.trim()||'';
    questions.push({question,options,correct,explanation});
  }
  const payload={title,scenario:scenario||'',table_data,questions,is_draft:isDraft,images:[]};
  let error;
  if(caseId){({error}=await sb.from('mlsboc_heme_cases').update(payload).eq('id',caseId));}
  else{({error}=await sb.from('mlsboc_heme_cases').insert(payload));}
  if(error){alert('Save failed: '+error.message);return;}
  document.getElementById('condition-modal').classList.add('hidden');
  if(!appState.hemeCaseAnswers)appState.hemeCaseAnswers={};
  renderTab();
}
async function deleteHemeCase(id){
  if(!confirm('Delete this case?'))return;
  await sb.from('mlsboc_heme_cases').delete().eq('id',id);
  renderTab();
}

// ═══════════════════════════════════════════════════════════════════════════════
// SHARED TABLE UTILITY — 5×5 grid with per-cell bold/color, used everywhere
// Data format: {headers:['Col1',...], rows:[['val',...], ...], meta:[[{bold,color}...],...]}
// headers = array of column header strings (up to 5)
// rows    = 2D array of cell strings (up to 5 rows × 5 cols)
// meta    = 2D array matching rows, each cell: {bold:bool, color:string|null}
// ═══════════════════════════════════════════════════════════════════════════════


// ─── LEGACY TABLE MIGRATION ─────────────────────────────────────────────────
function migrateTableData(c){
  if(c.table_data&&c.table_data.headers) return c.table_data;
  const legacy=c.typing_table||c.results_table||c.test_results;
  if(!legacy||!Array.isArray(legacy)||!legacy.length) return null;
  const headers=legacy.map(col=>col.label||'');
  const row=legacy.map(col=>col.value||'');
  const meta=legacy.map(col=>{
    let color='';
    if(col.flag==='high') color='#e05a5a';
    else if(col.flag==='low') color='#2980b9';
    return {bold:!!col.flag,color};
  });
  return {headers,rows:[row],meta:[meta]};
}
function withTableData(c){
  if(c.table_data&&c.table_data.headers) return c;
  const td=migrateTableData(c);
  return td?{...c,table_data:td}:c;
}

const TABLE_COLORS = [
  {label:'Default', value:''},
  {label:'Red',     value:'#e05a5a'},
  {label:'Blue',    value:'#2980b9'},
  {label:'Green',   value:'#27ae60'},
  {label:'Orange',  value:'#e67e22'},
  {label:'Purple',  value:'#8e44ad'},
  {label:'Teal',    value:'#16a085'},
  {label:'Gray',    value:'#7f8c8d'},
];

// Render a table for display (view/quiz/flashcard)
function renderDataTable(tableData, opts={}){
  if(!tableData||!tableData.headers||!tableData.headers.length) return '';
  const {headers, rows=[], meta=[]} = tableData;
  const colCount = headers.length;
  const fontSize = opts.small ? '12px' : '14px';
  const padH = opts.small ? '6px 10px' : '10px 16px';
  const padC = opts.small ? '7px 10px' : '11px 16px';
  let html = '<div style="overflow-x:auto;margin:10px 0">';
  html += '<table style="border-collapse:collapse;width:100%;min-width:'+Math.max(280,colCount*110)+'px">';
  // Header row
  html += '<thead><tr>';
  headers.forEach(h=>{
    html += `<th style="background:var(--bg4);border:1px solid var(--border2);padding:${padH};text-align:center;font-weight:700;font-size:${fontSize};color:var(--text);white-space:nowrap">${esc(h)}</th>`;
  });
  html += '</tr></thead><tbody>';
  // Data rows
  (rows||[]).forEach((row,ri)=>{
    html += '<tr>';
    (row||[]).forEach((cell,ci)=>{
      const m = (meta[ri]||[])[ci]||{};
      const bold = m.bold ? 'font-weight:800;' : 'font-weight:500;';
      const color = m.color ? `color:${m.color};` : 'color:var(--text);';
      html += `<td style="border:1px solid var(--border);padding:${padC};text-align:center;font-family:var(--mono);font-size:${opts.small?'13px':'15px'};${bold}${color}background:var(--bg3)">${esc(cell||'')}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

// Render the table editor UI (shared by all case editors + class question editor)
// prefix: unique string to namespace input IDs (e.g. 'sc', 'heme', 'csq-0')
// tableData: existing data object or null
function renderTableEditor(prefix, tableData){
  const headers = (tableData&&tableData.headers)||[''];
  const rows    = (tableData&&tableData.rows)||[['']];
  const meta    = (tableData&&tableData.meta)||[[{}]];
  const numCols = Math.min(5, Math.max(1, headers.length));
  const numRows = Math.min(5, Math.max(1, rows.length));

  let html = `
    <div class="tbl-editor" id="tbl-${prefix}" data-cols="${numCols}" data-rows="${numRows}">
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
        <span style="font-size:12px;font-weight:600;color:var(--text2)">Columns:</span>
        ${Array.from({length:5},(_,i)=>`<button class="btn btn-ghost btn-xs tbl-col-btn ${i<numCols?'btn-active':''}" onclick="tblSetCols('${prefix}',${i+1})">${i+1}</button>`).join('')}
        <span style="font-size:12px;font-weight:600;color:var(--text2);margin-left:8px">Rows:</span>
        ${Array.from({length:5},(_,i)=>`<button class="btn btn-ghost btn-xs tbl-row-btn ${i<numRows?'btn-active':''}" onclick="tblSetRows('${prefix}',${i+1})">${i+1}</button>`).join('')}
      </div>
      <div id="tbl-${prefix}-grid" style="overflow-x:auto">
        ${buildTableEditorGrid(prefix,numCols,numRows,headers,rows,meta)}
      </div>
    </div>`;
  return html;
}

function buildTableEditorGrid(prefix,numCols,numRows,headers,rows,meta){
  let html='<table style="border-collapse:collapse;width:100%">';
  // Header row
  html+='<thead><tr>';
  for(let c=0;c<numCols;c++){
    html+=`<th style="padding:4px 2px"><input type="text" id="tbl-${prefix}-h${c}" value="${esc((headers[c]||''))}" placeholder="Header ${c+1}" style="width:100%;font-size:12px;font-weight:600;padding:6px 8px;text-align:center;border-radius:var(--r);border:1px solid var(--accent);background:var(--bg4);color:var(--text)"></th>`;
  }
  html+='</tr></thead><tbody>';
  // Data rows
  for(let r=0;r<numRows;r++){
    html+='<tr>';
    for(let c=0;c<numCols;c++){
      const val=(rows[r]||[])[c]||'';
      const m=((meta[r]||[])[c])||{};
      const colorVal=m.color||'';
      const isBold=m.bold?'checked':'';
      html+=`<td style="padding:3px 2px;vertical-align:top">
        <div style="display:flex;flex-direction:column;gap:3px">
          <input type="text" id="tbl-${prefix}-r${r}c${c}" value="${esc(val)}" placeholder="…"
            style="width:100%;font-size:12px;padding:6px 8px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);color:${colorVal||'var(--text)'};"
            oninput="tblUpdateCellStyle('${prefix}',${r},${c})">
          <div style="display:flex;gap:4px;align-items:center">
            <label style="font-size:10px;display:flex;align-items:center;gap:3px;cursor:pointer;color:var(--text2)">
              <input type="checkbox" id="tbl-${prefix}-b${r}c${c}" ${isBold} style="margin:0" onchange="tblUpdateCellStyle('${prefix}',${r},${c})">B
            </label>
            <select id="tbl-${prefix}-color${r}c${c}" style="font-size:10px;padding:1px 2px;border-radius:3px;border:1px solid var(--border);background:var(--bg3);color:var(--text);flex:1" onchange="tblUpdateCellStyle('${prefix}',${r},${c})">
              ${TABLE_COLORS.map(tc=>`<option value="${tc.value}" ${colorVal===tc.value?'selected':''}>${tc.label}</option>`).join('')}
            </select>
          </div>
        </div>
      </td>`;
    }
    html+='</tr>';
  }
  html+='</tbody></table>';
  return html;
}

function tblUpdateCellStyle(prefix,r,c){
  const inp=document.getElementById('tbl-'+prefix+'-r'+r+'c'+c);
  const colorSel=document.getElementById('tbl-'+prefix+'-color'+r+'c'+c);
  if(!inp||!colorSel)return;
  const color=colorSel.value;
  inp.style.color=color||'var(--text)';
}

function tblSetCols(prefix,n){
  const editor=document.getElementById('tbl-'+prefix);if(!editor)return;
  const curRows=parseInt(editor.dataset.rows)||1;
  editor.dataset.cols=n;
  // update button active state
  editor.querySelectorAll('.tbl-col-btn').forEach((b,i)=>b.classList.toggle('btn-active',i<n));
  _tblRebuild(prefix,n,curRows);
}
function tblSetRows(prefix,n){
  const editor=document.getElementById('tbl-'+prefix);if(!editor)return;
  const curCols=parseInt(editor.dataset.cols)||1;
  editor.dataset.rows=n;
  editor.querySelectorAll('.tbl-row-btn').forEach((b,i)=>b.classList.toggle('btn-active',i<n));
  _tblRebuild(prefix,curCols,n);
}
function _tblRebuild(prefix,numCols,numRows){
  // Save current values before rebuild
  const cur=tblReadData(prefix);
  const grid=document.getElementById('tbl-'+prefix+'-grid');if(!grid)return;
  grid.innerHTML=buildTableEditorGrid(prefix,numCols,numRows,
    cur.headers, cur.rows, cur.meta);
}

// Read current table data from DOM inputs
function tblReadData(prefix){
  const editor=document.getElementById('tbl-'+prefix);
  if(!editor)return{headers:[],rows:[],meta:[]};
  const numCols=parseInt(editor.dataset.cols)||1;
  const numRows=parseInt(editor.dataset.rows)||1;
  const headers=[];
  for(let c=0;c<numCols;c++){
    const el=document.getElementById('tbl-'+prefix+'-h'+c);
    headers.push(el?el.value.trim():'');
  }
  const rows=[];const meta=[];
  for(let r=0;r<numRows;r++){
    const row=[];const metaRow=[];
    for(let c=0;c<numCols;c++){
      const inp=document.getElementById('tbl-'+prefix+'-r'+r+'c'+c);
      const bold=document.getElementById('tbl-'+prefix+'-b'+r+'c'+c);
      const color=document.getElementById('tbl-'+prefix+'-color'+r+'c'+c);
      row.push(inp?inp.value.trim():'');
      metaRow.push({bold:bold?bold.checked:false, color:color?color.value:''});
    }
    rows.push(row);meta.push(metaRow);
  }
  return {headers,rows,meta};
}

// Check if a table has any content worth saving
function hexToRgb(hex){
  if(!hex)return [30,30,30];
  const r=parseInt(hex.slice(1,3),16)||30;
  const g=parseInt(hex.slice(3,5),16)||30;
  const b=parseInt(hex.slice(5,7),16)||30;
  return [r,g,b];
}
function tblHasContent(td){
  if(!td||!td.headers)return false;
  if(td.headers.some(h=>h))return true;
  return (td.rows||[]).some(row=>row.some(cell=>cell));
}

        ${isAdmin&&allQs.length?`<button class="btn btn-primary" onclick="startSubjectCaseQuiz('${qmKey}','${cfg.dbTable}','${cfg.tableField}')">⚡ Quiz Mode <span style="font-size:11px;opacity:.8">${allQs.length} questions</span></button>`:''}
      </div>
    </div>
    ${!caseAnswersAvailable()?caseAnswerNoticeHTML():''}
    ${!cases.length?`<div class="empty">No ${cfg.label} yet. Use Admin mode to add one.</div>`:''}
    ${cases.map((c,i)=>renderSubjectCase(c,i,cfg)).join('')}
  `;
}

function renderSubjectCase(c, idx, cfg){
  const qs=c.questions||[];
  const selState=(appState[cfg.answerKey]||{})[c.id]||{};
  // table_data used via renderDataTable
  const imgs=imageEntryList(c.images);
  const collapsed=!appState[cfg.collapsedKey]||appState[cfg.collapsedKey][c.id]!==false;
  return `
    <div class="case-card" id="sc-${c.id}" style="margin-bottom:12px">
      <div class="flex-center gap-8 flex-wrap" style="cursor:pointer" onclick="toggleSubjectCaseCollapse('${c.id}','${cfg.collapsedKey}')">
        <span class="tag tag-info" style="font-size:13px;font-weight:700;padding:4px 12px">Case ${idx+1}</span>
        <span style="font-size:17px;font-weight:700">${c.title||'Untitled Case'}</span>
        ${c.is_draft?`<span class="draft-badge">Draft</span>`:''}
        <span class="ml-auto" style="font-size:18px;color:var(--text3);transition:transform .2s;transform:rotate(${collapsed?'0':'180'}deg)">⌃</span>
        ${isAdmin?`<div class="flex gap-6" onclick="event.stopPropagation()">
          <button class="btn btn-ghost btn-xs" onclick="${cfg.adminFn}('${c.id}')">Edit</button>
          <button class="btn btn-danger btn-xs" onclick="${cfg.deleteFn}('${c.id}')">Delete</button>
        </div>`:''}
      </div>
      ${collapsed?'':`
        <div style="margin-top:16px">
          ${c.scenario?`<div class="case-scenario" style="margin-bottom:20px;font-size:15px;line-height:1.85">${escNL(c.scenario)}</div>`:''}
          ${c.table_data&&tblHasContent(c.table_data)?`
            <div style="margin-bottom:20px">
              <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">${cfg.tableLabel}</div>
              ${renderDataTable(c.table_data)}
            </div>`:''}
          ${caseImageRowHTML(imgs)}
          ${qs.length?`
            <div class="divider"></div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
              <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px">Questions</div>
              ${caseAnswersAvailable()&&!scAllChecked(c.id,qs.length,cfg.answerKey)?`<button class="btn btn-primary btn-sm" onclick="checkAllSC('${c.id}',${qs.length},'${cfg.answerKey}')">Check All</button>`:''}
              ${scAnyAnswered(c.id,cfg.answerKey)?`<button class="btn btn-ghost btn-sm" onclick="resetAllSC('${c.id}','${cfg.answerKey}')">Reset All</button>`:''}
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;align-items:start">
              ${qs.map((q,qi)=>renderSubjectCaseQuestion(c.id,q,qi,selState,cfg.answerKey)).join('')}
            </div>
          `:`<div class="empty" style="padding:16px;text-align:left">No questions added yet.</div>`}
        </div>
      `}
    </div>
  `;
}

function renderSubjectCaseQuestion(caseId,q,qi,selState,answerKey){
  const checked=selState[qi]?.checked===true;
  const chosen=selState[qi]?.choice;
  const reveal=caseAnswersAvailable();
  const letters=['a','b','c','d'];
  const correctIdx=letters.indexOf(q.correct);
  return `
    <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:16px 18px;box-shadow:0 2px 8px #0002">
      <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;font-family:var(--mono)">Q${qi+1}</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.65">${escNL(q.question)}</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${(q.options||[]).map((opt,oi)=>{
          if(!opt)return '';
          const letter=letters[oi];
          let bg='var(--bg4)';let bd='var(--border)';let color='var(--text)';let weight='400';
          if(chosen===letter&&!checked){bg='var(--bg4)';bd='var(--accent)';color='var(--accent)';weight='500';}
          if(checked&&reveal){
            if(letter===q.correct){bg='var(--bg4)';bd='var(--success)';color='var(--success)';weight='600';}
            else if(letter===chosen&&chosen!==q.correct){bg='var(--bg4)';bd='var(--danger)';color='var(--danger)';weight='500';}
          }
          return `<button onclick="selectSubjectCaseQ('${caseId}',${qi},'${letter}','${answerKey}')" ${checked?'disabled':''} style="display:flex;align-items:flex-start;gap:10px;background:${bg};border:1px solid ${bd};border-radius:var(--r);padding:9px 13px;cursor:${checked?'default':'pointer'};text-align:left;width:100%;transition:all .12s">
            <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:${color};min-width:20px;margin-top:1px">${letter.toUpperCase()}.</span>
            <span style="font-size:13px;color:${color};font-weight:${weight};line-height:1.5">${opt}</span>
          </button>`;
        }).filter(Boolean).join('')}
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:32px">
        ${reveal&&!checked&&chosen?`<button class="btn btn-primary btn-sm" onclick="checkSubjectCaseQ('${caseId}',${qi},'${answerKey}')">Check Answer</button>`:''}
        ${chosen?`<button class="btn btn-ghost btn-sm" onclick="resetSubjectCaseQ('${caseId}',${qi},'${answerKey}')">Reset</button>`:''}
      </div>
      ${checked&&reveal?`
        <div class="case-feedback ${chosen===q.correct?'correct':'wrong'}" style="margin-top:8px;font-size:13px">
          ${chosen===q.correct?'✓ Correct!':`✗ Incorrect — Correct: ${(q.correct||'a').toUpperCase()}. ${(q.options||[])[correctIdx]||''}`}
        </div>
        ${q.explanation?`<div class="explanation" style="margin-top:8px;font-size:13px">${q.explanation}</div>`:''}`:''}
    </div>
  `;
}

function toggleSubjectCaseCollapse(id,key){
  if(!appState[key])appState[key]={};
  appState[key][id]=appState[key][id]===false?true:false;
  renderTab();
}
function scAllChecked(caseId,count,key){
  const s=(appState[key]||{})[caseId]||{};
  for(let i=0;i<count;i++){if(!s[i]?.checked)return false;}
  return count>0;
}
function scAnyAnswered(caseId,key){
  return Object.values((appState[key]||{})[caseId]||{}).some(v=>v?.choice);
}
function selectSubjectCaseQ(caseId,qi,letter,key){
  if(!appState[key])appState[key]={};
  if(!appState[key][caseId])appState[key][caseId]={};
  if(appState[key][caseId][qi]?.checked)return;
  appState[key][caseId][qi]={choice:letter,checked:false};
  renderTab();
}
function checkAllSC(caseId,count,key){
  if(!caseAnswersAvailable()){alert('Answers are available in Admin mode only for case activities.');return;}
  if(!appState[key])appState[key]={};
  if(!appState[key][caseId])appState[key][caseId]={};
  for(let i=0;i<count;i++){
    if(appState[key][caseId][i]?.choice&&!appState[key][caseId][i]?.checked)
      appState[key][caseId][i].checked=true;
  }
  renderTab();
}
function resetAllSC(caseId,key){if(!appState[key])appState[key]={};appState[key][caseId]={};renderTab();}
function checkSubjectCaseQ(caseId,qi,key){
  if(!caseAnswersAvailable()){alert('Answers are available in Admin mode only for case activities.');return;}
  if(appState[key]?.[caseId]?.[qi])appState[key][caseId][qi].checked=true;renderTab();
}
function resetSubjectCaseQ(caseId,qi,key){if(appState[key]?.[caseId])delete appState[key][caseId][qi];renderTab();}

// ─── SUBJECT CASE QUIZ MODE ────────────────────────────────────────────────────
async function startSubjectCaseQuiz(qmKey,dbTable,tableField){
  if(!isAdmin){alert('Quiz mode is available in Admin mode only for case activities.');return;}
  const {data}=await sb.from(dbTable).select('*').order('created_at');
  const cases=(data||[]).map(withTableData);
  const allQs=cases.flatMap(c=>(c.questions||[]).filter(q=>q.question).map(q=>({...q,_caseTitle:c.title,_scenario:c.scenario,_tableData:c.table_data||null,_imgs:imageEntryList(c.images)})));
  if(!allQs.length){alert('No questions found yet.');return;}
  appState[qmKey]=true;
  appState[qmKey+'Items']=shuffle(allQs);
  appState[qmKey+'Idx']=0;
  appState[qmKey+'Chosen']=null;
  appState[qmKey+'Answered']=false;
  appState[qmKey+'Score']=0;
  appState[qmKey+'Done']=false;
  appState[qmKey+'Answers']={};
  renderTab();
}

// These keys for quiz dispatch - called by the renderSubjectCases routing
function renderSubjectCaseQuiz(el,cfg){
  const qmKey=cfg.quizModeKey;
  if(appState[qmKey+'Done']){renderSubjectCaseQuizResults(el,cfg);return;}
  const items=appState[qmKey+'Items']||[];
  const idx=appState[qmKey+'Idx']||0;
  const item=items[idx];
  if(!item){appState[qmKey]=false;renderTab();return;}
  const answers=appState[qmKey+'Answers']||{};
  const chosen=answers[idx]??appState[qmKey+'Chosen'];
  const answered=chosen!==undefined&&chosen!==null;
  const letters=['a','b','c','d'];
  const colors=['bbq-opt-a','bbq-opt-b','bbq-opt-c','bbq-opt-d'];
  const emojis=['🔴','🔵','🟡','🟢'];
  const pct=Math.round((idx+1)/items.length*100);

  const tableHtml=item._tableData&&tblHasContent(item._tableData)?`
    <div style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px">${cfg.tableLabel}</div>
      ${renderDataTable(item._tableData,{small:true})}
    </div>`:'';

  const optsHtml=(item.options||[]).map((opt,oi)=>{
    if(!opt)return '';
    const letter=letters[oi];
    let cls=`bbq-opt ${colors[oi]}`;
    if(answered){
      if(letter===item.correct)cls+=' correct-ans';
      else if(letter===chosen&&chosen!==item.correct)cls+=' wrong-ans';
    }
    return `<button class="${cls}" onclick="answerSubjectCaseQuiz('${qmKey}','${letter}')" ${answered?'disabled':''}><span class="bbq-opt-letter">${emojis[oi]}</span><span>${opt}</span></button>`;
  }).filter(Boolean).join('');

  let afterHtml='';
  if(answered){
    const isCorrect=chosen===item.correct;
    const correctIdx=letters.indexOf(item.correct);
    afterHtml=`
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:22px;font-weight:800;color:${isCorrect?'var(--success)':'var(--danger)'};margin-bottom:6px">${isCorrect?'✓ Correct!':'✗ Incorrect'}</div>
        ${!isCorrect?`<div style="font-size:13px;color:var(--text2)">Correct: <strong style="color:var(--success)">${(item.options||[])[correctIdx]||''}</strong></div>`:''}
        ${item.explanation?`<div style="font-size:13px;color:var(--text2);margin-top:8px;background:var(--bg3);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 var(--r) var(--r) 0;text-align:left">${item.explanation}</div>`:''}
      </div>
      <div style="text-align:center;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        ${idx>0?`<button class="btn btn-ghost" onclick="subjectCaseQuizPrev('${qmKey}')" style="font-size:15px;padding:12px 24px">← Prev</button>`:''}
        ${idx<items.length-1
          ?`<button class="btn btn-primary" onclick="subjectCaseQuizNext('${qmKey}')" style="font-size:15px;padding:12px 32px">Next →</button>`
          :`<button class="btn btn-success" onclick="appState['${qmKey}Done']=true;renderTab()" style="font-size:15px;padding:12px 32px">See Results</button>`}
      </div>`;
  }

  el.innerHTML=`
    <div class="bbq-overlay">
      <div class="bbq-header">
        <button class="btn btn-ghost btn-sm" onclick="appState['${qmKey}']=false;appState['${qmKey}Done']=false;renderTab()">✕ Exit</button>
        <div class="progress-bar" style="flex:1;margin:0 8px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span class="question-num" style="white-space:nowrap">${idx+1} / ${items.length}</span>
      </div>
      <div class="bbq-body">
        <div class="bbq-context">
          <div class="bbq-context-title">${item._caseTitle||'Case'}</div>
          ${item._scenario?`<div class="bbq-context-scenario">${item._scenario}</div>`:''}
          ${tableHtml}
        </div>
        <div class="bbq-question">${escNL(item.question)}</div>
        <div class="bbq-options">${optsHtml}</div>
        ${afterHtml}
      </div>
    </div>
  `;
}

function answerSubjectCaseQuiz(qmKey,letter){
  if(!appState[qmKey+'Answers'])appState[qmKey+'Answers']={};
  const idx=appState[qmKey+'Idx']||0;
  if(appState[qmKey+'Answers'][idx]!==undefined)return;
  appState[qmKey+'Answered']=true;
  appState[qmKey+'Chosen']=letter;
  appState[qmKey+'Answers'][idx]=letter;
  const item=(appState[qmKey+'Items']||[])[idx];
  if(item&&letter===item.correct)appState[qmKey+'Score']=(appState[qmKey+'Score']||0)+1;
  renderTab();
}

function subjectCaseQuizNext(qmKey){
  appState[qmKey+'Idx']=(appState[qmKey+'Idx']||0)+1;
  const chosen=(appState[qmKey+'Answers']||{})[appState[qmKey+'Idx']];
  appState[qmKey+'Chosen']=chosen??null;
  appState[qmKey+'Answered']=chosen!==undefined;
  renderTab();
}
function subjectCaseQuizPrev(qmKey){
  appState[qmKey+'Idx']=Math.max(0,(appState[qmKey+'Idx']||0)-1);
  const chosen=(appState[qmKey+'Answers']||{})[appState[qmKey+'Idx']];
  appState[qmKey+'Chosen']=chosen??null;
  appState[qmKey+'Answered']=chosen!==undefined;
  renderTab();
}

function renderSubjectCaseQuizResults(el,cfg){
  const qmKey=cfg.quizModeKey;
  const total=(appState[qmKey+'Items']||[]).length;
  const answers=appState[qmKey+'Answers']||{};
  const score=(appState[qmKey+'Items']||[]).reduce((sum,item,i)=>sum+(answers[i]===item.correct?1:0),0);
  const pct=Math.round(score/total*100);
  const letters=['a','b','c','d'];
  const missed=[];
  (appState[qmKey+'Items']||[]).forEach((item,i)=>{
    if(answers[i]!==item.correct)missed.push({item,ans:answers[i]});
  });

  const exportMissed=()=>{
    if(!missed.length){alert('Nothing missed!');return;}
    try{
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF({unit:'mm',format:'a4'});
      const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight(),margin=18,cW=pageW-margin*2;
      let y=margin;
      const checkPage=(n=8)=>{if(y+n>pageH-margin){doc.addPage();y=margin;}};
      doc.setFillColor(210,210,210);doc.rect(margin,y,cW,10,'F');
      doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
      doc.text('Missed '+cfg.exportTitle+' Quiz Questions',(pageW/2),y+7,{align:'center'});y+=16;
      missed.forEach(({item,ans},i)=>{
        checkPage(32);
        const correctIdx=letters.indexOf(item.correct);
        const chosenIdx=ans?letters.indexOf(ans):-1;
        if(item._caseTitle){doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(100,100,140);doc.text(item._caseTitle,margin,y);y+=5;}
        doc.setFontSize(10.5);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
        doc.splitTextToSize('Q'+(i+1)+'. '+item.question,cW).forEach(l=>{checkPage();doc.text(l,margin,y);y+=5.5;});
        (item.options||[]).forEach((opt,oi)=>{
          if(!opt)return;
          const ltr=letters[oi];
          const isCorrect=ltr===item.correct,isGiven=ltr===ans;
          doc.setFontSize(9.5);doc.setFont('helvetica',isCorrect?'bold':'normal');
          doc.setTextColor(...(isCorrect?[20,120,60]:isGiven?[180,40,40]:[50,50,50]));
          checkPage();doc.text(ltr.toUpperCase()+'. '+opt+(isCorrect?' ✓':isGiven?' ←':''),margin+4,y);y+=5;
        });
        if(item.explanation){y+=1;doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(80,80,100);doc.splitTextToSize('Note: '+item.explanation,cW-4).forEach(l=>{checkPage();doc.text(l,margin+4,y);y+=4.5;});}
        y+=5;
      });
      const total2=doc.internal.getNumberOfPages();
      for(let p=1;p<=total2;p++){doc.setPage(p);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);doc.text('MLS BOC Prep — Missed Questions · Page '+p+' of '+total2,margin,pageH-8);doc.text(new Date().toLocaleDateString(),pageW-margin,pageH-8,{align:'right'});}
      doc.save('missed_'+cfg.subject+'_quiz.pdf');
    }catch(err){alert('PDF export failed: '+err.message);}
  };

  const retryWrong=()=>{
    if(!missed.length)return;
    appState[qmKey+'Items']=shuffle(missed.map(m=>m.item));
    appState[qmKey+'Idx']=0;appState[qmKey+'Chosen']=null;appState[qmKey+'Answered']=false;
    appState[qmKey+'Score']=0;appState[qmKey+'Done']=false;appState[qmKey+'Answers']={};
    renderTab();
  };

  el.innerHTML=`
    <div class="bbq-overlay">
      <div class="bbq-header">
        <button class="btn btn-ghost btn-sm" onclick="appState['${qmKey}']=false;appState['${qmKey}Done']=false;renderTab()">← Back to Cases</button>
        <div class="ml-auto" style="color:var(--text);font-size:13px;font-family:var(--mono)">Quiz Complete</div>
      </div>
      <div class="bbq-body">
        <div style="text-align:center;padding:24px 0 32px">
          <div style="font-size:48px;margin-bottom:8px">${pct>=80?'🏆':pct>=60?'✅':'📚'}</div>
          <div class="bbq-score-big">${pct}%</div>
          <div style="font-size:16px;color:var(--text2)">${score} of ${total} correct</div>
        </div>
        <div class="result-grid" style="margin-bottom:24px">
          <div class="stat-card"><div class="stat-num text-success">${score}</div><div class="stat-label">Correct</div></div>
          <div class="stat-card"><div class="stat-num text-danger">${total-score}</div><div class="stat-label">Missed</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${pct}%</div><div class="stat-label">Score</div></div>
        </div>
        <div class="flex gap-8 mb-20 flex-wrap">
          <button class="btn btn-primary" onclick="appState['${qmKey}Idx']=0;appState['${qmKey}Chosen']=null;appState['${qmKey}Answered']=false;appState['${qmKey}Score']=0;appState['${qmKey}Done']=false;appState['${qmKey}Answers']={};appState['${qmKey}Items']=shuffle(appState['${qmKey}Items']||[]);renderTab()">🔄 Retry All</button>
          ${missed.length?`<button class="btn btn-warn" onclick="(${retryWrong.toString()})()">⚡ Retry Wrong Only (${missed.length})</button>`:''}
          ${missed.length?`<button class="btn btn-ghost btn-sm" onclick="(${exportMissed.toString()})()">📥 Export Missed</button>`:''}
          <button class="btn btn-ghost" onclick="appState['${qmKey}']=false;appState['${qmKey}Done']=false;renderTab()">Back to Cases</button>
        </div>
        ${missed.length?`<div style="font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px">Review Missed</div>
          ${missed.map(({item,ans},i)=>{
            const correctIdx=letters.indexOf(item.correct);
            const chosenIdx=ans?letters.indexOf(ans):-1;
            return `<div style="background:var(--bg2);border:1px solid #f0647433;border-radius:var(--r);padding:14px 16px;margin-bottom:8px">
              <div style="font-size:11px;color:var(--text3);margin-bottom:4px">${item._caseTitle||''}</div>
              <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px">${escNL(item.question)}</div>
              <div style="font-size:12px;color:var(--danger)">✗ ${ans&&chosenIdx>=0?'Your answer: '+((item.options||[])[chosenIdx]||''):'(unanswered)'}</div>
              <div style="font-size:12px;color:var(--success);margin-top:2px">Correct: ${(item.options||[])[correctIdx]||''}</div>
              ${item.explanation?`<div style="font-size:12px;color:var(--text2);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">${item.explanation}</div>`:''}
            </div>`;
          }).join('')}`:`<div style="color:var(--success);font-weight:600;text-align:center;font-size:18px">Perfect score! 🎉</div>`}
      </div>
    </div>
  `;
}

function removeSCQuestion(i){

async function saveSubjectCase(){
  const subject=window._scSubject;
  const caseId=window._scCaseId;
  const cfg=getSubjectCaseConfig(subject);
  const title=document.getElementById('sc-title')?.value.trim();
  const scenario=document.getElementById('sc-scenario')?.value.trim();
  const isDraft=document.getElementById('sc-draft')?.value==='true';
  if(!title){alert('Title required.');return;}
  const tableData=tblReadData('sc');
  const table_data=tblHasContent(tableData)?tableData:null;
  const questions=[];
  for(let i=0;i<(window._scQCount||0);i++){
    const qEl=document.getElementById('sc-q-'+i);if(!qEl||!qEl.isConnected)continue;
    const question=document.getElementById('sc-qq-'+i)?.value.trim()||'';if(!question)continue;
    const options=['a','b','c','d'].map(l=>document.getElementById('sc-qo-'+i+'-'+l)?.value.trim()||'');
    const correct=document.getElementById('sc-qc-'+i)?.value||'a';
    const explanation=document.getElementById('sc-qe-'+i)?.value.trim()||'';
    questions.push({question,options,correct,explanation});
  }
  const payload={title,scenario:scenario||'',table_data,questions,is_draft:isDraft,images:[]};
  let error;
  if(caseId){({error}=await sb.from(cfg.dbTable).update(payload).eq('id',caseId));}
  else{({error}=await sb.from(cfg.dbTable).insert(payload));}
  if(error){alert('Save failed: '+error.message);return;}
  document.getElementById('condition-modal').classList.add('hidden');
  if(!appState[cfg.answerKey])appState[cfg.answerKey]={};
  renderTab();
}

function generateSubjectCasePDF(data,tableField,tableLabel,exportTitle){
  const selected=[];
  document.querySelectorAll('.sc-export-cb:checked').forEach(cb=>{
    const c=data.find(x=>x.id===cb.dataset.id);
    if(c)selected.push(c);
  });
  if(!selected.length){alert('Select at least one case.');return;}
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight(),margin=18,cW=pageW-margin*2;
    let y=margin;let first=true;
    const checkPage=(n=10)=>{if(y+n>pageH-margin){doc.addPage();y=margin;}};
    const writeText=(text,opts={})=>{
      const {size=11,bold=false,color=[30,30,30],indent=0}=opts;
      doc.setFontSize(size);doc.setFont('helvetica',bold?'bold':'normal');doc.setTextColor(...color);
      doc.splitTextToSize(String(text||''),cW-indent).forEach(l=>{checkPage(6);doc.text(l,margin+indent,y);y+=size*0.4+1.2;});
    };
    selected.forEach((c,ci)=>{
      if(!first){doc.addPage();y=margin;}first=false;
      doc.setFillColor(210,210,210);doc.rect(margin,y,cW,10,'F');
      doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
      doc.text(exportTitle+' — Case '+(ci+1)+': '+(c.title||'Untitled'),margin+3,y+7);y+=14;
      if(c.scenario){writeText('Patient Scenario',{size:10,bold:true,color:[40,40,40]});writeText(c.scenario,{size:10,indent:2});y+=3;}
      const tableD=c.table_data||migrateTableData(c);
      if(tableD&&tableD.headers&&tableD.headers.length){
        checkPage(20);writeText(tableLabel,{size:10,bold:true,color:[40,40,40]});
        const hdrs=tableD.headers;const rows=tableD.rows||[];const meta=tableD.meta||[];
        const colW=Math.min(cW/hdrs.length,44);const tableW=colW*hdrs.length;
        // header row
        doc.setFillColor(220,220,220);doc.rect(margin,y,tableW,8,'F');doc.setDrawColor(160,160,160);doc.setLineWidth(0.2);doc.rect(margin,y,tableW,8,'S');
        doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);
        hdrs.forEach((h,i)=>doc.text(String(h||'').substring(0,14),margin+i*colW+2,y+5.5));y+=8;
        // data rows
        rows.forEach((row,ri)=>{
          checkPage(9);
          doc.setFillColor(245,245,245);doc.rect(margin,y,tableW,9,'F');doc.rect(margin,y,tableW,9,'S');
          row.forEach((cell,ci)=>{
            const m=(meta[ri]||[])[ci]||{};
            const rgb=m.color?hexToRgb(m.color):[30,30,30];
            doc.setFontSize(10);doc.setFont('helvetica',m.bold?'bold':'normal');doc.setTextColor(...rgb);
            doc.text(String(cell||'').substring(0,12),margin+ci*colW+2,y+6.2);
          });y+=9;
        });y+=3;
      }
      const qs=c.questions||[];
      if(qs.length){
        y+=2;doc.setDrawColor(180,180,180);doc.setLineWidth(0.3);doc.line(margin,y,pageW-margin,y);y+=4;
        writeText('Questions',{size:10,bold:true,color:[40,40,40]});y+=1;
        const letters=['a','b','c','d'];
        qs.forEach((q,qi)=>{
          checkPage(28);writeText('Q'+(qi+1)+'. '+q.question,{size:10,bold:true,indent:2,color:[20,20,20]});
          (q.options||[]).forEach((opt,oi)=>{
            if(!opt)return;
            writeText(letters[oi].toUpperCase()+'. '+opt,{size:9.5,indent:6,color:[30,30,30]});
          });
          y+=4;
        });
      }
    });
    const tot=doc.internal.getNumberOfPages();
    for(let p=1;p<=tot;p++){doc.setPage(p);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);doc.text('MLS BOC Prep — '+exportTitle+' · Page '+p+' of '+tot,margin,pageH-8);doc.text(new Date().toLocaleDateString(),pageW-margin,pageH-8,{align:'right'});}
    doc.save(exportTitle.replace(/\s+/g,'_').toLowerCase()+'_cases.pdf');
    document.getElementById('condition-modal').classList.add('hidden');
  }catch(err){alert('PDF export failed: '+err.message);}
}

function renderProgressVisual(subj, rightPct, wrongPct, isDone100){
  const r=Math.max(0,Math.min(100,rightPct||0));
  const w=Math.max(0,Math.min(100-r,wrongPct||0));
  const confetti=isDone100?renderConfetti():'';

}

function renderConfetti(){
  const colors=['#f5a623','#e63946','#3ddc84','#2196f3','#9b59b6','#ffe44d'];
  const pieces=Array.from({length:28},(_,i)=>{
    const c=colors[i%colors.length];
    const x=Math.round(20+Math.random()*60);
    const delay=(Math.random()*0.6).toFixed(2);
    const dur=(0.9+Math.random()*0.8).toFixed(2);
    const rot=Math.round(Math.random()*360);
    return `<rect x="${x}%" y="0" width="${3+Math.round(Math.random()*5)}" height="${4+Math.round(Math.random()*5)}"
      fill="${c}" rx="1" opacity=".9"
      transform="rotate(${rot},${x*1.4},0)"
      style="animation:confetti-fall ${dur}s ease-in ${delay}s both"/>`;
  });
  return `<div style="position:relative;overflow:visible;height:0">
    <svg style="position:absolute;left:0;top:-10px;width:100%;height:90px;overflow:visible;pointer-events:none">
      ${pieces.join('')}
    </svg>
  </div>`;
}

function renderCaseCard(c,idx){
  const steps=parseSteps(c.steps);
  const reveal=caseAnswersAvailable();
  const fb=reveal?appState.caseSelections[c.id]?.feedback:null;
  const imgs=imageEntryList(c.images);
  return `
    <div class="case-card" id="ccard-${c.id}">
      <div class="flex-center gap-8 mb-8 flex-wrap">
        <span class="tag tag-info">Case ${idx+1}</span>
        <span style="font-size:14px;font-weight:600">${c.title}</span>
        ${c.is_draft?`<span class="draft-badge">Draft</span>`:''}
      </div>
      <div class="case-scenario">${escNL(c.scenario)}</div>
      ${c.case_data?`<div class="case-data">${c.case_data}</div>`:''}
      ${caseImageRowHTML(imgs)}
      ${steps.map((step,si)=>renderCaseStep(c.id,step,si,fb)).join('')}
      ${reveal&&!fb?`<button class="btn btn-primary btn-sm mt-8" onclick="submitGenericCase('${c.id}','${esc(c.answer)}')">Submit</button>`:''}
      ${reveal&&fb?`<div class="case-feedback ${fb.correct?'correct':'wrong'}">${fb.correct?'✓ Correct':'✗ Incorrect'} — ${fb.note||c.answer}</div>`:''}
      ${isAdmin?`<div class="flex gap-8 mt-8">
        ${c.is_draft?`<button class="btn btn-success btn-xs" onclick="publishCase('${c.id}')">Publish</button>`:''}
        <button class="btn btn-danger btn-xs" onclick="deleteCase('${c.id}')">Delete</button>
        <button class="btn btn-ghost btn-xs" onclick="openCaseImageEditor('${c.id}')">Edit Images</button>
      </div>`:''}
    </div>
  `;
}

function renderCaseStep(caseId,step,si,fb){
  const sel=appState.caseSelections[caseId]?.steps||{};
  const disabled=fb?'disabled':'';
  if(step.type==='select'){
    return `<div class="case-step">
      <div class="case-step-label">${step.label}</div>
      <div class="case-options">
        ${step.options.map(o=>`<button class="case-opt ${sel[step.key]===o?'selected':''}" onclick="selectCaseOpt('${caseId}','${step.key}','${esc(o)}','single')" ${disabled}>${o}</button>`).join('')}
      </div>
    </div>`;
  }
  if(step.type==='multi'){
    const msel=sel[step.key]||[];
    return `<div class="case-step">
      <div class="case-step-label">${step.label} (select all that apply)</div>
      <div class="case-options">
        ${step.options.map(o=>`<button class="case-opt ${msel.includes(o)?'selected':''}" onclick="selectCaseOpt('${caseId}','${step.key}','${esc(o)}','multi')" ${disabled}>${o}</button>`).join('')}
      </div>
    </div>`;
  }
  return '';
}

function selectCaseOpt(caseId,key,val,type){
  if(!appState.caseSelections[caseId])appState.caseSelections[caseId]={steps:{}};
  if(!appState.caseSelections[caseId].steps)appState.caseSelections[caseId].steps={};
  if(type==='single'){
    appState.caseSelections[caseId].steps[key]=val;
  }else{
    const arr=appState.caseSelections[caseId].steps[key]||[];
    appState.caseSelections[caseId].steps[key]=arr.includes(val)?arr.filter(x=>x!==val):[...arr,val];
  }
  renderTab();
}

function submitGenericCase(caseId,answer){
  if(!caseAnswersAvailable()){alert('Answers are available in Admin mode only for case activities.');return;}
  if(!appState.caseSelections[caseId])appState.caseSelections[caseId]={steps:{}};
  const allVals=Object.values(appState.caseSelections[caseId].steps||{}).flat().join(' ').toLowerCase();
  const correct=answer&&allVals.includes(answer.toLowerCase().split(' ')[0]);
  appState.caseSelections[caseId].feedback={correct,note:'Expected: '+answer};
  renderTab();
}

function renderMicroCase(c,idx){

function renderMicroCaseQuestion(caseId,q,qi,selState){
  const checked=selState[qi]?.checked===true;
  const chosen=selState[qi]?.choice;
  const reveal=caseAnswersAvailable();
  const letters=['a','b','c','d'];
  const correctIdx=letters.indexOf(q.correct);
  return `
    <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:16px 18px;box-shadow:0 2px 8px #0002">
      <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;font-family:var(--mono)">Q${qi+1}</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.65">${escNL(q.question)}</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${(q.options||[]).map((opt,oi)=>{
          if(!opt)return '';
          const letter=letters[oi];
          let bg='var(--bg4)';let bd='var(--border)';let color='var(--text)';let weight='400';
          if(chosen===letter&&!checked){bg='var(--bg4)';bd='var(--accent)';color='var(--accent)';weight='500';}
          if(checked&&reveal){
            if(letter===q.correct){bg='var(--bg4)';bd='var(--success)';color='var(--success)';weight='600';}
            else if(letter===chosen&&chosen!==q.correct){bg='var(--bg4)';bd='var(--danger)';color='var(--danger)';weight='500';}
          }
          return `<button onclick="selectMCQ('${caseId}',${qi},'${letter}')" ${checked?'disabled':''} style="display:flex;align-items:flex-start;gap:10px;background:${bg};border:1px solid ${bd};border-radius:var(--r);padding:9px 13px;cursor:${checked?'default':'pointer'};text-align:left;width:100%;transition:all .12s">
            <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:${color};min-width:20px;margin-top:1px">${letter.toUpperCase()}.</span>
            <span style="font-size:13px;color:${color};font-weight:${weight};line-height:1.5">${opt}</span>
          </button>`;
        }).filter(Boolean).join('')}
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:32px">
        ${reveal&&!checked&&chosen?`<button class="btn btn-primary btn-sm" onclick="checkMCQ('${caseId}',${qi})">Check Answer</button>`:''}
        ${chosen?`<button class="btn btn-ghost btn-sm" onclick="resetMCQ('${caseId}',${qi})">Reset</button>`:''}
      </div>
      ${checked&&reveal?`
        <div class="case-feedback ${chosen===q.correct?'correct':'wrong'}" style="margin-top:8px;font-size:13px">
          ${chosen===q.correct?'✓ Correct!':`✗ Incorrect — Correct: ${(q.correct||'a').toUpperCase()}. ${(q.options||[])[correctIdx]||''}`}
        </div>
        ${q.explanation?`<div class="explanation" style="margin-top:8px;font-size:13px">${q.explanation}</div>`:''}`:''}
    </div>
  `;
}

function mcAllChecked(caseId,count){
  const s=(appState.microCaseAnswers||{})[caseId]||{};
  for(let i=0;i<count;i++){if(!s[i]?.checked)return false;}
  return count>0;
}
function mcAnyAnswered(caseId){
  return Object.values((appState.microCaseAnswers||{})[caseId]||{}).some(v=>v?.choice);
}
function selectMCQ(caseId,qi,letter){
  if(!appState.microCaseAnswers)appState.microCaseAnswers={};
  if(!appState.microCaseAnswers[caseId])appState.microCaseAnswers[caseId]={};
  if(appState.microCaseAnswers[caseId][qi]?.checked)return;
  appState.microCaseAnswers[caseId][qi]={choice:letter,checked:false};
  renderTab();
}
function checkAllMC(caseId,count){
  if(!caseAnswersAvailable()){alert('Answers are available in Admin mode only for case activities.');return;}
  if(!appState.microCaseAnswers)appState.microCaseAnswers={};
  if(!appState.microCaseAnswers[caseId])appState.microCaseAnswers[caseId]={};
  for(let i=0;i<count;i++){
    if(appState.microCaseAnswers[caseId][i]?.choice&&!appState.microCaseAnswers[caseId][i]?.checked)
      appState.microCaseAnswers[caseId][i].checked=true;
  }
  renderTab();
}
function resetAllMC(caseId){if(!appState.microCaseAnswers)appState.microCaseAnswers={};appState.microCaseAnswers[caseId]={};renderTab();}
function checkMCQ(caseId,qi){
  if(!caseAnswersAvailable()){alert('Answers are available in Admin mode only for case activities.');return;}
  if(appState.microCaseAnswers?.[caseId]?.[qi])appState.microCaseAnswers[caseId][qi].checked=true;renderTab();
}
function resetMCQ(caseId,qi){if(appState.microCaseAnswers?.[caseId])delete appState.microCaseAnswers[caseId][qi];renderTab();}
function toggleMicroCaseCollapse(id){
  if(!appState.microCaseCollapsed)appState.microCaseCollapsed={};
  appState.microCaseCollapsed[id]=appState.microCaseCollapsed[id]===false?true:false;
  renderTab();
}

}
function addMCTableCol(){

function mcQuestionEditor(i,q){

function addMCQuestion(){

  const container=document.getElementById('mc-questions-list');if(!container)return;

function removeMCQuestion(i){

async function saveMicroCase(caseId){
  const title=document.getElementById('mc-title')?.value.trim();
  const scenario=document.getElementById('mc-scenario')?.value.trim();
  const group_label=document.getElementById('mc-group')?.value||'';
  const isDraft=document.getElementById('mc-draft')?.value==='true';
  if(!title){alert('Title required.');return;}
  const rawMC=tblReadData('mc');
  const table_data=tblHasContent(rawMC)?rawMC:null;
  const questions=[];
  for(let i=0;i<(window._mcQCount||0);i++){
    const qEl=document.getElementById('mc-q-'+i);if(!qEl||!qEl.isConnected)continue;
    const question=document.getElementById('mc-qq-'+i)?.value.trim()||'';if(!question)continue;
    const options=['a','b','c','d'].map(l=>document.getElementById('mc-qo-'+i+'-'+l)?.value.trim()||'');
    const correct=document.getElementById('mc-qc-'+i)?.value||'a';
    const explanation=document.getElementById('mc-qe-'+i)?.value.trim()||'';
    questions.push({question,options,correct,explanation});
  }
  const payload={title,scenario:scenario||'',table_data,questions,group_label,is_draft:isDraft,images:[]};
  let error;
  if(caseId){({error}=await sb.from('mlsboc_micro_cases').update(payload).eq('id',caseId));}
  else{({error}=await sb.from('mlsboc_micro_cases').insert(payload));}
  if(error){alert('Save failed: '+error.message);return;}
  document.getElementById('condition-modal').classList.add('hidden');
  if(!appState.microCaseAnswers)appState.microCaseAnswers={};
  renderTab();
}
async function deleteMicroCase(id){
  if(!confirm('Delete this case?'))return;
  await sb.from('mlsboc_micro_cases').delete().eq('id',id);
  renderTab();
}
