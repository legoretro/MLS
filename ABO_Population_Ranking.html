<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ABO Phenotype Frequency – Rank It!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

  * { box-sizing: border-box; }

  :root{
    --bg: #ece9e2;
    --panel: #f7f3eb;
    --header: #e8920a;
    --cell: #fde8c8;
    --cell2: #fbd8a8;
    --border: #f7ddb5;
    --text: #111;
    --muted: #666;
    --drop: #fffaf0;
    --drop-border: #e8920a;
    --good: #2e8b57;
    --bad: #c0392b;
    --top-dark: #2c2c2c;
    --top-yellow: #f5c842;
    --shadow: 0 2px 12px rgba(0,0,0,.10);
  }

  body{
    margin:0;
    font-family:'Nunito', sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:12px;
  }

  .wrap{ max-width:1000px; margin:0 auto; }

  header{
    background:var(--top-dark);
    color:#fff;
    padding:10px 18px;
    display:flex;
    align-items:center;
    gap:12px;
    border-radius:12px;
    margin-bottom:10px;
    box-shadow:var(--shadow);
  }

  header h1{ margin:0; font-size:1.35rem; font-weight:900; color:var(--top-yellow); }
  header p{ margin:2px 0 0; font-size:.72rem; color:#d4d4d4; line-height:1.35; }

  .badge{
    margin-left:auto;
    background:var(--bad);
    color:#fff;
    font-weight:800;
    font-size:.68rem;
    padding:4px 10px;
    border-radius:20px;
    white-space:nowrap;
  }

  .controls{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:10px;
    background:var(--panel);
    border-radius:12px;
    padding:10px 12px;
    box-shadow:var(--shadow);
    align-items:center;
  }

  button{
    border:none;
    border-radius:8px;
    padding:8px 12px;
    font-family:'Nunito', sans-serif;
    font-weight:800;
    cursor:pointer;
    font-size:.82rem;
  }

  .checkBtn{ background:#1f1f1f; color:#fff; }
  .resetBtn{ background:#d9d2c6; color:#333; }

  .score{
    font-weight:800;
    display:flex;
    align-items:center;
    padding:6px 10px;
    border-radius:8px;
    min-height:32px;
    font-size:.82rem;
  }
  .score.good{ background:#edf8f1; color:var(--good); }
  .score.bad{  background:#fff0ee; color:var(--bad); }

  /* layout: bank left, columns right */
  .layout{
    display:grid;
    grid-template-columns: 160px 1fr;
    gap:10px;
    align-items:start;
  }

  .bank{
    background:var(--panel);
    border-radius:12px;
    padding:10px;
    box-shadow:var(--shadow);
    position:sticky;
    top:10px;
  }

  .bank h2{
    margin:0 0 8px;
    font-size:.78rem;
    text-transform:uppercase;
    letter-spacing:1px;
  }

  .hint{
    font-size:.68rem;
    color:var(--muted);
    line-height:1.3;
    margin-bottom:8px;
  }

  .chip{
    background:#fff;
    border:2px solid #ddd4c4;
    border-radius:8px;
    padding:9px;
    margin-bottom:6px;
    cursor:grab;
    user-select:none;
    transition:.15s ease;
    text-align:center;
    font-weight:900;
    font-size:.88rem;
  }
  .chip:last-child{ margin-bottom:0; }
  .chip.dragging{ opacity:.45; }
  .chip.used{ opacity:.22; pointer-events:none; }

  /* 4 phenotype columns */
  .columns{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
  }

  .col-section{
    box-shadow:var(--shadow);
    border-radius:12px;
    overflow:hidden;
    background:transparent;
  }

  .col-title{
    background:var(--header);
    color:#fff;
    text-align:center;
    font-size:1.25rem;
    font-weight:900;
    padding:12px 6px;
    letter-spacing:.5px;
  }

  table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
  }

  th, td{
    border:2px solid var(--border);
    padding:6px 4px;
    text-align:center;
  }

  th{
    background:var(--header);
    color:#fff;
    font-size:.75rem;
    font-weight:900;
  }

  td{ background:var(--cell); }
  tbody tr:nth-child(even) td{ background:var(--cell2); }

  .dropzone{
    min-height:44px;
    background:var(--drop);
    border:2px dashed #cfc3a5;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.15s ease;
    padding:4px 5px;
    text-align:center;
    line-height:1.2;
    font-weight:900;
    font-size:.82rem;
  }

  .dropzone.drag-over{
    border-color:var(--drop-border);
    background:#fff4d8;
    transform:scale(1.02);
  }

  .dropzone.filled{
    border-style:solid;
    background:#fff;
    cursor:pointer;
    color:#111;
  }

  .dropzone.correct{
    background:#edf8f1;
    border-color:var(--good);
    color:var(--good);
  }

  .dropzone.wrong{
    background:#fff0ee;
    border-color:var(--bad);
    color:var(--bad);
  }

  .placeholder{
    color:#9b8b66;
    font-weight:800;
    font-size:.62rem;
    text-align:center;
    width:100%;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>🩸 ABO Phenotype Frequency – Rank It!</h1>
      <p>Drag populations into each phenotype column, ranked most → least frequent.<br>Click a filled slot to return it to the bank.</p>
    </div>
    <span class="badge">RANK IT!</span>
  </header>

  <div class="controls">
    <button class="checkBtn" id="checkBtn">✔ Check Answers</button>
    <button class="resetBtn" id="resetBtn">↺ Reset</button>
    <div class="score" id="scoreMsg"></div>
  </div>

  <div class="layout">

    <!-- BANK -->
    <div class="bank">
      <h2>Populations</h2>
      <p class="hint">Each population can be used once per phenotype. Drag to rank top → bottom.</p>
      <div id="chipWrap"></div>
    </div>

    <!-- PHENOTYPE COLUMNS -->
    <div class="columns" id="colsWrap"></div>

  </div>
</div>

<script>
/* ── DATA ── */
// Frequencies:
//          White  Black  Hispanic  Asian
// O          45     50      56      40
// A          40     26      31      28
// B          11     20      10      25
// AB          4      4       3       7

const PHENOTYPES = ["O","A","B","AB"];
const POPULATIONS = ["White","Black","Hispanic","Asian"];

// Correct order per phenotype (most → least frequent)
const CORRECT = {
  O:  ["Hispanic","Black","White","Asian"],   // 56, 50, 45, 40
  A:  ["White","Hispanic","Asian","Black"],   // 40, 31, 28, 26
  B:  ["Asian","Black","White","Hispanic"],   // 25, 20, 11, 10
  AB: ["Asian","White","Black","Hispanic"],   // 7, 4, 4, 3
};

// AB: White & Black both = 4%, accept either order at ranks 1 & 2
const TIED = {
  AB: { ranks:[1,2], pops:["White","Black"] }
};

/* ── STATE ── */
const state = {};
let dragItem = null;
let dragFrom = null;

function slotKey(ph, rank){ return `${ph}__${rank}`; }
function getState(k){ return state[k] || null; }
function setState(k, v){ if(v == null) delete state[k]; else state[k] = v; }

function countUsesInPhenotype(ph, pop){
  let n = 0;
  for(let r = 0; r < 4; r++){
    const s = getState(slotKey(ph, r));
    if(s && s.pop === pop) n++;
  }
  return n;
}

function countTotalUses(pop){
  return Object.values(state).filter(v => v && v.pop === pop).length;
}

/* ── BUILD BANK ── */
function buildBank(){
  const wrap = document.getElementById("chipWrap");
  wrap.innerHTML = "";
  POPULATIONS.forEach(pop => {
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.id = `chip-${pop}`;
    chip.draggable = true;
    chip.textContent = pop;

    chip.addEventListener("dragstart", e => {
      if(countTotalUses(pop) >= 4){ e.preventDefault(); return; }
      dragItem = { pop };
      dragFrom = null;
      chip.classList.add("dragging");
    });
    chip.addEventListener("dragend", () => chip.classList.remove("dragging"));
    wrap.appendChild(chip);
  });
}

function renderBankUsage(){
  POPULATIONS.forEach(pop => {
    const chip = document.getElementById(`chip-${pop}`);
    if(!chip) return;
    chip.classList.toggle("used", countTotalUses(pop) >= 4);
  });
}

/* ── BUILD COLUMNS ── */
function buildColumns(){
  const wrap = document.getElementById("colsWrap");
  wrap.innerHTML = "";

  PHENOTYPES.forEach(ph => {
    const section = document.createElement("div");
    section.className = "col-section";

    const title = document.createElement("div");
    title.className = "col-title";
    title.textContent = ph;
    section.appendChild(title);

    const tbl = document.createElement("table");
    const tbody = document.createElement("tbody");

    for(let r = 0; r < 4; r++){
      const tr = document.createElement("tr");
      const td = document.createElement("td");
      td.appendChild(makeDropzone(ph, r));
      tr.appendChild(td);
      tbody.appendChild(tr);
    }

    tbl.appendChild(tbody);
    section.appendChild(tbl);
    wrap.appendChild(section);
  });
}

function makeDropzone(ph, rank){
  const key = slotKey(ph, rank);
  const dz = document.createElement("div");
  dz.className = "dropzone";
  dz.id = `slot-${key}`;
  dz.draggable = true;
  renderSlotContent(dz, null);

  dz.addEventListener("dragover", e => {
    if(dragItem){ e.preventDefault(); dz.classList.add("drag-over"); }
  });
  dz.addEventListener("dragleave", () => dz.classList.remove("drag-over"));

  dz.addEventListener("drop", e => {
    e.preventDefault();
    dz.classList.remove("drag-over");
    if(!dragItem) return;
    const { pop } = dragItem;
    const existing = getState(key);
    const movingSame = dragFrom && getState(dragFrom) && getState(dragFrom).pop === pop;

    if(countUsesInPhenotype(ph, pop) > 0 && !movingSame){
      dragItem = null; dragFrom = null; return;
    }

    if(dragFrom && dragFrom !== key){
      if(existing){ setState(dragFrom, existing); renderSlot(dragFrom); }
      else { setState(dragFrom, null); renderSlot(dragFrom); }
    }

    setState(key, { pop });
    renderSlot(key);
    dragItem = null; dragFrom = null;
    clearMarks();
    renderBankUsage();
  });

  dz.addEventListener("click", () => {
    if(!getState(key)) return;
    setState(key, null);
    renderSlot(key);
    clearMarks();
    renderBankUsage();
  });

  dz.addEventListener("dragstart", e => {
    const cur = getState(key);
    if(!cur){ e.preventDefault(); return; }
    dragItem = { ...cur };
    dragFrom = key;
  });

  return dz;
}

function renderSlotContent(el, val){
  if(!val){
    el.innerHTML = `<div class="placeholder">— drop here —</div>`;
    el.classList.remove("filled");
  } else {
    el.textContent = val.pop;
    el.classList.add("filled");
  }
}

function renderSlot(key){
  const el = document.getElementById(`slot-${key}`);
  if(!el) return;
  el.classList.remove("correct","wrong");
  renderSlotContent(el, getState(key));
}

/* ── CHECK / RESET ── */
function clearMarks(){
  document.querySelectorAll(".dropzone").forEach(z => z.classList.remove("correct","wrong"));
  const msg = document.getElementById("scoreMsg");
  msg.textContent = ""; msg.className = "score";
}

function isCorrect(ph, rank, pop){
  const tied = TIED[ph];
  if(tied && tied.ranks.includes(rank)) return tied.pops.includes(pop);
  return CORRECT[ph][rank] === pop;
}

function checkAnswers(){
  let correct = 0, total = 0;
  PHENOTYPES.forEach(ph => {
    for(let r = 0; r < 4; r++){
      total++;
      const key = slotKey(ph, r);
      const el = document.getElementById(`slot-${key}`);
      const cur = getState(key);
      el.classList.remove("correct","wrong");
      if(cur && isCorrect(ph, r, cur.pop)){
        el.classList.add("correct"); correct++;
      } else {
        el.classList.add("wrong");
      }
    }
  });
  const msg = document.getElementById("scoreMsg");
  msg.textContent = `${correct}/${total} correct`;
  msg.className = `score ${correct === total ? "good" : "bad"}`;
}

function reset(){
  Object.keys(state).forEach(k => delete state[k]);
  PHENOTYPES.forEach(ph => {
    for(let r = 0; r < 4; r++) renderSlot(slotKey(ph, r));
  });
  clearMarks();
  renderBankUsage();
}

/* ── INIT ── */
document.getElementById("checkBtn").addEventListener("click", checkAnswers);
document.getElementById("resetBtn").addEventListener("click", reset);

buildBank();
buildColumns();
reset();
</script>
</body>
</html>
