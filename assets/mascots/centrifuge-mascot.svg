<!--
  MLS homepage centrifuge mascot animation.
  Source/license: self-made SVG created for this MLS Study Hub. No external images, paid assets,
  copyrighted characters, stock art, watermarks, or third-party mascot assets are used.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-labelledby="title desc">
  <title id="title">Animated retro centrifuge mascot</title>
  <desc id="desc">A hand-drawn style cute centrifuge with a spinning rotor, blinking face, wobble motion, and sketchy retro accent lines.</desc>
  <defs>
    <style>
      :root{
        --paper:#fbf7eb;
        --ink:#25304a;
        --blue:#93b8cf;
        --blue2:#dcecf4;
        --cream:#fff9e8;
        --red:#d85a50;
        --gold:#e7b54a;
        --lav:#9d84c6;
        --green:#66a86e;
      }
      .ink{stroke:var(--ink);stroke-width:5.5;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:var(--ink);stroke-width:3.3;stroke-linecap:round;stroke-linejoin:round}
      .sketch{fill:none;stroke:var(--ink);stroke-width:2.2;stroke-linecap:round;opacity:.28}
      .mascot{transform-origin:180px 204px;transform-box:view-box;animation:retroWobble 2.6s steps(2,end) infinite}
      .rotor{transform-origin:180px 143px;transform-box:view-box;animation:spin 1.1s linear infinite}
      .lid{transform-origin:180px 88px;transform-box:view-box;animation:lidHop 2.6s steps(2,end) infinite}
      .eye{transform-origin:center;transform-box:fill-box;animation:blink 3.9s ease-in-out infinite}
      .left-arm{transform-origin:104px 204px;transform-box:view-box;animation:waveLeft 2.4s ease-in-out infinite}
      .right-arm{transform-origin:256px 204px;transform-box:view-box;animation:waveRight 2.4s ease-in-out infinite}
      .dash{animation:dashPop 1.8s steps(2,end) infinite}
      .dash.two{animation-delay:.35s}
      .dash.three{animation-delay:.72s}
      .lamp{animation:lampBlink 1.2s steps(2,end) infinite}
      .lamp.two{animation-delay:.25s}
      .lamp.three{animation-delay:.5s}
      @keyframes retroWobble{
        0%,100%{transform:translate(0,0) rotate(0)}
        25%{transform:translate(-2px,-1px) rotate(-1.4deg)}
        50%{transform:translate(2px,1px) rotate(1.1deg)}
        75%{transform:translate(-1px,1px) rotate(-.7deg)}
      }
      @keyframes lidHop{
        0%,100%{transform:translateY(0) rotate(0)}
        40%{transform:translateY(-4px) rotate(-.8deg)}
        65%{transform:translateY(1px) rotate(.6deg)}
      }
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes blink{
        0%,86%,100%{transform:scaleY(1)}
        90%,94%{transform:scaleY(.1)}
      }
      @keyframes waveLeft{
        0%,100%{transform:rotate(4deg)}
        45%{transform:rotate(-16deg)}
        62%{transform:rotate(12deg)}
      }
      @keyframes waveRight{
        0%,100%{transform:rotate(-4deg)}
        45%{transform:rotate(13deg)}
        62%{transform:rotate(-10deg)}
      }
      @keyframes dashPop{
        0%,100%{opacity:.22;transform:translateY(0)}
        50%{opacity:1;transform:translateY(-3px)}
      }
      @keyframes lampBlink{
        0%,100%{opacity:.35}
        50%{opacity:1}
      }
      @media (prefers-reduced-motion: reduce){
        .mascot,.rotor,.lid,.eye,.left-arm,.right-arm,.dash,.lamp{animation:none!important}
      }
    </style>
  </defs>

  <rect x="10" y="10" width="340" height="340" rx="22" fill="var(--paper)"/>
  <path d="M33 62c70-15 157-18 292 7M39 291c88 13 174 12 279-6" class="sketch"/>
  <path d="M41 82c30-7 50-7 74-1M258 72c26-6 48-4 66 3" class="sketch"/>
  <ellipse cx="181" cy="302" rx="101" ry="15" fill="#25304a" opacity=".13"/>

  <g class="dash">
    <path d="M64 128l-15-8M70 105l-9-15" class="thin" fill="none" opacity=".45"/>
  </g>
  <g class="dash two">
    <path d="M299 120l15-8M290 98l8-15" class="thin" fill="none" opacity=".45"/>
  </g>
  <g class="dash three">
    <path d="M77 252l-18 9M284 260l18 9" class="thin" fill="none" opacity=".35"/>
  </g>

  <g class="mascot">
    <g class="lid">
      <path d="M112 96c6-33 33-52 68-52 36 0 62 19 68 52" fill="var(--cream)" class="ink"/>
      <path d="M105 100c12-17 39-29 75-29s64 12 75 29v26H105z" fill="var(--blue2)" class="ink"/>
      <path d="M129 94c18-9 53-13 82-7" class="sketch"/>
      <path d="M133 126c27 6 65 6 94 0" class="thin" fill="none" opacity=".45"/>
    </g>

    <path d="M92 124h176c17 0 30 13 30 30v106c0 19-14 32-32 32H95c-18 0-32-13-32-32V154c0-17 12-30 29-30z" fill="var(--blue2)" class="ink"/>
    <path d="M94 138c37-11 127-12 172 0" class="sketch"/>
    <path d="M80 260c47 9 152 10 201 0" class="thin" fill="none" opacity=".3"/>

    <circle cx="180" cy="143" r="54" fill="#f9fdff" class="ink"/>
    <circle cx="180" cy="143" r="38" fill="#d7eef3" class="thin"/>
    <path d="M146 130c16-14 42-19 62-11" class="sketch"/>
    <g class="rotor">
      <circle cx="180" cy="143" r="9" fill="var(--ink)"/>
      <path d="M180 143l-6-33h12z" fill="var(--lav)" class="thin"/>
      <path d="M180 143l33 9-8 14z" fill="var(--gold)" class="thin"/>
      <path d="M180 143l-26 22-8-13z" fill="#ffffff" class="thin"/>
    </g>

    <g class="left-arm">
      <path d="M95 205c-20 15-36 12-45-3" fill="none" class="thin"/>
      <circle cx="50" cy="201" r="8" fill="var(--cream)" class="thin"/>
    </g>
    <g class="right-arm">
      <path d="M265 205c20 15 36 12 45-3" fill="none" class="thin"/>
      <circle cx="310" cy="201" r="8" fill="var(--cream)" class="thin"/>
    </g>

    <circle class="eye" cx="152" cy="220" r="7" fill="var(--ink)"/>
    <circle class="eye" cx="208" cy="220" r="7" fill="var(--ink)"/>
    <circle cx="149" cy="217" r="2.5" fill="#fff"/>
    <circle cx="205" cy="217" r="2.5" fill="#fff"/>
    <path d="M137 206c7-7 19-7 27 0M196 206c8-7 20-7 28 0" fill="none" class="thin" opacity=".72"/>
    <path d="M165 239c8 8 22 8 31 0" fill="none" class="ink"/>

    <rect x="231" y="202" width="38" height="52" rx="6" fill="var(--cream)" class="thin"/>
    <circle class="lamp" cx="250" cy="217" r="5" fill="var(--green)"/>
    <circle class="lamp two" cx="250" cy="232" r="5" fill="var(--gold)"/>
    <circle class="lamp three" cx="250" cy="247" r="5" fill="var(--red)"/>
    <path d="M240 207c8-2 16-2 23 1" class="sketch"/>

    <path d="M108 292l-16 18h54l9-18M252 292l16 18h-54l-9-18" fill="#bacbd6" class="ink"/>
    <rect x="126" y="266" width="108" height="18" rx="6" fill="var(--cream)" class="thin"/>
    <path d="M144 274c18 4 54 4 72 0" class="sketch"/>
  </g>
</svg>
