<!--
  MLS homepage centrifuge mascot animation.
  Source/license: self-made SVG created for this MLS Study Hub. No external images, paid assets,
  copyrighted characters, stock art, watermarks, or third-party mascot assets are used.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-labelledby="title desc">
  <title id="title">Animated retro centrifuge mascot</title>
  <desc id="desc">A cute hand-drawn bench centrifuge with a stationary outside body and a spinning rotor inside the lid window.</desc>
  <defs>
    <style>
      :root{
        --paper:#fbf7eb;
        --ink:#25304a;
        --body:#dcecf4;
        --body2:#b8d0df;
        --cream:#fff9e8;
        --glass:#f8fdff;
        --glass2:#cfeaf2;
        --red:#d85a50;
        --gold:#e7b54a;
        --lav:#9d84c6;
        --green:#66a86e;
      }
      .ink{stroke:var(--ink);stroke-width:5.5;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:var(--ink);stroke-width:3.3;stroke-linecap:round;stroke-linejoin:round}
      .sketch{fill:none;stroke:var(--ink);stroke-width:2.2;stroke-linecap:round;opacity:.28}
      .rotor{transform-origin:180px 128px;transform-box:view-box;animation:spin 1.05s linear infinite}
      .eye{transform-origin:center;transform-box:fill-box;animation:blink 4s ease-in-out infinite}
      .dash{animation:dashPop 1.7s steps(2,end) infinite}
      .dash.two{animation-delay:.35s}
      .dash.three{animation-delay:.75s}
      .lamp{animation:lampBlink 1.2s steps(2,end) infinite}
      .lamp.two{animation-delay:.25s}
      .lamp.three{animation-delay:.5s}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes blink{
        0%,86%,100%{transform:scaleY(1)}
        90%,94%{transform:scaleY(.1)}
      }
      @keyframes dashPop{
        0%,100%{opacity:.18;transform:translateY(0)}
        50%{opacity:1;transform:translateY(-3px)}
      }
      @keyframes lampBlink{
        0%,100%{opacity:.35}
        50%{opacity:1}
      }
      @media (prefers-reduced-motion: reduce){
        .rotor,.eye,.dash,.lamp{animation:none!important}
      }
    </style>
  </defs>

  <rect x="10" y="10" width="340" height="340" rx="18" fill="var(--paper)"/>
  <path d="M33 62c70-15 157-18 292 7M39 293c88 13 174 12 279-6" class="sketch"/>
  <path d="M45 85c27-6 49-6 72-1M255 80c30-7 52-5 69 3" class="sketch"/>
  <ellipse cx="180" cy="307" rx="106" ry="15" fill="#25304a" opacity=".13"/>

  <g class="dash">
    <path d="M70 132l-17-8M76 107l-10-16" class="thin" fill="none" opacity=".44"/>
  </g>
  <g class="dash two">
    <path d="M288 132l17-8M282 107l10-16" class="thin" fill="none" opacity=".44"/>
  </g>
  <g class="dash three">
    <path d="M124 53c30-11 79-12 111 0" class="thin" fill="none" opacity=".22"/>
  </g>

  <!-- Stationary centrifuge body; only the rotor group animates. -->
  <g>
    <path d="M111 111c8-34 34-52 69-52s61 18 69 52" fill="none" class="ink"/>
    <path d="M93 128c9-26 42-44 87-44s78 18 87 44l-10 22H103z" fill="var(--cream)" class="ink"/>
    <path d="M124 106c21-10 58-13 88-5" class="sketch"/>

    <ellipse cx="180" cy="128" rx="78" ry="46" fill="var(--glass)" class="ink"/>
    <ellipse cx="180" cy="128" rx="57" ry="31" fill="var(--glass2)" class="thin"/>
    <path d="M135 117c20-14 54-17 82-8" class="sketch"/>
    <g class="rotor">
      <circle cx="180" cy="128" r="8" fill="var(--ink)"/>
      <rect x="172" y="87" width="16" height="29" rx="5" fill="var(--lav)" class="thin"/>
      <rect x="205" y="134" width="29" height="16" rx="5" fill="var(--gold)" class="thin" transform="rotate(20 219.5 142)"/>
      <rect x="126" y="134" width="29" height="16" rx="5" fill="#fff" class="thin" transform="rotate(-20 140.5 142)"/>
    </g>

    <path d="M93 139h174c15 0 28 11 31 26l17 92c5 27-11 48-38 48H83c-27 0-43-21-38-48l17-92c3-15 16-26 31-26z" fill="var(--body)" class="ink"/>
    <path d="M69 166c39 10 185 10 224 0" class="sketch"/>
    <path d="M66 262c45 11 184 12 229 0" class="thin" fill="none" opacity=".28"/>
    <path d="M60 278h240" class="sketch"/>

    <rect x="216" y="195" width="48" height="58" rx="7" fill="var(--cream)" class="thin"/>
    <circle class="lamp" cx="240" cy="212" r="5" fill="var(--green)"/>
    <circle class="lamp two" cx="240" cy="229" r="5" fill="var(--gold)"/>
    <circle class="lamp three" cx="240" cy="246" r="5" fill="var(--red)"/>
    <path d="M229 201c9-2 17-2 26 1" class="sketch"/>

    <circle class="eye" cx="143" cy="224" r="6.5" fill="var(--ink)"/>
    <circle class="eye" cx="190" cy="224" r="6.5" fill="var(--ink)"/>
    <circle cx="140" cy="221" r="2.2" fill="#fff"/>
    <circle cx="187" cy="221" r="2.2" fill="#fff"/>
    <path d="M130 210c7-6 18-6 25 0M177 210c7-6 18-6 25 0" fill="none" class="thin" opacity=".68"/>
    <path d="M150 241c8 7 22 7 30 0" fill="none" class="thin"/>

    <path d="M106 305l-13 17h52l8-17M254 305l13 17h-52l-8-17" fill="var(--body2)" class="ink"/>
    <rect x="124" y="278" width="112" height="18" rx="6" fill="var(--cream)" class="thin"/>
    <path d="M144 286c18 4 54 4 72 0" class="sketch"/>
  </g>
</svg>
