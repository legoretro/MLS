<!--
  MLS homepage centrifuge mascot animation.
  Source/license: self-made SVG created for this MLS Study Hub. No external images, paid assets,
  copyrighted characters, stock art, watermarks, or third-party mascot assets are used.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-labelledby="title desc">
  <title id="title">Animated centrifuge mascot</title>
  <desc id="desc">A cute cartoon centrifuge with a spinning rotor, blinking face, wobble motion, and status lights.</desc>
  <defs>
    <linearGradient id="sceneBg" x1="38" y1="22" x2="326" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f9fcff"/>
      <stop offset=".58" stop-color="#edf4ff"/>
      <stop offset="1" stop-color="#e4eaf8"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="104" y1="86" x2="260" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset=".48" stop-color="#dfeafa"/>
      <stop offset="1" stop-color="#b9cae5"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="107" y1="60" x2="252" y2="142" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cbdaf1"/>
    </linearGradient>
    <linearGradient id="windowGrad" x1="133" y1="98" x2="226" y2="202" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f9fdff"/>
      <stop offset=".62" stop-color="#d5f1ff"/>
      <stop offset="1" stop-color="#9dd3ef"/>
    </linearGradient>
    <linearGradient id="tubeLav" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#efe8ff"/>
      <stop offset="1" stop-color="#9f7ae6"/>
    </linearGradient>
    <linearGradient id="tubeGold" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#fff5c9"/>
      <stop offset="1" stop-color="#e1a72f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="9" flood-color="#21365f" flood-opacity=".18"/>
    </filter>
    <style>
      :root{
        --ink:#25304a;
        --line:#25304a;
        --blue:#70bde8;
        --deep:#52698d;
        --panel:#edf4ff;
        --lav:#936bdc;
        --gold:#efbb43;
        --red:#d6505d;
        --green:#5ebf7a;
      }
      .line{stroke:var(--line);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:var(--line);stroke-width:3.3;stroke-linecap:round;stroke-linejoin:round}
      .face{fill:var(--ink)}
      .machine{transform-origin:180px 205px;transform-box:view-box;animation:machineWobble 3.7s ease-in-out infinite}
      .rotor{transform-origin:180px 152px;transform-box:view-box;animation:rotorSpin 1.25s linear infinite}
      .lid{transform-origin:180px 94px;transform-box:view-box;animation:lidBob 3.7s ease-in-out infinite}
      .blink{transform-origin:center;transform-box:fill-box;animation:blink 4.5s ease-in-out infinite}
      .mouth{animation:smilePulse 4.5s ease-in-out infinite}
      .status{animation:statusBlink 1.6s ease-in-out infinite}
      .status.two{animation-delay:.5s}
      .status.three{animation-delay:1s}
      .highlight{animation:shine 4.8s ease-in-out infinite}
      .arm-left{transform-origin:104px 206px;transform-box:view-box;animation:leftWave 4.2s ease-in-out infinite}
      .arm-right{transform-origin:256px 206px;transform-box:view-box;animation:rightWave 4.2s ease-in-out infinite}
      .bubble{animation:float 5s ease-in-out infinite}
      .bubble.two{animation-delay:.8s}
      .bubble.three{animation-delay:1.6s}
      @keyframes machineWobble{
        0%,100%{transform:translateY(0) rotate(0)}
        20%{transform:translateY(-2px) rotate(-1.1deg)}
        38%{transform:translateY(1px) rotate(1deg)}
        58%{transform:translateY(-1px) rotate(-.7deg)}
        76%{transform:translateY(0) rotate(.5deg)}
      }
      @keyframes lidBob{
        0%,100%{transform:translateY(0)}
        38%{transform:translateY(-3px)}
        64%{transform:translateY(1px)}
      }
      @keyframes rotorSpin{to{transform:rotate(360deg)}}
      @keyframes blink{
        0%,88%,100%{transform:scaleY(1)}
        91%,94%{transform:scaleY(.08)}
      }
      @keyframes smilePulse{
        0%,100%{transform:translateY(0)}
        48%{transform:translateY(1px)}
      }
      @keyframes statusBlink{
        0%,100%{opacity:.45}
        48%{opacity:1}
      }
      @keyframes shine{
        0%,100%{opacity:.38;transform:translateX(0)}
        50%{opacity:.9;transform:translateX(5px)}
      }
      @keyframes leftWave{
        0%,100%{transform:rotate(0)}
        30%,46%{transform:rotate(-11deg)}
        38%,56%{transform:rotate(9deg)}
      }
      @keyframes rightWave{
        0%,100%{transform:rotate(0)}
        30%,46%{transform:rotate(10deg)}
        38%,56%{transform:rotate(-8deg)}
      }
      @keyframes float{
        0%,100%{transform:translateY(0);opacity:.52}
        50%{transform:translateY(-9px);opacity:1}
      }
      @media (prefers-reduced-motion: reduce){
        .machine,.rotor,.lid,.blink,.mouth,.status,.highlight,.arm-left,.arm-right,.bubble{animation:none!important}
      }
    </style>
  </defs>

  <rect width="360" height="360" rx="42" fill="url(#sceneBg)"/>
  <ellipse cx="180" cy="310" rx="102" ry="17" fill="#415a86" opacity=".13"/>
  <path d="M46 72h268M47 294h266" stroke="#d8e2f3" stroke-width="3" stroke-linecap="round"/>
  <circle class="bubble" cx="54" cy="60" r="5" fill="#78c6ea"/>
  <circle class="bubble two" cx="305" cy="82" r="7" fill="#c9bcff"/>
  <circle class="bubble three" cx="300" cy="278" r="5" fill="#81cfba"/>

  <g class="machine" filter="url(#shadow)">
    <g class="lid">
      <path d="M113 91c5-31 31-51 67-51s62 20 67 51" fill="none" class="line"/>
      <path d="M105 92c6-25 34-42 75-42s69 17 75 42v32H105z" fill="url(#lidGrad)" class="line"/>
      <path class="highlight" d="M130 85c16-14 43-20 75-14" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity=".72"/>
      <path d="M136 124h88" stroke="#93a9c9" stroke-width="5" stroke-linecap="round"/>
    </g>

    <path d="M100 122h160c18 0 32 14 32 32v113c0 18-14 32-32 32H100c-18 0-32-14-32-32V154c0-18 14-32 32-32z" fill="url(#bodyGrad)" class="line"/>
    <path d="M82 254h196" stroke="#90a5c4" stroke-width="4" stroke-linecap="round" opacity=".55"/>
    <path d="M106 142c10-7 32-12 74-12s64 5 74 12" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity=".7"/>

    <g>
      <circle cx="180" cy="156" r="61" fill="url(#windowGrad)" class="line"/>
      <circle cx="180" cy="156" r="45" fill="#eefaff" stroke="#5f789f" stroke-width="4"/>
      <g class="rotor">
        <circle cx="180" cy="156" r="9" fill="#53698f" stroke="#25304a" stroke-width="4"/>
        <path d="M180 156l-8-34h16z" fill="url(#tubeLav)" class="thin"/>
        <path d="M180 156l36 9-8 14z" fill="url(#tubeGold)" class="thin"/>
        <path d="M180 156l-28 24-8-14z" fill="#d9f0ff" class="thin"/>
      </g>
      <path class="highlight" d="M144 132c12-13 31-19 52-16" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity=".72"/>
    </g>

    <g>
      <circle class="blink face" cx="151" cy="230" r="7"/>
      <circle class="blink face" cx="209" cy="230" r="7"/>
      <circle cx="148" cy="227" r="2.5" fill="#fff"/>
      <circle cx="206" cy="227" r="2.5" fill="#fff"/>
      <path class="mouth" d="M165 247c8 8 22 8 30 0" fill="none" stroke="#25304a" stroke-width="5" stroke-linecap="round"/>
      <path d="M137 214c9-8 21-8 29 0M194 214c9-8 21-8 29 0" fill="none" stroke="#53698f" stroke-width="4" stroke-linecap="round"/>
    </g>

    <g>
      <rect x="232" y="210" width="34" height="50" rx="12" fill="#f7fbff" stroke="#25304a" stroke-width="4"/>
      <circle class="status" cx="249" cy="224" r="5" fill="#5ebf7a"/>
      <circle class="status two" cx="249" cy="239" r="5" fill="#efbb43"/>
      <circle class="status three" cx="249" cy="254" r="5" fill="#d6505d"/>
    </g>

    <path class="arm-left thin" d="M100 209c-19 12-35 8-43-7" fill="none"/>
    <path class="arm-right thin" d="M260 209c19 12 35 8 43-7" fill="none"/>
    <circle cx="56" cy="202" r="8" fill="#dfeafa" class="thin"/>
    <circle cx="304" cy="202" r="8" fill="#dfeafa" class="thin"/>

    <path d="M102 299l-16 20h55l10-20M258 299l16 20h-55l-10-20" fill="#b9cae5" class="line"/>
    <rect x="123" y="275" width="114" height="18" rx="9" fill="#d7e3f5" stroke="#25304a" stroke-width="4"/>
    <text x="180" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#53698f">BALANCED</text>
  </g>
</svg>
