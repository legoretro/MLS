<!--
  MLS homepage mascot animation.
  Source/license: self-made SVG created for this MLS Study Hub. No external images, paid assets,
  copyrighted characters, stock art, watermarks, or third-party mascot assets are used.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-labelledby="title desc">
  <title id="title">Animated MLS lab item mascots</title>
  <desc id="desc">A looping vector scene with an EDTA tube, test tube, blood drop, petri dish, urine cup, and centrifuge.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="24" x2="326" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#e8eefc"/>
    </linearGradient>
    <filter id="softShadow" x="-18%" y="-18%" width="136%" height="145%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#20345d" flood-opacity=".16"/>
    </filter>
    <style>
      :root{
        --ink:#26324a;
        --blue:#6bb8e8;
        --blue2:#dff2ff;
        --lav:#8b66d9;
        --red:#d94b55;
        --gold:#f2bd45;
        --green:#70b56d;
        --cream:#fff8ef;
      }
      .outline{stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:var(--ink);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round}
      .face{fill:var(--ink)}
      .smile{fill:none;stroke:var(--ink);stroke-width:3.4;stroke-linecap:round}
      .label{font:700 13px ui-rounded, "Avenir Next", Arial, sans-serif;fill:var(--ink);letter-spacing:.03em}
      .tiny{font:700 10px ui-rounded, "Avenir Next", Arial, sans-serif;fill:#62708d}
      .blink{transform-origin:center;animation:blink 4.4s ease-in-out infinite;transform-box:fill-box}
      .edta{transform-origin:72px 112px;animation:bounce 4.8s ease-in-out infinite}
      .edta-arm{transform-origin:94px 99px;animation:wave 4.8s ease-in-out infinite}
      .testtube{transform-origin:178px 105px;animation:wobble 5.4s ease-in-out infinite}
      .blood{transform-origin:284px 111px;animation:hop 4.8s ease-in-out infinite}
      .petri{transform-origin:78px 250px;animation:jiggle 5.2s ease-in-out infinite}
      .urine{transform-origin:180px 252px;animation:bounceSmall 5.6s ease-in-out infinite}
      .centrifuge{transform-origin:286px 250px;animation:wobbleSoft 6s ease-in-out infinite}
      .rotor{transform-origin:286px 245px;animation:spin 2.2s linear infinite}
      .bubble{animation:floaty 5s ease-in-out infinite}
      .bubble.two{animation-delay:.6s}
      .bubble.three{animation-delay:1.1s}
      @keyframes blink{
        0%,88%,100%{transform:scaleY(1)}
        91%,94%{transform:scaleY(.08)}
      }
      @keyframes bounce{
        0%,100%{transform:translateY(0) rotate(-3deg)}
        42%{transform:translateY(-8px) rotate(2deg)}
        58%{transform:translateY(-4px) rotate(-1deg)}
      }
      @keyframes bounceSmall{
        0%,100%{transform:translateY(0)}
        48%{transform:translateY(-6px)}
        63%{transform:translateY(-2px)}
      }
      @keyframes wave{
        0%,100%{transform:rotate(0)}
        28%,44%{transform:rotate(-22deg)}
        34%,52%{transform:rotate(14deg)}
      }
      @keyframes wobble{
        0%,100%{transform:rotate(0)}
        18%{transform:rotate(-5deg)}
        34%{transform:rotate(5deg)}
        50%{transform:rotate(-2deg)}
      }
      @keyframes wobbleSoft{
        0%,100%{transform:rotate(0)}
        45%{transform:rotate(2deg)}
        60%{transform:rotate(-2deg)}
      }
      @keyframes hop{
        0%,100%{transform:translateY(0) scale(1)}
        35%{transform:translateY(-12px) scale(1.03)}
        50%{transform:translateY(1px) scale(.98)}
      }
      @keyframes jiggle{
        0%,100%{transform:translateX(0) rotate(0)}
        32%{transform:translateX(-3px) rotate(-2deg)}
        46%{transform:translateX(3px) rotate(2deg)}
        62%{transform:translateX(0) rotate(0)}
      }
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes floaty{
        0%,100%{transform:translateY(0);opacity:.55}
        50%{transform:translateY(-8px);opacity:1}
      }
      @media (prefers-reduced-motion: reduce){
        .edta,.edta-arm,.testtube,.blood,.petri,.urine,.centrifuge,.rotor,.blink,.bubble{animation:none!important}
      }
    </style>
  </defs>

  <rect width="360" height="360" rx="42" fill="url(#bg)"/>
  <path d="M34 62h292M36 300h288" stroke="#d8e1f4" stroke-width="3" stroke-linecap="round"/>
  <path d="M40 108h280M40 203h280" stroke="#edf2fb" stroke-width="2" stroke-linecap="round"/>
  <circle class="bubble" cx="42" cy="42" r="5" fill="#87c9ec"/>
  <circle class="bubble two" cx="318" cy="82" r="7" fill="#d6c7ff"/>
  <circle class="bubble three" cx="304" cy="306" r="5" fill="#8fd1bf"/>

  <g class="edta" filter="url(#softShadow)">
    <path d="M56 48h36v18H56z" fill="#8b66d9" class="outline"/>
    <path d="M60 66h28v92c0 10-6 18-14 18s-14-8-14-18z" fill="#f7fbff" class="outline"/>
    <path d="M62 112h24v42c0 9-5 15-12 15s-12-6-12-15z" fill="#c9b6ff" opacity=".86"/>
    <circle class="face blink" cx="69" cy="94" r="3.3"/>
    <circle class="face blink" cx="81" cy="94" r="3.3"/>
    <path d="M70 106c4 3 8 3 12 0" class="smile"/>
    <path d="M57 114c-15 5-21 1-25-8" fill="none" class="thin"/>
    <path class="edta-arm thin" d="M89 111c14-2 18-10 20-18" fill="none"/>
    <text x="49" y="196" class="label">EDTA</text>
  </g>

  <g class="testtube" filter="url(#softShadow)">
    <path d="M159 52h42" class="outline" fill="none"/>
    <path d="M165 52v105c0 12 7 22 15 22s15-10 15-22V52z" fill="#f8fcff" class="outline"/>
    <path d="M168 112h24v44c0 10-5 17-12 17s-12-7-12-17z" fill="#72c3ed" opacity=".82"/>
    <path d="M169 109c5 3 17 3 23 0" stroke="#3e94c1" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle class="face blink" cx="174" cy="91" r="3.5"/>
    <circle class="face blink" cx="187" cy="91" r="3.5"/>
    <path d="M175 102c4 4 9 4 13 0" class="smile"/>
    <path d="M162 124c-13 3-19 0-23-7" fill="none" class="thin"/>
    <path d="M198 124c13 3 18-1 22-8" fill="none" class="thin"/>
    <text x="147" y="196" class="label">TUBE</text>
  </g>

  <g class="blood" filter="url(#softShadow)">
    <path d="M285 50c20 26 36 49 36 73 0 24-16 41-36 41s-36-17-36-41c0-24 16-47 36-73z" fill="#d94b55" class="outline"/>
    <path d="M274 84c5-9 11-16 18-24" stroke="#ff9099" stroke-width="6" stroke-linecap="round" opacity=".8"/>
    <circle class="blink" cx="275" cy="118" r="4.2" fill="#fff"/>
    <circle class="blink" cx="297" cy="118" r="4.2" fill="#fff"/>
    <path d="M276 133c7 6 15 6 22 0" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M252 130c-11 5-17 2-21-6" fill="none" class="thin"/>
    <path d="M318 130c11 5 17 1 21-7" fill="none" class="thin"/>
    <text x="266" y="196" class="label">DROP</text>
  </g>

  <g class="petri" filter="url(#softShadow)">
    <ellipse cx="78" cy="247" rx="48" ry="32" fill="#fdfbf6" class="outline"/>
    <ellipse cx="78" cy="247" rx="37" ry="23" fill="#d7f4dc" stroke="#7ebd7d" stroke-width="4"/>
    <circle cx="58" cy="240" r="5" fill="#70b56d"/>
    <circle cx="76" cy="256" r="4" fill="#f2bd45"/>
    <circle cx="94" cy="237" r="5" fill="#70b56d"/>
    <path d="M62 260c9-8 22 6 34-4" stroke="#5ea5d6" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle class="face blink" cx="67" cy="247" r="3.2"/>
    <circle class="face blink" cx="88" cy="247" r="3.2"/>
    <path d="M70 258c5 4 12 4 17 0" class="smile"/>
    <text x="55" y="306" class="label">PETRI</text>
  </g>

  <g class="urine" filter="url(#softShadow)">
    <path d="M150 219h60l-8 73c-1 10-10 18-22 18s-21-8-22-18z" fill="#fffaf0" class="outline"/>
    <path d="M156 254h48l-4 36c-1 9-9 15-20 15s-18-6-20-15z" fill="#f2bd45" opacity=".82"/>
    <path d="M155 250c13 5 36 5 50 0" stroke="#d49a25" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M150 219h60" class="outline" fill="none"/>
    <circle class="face blink" cx="171" cy="244" r="3.4"/>
    <circle class="face blink" cx="190" cy="244" r="3.4"/>
    <path d="M172 257c5 4 12 4 17 0" class="smile"/>
    <path d="M158 264c-13 4-20 1-24-7" fill="none" class="thin"/>
    <path d="M205 264c12 4 19 0 23-8" fill="none" class="thin"/>
    <text x="159" y="332" class="label">URINE</text>
  </g>

  <g class="centrifuge" filter="url(#softShadow)">
    <rect x="246" y="217" width="80" height="78" rx="18" fill="#eef4ff" class="outline"/>
    <circle cx="286" cy="245" r="25" fill="#fff" class="outline"/>
    <g class="rotor">
      <path d="M286 245l-3-18h6z" fill="#6bb8e8" class="thin"/>
      <path d="M286 245l17 8-4 6z" fill="#8b66d9" class="thin"/>
      <path d="M286 245l-15 10-4-6z" fill="#f2bd45" class="thin"/>
    </g>
    <rect x="262" y="282" width="49" height="11" rx="5.5" fill="#cfe0ff" stroke="#26324a" stroke-width="3"/>
    <circle class="face blink" cx="274" cy="224" r="3.3"/>
    <circle class="face blink" cx="299" cy="224" r="3.3"/>
    <path d="M278 235c5 4 12 4 17 0" class="smile"/>
    <text x="249" y="332" class="label">SPIN</text>
  </g>
</svg>
