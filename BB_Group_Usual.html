<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BB Group Match - Usual Suspects</title>
<style>
:root{
  --bg:#0d0f12;--bg2:#141720;--bg3:#1c2030;--bg4:#242840;
  --border:#2a2f4a;--border2:#3a4060;--accent:#f06474;--accent2:#ff9aa6;
  --text:#e8eaf6;--text2:#aeb4d2;--text3:#6f7899;--good:#3ddc84;--bad:#f06474;--warn:#f5a623;
  --r:10px;--r2:14px;--mono:"SFMono-Regular","Menlo",monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top left,#2a1420 0,#0d0f12 34%,#090a0d 100%);color:var(--text);font-family:var(--sans);min-height:100vh}
a{color:var(--accent2);text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:22px}
.top{display:flex;gap:14px;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap}
.eyebrow{font-family:var(--mono);font-size:12px;color:var(--accent2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
h1{font-size:28px;line-height:1.1;margin:0 0 8px}
.sub{color:var(--text2);font-size:14px;max-width:720px;line-height:1.5}
.pillbar{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
.pill{border:1px solid var(--border);background:var(--bg2);color:var(--text2);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer}
.pill.active{background:var(--accent);border-color:var(--accent);color:white}
.panel{background:rgba(20,23,32,.92);border:1px solid var(--border);border-radius:var(--r2);box-shadow:0 18px 50px rgba(0,0,0,.28);overflow:hidden}
.toolbar{display:flex;gap:8px;align-items:center;padding:14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.btn{border:1px solid var(--border);background:var(--bg3);color:var(--text);border-radius:var(--r);padding:9px 13px;font-weight:750;font-size:13px;cursor:pointer}
.btn.primary{background:var(--accent);border-color:var(--accent);color:white}
.btn.good{background:#3ddc8420;border-color:#3ddc8460;color:var(--good)}
.score{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--text3)}
.game{display:grid;grid-template-columns:minmax(280px,380px) 1fr;gap:0}
.bank{border-right:1px solid var(--border);padding:14px;background:rgba(13,15,18,.45);min-height:520px}
.bank-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-weight:850;margin-bottom:10px}
.chips{display:flex;flex-direction:column;gap:8px}
.chip{border:1px solid var(--border2);background:linear-gradient(180deg,var(--bg4),var(--bg3));color:var(--text);border-radius:var(--r);padding:10px 11px;font-size:13px;line-height:1.3;cursor:grab;box-shadow:0 4px 14px rgba(0,0,0,.16);user-select:none}
.chip:active{cursor:grabbing}
.chip.selected{outline:2px solid var(--accent2);border-color:var(--accent2)}
.board{padding:14px;display:grid;gap:10px}
.row{display:grid;grid-template-columns:155px 1fr;gap:10px;align-items:stretch}
.system{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px;display:flex;align-items:center;gap:10px}
.dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--system,#f06474);font-family:var(--mono);font-weight:900;color:#fff;flex-shrink:0}
.system-name{font-weight:850;font-size:14px}
.hint{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:2px}
.slot{min-height:62px;border:1.5px dashed var(--border2);border-radius:var(--r);background:rgba(28,32,48,.72);display:flex;align-items:center;padding:8px;transition:.14s}
.slot.over{border-color:var(--accent2);background:#f0647414}
.slot.empty::before{content:"drop matching chip";font-family:var(--mono);font-size:11px;color:var(--text3);padding-left:4px}
.slot .chip{width:100%;cursor:pointer}
.slot.correct{border-style:solid;border-color:var(--good);background:#3ddc8412}
.slot.wrong{border-style:solid;border-color:var(--bad);background:#f0647412}
.mini{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:8px;margin:14px 0}
.mini div{background:rgba(20,23,32,.78);border:1px solid var(--border);border-radius:var(--r);padding:10px;text-align:center;font-size:12px;color:var(--text2)}
.mini b{display:block;color:var(--text);font-size:14px;margin-bottom:2px}
.msg{font-size:13px;color:var(--text2);padding:0 14px 14px;min-height:24px}
.msg.good{color:var(--good)}
.msg.bad{color:var(--bad)}
@media(max-width:820px){
  .game{grid-template-columns:1fr}
  .bank{border-right:0;border-bottom:1px solid var(--border);min-height:0}
  .row{grid-template-columns:1fr}
  .score{margin-left:0;width:100%}
  .mini{grid-template-columns:1fr 1fr}
}
</style>
<script src="interactive_theme.js"></script>
<link rel="stylesheet" href="interactive_learning.css?v=bb-theme-1">
<script src="interactive_music.js?v=bb-theme-1" defer></script>
</head>
<body class="mls-interactive bb-match bb-theme">
<header class="site-header">
  <div>
    <div class="logo">MLS<span style="color:var(--mls-text3)">/</span>BOC<span style="color:var(--mls-text3);font-size:12px;margin-left:8px">PREP</span></div>
    <div class="logo-sub">Interactive Learning</div>
  </div>
  <a class="mls-home-btn" href="index.html#interactive">← Interactive Tools</a>
</header>

<div class="wrap">
  <div class="top">
    <div>
      <div class="eyebrow">Blood Bank Groups</div>
      <h1>Usual Suspects Drag Match</h1>
      <div class="sub">Practice the common blood group systems without donor-percentage drilling. Drag or tap chips into the matching system row.</div>
    </div>
  </div>

  <div class="pillbar" id="roundTabs"></div>

  <section class="panel">
    <div class="toolbar">
      <button class="btn primary" id="checkBtn">Check</button>
      <button class="btn" id="resetBtn">Reset round</button>
      <button class="btn good" id="answerBtn">Show answers</button>
      <div class="score" id="scoreText">0 / 0 placed</div>
    </div>
    <div class="game">
      <aside class="bank">
        <div class="bank-title">Answer chips</div>
        <div class="chips" id="bank"></div>
      </aside>
      <main class="board" id="board"></main>
    </div>
    <div class="msg" id="msg"></div>
  </section>
</div>

<script>
const systems=[
  {id:"abo",name:"ABO",short:"AB",color:"#c74656"},
  {id:"rh",name:"Rh",short:"Rh",color:"#8e44ad"},
  {id:"mns",name:"MNS",short:"MN",color:"#2f7dd1"},
  {id:"p",name:"P / Glob",short:"P",color:"#2fa66a"},
  {id:"kell",name:"Kell",short:"K",color:"#d07a24"},
  {id:"duffy",name:"Duffy",short:"Fy",color:"#d0a126"},
  {id:"kidd",name:"Kidd",short:"Jk",color:"#16a085"},
  {id:"lewis",name:"Lewis",short:"Le",color:"#6474d8"},
  {id:"lutheran",name:"Lutheran",short:"Lu",color:"#bd4d9b"}
];

const rounds=[
  {id:"identity",name:"Round 1: System ID",items:{
    abo:"Ch 9; H/FUT1-FUT2; A sugar = GalNAc, B sugar = galactose; no antithetical pair",
    rh:"Ch 1; Rh/RHAG membrane complex; D has no partner; C/c and E/e are pairs",
    mns:"Ch 4; GYPA makes M/N, GYPB makes S/s/U; M/N and S/s are pairs",
    p:"Ch 22 P1PK plus Ch 3 Glob; glycosphingolipid; P1 weak at birth",
    kell:"Ch 7; Kell linked to Kx; K/k, Kpa/Kpb, Jsa/Jsb are pairs",
    duffy:"Ch 1; ACKR1 multipass glycoprotein; Fya/Fyb pair; malaria clue",
    kidd:"Ch 18; urea transporter; Jka/Jkb pair; antibodies can hide",
    lewis:"Ch 19; plasma antigens adsorb to RBC; Lea/Leb are not true pairs",
    lutheran:"Ch 19; BCAM glycoprotein; Lua/Lub pair; mixed-field expression"
  }},
  {id:"antibody",name:"Round 2: Antibody Rules",items:{
    abo:"IgM cold, naturally occurring; fixes complement; severe HTR, mild HDN",
    rh:"IgG warm; dosage; does not usually fix complement; severe HDN",
    mns:"Anti-M/N often IgM cold; anti-S/s/U IgG warm; M/N enzyme susceptible",
    p:"Anti-P1 IgM cold; anti-PP1Pk IgG/complement; PCH Donath-Landsteiner clue",
    kell:"Usually IgG warm; no dosage; DTT susceptible; enzyme resistant/enhanced",
    duffy:"IgG warm; dosage variable; enzyme susceptible; not naturally occurring",
    kidd:"IgG warm; dosage; complement; delayed HTR; titer drops fast",
    lewis:"IgM cold; naturally occurring; neutralizable; no HDN",
    lutheran:"Lua IgM cold, Lub IgG warm; no complement; no HDN or HTR"
  }},
  {id:"clinical",name:"Round 3: Clinical Clues",items:{
    abo:"H antigen is required; Bombay lacks H; Parabombay secretor has soluble H",
    rh:"Most immunogenic after ABO; D antigen is the major typing clue; severe HDN risk",
    mns:"Anti-N can be transient in dialysis; S/s/U are the stronger clinical risk",
    p:"Anti-P1 often insignificant; anti-PP1Pk can cause HTR and pregnancy loss",
    kell:"McLeod/Kx association; anti-K can cause severe HDN by suppressing erythropoiesis",
    duffy:"Fy(a-b-) common in West Africans; reduced expression protects from malaria",
    kidd:"Classic delayed hemolytic transfusion reaction; weak/disappearing antibody",
    lewis:"Pregnancy transient anti-Lea; antigens poorly expressed on cord cells",
    lutheran:"Sickle-cell overexpression/vaso-occlusion clue; variable expression"
  }}
];

let roundIndex=0;
let placements={};
let selectedChip=null;

function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}
function chipId(systemId){return rounds[roundIndex].id+"__"+systemId;}
function currentRound(){return rounds[roundIndex];}
function systemById(id){return systems.find(s=>s.id===id);}
function formatChipText(text){
  return String(text)
    .split(";")
    .map(part=>part.trim())
    .filter(Boolean)
    .map(part=>`<span>${part}</span>`)
    .join("");
}

function renderTabs(){
  const tabs=document.getElementById("roundTabs");
  tabs.innerHTML=rounds.map((r,i)=>`<button class="pill ${i===roundIndex?"active":""}" data-round="${i}">${r.name}</button>`).join("");
  tabs.querySelectorAll("button").forEach(btn=>btn.addEventListener("click",()=>{
    roundIndex=Number(btn.dataset.round);placements={};selectedChip=null;render();
  }));
}

function makeChip(systemId,text){
  const id=chipId(systemId);
  const chip=document.createElement("div");
  chip.className="chip";
  chip.draggable=true;
  chip.dataset.id=id;
  chip.dataset.system=systemId;
  chip.innerHTML=formatChipText(text);
  chip.addEventListener("dragstart",e=>{e.dataTransfer.setData("text/plain",id);});
  chip.addEventListener("click",()=>selectChip(id));
  if(selectedChip===id)chip.classList.add("selected");
  return chip;
}

function selectChip(id){
  selectedChip=selectedChip===id?null:id;
  render();
}

function placeChip(targetSystemId,id){
  const fromSystem=Object.keys(placements).find(k=>placements[k]===id);
  if(fromSystem)delete placements[fromSystem];
  placements[targetSystemId]=id;
  selectedChip=null;
  render();
}

function clearSlot(systemId){
  delete placements[systemId];
  selectedChip=null;
  render();
}

function renderBank(){
  const bank=document.getElementById("bank");
  const r=currentRound();
  const placed=new Set(Object.values(placements));
  const chips=shuffle(systems.map(s=>({systemId:s.id,text:r.items[s.id],id:chipId(s.id)})).filter(c=>!placed.has(c.id)));
  bank.innerHTML="";
  chips.forEach(c=>bank.appendChild(makeChip(c.systemId,c.text)));
}

function renderBoard(){
  const board=document.getElementById("board");
  const r=currentRound();
  board.innerHTML="";
  systems.forEach(s=>{
    const row=document.createElement("div");
    row.className="row";
    row.innerHTML=`<div class="system"><div class="dot" style="--system:${s.color}">${s.short}</div><div><div class="system-name">${s.name}</div><div class="hint">${r.name}</div></div></div>`;
    const slot=document.createElement("div");
    slot.className="slot empty";
    slot.dataset.system=s.id;
    slot.addEventListener("dragover",e=>{e.preventDefault();slot.classList.add("over");});
    slot.addEventListener("dragleave",()=>slot.classList.remove("over"));
    slot.addEventListener("drop",e=>{
      e.preventDefault();slot.classList.remove("over");
      placeChip(s.id,e.dataTransfer.getData("text/plain"));
    });
    slot.addEventListener("click",()=>{
      if(selectedChip)placeChip(s.id,selectedChip);
      else if(placements[s.id])clearSlot(s.id);
    });
    if(placements[s.id]){
      slot.classList.remove("empty");
      const sysId=placements[s.id].split("__")[1];
      slot.appendChild(makeChip(sysId,r.items[sysId]));
    }
    row.appendChild(slot);
    board.appendChild(row);
  });
}

function updateScore(){
  const placed=Object.keys(placements).length;
  document.getElementById("scoreText").textContent=`${placed} / ${systems.length} placed`;
}

function checkAnswers(){
  let correct=0;
  document.querySelectorAll(".slot").forEach(slot=>{
    const systemId=slot.dataset.system;
    const expected=chipId(systemId);
    slot.classList.remove("correct","wrong");
    if(!placements[systemId])return;
    if(placements[systemId]===expected){slot.classList.add("correct");correct++;}
    else slot.classList.add("wrong");
  });
  const msg=document.getElementById("msg");
  msg.className="msg "+(correct===systems.length?"good":"bad");
  msg.textContent=correct===systems.length?"Perfect. Move to the next round.":`${correct} correct. Tap a filled slot to return a chip.`;
}

function showAnswers(){
  placements={};
  systems.forEach(s=>placements[s.id]=chipId(s.id));
  selectedChip=null;
  render();
  checkAnswers();
}

function resetRound(){
  placements={};selectedChip=null;
  document.getElementById("msg").textContent="";
  document.getElementById("msg").className="msg";
  render();
}

function render(){
  renderTabs();
  renderBank();
  renderBoard();
  updateScore();
}

document.getElementById("checkBtn").addEventListener("click",checkAnswers);
document.getElementById("resetBtn").addEventListener("click",resetRound);
document.getElementById("answerBtn").addEventListener("click",showAnswers);
render();
</script>
</body>
</html>
